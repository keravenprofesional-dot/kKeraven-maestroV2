function CB_redimensionar(archivo){
  return new Promise((ok, mal)=>{
    const img = new Image();
    img.onload = ()=>{
      const MAX = 1400;
      let w = img.width, h = img.height;
      if (Math.max(w,h) > MAX){ const f = MAX/Math.max(w,h); w=Math.round(w*f); h=Math.round(h*f); }
      const cv = document.createElement("canvas"); cv.width=w; cv.height=h;
      cv.getContext("2d").drawImage(img,0,0,w,h);
      ok(cv.toDataURL("image/jpeg",0.85).split(",")[1]);
    };
    img.onerror = ()=>mal(new Error("No se pudo leer la imagen"));
    img.src = URL.createObjectURL(archivo);
  });
}
async function CB_extraerConIA(clave, b64){
  const respuesta = await fetch("https://api.anthropic.com/v1/messages", {
    method:"POST",
    headers:{
      "content-type":"application/json",
      "x-api-key": clave,
      "anthropic-version":"2023-06-01",
      "anthropic-dangerous-direct-browser-access":"true"
    },
    body: JSON.stringify({
      model:"claude-sonnet-5",
      max_tokens:1200,
      messages:[{role:"user", content:[
        {type:"image", source:{type:"base64", media_type:"image/jpeg", data:b64}},
        {type:"text", text:
`Esta es la foto de un CONTRATO DE VENTA A CRÉDITO de Keraven Profesional (República Dominicana), llenado a mano.
Extrae los datos y responde SOLO con un JSON (sin explicaciones, sin markdown) con esta forma exacta:
{"no":"número de contrato (rojo, arriba)","nombre":"nombre del cliente","tel":"teléfono1 solo dígitos","tel2":"teléfono2 solo dígitos o vacío","monto":4900,"saldo":4900,"limite":"AAAA-MM-DD","promesa":"AAAA-MM-DD o vacío","notas":"cédula, dirección, lugar de trabajo, anotaciones a mano (abonos, acuerdos), y la palabra REVISAR en los datos dudosos"}
Reglas: monto = valor total de la venta. saldo = monto menos abonos anotados a mano (si no hay abonos, saldo = monto). limite = fecha límite de pago. promesa = fecha de promesa/acuerdo anotada a mano si existe. Si algo no se lee, déjalo vacío y menciónalo en notas con REVISAR.`}
      ]}]
    })
  });
  if (!respuesta.ok){
    const err = await respuesta.json().catch(()=>({}));
    throw new Error(err.error?.message || ("HTTP " + respuesta.status));
  }
  const dato = await respuesta.json();
  let texto = (dato.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("");
  const ini = texto.indexOf("{"), fin = texto.lastIndexOf("}");
  if (ini<0) throw new Error("La IA no devolvió datos");
  return JSON.parse(texto.slice(ini, fin+1));
}

// Opción 2: importar lote JSON/CSV
function CB_importarLote(ev){
  const f = ev.target.files[0]; if(!f) return;
  const r = new FileReader();
  r.onload = async () => {
    try{
      let nuevos;
      if (f.name.toLowerCase().endsWith(".json")) nuevos = JSON.parse(r.result);
      else nuevos = CB_csvAClientes(r.result);
      const res = await _cobradorSubirLote(Array.isArray(nuevos)?nuevos:[nuevos]);
      CB_cargar(); CB_pintar();
      alert(`Lote importado: ${res.nuevos} clientes nuevos guardados de verdad, ${res.existentes} ya existían.`);
    }catch(e){ alert("No se pudo leer el lote: " + e.message); }
    ev.target.value = "";
  };
  r.readAsText(f, "utf-8");
}
function CB_csvAClientes(texto){
  const lineas = texto.replace(/^﻿/,"").split(/\r?\n/).filter(l=>l.trim());
  const parse = l => (l.match(/("([^"]*)"|[^,]+)(?=,|$)/g)||[]).map(x=>x.replace(/^"|"$/g,"").trim());
  const cab = parse(lineas[0]).map(x=>x.toLowerCase());
  const idx = n => cab.findIndex(c=>c.includes(n));
  const iNo=idx("no"), iNom=idx("cliente")>=0?idx("cliente"):idx("nombre"), iTel=idx("tel"), iMonto=idx("monto"), iSaldo=idx("saldo"), iLim=idx("límite")>=0?idx("límite"):idx("limite"), iNot=idx("nota");
  return lineas.slice(1).map(l=>{
    const c = parse(l);
    const fecha = (c[iLim]||"").includes("/") ? c[iLim].split("/").reverse().join("-") : (c[iLim]||"");
    return {no:c[iNo], nombre:c[iNom], tel:c[iTel], monto:c[iMonto], saldo:iSaldo>=0?c[iSaldo]:undefined, limite:fecha, notas:iNot>=0?c[iNot]:""};
  });
}

function CB_programarEnvio(){
  const nos = [...document.querySelectorAll(".sel-cliente:checked")].map(ch=>ch.value);
  const fecha = document.getElementById("cb-prog-fecha").value;
  const hora = document.getElementById("cb-prog-hora").value;
  if (!nos.length){ alert("Marca al menos un cliente."); return; }
  if (!fecha || !hora){ alert("Pon la fecha y la hora del envío."); return; }
  CB_jobs.push({id:Date.now(), fecha, hora, nos, estado:"pendiente"});
  CB_guardarJobs(); CB_pintarJobs();
  if ("Notification" in window && Notification.permission==="default") Notification.requestPermission();
  alert(`✅ Programado: ${nos.length} mensaje(s) para el ${CB_fechaBonita(fecha)} a las ${hora}.\n\n⚠️ IMPORTANTE: este programa debe estar ABIERTO en el navegador ese día a esa hora para poder enviar.`);
}
function CB_pintarJobs(){
  if(!document.getElementById('cb-lista-jobs')) return;

  const el = document.getElementById("cb-lista-jobs");
  if (!CB_jobs.length){ el.innerHTML = "<p style='color:#667'>No hay envíos programados.</p>"; return; }
  el.innerHTML = CB_jobs.map(j=>`
    <div class="tarjeta" style="display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:8px">
      <div>📅 <b>${CB_fechaBonita(j.fecha)} a las ${j.hora}</b> — ${j.nos.length} cliente(s) — ${j.estado==="pendiente"?"⏳ pendiente":"✅ enviado"}<br>

      <button class="peligro btn-mini" onclick="CB_borrarJob(${j.id})">🗑</button>
    </div>`).join("");
}
function CB_borrarJob(id){ CB_jobs = CB_jobs.filter(j=>j.id!==id); CB_guardarJobs(); CB_pintarJobs(); }
function CB_revisarProgramados(){
  const ahora = new Date();
  CB_jobs.forEach(j=>{
    if (j.estado!=="pendiente") return;
    if (ahora >= new Date(j.fecha + "T" + j.hora)){
      j.estado = "enviado"; CB_guardarJobs();
      CB_colaEnvio = CB_clientes.map((c,i)=>({c,i})).filter(x => j.nos.includes(String(x.c.no)) && x.c.saldo>0 && x.c.tel);
      if ("Notification" in window && Notification.permission==="granted")
        new Notification("💰 Cobrador Keraven", {body:`Hora de enviar ${CB_colaEnvio.length} recordatorio(s) programado(s)`});
      CB_sonar();

      document.getElementById("cb-progreso-envio").innerHTML =
        `⏰ ¡Llegó la hora! ${CB_colaEnvio.length} cobro(s) listos. <button class="principal" onclick="CB_siguienteEnvio()">▶️ COMENZAR ENVÍO</button>`;
      alert(`⏰ ¡Llegó la hora del envío programado (${CB_fechaBonita(j.fecha)} ${j.hora})!\n\nDale a "▶️ COMENZAR ENVÍO": se abrirá WhatsApp con cada mensaje listo, presiona enviar y luego "Siguiente".`);
    }
  });
}
function CB_sonar(){
  try{
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    [0,.7,1.4].forEach(t=>{
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination); o.frequency.value = 880;
      g.gain.setValueAtTime(.25, ctx.currentTime + t);
      o.start(ctx.currentTime + t); o.stop(ctx.currentTime + t + .45);
    });
  }catch(e){}
}

// ------------------- Provincias (RD, ver PROVINCIAS_RD global) -------------------
function CB_llenarFiltroProvincia(){

  PROVINCIAS_RD.forEach(function(p){ sel.innerHTML+='<option value="'+p+'">'+p+'</option>'; });

// ------------------- Tabla principal -------------------
function CB_pintar(){
  if(!document.getElementById('cb-cuerpo')) return;
  CB_llenarFiltroProvincia();

  const filtro = document.getElementById("cb-filtro").value;
  const filtroProvincia = (document.getElementById("cb-filtro-provincia")||{}).value||'';
  const q = document.getElementById("cb-buscar").value.toLowerCase();
  const cuerpo = document.getElementById("cb-cuerpo");
  cuerpo.innerHTML = "";
  let pendiente=0, vencidos=0, promesasHoy=0, pagados=0, facturado=0;
  CB_clientes.forEach((c,i)=>{
    const est = CB_estadoDe(c);
    facturado += c.monto;
    if (est!=="pagado") pendiente += c.saldo;
    if (est==="vencido") vencidos++;
    if (est==="pagado") pagados++;
    if (c.promesa === CB_hoyISO() && est!=="pagado") promesasHoy++;
    const pasa =
      (filtro==="todos") ||
      (filtro==="vencidos" && est==="vencido") ||
      (filtro==="promesas" && c.promesa===CB_hoyISO() && est!=="pagado") ||
      (filtro==="pagados" && est==="pagado");
    const coincideProvincia = !filtroProvincia || c.provincia===filtroProvincia;
    const coincide = !q || c.nombre.toLowerCase().includes(q) || String(c.no).includes(q);
    if (!pasa || !coincideProvincia || !coincide) return;
    const dias = CB_diasAtraso(c);
    const tr = document.createElement("tr");
    tr.className = est;
    tr.innerHTML = `
      <td>${c.no}</td>
      <td><b>${c.nombre}</b></td>
      <td>${c.provincia||"—"}</td>
      <td>${c.tel||"—"}${c.tel2?"<br>"+c.tel2:""}</td>
      <td>${CB_fmt(c.monto)}</td>
      <td class="rojo"><b>${c.saldo>0? CB_fmt(c.saldo) : "0 ✅"}</b></td>
      <td>${CB_fechaBonita(c.limite)}</td>
      <td>${dias>0? dias+" días":"—"}</td>
      <td class="estado-${est}">${est==="aldia"?"AL DÍA":est.toUpperCase()}</td>
      <td>${c.promesa? (c.promesa===CB_hoyISO()? "<span class='chip'>📅 HOY</span>" : CB_fechaBonita(c.promesa)) : "—"}</td>
      <td style="max-width:220px">${c.notas||""}${c.ultimoCobro?`<br><span class='chip'>último cobro: ${CB_fechaBonita(c.ultimoCobro)}</span>`:""}</td>
      <td style="white-space:nowrap">
        <button class="principal btn-mini" onclick="CB_cobrar(${i})">📲 Cobrar</button>
        <button class="btn-mini" onclick="CB_registrarAbono(${i})">💵 Abono</button>
        <button class="btn-mini" onclick="CB_abrirEdicion(${i})">✏️</button>
      </td>`;
    cuerpo.appendChild(tr);
  });
  document.getElementById("cb-t-facturado").textContent = "RD$" + CB_fmt(facturado);
  document.getElementById("cb-t-cantidad").textContent = CB_clientes.length + " facturas";
  document.getElementById("cb-t-cobrado").textContent = "RD$" + CB_fmt(facturado - pendiente);
  document.getElementById("cb-t-pendiente").textContent = "RD$" + CB_fmt(pendiente);
  document.getElementById("cb-t-vencidos").textContent = vencidos;
  document.getElementById("cb-t-promesas").textContent = promesasHoy;
  document.getElementById("cb-t-pagados").textContent = pagados;
}

</script>

function aplicarGPS(pos){

/* ── Detección de foto borrosa (varianza Laplaciana) ── */
function _checkBlur(dataUrl){
  return new Promise(function(res){
    var img=new Image();
    img.onerror=function(){ res({score:999,blurry:false,borderline:false}); };
    img.onload=function(){
      try{
        var cv=document.createElement('canvas');
        var esc=Math.min(1,320/img.width);
        cv.width=Math.max(2,Math.round(img.width*esc));
        cv.height=Math.max(2,Math.round(img.height*esc));
        var cx=cv.getContext('2d');
        cx.drawImage(img,0,0,cv.width,cv.height);
        var d=cx.getImageData(0,0,cv.width,cv.height).data;
        var w=cv.width,hh=cv.height,g=new Float32Array(w*hh);
        for(var i=0;i<d.length;i+=4) g[i/4]=0.299*d[i]+0.587*d[i+1]+0.114*d[i+2];
        var s=0,s2=0,n=0;
        for(var y=1;y<hh-1;y++) for(var x=1;x<w-1;x++){
          var lap = 4*g[y*w+x] - g[(y-1)*w+x] - g[(y+1)*w+x] - g[y*w+x-1] - g[y*w+x+1];
          s+=lap; s2+=lap*lap; n++;
        }
        var v = n? (s2 - (s*s)/n)/n : 999;
        res({score:Math.round(v), blurry:v<80, borderline:v<200});
      }catch(e){ res({score:999,blurry:false,borderline:false}); }
    };
    img.src=dataUrl;
  });
}

/* ── Validar cédula con IA: compara la foto contra lo digitado ── */
async function validarDocumentosAI(){
  var box=document.getElementById('val_result');
  var nm=(document.getElementById('cf_nm')||{}).value||'';
  var ce=(document.getElementById('cf_ce')||{}).value||'';
  nm=nm.trim().toUpperCase(); ce=ce.replace(/\D/g,'');

  function show(bg,br,col,html){
    if(!box) return;
    box.style.display='block';
    box.style.background=bg; box.style.border='1.5px solid '+br; box.style.color=col;
    box.innerHTML=html;
  }
  if(!fotos.f && !fotos.r){
    show('#FFEBEE','#C62828','#7F0000','⚠️ Toma primero la foto de la cédula.');
    return;
  }
  if(!nm || !ce){
    show('#FFF3E0','#FF8F00','#E65100','⚠️ Escribe el nombre y la cédula antes de validar.');
    return;
  }
  show('#E3F2FD','#0288D1','#01579B','🔍 Analizando la cédula con IA…');

  try{
    var img=(fotos.f||fotos.r).split(',')[1];
    var ia=await apiFetch('/api/ia/leer-cedula',{method:'POST',body:{imagenBase64:img}});

    if(!ia.esCedula){
      show('#FFEBEE','#C62828','#7F0000',
        '<b>❌ Esta foto no es una cédula.</b><br>Tomá una foto clara del documento de identidad, no de otra cosa.');
      return;
    }
    if(!ia.legible){
      show('#FFEBEE','#C62828','#7F0000',
        '<b>❌ La foto de la cédula no se lee bien.</b><br>Tómala de nuevo con buena luz y sin movimiento.');
      return;
    }
    function norm(s){ return (s||'').toUpperCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim(); }
    var alertas=[];
    var A=norm(ia.nombre).split(/\s+/).filter(Boolean);
    var B=norm(nm).split(/\s+/).filter(Boolean);
    if(A.length && B.length){
      var hit=A.filter(function(w){ return B.some(function(x){ return x===w||x.indexOf(w)>=0||w.indexOf(x)>=0; }); });
      var sim=hit.length/Math.max(A.length,B.length);
      if(sim<0.5) alertas.push('⚠️ <b>EL NOMBRE NO COINCIDE</b><br>Cédula: "'+ia.nombre+'"<br>Digitado: "'+nm+'"');
      else if(sim<0.8) alertas.push('⚠️ El nombre podría estar mal escrito.<br>Cédula: "'+ia.nombre+'" · Digitado: "'+nm+'"');
    }
    var cIA=(ia.cedula||'').replace(/\D/g,'');
    if(cIA && cIA!==ce) alertas.push('❌ <b>LA CÉDULA NO COINCIDE</b><br>Foto: '+ia.cedula+'<br>Digitada: '+ce);

    var pieFac = fotos.fac
      ? '<div style="margin-top:9px;font-size:12px">📄 Foto de la factura: capturada ✓</div>'
      : '<div style="margin-top:9px;font-size:12px;color:#E65100">⚠️ Falta la foto de la factura física.</div>';

    if(!alertas.length){
      show('#E8F5E9','#2E7D32','#1B5E20',
        '<b>✅ Documentos validados</b><div style="font-size:12px;margin-top:5px">Nombre: <b>'+ia.nombre
        +'</b> · Cédula: <b>'+ia.cedula+'</b></div>'+pieFac);
    } else {
      show('#FFEBEE','#C62828','#7F0000',
        '<b>⚠️ Alertas de validación</b>'
        + alertas.map(function(a){
            return '<div style="margin-top:6px;padding:7px 10px;background:rgba(255,255,255,.55);border-radius:6px;font-size:12px">'+a+'</div>';
          }).join('') + pieFac);
    }
  }catch(e){
    show('#FFF3E0','#FF8F00','#E65100','📶 No se pudo validar con IA: '+(e.message||'revisa tu conexión.'));
  }
}

(function(){

    _refrescarBotonValidar();

          +'color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:11px;font-family:inherit">📷 Retomar</button>'

      } else {

      }
    });
  };
})();

<script>
/* ══════════════════════════════════════════════════════════════
   1) NAVEGACIÓN — flecha para volver atrás
════════════════════════════════════════════════════════════════ */
var _navHist=[], _navBack=false;
(function(){
  var _ir=window.ir;
  if(!_ir) return;
  window.ir=function(id){
    try{
      if(!_navBack && typeof pag!=='undefined' && pag && pag!==id){
        _navHist.push(pag);
        if(_navHist.length>40) _navHist.shift();
      }
    }catch(e){}
    _navBack=false;
    _ir.apply(this, arguments);
    _navPintar();
  };
})();
function volverAtras(){
  if(!_navHist.length) return;
  var previo=_navHist.pop();
  _navBack=true;
  ir(previo);
}
function _navPintar(){
  var b=document.getElementById('btn_back');
  if(b) b.style.display = _navHist.length ? 'flex' : 'none';
}
/* Botón físico "atrás" del teléfono */
window.addEventListener('popstate', function(){ if(_navHist.length) volverAtras(); });


/* ══════════════════════════════════════════════════════════════
   2) ORGANIZAR MÓDULOS — flechas ◀ ▶ (funcionan en móvil y PC)
════════════════════════════════════════════════════════════════ */
function kvMoverCard(id, dir, e){
  if(e){ e.stopPropagation(); e.preventDefault(); }
  var grid=document.getElementById('kv_grid'); if(!grid) return;
  var cards=[].slice.call(grid.querySelectorAll('.lc'));
  var i=cards.findIndex(function(c){ return c.getAttribute('data-id')===id; });
  if(i<0) return;
  var j=i+dir;
  if(j<0 || j>=cards.length) return;
  if(dir>0) grid.insertBefore(cards[j], cards[i]);
  else      grid.insertBefore(cards[i], cards[j]);
  kvSaveOrder();
}
/* Inyecta las flechas en cada tarjeta al activar el modo Organizar */
(function(){
  var _tog=window.kvToggleOrg;
  if(!_tog) return;
  window.kvToggleOrg=function(){
    _tog.apply(this, arguments);
    var grid=document.getElementById('kv_grid'); if(!grid) return;
    var edit=grid.classList.contains('edit-mode');
    grid.querySelectorAll('.lc').forEach(function(c){
      if(edit && !c.querySelector('.lc-move')){
        var id=c.getAttribute('data-id');
        var izq=document.createElement('button');
        izq.className='lc-move izq'; izq.type='button'; izq.textContent='◀';
        izq.title='Mover a la izquierda';
        izq.onclick=function(e){ kvMoverCard(id,-1,e); };
        var der=document.createElement('button');
        der.className='lc-move der'; der.type='button'; der.textContent='▶';
        der.title='Mover a la derecha';
        der.onclick=function(e){ kvMoverCard(id, 1,e); };
        c.appendChild(izq); c.appendChild(der);
      }
      if(!edit) c.querySelectorAll('.lc-move').forEach(function(b){ b.remove(); });
    });
  };
})();

════════════════════════════════════════════════════════════════ */
function _cbLog(msg){
  var el=document.getElementById('cb-excel-log');
  if(el) el.textContent += (el.textContent?'\n':'') + msg;
}
/* Normaliza un encabezado: minúsculas, sin tildes ni signos */
function _cbNorm(s){
  return String(s||'').toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .replace(/[^a-z0-9]/g,'');
}
/* Convierte una fecha de Excel (serie, texto ISO o dd/mm/aaaa) a AAAA-MM-DD */
function _cbFecha(v){
  if(v===undefined || v===null || v==='') return '';
  if(v instanceof Date && !isNaN(v)) return v.toISOString().slice(0,10);
  if(typeof v==='number'){                    // serie de Excel
    var d=new Date(Math.round((v-25569)*86400*1000));
    return isNaN(d) ? '' : d.toISOString().slice(0,10);
  }
  var s=String(v).trim();
  if(/^\d{4}-\d{2}-\d{2}/.test(s)) return s.slice(0,10);
  var m=s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})$/);   // dd/mm/aaaa
  if(m){
    var a=m[3].length===2 ? '20'+m[3] : m[3];
    return a+'-'+('0'+m[2]).slice(-2)+'-'+('0'+m[1]).slice(-2);
  }
  return s;
}
function _cbNum(v){
  if(v===undefined||v===null||v==='') return null;
  var n=parseFloat(String(v).replace(/[^0-9.\-]/g,''));
  return isNaN(n)?null:n;
}
/* Mapea una fila del Excel al formato del cobrador */
function _cbFila(obj){
  var g={};
  Object.keys(obj).forEach(function(k){ g[_cbNorm(k)] = obj[k]; });
  function buscar(lista){
    for(var i=0;i<lista.length;i++){
      var t=lista[i];
      var k=Object.keys(g).find(function(x){ return x===t; });
      if(k!==undefined && g[k]!=='' && g[k]!==null && g[k]!==undefined) return g[k];
    }
    for(var j=0;j<lista.length;j++){
      var t2=lista[j];
      var k2=Object.keys(g).find(function(x){ return x.indexOf(t2)>=0; });
      if(k2!==undefined && g[k2]!=='' && g[k2]!==null && g[k2]!==undefined) return g[k2];
    }
    return '';
  }
  var monto  = _cbNum(buscar(['montofactura','monto','montords','total','valor']));
  var abon   = _cbNum(buscar(['abonado','abonadords','pagado','abono']));
  var saldo  = _cbNum(buscar(['saldodeberds','saldodebe','saldo','resta','debe','pendiente']));
  if(saldo===null && monto!==null) saldo = monto - (abon||0);
  return {
    no:     String(buscar(['no','nocontrato','contrato','numero','factura'])||'').trim(),
    nombre: String(buscar(['cliente','nombre','nombrecliente'])||'').trim(),
    tel:    String(buscar(['telefono1','telefono','tel','celular'])||'').replace(/\D/g,''),
    tel2:   String(buscar(['telefono2','tel2','telefonoalterno'])||'').replace(/\D/g,''),
    monto:  monto||0,
    saldo:  (saldo===null? (monto||0) : saldo),
    limite: _cbFecha(buscar(['fechalimite','limite','vence','vencimiento'])),
    promesa:_cbFecha(buscar(['promesa','promesadepago'])),
    notas:  String(buscar(['notas','nota','observaciones','comentarios'])||'').trim(),
  };
}
/* Lee el archivo Excel y lo importa */
async function cbImportarExcel(ev){
  var f = ev.target.files && ev.target.files[0];
  if(!f) return;
  var log=document.getElementById('cb-excel-log'); if(log) log.textContent='';
  if(typeof XLSX==='undefined'){
    _cbLog('❌ No se pudo cargar el lector de Excel. Revisa tu conexión a internet y recarga la página.');
    ev.target.value=''; return;
  }
  _cbLog('📖 Leyendo "'+f.name+'"…');
  var r=new FileReader();
  r.onload=async function(e){
    try{
      var wb = XLSX.read(new Uint8Array(e.target.result), {type:'array', cellDates:true});
      var hoja = wb.SheetNames[0];
      _cbLog('   Hoja: "'+hoja+'"');
      var filas = XLSX.utils.sheet_to_json(wb.Sheets[hoja], {defval:''});

      // Si la 1ª fila no trae encabezados válidos, busca la fila de encabezado real
      var tieneCliente = filas.length && Object.keys(filas[0]).some(function(k){
        return /cliente|nombre/.test(_cbNorm(k));
      });
      if(!tieneCliente){
        var m = XLSX.utils.sheet_to_json(wb.Sheets[hoja], {header:1, defval:''});
        var iCab = m.findIndex(function(row){
          return row.some(function(c){ return /cliente|nombre/.test(_cbNorm(c)); });
        });
        if(iCab>=0){
          _cbLog('   Encabezados detectados en la fila '+(iCab+1));
          filas = XLSX.utils.sheet_to_json(wb.Sheets[hoja], {range:iCab, defval:''});
        }
      }
      _cbLog('   '+filas.length+' fila(s) leída(s)');

      var listos = filas.map(_cbFila).filter(function(c){
        return c.nombre && !/^totales?$/i.test(c.nombre);
      });
      _cbLog('   '+listos.length+' cliente(s) válido(s)');
      if(!listos.length){
        _cbLog('❌ No encontré clientes. El Excel debe tener al menos las columnas: No. · Cliente · Teléfono · Monto');
        ev.target.value=''; return;
      }
      _cbLog('   Subiendo a la base de datos…');
      var res = await _cobradorSubirLote(listos);
      CB_cargar(); CB_pintar();
      _cbLog('');
      _cbLog('✅ '+res.nuevos+' cliente(s) nuevo(s) creado(s) de verdad en la base de datos');
      _cbLog('⏭️  '+res.existentes+' ya existían — no se duplicaron (se les actualizó teléfono 2/fecha límite/promesa/notas si venían vacíos)');
      if(res.errores) _cbLog('❌ '+res.errores+' con error');
      _cbLog('');
      _cbLog('Ve a la pestaña 👥 Clientes para verlos.');
      if(typeof showToast==='function') showToast('Excel importado: '+res.nuevos+' clientes nuevos');
    }catch(err){
      _cbLog('❌ Error al leer el Excel: '+err.message);
    }
    ev.target.value='';
  };
  r.onerror=function(){ _cbLog('❌ No se pudo abrir el archivo.'); ev.target.value=''; };
  r.readAsArrayBuffer(f);
}

<script>
/* ══════════════════════════════════════════════════════════════════
   CARGA POR EXCEL — FACTURACIÓN
   Crea contratos reales (POST /api/contratos, igual que enviarC())
   desde un Excel con varios clientes. Cada fila entra al Buzón como
   "pendiente" -- alguien tiene que revisarla y aprobarla igual que
   una venta manual, y luego completar foto de cédula/GPS desde el
   celular si hace falta. Reutiliza _cbNorm/_cbFecha/_cbNum (ya
   cargados por el panel de Excel del Cobrador, más arriba).
══════════════════════════════════════════════════════════════════ */
function _facTipoVenta(v){
  var n=_cbNorm(v);
  if(n.indexOf('cred')>=0) return 'credito';
  if(n.indexOf('cont')>=0) return 'contado';
  return '';
}
/* "Duo Kit 10oz, Bálsamo" → nombres reales del catálogo (PRODS), sin
   duplicar por mayúsculas/tildes distintas a como están guardados */
function _facProductos(v){
  var crudos=String(v||'').split(/[,;]+/).map(function(s){return s.trim();}).filter(Boolean);
  var out=[], noEncontrados=[];
  crudos.forEach(function(nombre){
    var n=_cbNorm(nombre);
    var real=(typeof PRODS!=='undefined'?PRODS:[]).find(function(p){return _cbNorm(p)===n;});
    if(real){ if(out.indexOf(real)<0) out.push(real); }
    else noEncontrados.push(nombre);
  });
  return {productos:out, noEncontrados:noEncontrados};
}
function _facFila(obj){
  var g={};
  Object.keys(obj).forEach(function(k){ g[_cbNorm(k)] = obj[k]; });
  function buscar(lista){
    for(var i=0;i<lista.length;i++){
      var k=Object.keys(g).find(function(x){ return x===lista[i]; });
      if(k!==undefined && g[k]!=='' && g[k]!==null && g[k]!==undefined) return g[k];
    }
    // 2º intento: coincidencia parcial (ej. "Monto RD$" → "montord" contiene "monto")
    for(var j=0;j<lista.length;j++){
      var k2=Object.keys(g).find(function(x){ return x.indexOf(lista[j])>=0; });
      if(k2!==undefined && g[k2]!=='' && g[k2]!==null && g[k2]!==undefined) return g[k2];
    }
    return '';
  }
  var pr=_facProductos(buscar(['productos','producto']));
  return {
    nombre:       String(buscar(['cliente','nombre','nombrecliente'])||'').trim().toUpperCase(),
    cedula:       String(buscar(['cedula'])||'').trim(),
    telefono1:    String(buscar(['telefono1','telefono','tel','celular'])||'').trim(),
    telefono2:    String(buscar(['telefono2','tel2','telefonoalterno'])||'').trim(),
    email:        String(buscar(['correo','email','correoelectronico'])||'').trim(),
    institucion:  String(buscar(['institucion','trabajo'])||'').trim().toUpperCase(),
    barrio:       String(buscar(['barrio','sector'])||'').trim().toUpperCase(),
    referencia:   String(buscar(['referencia'])||'').trim().toUpperCase(),
    direccion:    String(buscar(['direccion'])||'').trim().toUpperCase(),
    zona:         String(buscar(['zona','ruta'])||'').trim().toUpperCase(),
    promotorNombre: String(buscar(['promotor'])||'').trim().toUpperCase(),
    tipoVenta:    _facTipoVenta(buscar(['tipo','tipoventa','tipodeventa'])),
    plazoDias:    _cbNum(buscar(['plazo','plazodias'])),
    productos:    pr.productos,
    _productosNoEncontrados: pr.noEncontrados,
    monto:        _cbNum(buscar(['monto','montords','total','valor'])),
    descuento:    _cbNum(buscar(['descuento'])) || 0,
    observaciones:String(buscar(['observaciones','notas','comentarios'])||'').trim(),
  };
}
function _facValidarFila(f){
  var errores=[];
  if(!f.nombre) errores.push('falta el nombre del cliente');
  if(!f.cedula) errores.push('falta la cédula');
  if(!f.telefono1) errores.push('falta el teléfono');
  if(!f.monto || f.monto<=0) errores.push('falta el monto (o es 0)');
  if(!f.tipoVenta) errores.push('el tipo debe ser "Crédito" o "Contado"');
  if(f.tipoVenta==='credito' && !f.plazoDias) errores.push('venta a crédito sin plazo (días)');
  if(!f.promotorNombre) errores.push('falta el promotor');
  if(!f.productos.length) errores.push('ningún producto reconocido'+(f._productosNoEncontrados.length?' ("'+f._productosNoEncontrados.join('", "')+'" no está en el catálogo)':''));
  return errores;
}
function facPlantillaExcel(){
  if(typeof XLSX==='undefined'){ alert('Recarga la página: el lector de Excel no cargó.'); return; }
  var nombreProd1=(typeof PRODS!=='undefined'&&PRODS[0])?PRODS[0]:'Duo Kit 10 oz';
  var datos=[
    ['Cliente','Cédula','Teléfono 1','Teléfono 2','Correo','Institución','Barrio','Referencia','Dirección',
     'Zona','Promotor','Tipo (Crédito/Contado)','Plazo (días)','Productos','Monto RD$','Descuento RD$','Observaciones'],
    ['Nombre Apellido','000-0000000-0','8091234567','8299876543','correo@ejemplo.com','Escuela / Empresa',
     'Los Mameyes','Frente al parque','Calle Principal #12','SANTO DOMINGO','PROMOTOR A','Crédito',30,

    {wch:16},{wch:14},{wch:18},{wch:11},{wch:22},{wch:11},{wch:12},{wch:30}];
  var wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Ventas');

}
function _facLog(msg){
  var log=document.getElementById('fac-excel-log');
  if(log) log.textContent += (log.textContent?'\n':'')+msg;
}
async function facImportarExcel(ev){
  var f = ev.target.files && ev.target.files[0];
  if(!f) return;
  var log=document.getElementById('fac-excel-log'); if(log) log.textContent='';
  if(typeof XLSX==='undefined'){ _facLog('❌ No se pudo cargar el lector de Excel. Revisa tu conexión e intenta de nuevo.'); ev.target.value=''; return; }
  _facLog('📖 Leyendo "'+f.name+'"…');
  var r=new FileReader();
  r.onload=async function(e){
    var filas=[];
    try{
      var wb = XLSX.read(new Uint8Array(e.target.result), {type:'array', cellDates:true});
      var hoja = wb.SheetNames[0];
      filas = XLSX.utils.sheet_to_json(wb.Sheets[hoja], {defval:''});
      _facLog('   '+filas.length+' fila(s) leída(s)');
    }catch(err){ _facLog('❌ Error al leer el Excel: '+err.message); ev.target.value=''; return; }

    var registros=filas.map(_facFila).filter(function(x){ return x.nombre && !/^totales?$/i.test(x.nombre); });
    if(!registros.length){ _facLog('❌ No encontré clientes en el Excel. Descarga la plantilla para ver el formato.'); ev.target.value=''; return; }

    var creados=0, conError=0;
    var btn=document.getElementById('fac-excel-btn'); if(btn){ btn.disabled=true; btn.textContent='Importando…'; }
    for (var i=0;i<registros.length;i++){
      var reg=registros[i];
      var errores=_facValidarFila(reg);
      if(errores.length){
        conError++;
        _facLog('❌ Fila '+(i+2)+' ('+(reg.nombre||'sin nombre')+'): '+errores.join('; '));
        continue;
      }
      try{
        var contrato=await apiFetch('/api/contratos',{method:'POST',body:{
          fecha:hoy(), promotorId:null, promotorNombre:reg.promotorNombre, zona:reg.zona,
          nombre:reg.nombre, cedula:reg.cedula, telefono1:reg.telefono1, telefono2:reg.telefono2,
          email:reg.email, institucion:reg.institucion, barrio:reg.barrio, referencia:reg.referencia,
          direccion:reg.direccion, tipoVenta:reg.tipoVenta, plazoDias:reg.plazoDias||null,
          fechaLimite:reg.plazoDias?addD(hoy(),reg.plazoDias):null, productos:reg.productos,
          monto:reg.monto, descuento:reg.descuento,
          observaciones:(reg.observaciones?reg.observaciones+' — ':'')+'Importado desde Excel: falta foto de cédula y GPS.',
          origen:'excel',
        }});
        creados++;
        _facLog('✅ Fila '+(i+2)+': '+reg.nombre+' → '+contrato.numero_factura);
      }catch(err){
        conError++;
        _facLog('❌ Fila '+(i+2)+' ('+reg.nombre+'): '+err.message);
      }
    }
    if(btn){ btn.disabled=false; btn.textContent='📥 Importar Excel'; }
    _facLog('');
    _facLog('✅ '+creados+' contrato(s) creado(s) — quedaron pendientes en el Buzón.');
    if(conError) _facLog('⚠️ '+conError+' fila(s) con error — revísalas arriba y vuelve a intentar solo esas.');
    if(creados){ await cargarContratos(); buildBotNav(); if(typeof showToast==='function') showToast(creados+' contrato(s) importado(s) al Buzón'); }
    ev.target.value='';
  };
  r.onerror=function(){ _facLog('❌ No se pudo abrir el archivo.'); ev.target.value=''; };
  r.readAsArrayBuffer(f);
}

/* Panel colapsable arriba del formulario manual -- puramente aditivo,

    var panel =

      + '<details>'
      +   '<summary style="cursor:pointer"><b>📊 Importar / Exportar Excel</b> <span style="font-size:11px;color:var(--k-mist);font-weight:400">(para no digitar uno por uno)</span></summary>'
      +   '<div style="margin-top:12px;font-size:12px;color:var(--k-mist)">Cada fila importada se crea como una venta nueva y entra al <b>Buzón</b> como <b>pendiente de aprobación</b> -- después hay que completarle la foto de cédula y el GPS desde el celular antes de aprobarla.</div>'
      +   '<div style="margin:10px 0;font-size:12px;color:var(--k-mist)">Columnas: <b>Cliente, Cédula, Teléfono 1/2, Correo, Institución, Barrio, Referencia, Dirección, Zona, Promotor, Tipo (Crédito/Contado), Plazo (días), Productos, Monto, Descuento, Observaciones</b>.</div>'
      +   '<div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:10px">'
      +     '<input type="file" id="fac-excel-file" accept=".xlsx,.xls">'
      +     '<button type="button" class="bs" onclick="facPlantillaExcel()">⬇️ Descargar plantilla</button>'
      +     '<button type="button" class="bg" id="fac-excel-btn">📥 Importar Excel</button>'
      +     '<button type="button" class="bs" onclick="facExportarExcel()">⬇️ Exportar facturación actual</button>'
      +   '</div>'
      +   '<pre id="fac-excel-log" style="white-space:pre-wrap;font-family:inherit;font-size:12px;background:rgba(0,0,0,.03);border-radius:8px;padding:10px;min-height:20px;max-height:220px;overflow-y:auto">Esperando archivo…</pre>'
      + '</details>'
      + '</div>';
    return panel + html;
  };
})();
(function(){
  document.addEventListener('change', function(ev){
    if(ev.target && ev.target.id==='fac-excel-file') facImportarExcel(ev);
  });
})();
</script>

<script>
/* ══════════════════════════════════════════════════════════════════
   GESTIÓN DE PRODUCTOS — no existía pantalla (solo la API en db.js/
   server.js, ya construida en la Etapa 2). Lista, crear, editar precio/
   nombre/categoría, desactivar/reactivar. Importar/Exportar Excel solo
   si Gerencia le dio a este usuario el permiso opcional 'excel'.
══════════════════════════════════════════════════════════════════ */
function rProductosAdmin(){
  var activos = PRODUCTOS_ADMIN.filter(function(p){return p.activo;});
  var inactivos = PRODUCTOS_ADMIN.filter(function(p){return !p.activo;});
  var cats = {};
  activos.forEach(function(p){ var k=p.categoria||'Otros'; (cats[k]=cats[k]||[]).push(p); });
  var body = '<div style="display:flex;gap:8px;margin-bottom:14px"><button class="bg" onclick="prodAbrirNuevo()"><i class="ti ti-plus"></i> Nuevo producto</button></div>';
  Object.keys(cats).sort().forEach(function(cat){
    body += '<div class="sl">'+cat+'</div><div class="tbl-wrap"><table class="tbl"><thead><tr><th>Código</th><th>Producto</th><th class="tr">Precio referencia</th><th>Acciones</th></tr></thead><tbody>'
      + cats[cat].map(function(p){
          return '<tr><td><span class="pill">'+(p.codigo||'—')+'</span></td><td style="font-weight:600">'+p.nombre+'</td><td class="tr">'+fM(Number(p.precio_referencia)||0)+'</td>'
            + '<td><button class="bsm" onclick="prodAbrirEdicion('+p.id+')"><i class="ti ti-edit"></i></button> '
            + '<button class="bsm" style="color:var(--er)" onclick="prodDesactivar('+p.id+')"><i class="ti ti-trash"></i></button></td></tr>';
        }).join('')
      + '</tbody></table></div>';
  });
  if(!activos.length) body += '<div class="empty"><i class="ti ti-tag"></i><p>Sin productos activos</p></div>';
  if(inactivos.length){
    body += '<details style="margin-top:14px"><summary style="cursor:pointer">🗄️ Desactivados ('+inactivos.length+')</summary>'
      + '<div class="tbl-wrap"><table class="tbl"><thead><tr><th>Producto</th><th class="tr">Precio</th><th>Acciones</th></tr></thead><tbody>'
      + inactivos.map(function(p){ return '<tr style="opacity:.6"><td>'+p.nombre+'</td><td class="tr">'+fM(Number(p.precio_referencia)||0)+'</td>'
        + '<td><button class="bsm" onclick="prodReactivar('+p.id+')"><i class="ti ti-rotate"></i> Reactivar</button></td></tr>'; }).join('')
      + '</tbody></table></div></details>';
  }
  var html = '<div class="card"><div class="ct"><i class="ti ti-tag" style="color:var(--gold);font-size:18px"></i>Gestión de Productos'
    + '<span class="pill" style="margin-left:auto">'+activos.length+' activo'+(activos.length!==1?'s':'')+'</span></div>'
    + '<div class="cs">Precios y catálogo usados en Facturación, Pedidos y Almacén.</div>'
    + body + '</div>';
  if(perms().includes('excel')){
    html += '<div class="card"><details>'
      + '<summary style="cursor:pointer"><b>📊 Importar / Exportar Excel</b></summary>'
      + '<div style="margin:10px 0;font-size:12px;color:var(--k-mist)">Columnas: <b>Producto, Categoría, Precio</b>. Si el producto ya existe (mismo nombre) se actualiza el precio y la categoría; si no, se crea.</div>'
      + '<div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:10px">'
      + '<input type="file" id="prod-excel-file" accept=".xlsx,.xls">'
      + '<button type="button" class="bs" onclick="prodPlantillaExcel()">⬇️ Descargar plantilla</button>'
      + '<button type="button" class="bs" onclick="prodExportarExcel()">⬇️ Exportar catálogo</button>'
      + '</div><pre id="prod-excel-log" style="white-space:pre-wrap;font-family:inherit;font-size:12px;background:rgba(0,0,0,.03);border-radius:8px;padding:10px;min-height:20px;max-height:220px;overflow-y:auto">Esperando archivo…</pre>'
      + '</details></div>';
  }
  return html;
}
var _prodEditando=null;
function prodAbrirNuevo(){ _prodEditando=null; _prodModal('Nuevo producto','','','',''); }
function prodAbrirEdicion(id){
  var p=PRODUCTOS_ADMIN.find(function(x){return x.id===id;}); if(!p) return;
  _prodEditando=id; _prodModal('Editar producto', p.nombre, p.categoria||'', Number(p.precio_referencia)||0, p.codigo||'');
}
function _prodModal(titulo, nombre, categoria, precio, codigo){
  var ov=document.createElement('div');
  ov.id='prod_modal_ov';
  ov.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(3px);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px;overflow-y:auto';
  ov.onclick=function(e){if(e.target===ov)ov.remove();};
  ov.innerHTML=
    '<div style="background:#fff;border-radius:16px;width:100%;max-width:420px;margin:auto;box-shadow:0 20px 60px rgba(0,0,0,.2);overflow:hidden">'
    + '<div style="padding:16px 20px;border-bottom:1px solid var(--br);font-weight:800">'+titulo+'</div>'
    + '<div style="padding:18px 20px">'
    +   '<div class="fi"><label>Nombre del producto *</label><input id="pd_nm" value="'+(nombre||'').replace(/"/g,'&quot;')+'"></div>'
    +   '<div class="fi" style="margin-top:10px"><label>Código<span style="font-weight:400;text-transform:none;color:var(--t3)"> (ej: SHA-009, MASC-009 -- vacío = automático)</span></label><input id="pd_cod" value="'+(codigo||'').replace(/"/g,'&quot;')+'" placeholder="Se genera automático si lo dejas vacío" style="text-transform:uppercase" oninput="this.value=this.value.toUpperCase()"></div>'
    +   '<div class="fi" style="margin-top:10px"><label>Categoría</label><input id="pd_cat" value="'+(categoria||'').replace(/"/g,'&quot;')+'" placeholder="Ej: Duo Kit 10 oz, Tratamientos..."></div>'
    +   '<div class="fi" style="margin-top:10px"><label>Precio de referencia RD$</label><input id="pd_pr" type="number" step="0.01" value="'+(precio||0)+'"></div>'
    + '</div>'
    + '<div style="padding:14px 20px;border-top:1px solid var(--br);display:flex;justify-content:flex-end;gap:8px">'
    +   '<button class="bs" onclick="document.getElementById(\'prod_modal_ov\').remove()">Cancelar</button>'
    +   '<button class="bg" onclick="prodGuardar()">Guardar</button>'
    + '</div></div>';
  document.body.appendChild(ov);
  setTimeout(function(){var el=document.getElementById('pd_nm');if(el)el.focus();},50);
}
async function prodGuardar(){
  var nombre=(document.getElementById('pd_nm')?.value||'').trim();
  var codigo=(document.getElementById('pd_cod')?.value||'').trim();
  var categoria=(document.getElementById('pd_cat')?.value||'').trim();
  var precio=parseFloat(document.getElementById('pd_pr')?.value)||0;
  if(!nombre){ alert('Falta el nombre del producto.'); return; }
  try{
    if(_prodEditando!=null){
      await apiFetch('/api/productos/'+_prodEditando,{method:'PATCH',body:{nombre:nombre,precioReferencia:precio,categoria:categoria,codigo:codigo||undefined}});
    } else {
      await apiFetch('/api/productos',{method:'POST',body:{nombre:nombre,precioReferencia:precio,categoria:categoria,codigo:codigo||undefined}});
    }
  }catch(e){ alert('No se pudo guardar: '+e.message); return; }
  document.getElementById('prod_modal_ov')?.remove();
  await cargarProductosAdmin(); await cargarProductos();
  if(pag==='productos') document.getElementById('main').innerHTML=rProductosAdmin();
  if(typeof showToast==='function') showToast('Producto guardado ✅');
}
async function prodDesactivar(id){
  var p=PRODUCTOS_ADMIN.find(function(x){return x.id===id;}); if(!p) return;
  if(!confirm('¿Desactivar "'+p.nombre+'"? Deja de aparecer para nuevas ventas, pero no se borra su historial.')) return;
  try{ await apiFetch('/api/productos/'+id+'/desactivar',{method:'POST'}); }
  catch(e){ alert('No se pudo desactivar: '+e.message); return; }
  await cargarProductosAdmin(); await cargarProductos();
  if(pag==='productos') document.getElementById('main').innerHTML=rProductosAdmin();
}
async function prodReactivar(id){
  try{ await apiFetch('/api/productos/'+id+'/reactivar',{method:'POST'}); }
  catch(e){ alert('No se pudo reactivar: '+e.message); return; }
  await cargarProductosAdmin(); await cargarProductos();
  if(pag==='productos') document.getElementById('main').innerHTML=rProductosAdmin();
}
function prodPlantillaExcel(){
  if(typeof XLSX==='undefined'){ alert('Recarga la página: el lector de Excel no cargó.'); return; }
  var datos=[['Producto','Categoría','Precio RD$'],['Duo Kit 10 oz','Duo Kit 10 oz',4900]];
  var ws=XLSX.utils.aoa_to_sheet(datos);
  ws['!cols']=[{wch:28},{wch:20},{wch:12}];
  var wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Productos');
  XLSX.writeFile(wb, 'plantilla_productos.xlsx');
}
function prodExportarExcel(){
  if(typeof XLSX==='undefined'){ alert('Recarga la página: el lector de Excel no cargó.'); return; }
  var datos=[['Producto','Categoría','Precio RD$','Activo']];
  PRODUCTOS_ADMIN.forEach(function(p){ datos.push([p.nombre, p.categoria||'', Number(p.precio_referencia)||0, p.activo?'Sí':'No']); });
  var ws=XLSX.utils.aoa_to_sheet(datos);
  ws['!cols']=[{wch:28},{wch:20},{wch:12},{wch:8}];
  var wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Productos');
  XLSX.writeFile(wb, 'productos_'+hoy()+'.xlsx');
}
function _prodLog(msg){ var log=document.getElementById('prod-excel-log'); if(log) log.textContent += (log.textContent?'\n':'')+msg; }
async function prodImportarExcel(ev){
  var f = ev.target.files && ev.target.files[0];
  if(!f) return;
  var log=document.getElementById('prod-excel-log'); if(log) log.textContent='';
  if(typeof XLSX==='undefined'){ _prodLog('❌ No se pudo cargar el lector de Excel.'); ev.target.value=''; return; }
  var r=new FileReader();
  r.onload=async function(e){
    var filas=[];
    try{
      var wb = XLSX.read(new Uint8Array(e.target.result), {type:'array'});
      filas = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {defval:''});
      _prodLog(filas.length+' fila(s) leída(s)');
    }catch(err){ _prodLog('❌ Error al leer el Excel: '+err.message); ev.target.value=''; return; }

    var creados=0, actualizados=0, conError=0;
    for (var i=0;i<filas.length;i++){
      var g={}; Object.keys(filas[i]).forEach(function(k){ g[_cbNorm(k)]=filas[i][k]; });
      var nombre=String(g.producto||g.nombre||'').trim();
      var categoria=String(g.categoria||'').trim();
      var precio=_cbNum(g.preciord||g.precioreferencia||g.precioreferenciard||g.precio||g.valor)||0;
      if(!nombre) continue;
      var existente=PRODUCTOS_ADMIN.find(function(p){ return _cbNorm(p.nombre)===_cbNorm(nombre); });
      try{
        if(existente){
          await apiFetch('/api/productos/'+existente.id,{method:'PATCH',body:{nombre:nombre,precioReferencia:precio,categoria:categoria||existente.categoria,origen:'excel'}});
          actualizados++;
          _prodLog('🔄 Fila '+(i+2)+': '+nombre+' → precio actualizado');
        } else {
          await apiFetch('/api/productos',{method:'POST',body:{nombre:nombre,precioReferencia:precio,categoria:categoria,origen:'excel'}});
          creados++;
          _prodLog('✅ Fila '+(i+2)+': '+nombre+' → creado');
        }
      }catch(err){ conError++; _prodLog('❌ Fila '+(i+2)+' ('+nombre+'): '+err.message); }
    }
    await cargarProductosAdmin(); await cargarProductos();
    if(pag==='productos') document.getElementById('main').innerHTML=rProductosAdmin();
    _prodLog('');
    _prodLog('✅ '+creados+' nuevo(s), 🔄 '+actualizados+' actualizado(s)'+(conError?', ❌ '+conError+' con error':''));
    if(typeof showToast==='function') showToast('Excel de productos importado');
    ev.target.value='';
  };
  r.onerror=function(){ _prodLog('❌ No se pudo abrir el archivo.'); ev.target.value=''; };
  r.readAsArrayBuffer(f);
}
(function(){
  document.addEventListener('change', function(ev){
    if(ev.target && ev.target.id==='prod-excel-file') prodImportarExcel(ev);
  });
})();
</script>

<script>
/* ══════════════════════════════════════════════════════════════════
   LABORATORIO — fabricación de productos capilares/cosméticos.
   3 sub-pestañas: Almacén de Laboratorio (materias primas + stock
   real), Recetas (qué materia prima lleva cada producto, con cálculo
   de peso del lote/unidades que rinde/costo de fabricar), Producción
   (fabricar un lote: descuenta materia prima, suma producto terminado
   al Almacén Principal). El cálculo de unidades/costo NUNCA se guarda
   fijo -- se recalcula siempre desde el servidor (db.js), así que si
   sube el precio de una materia prima el costo se actualiza solo.
══════════════════════════════════════════════════════════════════ */
var LAB_MATERIAS=[], LAB_RECETAS=[], LAB_PRODUCCIONES=[];
var _labTab='almacen', _labMpEditando=null, _labEntradaMpId=null, _labRecetaEditando=null;
var _labAlmCat='quimico', _labAlmQ='';
var LAB_UNIDADES={gramos:'g',kilogramos:'kg',onzas:'oz',galon:'gal',unidad:'u'};
function labUnidadLbl(u){ return LAB_UNIDADES[u]||u; }

async function cargarLabDatos(){
  try{
    LAB_MATERIAS = await apiFetch('/api/lab/materias-primas?todos=1');
    LAB_RECETAS = await apiFetch('/api/lab/recetas');
    LAB_PRODUCCIONES = await apiFetch('/api/lab/producciones');
    if(typeof PRODUCTOS_ADMIN==='undefined' || !PRODUCTOS_ADMIN.length) await cargarProductosAdmin();
  }catch(e){ console.error('No se pudo cargar Laboratorio:', e); LAB_MATERIAS=[]; LAB_RECETAS=[]; LAB_PRODUCCIONES=[]; }
}

function rLaboratorio(){
  var body = _labTab==='recetas' ? labRecetasHTML() : _labTab==='produccion' ? labProduccionHTML() : labAlmacenHTML();
  return '<div class="card">'
    + '<div class="ct"><i class="ti ti-flask" style="color:var(--gold);font-size:18px"></i>Laboratorio'
    +   '<span class="pill" style="margin-left:auto">'+LAB_MATERIAS.filter(function(m){return m.activo;}).length+' materias primas</span></div>'
    + '<div class="cs">Materias primas, recetas y producción.</div>'
    + '<div class="tab-bar" style="margin-bottom:14px">'
    +   '<button id="lab_tab_almacen" class="tab-btn'+(_labTab==='almacen'?' act':'')+'" onclick="labTab(\'almacen\')">🧪 Almacén de Laboratorio</button>'
    +   '<button id="lab_tab_recetas" class="tab-btn'+(_labTab==='recetas'?' act':'')+'" onclick="labTab(\'recetas\')">📋 Recetas</button>'
    +   '<button id="lab_tab_produccion" class="tab-btn'+(_labTab==='produccion'?' act':'')+'" onclick="labTab(\'produccion\')">⚗️ Producción</button>'
    + '</div>'
    + '<div id="lab_cont">'+body+'</div>'
    + '</div>';
}
function labTab(t){
  _labTab=t;
  ['almacen','recetas','produccion'].forEach(function(x){
    var b=document.getElementById('lab_tab_'+x); if(b) b.className='tab-btn'+(x===t?' act':'');
  });
  var cont=document.getElementById('lab_cont'); if(!cont) return;
  cont.innerHTML = t==='recetas' ? labRecetasHTML() : t==='produccion' ? labProduccionHTML() : labAlmacenHTML();
}

/* ── Sub-pestaña: Almacén de Laboratorio ── */
function _labDiasPara(fechaISO){
  if(!fechaISO) return null;
  return Math.round((new Date(fechaISO) - new Date(hoy())) / 86400000);
}
var LAB_CATS=[['quimico','⚗️ Químicos'],['natural','🌿 Naturales'],['empaque','📦 Empaque']];
function labAlmCat(cat){
  _labAlmCat=cat; _labAlmQ='';
  var cont=document.getElementById('lab_cont'); if(cont) cont.innerHTML=labAlmacenHTML();
}
function labAlmBuscar(v){
  _labAlmQ=v;
  var tb=document.getElementById('lab_alm_tbody'); if(!tb) return;
  tb.innerHTML = _labAlmFilasHTML(_labAlmFiltradas());
}
function _labAlmFiltradas(){
  var activos = LAB_MATERIAS.filter(function(m){return m.activo && m.tipo===_labAlmCat;});
  var q=(_labAlmQ||'').trim().toLowerCase();
  if(q) activos = activos.filter(function(m){return m.nombre.toLowerCase().indexOf(q)>=0;});
  return activos;
}
function _labAlmFilasHTML(lista){
  if(!lista.length) return '<tr><td colspan="4" style="text-align:center;color:var(--t3);padding:20px">Sin resultados</td></tr>';
  return lista.map(function(m){
    var dias=_labDiasPara(m.proximo_vencimiento);
    return '<tr><td style="font-weight:600">'+m.nombre
      + (m.bajo_minimo?' <span class="pill" style="background:#FFF3E0;border-color:#E65100;color:#E65100;font-size:9px">bajo mínimo</span>':'')
      + (dias!=null&&dias<=60?' <span class="pill" style="background:'+(dias<0?'#FFEBEE':'#FFF3E0')+';border-color:'+(dias<0?'#C62828':'#E65100')+';color:'+(dias<0?'#C62828':'#E65100')+';font-size:9px">'+(dias<0?'vencido':dias+'d para vencer')+'</span>':'')
      + '</td>'
      + '<td class="tr" style="'+(Number(m.stock)<=0?'color:var(--er);font-weight:700':'')+'">'+Number(m.stock).toLocaleString('es-DO',{maximumFractionDigits:3})+' '+labUnidadLbl(m.unidad)+'</td>'
      + '<td class="tr">'+fM(Number(m.costo_unitario)||0)+' / '+labUnidadLbl(m.unidad)+'</td>'
      + '<td style="white-space:nowrap"><button class="bsm" onclick="labMpAbrirEntrada('+m.id+')"><i class="ti ti-plus"></i> Entrada</button> '
      + '<button class="bsm" onclick="labMpVerHistorial('+m.id+')"><i class="ti ti-history"></i></button> '
      + '<button class="bsm" onclick="labMpAbrirEdicion('+m.id+')"><i class="ti ti-edit"></i></button> '
      + '<button class="bsm" style="color:var(--er)" onclick="labMpDesactivar('+m.id+')"><i class="ti ti-trash"></i></button></td></tr>';
  }).join('');
}
function labAlmacenHTML(){
  var activos = LAB_MATERIAS.filter(function(m){return m.activo;});
  var inactivos = LAB_MATERIAS.filter(function(m){return !m.activo;});
  var bajoMinimo = activos.filter(function(m){return m.bajo_minimo;});
  var porVencer = activos.filter(function(m){var d=_labDiasPara(m.proximo_vencimiento); return d!=null && d<=60;});
  var cats={};
  activos.forEach(function(m){ (cats[m.tipo]=cats[m.tipo]||[]).push(m); });
  if(!cats[_labAlmCat] || !cats[_labAlmCat].length){
    var primeraConDatos = LAB_CATS.find(function(par){return cats[par[0]] && cats[par[0]].length;});
    if(primeraConDatos) _labAlmCat = primeraConDatos[0];
  }
  var h = '<div style="display:flex;gap:8px;margin-bottom:14px"><button class="bg" onclick="labMpAbrirNuevo()"><i class="ti ti-plus"></i> Nueva materia prima</button></div>';
  if(bajoMinimo.length || porVencer.length){
    h += '<details style="background:#FFF3E0;border:1.5px solid #E65100;border-radius:10px;padding:10px 15px;margin-bottom:14px;font-size:12px;color:#7F3D00">';
    h += '<summary style="cursor:pointer;font-weight:700">⚠️ '+bajoMinimo.length+' bajo el mínimo · ⏳ '+porVencer.length+' por vencer (60 días)</summary>';
    if(bajoMinimo.length) h += '<div style="margin-top:8px">⚠️ <b>Bajo el mínimo:</b> '+bajoMinimo.map(function(m){return m.nombre+' ('+Number(m.stock).toLocaleString('es-DO',{maximumFractionDigits:2})+' '+labUnidadLbl(m.unidad)+')';}).join(', ')+'</div>';
    if(porVencer.length) h += '<div style="margin-top:6px">⏳ <b>Por vencer:</b> '+porVencer.map(function(m){var d=_labDiasPara(m.proximo_vencimiento);return m.nombre+' ('+(d<0?'vencido':d+'d')+')';}).join(', ')+'</div>';
    h += '</details>';
  }
  h += '<div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:12px">';
  h += '<div class="tab-bar" style="margin:0">'+LAB_CATS.map(function(par){
    var n=(cats[par[0]]||[]).length;
    return '<button class="tab-btn'+(par[0]===_labAlmCat?' act':'')+'" onclick="labAlmCat(\''+par[0]+'\')">'+par[1]+' ('+n+')</button>';
  }).join('')+'</div>';

async function labMpGuardar(){
  var nombre=(document.getElementById('lmp_nm')?.value||'').trim();
  var tipo=document.getElementById('lmp_tipo')?.value;
  var unidad=document.getElementById('lmp_unidad')?.value;
  var costo=parseFloat(document.getElementById('lmp_costo')?.value)||0;
  var stockMinimo=parseFloat(document.getElementById('lmp_stockmin')?.value)||0;
  if(!nombre){ alert('Falta el nombre.'); return; }
  try{
    if(_labMpEditando!=null) await apiFetch('/api/lab/materias-primas/'+_labMpEditando,{method:'PATCH',body:{nombre:nombre,tipo:tipo,unidad:unidad,costoUnitario:costo,stockMinimo:stockMinimo}});
    else await apiFetch('/api/lab/materias-primas',{method:'POST',body:{nombre:nombre,tipo:tipo,unidad:unidad,costoUnitario:costo,stockMinimo:stockMinimo}});

  document.getElementById('lab_mp_modal_ov')?.remove();
  await cargarLabDatos();

}

  _labRecetaEditando = {
    productoId: productoId,

    contenidoPorUnidad: existente?Number(existente.contenido_por_unidad):1,
    contenidoUnidad: existente?existente.contenido_unidad:'gramos',
    mermaPct: existente?Number(existente.merma_pct)||0:0,
    notas: existente?(existente.notas||''):'',

async function labRecetaGuardar(){
  var e=_labRecetaEditando;
  if(!e.contenidoPorUnidad || e.contenidoPorUnidad<=0){ alert('Indica cuánto contiene cada unidad vendida.'); return; }
  var items=e.items.filter(function(it){return it.materiaPrimaId && it.cantidad>0;});
  if(!items.length){ alert('Agrega al menos un ingrediente con cantidad.'); return; }
  try{
    await apiFetch('/api/lab/recetas/'+e.productoId,{method:'POST',body:{contenidoPorUnidad:e.contenidoPorUnidad,contenidoUnidad:e.contenidoUnidad,mermaPct:e.mermaPct,notas:e.notas,items:items}});
  }catch(err){ alert('No se pudo guardar: '+err.message); return; }
  await cargarLabDatos();
  var actualizada = LAB_RECETAS.find(function(r){return r.producto_id===e.productoId;});
  if(actualizada){
    _labRecetaEditando.items = actualizada.items.map(function(it){return {materiaPrimaId:it.materiaPrimaId,cantidad:Number(it.cantidad)};});
    _labRecetaEditando.calculo = actualizada.calculo;

  else {
    h += '<div class="tbl-wrap"><table class="tbl"><thead><tr><th>Fecha</th><th>Producto</th><th class="tr">Lotes</th><th class="tr">Unidades</th><th class="tr">Costo total</th><th class="tr">Costo/unidad</th><th>Registró</th></tr></thead><tbody>'
      + LAB_PRODUCCIONES.map(function(p){
          return '<tr><td style="font-size:11px">'+fD(p.fecha)+'</td><td style="font-weight:600">'+p.producto_nombre+'</td>'

            + '<td class="tr">'+fM(p.costo_total)+'</td><td class="tr">'+fM(p.costo_por_unidad)+'</td>'
            + '<td style="font-size:11px">'+(p.registrado_por_nombre||'—')+'</td></tr>';
        }).join('')
      + '</tbody></table></div>';
  }
  return h;
}
function labProduccionSeleccionar(recetaId){
  var cont=document.getElementById('lab_produccion_editor');
  if(!recetaId){ if(cont)cont.innerHTML=''; return; }
  var r = LAB_RECETAS.find(function(x){return x.id===recetaId;});
  if(!r || !cont){ if(cont)cont.innerHTML=''; return; }
  var puedeProducir = typeof perms==='function' && perms().includes('laboratorio_produccion');
  cont.innerHTML = '<div class="card">'
    + labRecetaResumenHTML(r.calculo, r.precio_referencia)
    + '<div class="fi" style="margin-top:12px"><label>¿Cuántos lotes vas a fabricar?</label><input id="lab_prod_lotes" type="number" step="0.01" value="1" oninput="labProduccionPreview('+recetaId+')"'+(puedeProducir?'':' disabled')+'></div>'
    + '<div id="lab_prod_preview" style="margin-top:10px"></div>'
    + '<label style="display:flex;align-items:center;gap:6px;margin-top:10px;font-size:12px"><input type="checkbox" id="lab_prod_sumar" checked'+(puedeProducir?'':' disabled')+'> Sumar las unidades producidas al Almacén Principal</label>'
    + (puedeProducir
        ? '<div style="margin-top:14px"><button class="bg" onclick="labProduccionConfirmar('+recetaId+')">⚗️ Registrar producción</button></div>'
        : '<div style="margin-top:14px;font-size:12px;color:var(--t2)">🔒 No tienes permiso para confirmar producciones -- pídele a Gerencia que te lo active en Usuarios.</div>')
    + '</div>';
  labProduccionPreview(recetaId);
}
function labProduccionPreview(recetaId){
  var r = LAB_RECETAS.find(function(x){return x.id===recetaId;});
  var lotes = parseFloat(document.getElementById('lab_prod_lotes')?.value)||0;
  var prev=document.getElementById('lab_prod_preview'); if(!prev||!r) return;
  if(lotes<=0){ prev.innerHTML=''; return; }
  var faltantes=[];
  (r.items||[]).forEach(function(it){
    var mp=LAB_MATERIAS.find(function(m){return m.id===it.materiaPrimaId;});
    var necesario=Number(it.cantidad)*lotes;
    if(mp && necesario>Number(mp.stock)) faltantes.push(mp.nombre+': faltan '+(necesario-Number(mp.stock)).toFixed(3)+' '+labUnidadLbl(mp.unidad));
  });
  var unidades = r.calculo.unidadesPorLote*lotes;
  var costoTot = r.calculo.costoTotalLote*lotes;
  prev.innerHTML = '<div style="font-size:13px"><b>Producirá:</b> '+unidades.toLocaleString('es-DO',{maximumFractionDigits:2})+' unidades · <b>Costo total:</b> '+fM(costoTot)+'</div>'
    + (faltantes.length ? '<div style="color:var(--er);font-size:12px;margin-top:6px">⚠️ No hay suficiente materia prima:<br>'+faltantes.join('<br>')+'</div>' : '<div style="color:var(--green);font-size:12px;margin-top:6px">✅ Hay materia prima suficiente</div>');
}
async function labProduccionConfirmar(recetaId){
  var lotes = parseFloat(document.getElementById('lab_prod_lotes')?.value)||0;
  var sumar = document.getElementById('lab_prod_sumar')?.checked;
  if(lotes<=0){ alert('Cantidad de lotes inválida.'); return; }
  if(!confirm('¿Confirmar producción de '+lotes+' lote(s)? Esto descuenta la materia prima usada.')) return;
  var res;
  try{ res = await apiFetch('/api/lab/producciones',{method:'POST',body:{recetaId:recetaId,lotes:lotes,sumarAlmacen:sumar}}); }
  catch(e){ alert('No se pudo registrar: '+(e.data&&e.data.faltantes?e.data.faltantes.join('\n'):e.message)); return; }
  await cargarLabDatos(); await cargarProductos();
  if(pag==='laboratorio') document.getElementById('main').innerHTML=rLaboratorio();
  if(typeof showToast==='function') showToast('Producción registrada: '+Number(res.unidades_producidas).toFixed(0)+' unidades ✅');

/* ── Excel (materias primas) -- gateado por el permiso opcional 'excel' ── */
function labPlantillaExcel(){
  if(typeof XLSX==='undefined'){ alert('Recarga la página: el lector de Excel no cargó.'); return; }
  var datos=[['Materia Prima','Tipo (Quimico/Natural)','Unidad (Gramos/Kilogramos/Onzas/Galon)','Costo Unitario RD$'],['Aceite de Coco','Natural','Galon',850]];
  var ws=XLSX.utils.aoa_to_sheet(datos);
  ws['!cols']=[{wch:28},{wch:18},{wch:22},{wch:14}];
  var wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Materias Primas');
  XLSX.writeFile(wb, 'plantilla_materias_primas.xlsx');
}
function labExportarExcel(){
  if(typeof XLSX==='undefined'){ alert('Recarga la página: el lector de Excel no cargó.'); return; }
  var datos=[['Materia Prima','Tipo','Unidad','Costo Unitario RD$','Stock','Activo']];
  LAB_MATERIAS.forEach(function(m){ datos.push([m.nombre, m.tipo, m.unidad, Number(m.costo_unitario)||0, Number(m.stock)||0, m.activo?'Sí':'No']); });
  var ws=XLSX.utils.aoa_to_sheet(datos);
  ws['!cols']=[{wch:28},{wch:12},{wch:14},{wch:14},{wch:12},{wch:8}];
  var wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Materias Primas');
  XLSX.writeFile(wb, 'materias_primas_'+hoy()+'.xlsx');
}
function _labLog(msg){ var log=document.getElementById('lab-excel-log'); if(log) log.textContent += (log.textContent?'\n':'')+msg; }
async function labImportarExcel(ev){
  var f=ev.target.files && ev.target.files[0]; if(!f) return;
  var log=document.getElementById('lab-excel-log'); if(log) log.textContent='';
  if(typeof XLSX==='undefined'){ _labLog('❌ No se pudo cargar el lector de Excel.'); ev.target.value=''; return; }
  var r=new FileReader();
  r.onload=async function(e){
    var filas=[];
    try{
      var wb=XLSX.read(new Uint8Array(e.target.result),{type:'array'});
      filas=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{defval:''});
      _labLog(filas.length+' fila(s) leída(s)');
    }catch(err){ _labLog('❌ Error al leer el Excel: '+err.message); ev.target.value=''; return; }
    var creados=0, actualizados=0, conError=0;
    for(var i=0;i<filas.length;i++){
      var g={}; Object.keys(filas[i]).forEach(function(k){ g[_cbNorm(k)]=filas[i][k]; });
      var nombre=String(g.materiaprima||g.nombre||'').trim();
      var tipoRaw=_cbNorm(g.tipo||'');
      var tipo = tipoRaw.indexOf('emp')>=0 ? 'empaque' : tipoRaw.indexOf('nat')>=0 ? 'natural' : 'quimico';
      var unidadRaw=_cbNorm(g.unidad||'');
      var unidad = unidadRaw.indexOf('kilo')>=0?'kilogramos': unidadRaw.indexOf('onza')>=0?'onzas': unidadRaw.indexOf('galon')>=0?'galon': unidadRaw==='unidad'||unidadRaw.indexOf('pieza')>=0?'unidad':'gramos';
      var costo=_cbNum(g.costounitario||g.costo)||0;
      if(!nombre) continue;
      var existente=LAB_MATERIAS.find(function(m){ return _cbNorm(m.nombre)===_cbNorm(nombre); });
      try{
        if(existente){
          await apiFetch('/api/lab/materias-primas/'+existente.id,{method:'PATCH',body:{nombre:nombre,tipo:tipo,unidad:unidad,costoUnitario:costo,origen:'excel'}});
          actualizados++; _labLog('🔄 Fila '+(i+2)+': '+nombre+' → actualizado');
        } else {
          await apiFetch('/api/lab/materias-primas',{method:'POST',body:{nombre:nombre,tipo:tipo,unidad:unidad,costoUnitario:costo,origen:'excel'}});
          creados++; _labLog('✅ Fila '+(i+2)+': '+nombre+' → creado');
        }
      }catch(err){ conError++; _labLog('❌ Fila '+(i+2)+' ('+nombre+'): '+err.message); }
    }
    await cargarLabDatos();
    if(pag==='laboratorio') document.getElementById('main').innerHTML=rLaboratorio();
    _labLog(''); _labLog('✅ '+creados+' nuevo(s), 🔄 '+actualizados+' actualizado(s)'+(conError?', ❌ '+conError+' con error':''));
    if(typeof showToast==='function') showToast('Excel de materias primas importado');
    ev.target.value='';
  };
  r.onerror=function(){ _labLog('❌ No se pudo abrir el archivo.'); ev.target.value=''; };
  r.readAsArrayBuffer(f);
}
(function(){
  document.addEventListener('change', function(ev){
    if(ev.target && ev.target.id==='lab-excel-file') labImportarExcel(ev);
  });
})();
</script>

<script>
/* ══════════════════════════════════════════════════════════════
   RUTA CON MAPA — cobro guiado por GPS
   Ordena las visitas por cercanía y recalcula al llegar a cada una
════════════════════════════════════════════════════════════════ */
var RT = {
  yo:null,          // {lat,lng,acc}
  paradas:[],       // seleccion de hoy pendiente, con coordenadas
  hechasInfo:[],    // filas de ruta_seleccion ya resueltas hoy (pagado/abonado/no_pago/saltado)
  mapa:null, capaMarcas:null, capaLinea:null, marcaYo:null,
  watch:null, recaudado:0
};

/* Saca lat/lng del texto guardado: "7F3F+H59  (18.48123, -69.93456)" */
function rtCoords(c){
  if(!c) return null;
  var g=c.gps;
  if(g && typeof g==='object' && g.lat) return {lat:+g.lat, lng:+g.lng};
  if(typeof g!=='string' || !g) return null;
  var m=g.match(/\(?\s*(-?\d{1,3}\.\d+)\s*,\s*(-?\d{1,3}\.\d+)\s*\)?/);
  if(!m) return null;
  var la=parseFloat(m[1]), ln=parseFloat(m[2]);
  if(isNaN(la)||isNaN(ln)||Math.abs(la)>90||Math.abs(ln)>180) return null;
  return {lat:la, lng:ln};
}

/* Distancia real entre dos puntos de la Tierra (Haversine), en metros */
function rtDist(a,b){
  if(!a||!b) return Infinity;
  var R=6371000, r=Math.PI/180;
  var dLa=(b.lat-a.lat)*r, dLn=(b.lng-a.lng)*r;
  var x=Math.sin(dLa/2)*Math.sin(dLa/2)
      + Math.cos(a.lat*r)*Math.cos(b.lat*r)*Math.sin(dLn/2)*Math.sin(dLn/2);
  return 2*R*Math.atan2(Math.sqrt(x), Math.sqrt(1-x));
}
function rtKm(m){
  if(m===Infinity||m===null) return '—';
  return m<1000 ? Math.round(m)+' m' : (m/1000).toFixed(m<10000?1:0)+' km';
}

/* Ruta por VECINO MÁS CERCANO: desde donde estoy, siempre la más próxima */
function rtOrdenar(desde, pend){
  var ruta=[], libres=pend.slice(), aqui=desde;
  while(libres.length){
    var mejor=0, min=Infinity;
    for(var i=0;i<libres.length;i++){
      var d = aqui ? rtDist(aqui, libres[i].co) : 0;
      if(d<min){ min=d; mejor=i; }
    }
    var p=libres.splice(mejor,1)[0];
    p.dist = aqui ? min : null;
    ruta.push(p);
    aqui = p.co;
  }
  return ruta;
}

/* Reconstruye la lista de paradas pendientes desde la selección de HOY
   (armada a mano en "Preparar ruta" -- ya no se arma sola con todo
   contrato que tenga GPS). */
async function rtCargar(){
  var datos=[];
  try{ datos = await apiFetch('/api/ruta/seleccion'); }catch(e){ datos=[]; }
  RT.hechasInfo = datos.filter(function(r){ return r.estado!=='pendiente'; });
  RT.recaudado = RT.hechasInfo.reduce(function(s,r){
    return s + ((r.estado==='pagado'||r.estado==='abonado') ? (Number(r.monto_resultado)||0) : 0);
  }, 0);
  var lista=[];
  datos.forEach(function(r){
    if(r.estado!=='pendiente') return;
    if(r.gps_lat==null || r.gps_lng==null) return;
    lista.push({
      id:r.contrato_id, seleccionId:r.seleccion_id,
      c:{ id:r.contrato_id, fac:r.numero_factura, cliente:r.cliente_nombre, saldo:Number(r.saldo)||0,
          tel1:r.cliente_tel1, dir:r.cliente_direccion, ref:r.cliente_referencia,
          inst:r.cliente_institucion, lim:r.fecha_limite },
      co:{ lat:Number(r.gps_lat), lng:Number(r.gps_lng) }
    });
  });
  RT.paradas = rtOrdenar(RT.yo, lista);
}

/* ══ Pantalla ══ */
var _rutaVista='preparar';
function rRuta(){
  return '<div id="ruta_root">'
    + '<div class="tab-bar" style="margin-bottom:14px">'
    +   '<button id="rt_tab_preparar" class="tab-btn'+(_rutaVista==='preparar'?' act':'')+'" onclick="rtVista(\'preparar\')"><i class="ti ti-search"></i> Preparar ruta</button>'
    +   '<button id="rt_tab_mapa" class="tab-btn'+(_rutaVista==='mapa'?' act':'')+'" onclick="rtVista(\'mapa\')"><i class="ti ti-map-2"></i> Mapa</button>'
    + '</div>'
    + '<div id="rt_cont">'+(_rutaVista==='preparar'?rtPrepararHTML():rtMapaHTML())+'</div>'
    + '</div>';
}
function rtVista(v){
  _rutaVista=v;
  ['preparar','mapa'].forEach(function(x){var b=document.getElementById('rt_tab_'+x);if(b)b.className='tab-btn'+(x===v?' act':'');});
  var c=document.getElementById('rt_cont'); if(!c) return;
  c.innerHTML = v==='preparar' ? rtPrepararHTML() : rtMapaHTML();

/* ── Pestaña: Preparar ruta (buscar y elegir a mano a quién visitar hoy) ── */
var RT_BUSQUEDA=[], _rtBuscarTimer=null;
function rtPrepararHTML(){
  return '<div class="card">'
    + '<div class="ct"><i class="ti ti-search" style="color:var(--gold)"></i>Buscar cliente a visitar</div>'
    + '<div class="cs">Por número de factura, cédula, teléfono o nombre.</div>'
    + '<input type="search" id="rt_buscar_inp" placeholder="Ej: KRV-0045, cédula, teléfono o nombre..." oninput="rtBuscarDebounced()" '
    +   'style="width:100%;padding:10px 14px;border:1.5px solid var(--br2);border-radius:10px;font-size:14px;margin-bottom:12px">'
    + '<div id="rt_buscar_res"></div>'
    + '</div>'
    + '<div class="card" style="margin-top:14px">'
    + '<div class="ct"><i class="ti ti-list-check" style="color:var(--gold)"></i>Ruta de hoy<span class="pill" style="margin-left:auto" id="rt_hoy_count">0</span></div>'
    + '<div id="rt_hoy_lista"></div>'
    + '</div>';
}
function rtBuscarDebounced(){ clearTimeout(_rtBuscarTimer); _rtBuscarTimer=setTimeout(rtBuscar,350); }
async function rtBuscar(){
  var inp=document.getElementById('rt_buscar_inp'); var q=inp?inp.value:'';
  var box=document.getElementById('rt_buscar_res'); if(!box) return;
  if(q.trim().length<2){ box.innerHTML=''; return; }
  box.innerHTML='<div style="padding:10px;color:var(--t3);font-size:12px">Buscando…</div>';
  var res=[];
  try{ res=await apiFetch('/api/ruta/buscar?q='+encodeURIComponent(q)); }catch(e){ box.innerHTML='<div class="empty"><p>Error al buscar</p></div>'; return; }
  RT_BUSQUEDA=res;
  if(!res.length){ box.innerHTML='<div class="empty"><i class="ti ti-search-off"></i><p>Sin resultados</p></div>'; return; }
  box.innerHTML=res.map(function(c,i){
    var tieneGps = c.gps_lat!=null && c.gps_lng!=null;
    return '<div class="stop" style="align-items:flex-start">'
      + '<div style="flex:1;min-width:0">'
      +   '<div class="stop-nom">'+c.cliente_nombre+'</div>'
      +   '<div class="stop-sub">'+c.numero_factura+' · debe '+fM(c.saldo)+(c.cliente_direccion?' · '+c.cliente_direccion:'')+'</div>'
      +   (tieneGps ? '' :
            '<div style="margin-top:8px;padding:10px;background:var(--bg2);border-radius:8px">'
            + '<div style="font-size:11px;color:var(--t2);margin-bottom:6px">⚠️ Sin ubicación guardada — cargala para poder agregarlo:</div>'
            + '<div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center">'
            +   '<button type="button" class="bsm" onclick="rtUsarMiUbicacion('+i+')">📍 Usar mi ubicación actual</button>'
            +   '<input type="text" id="rt_gps_manual_'+i+'" placeholder="o pegá: 18.4801, -69.9317" style="flex:1;min-width:160px;padding:6px 10px;border:1px solid var(--br2);border-radius:8px;font-size:12px">'
            + '</div></div>')
      + '</div>'
      + '<div style="flex-shrink:0">'
      +   (c.ya_en_ruta_hoy
            ? '<span class="pill" style="background:var(--gbg);color:var(--green);border-color:var(--green)">✓ En la ruta</span>'
            : '<button type="button" class="bsm" style="background:var(--gold);color:#fff;border:none" onclick="rtAgregarSeleccion('+i+')">+ Agregar</button>')
      + '</div></div>';
  }).join('');
}
function rtUsarMiUbicacion(i){
  if(!navigator.geolocation){ showToast('Este navegador no tiene GPS','error'); return; }
  showToast('Buscando tu ubicación…','info');
  navigator.geolocation.getCurrentPosition(function(pos){
    var inp=document.getElementById('rt_gps_manual_'+i);
    if(inp) inp.value=pos.coords.latitude.toFixed(6)+', '+pos.coords.longitude.toFixed(6);
    showToast('📍 Ubicación cargada, ahora tocá Agregar');
  }, function(){ showToast('No se pudo obtener tu ubicación','error'); }, {enableHighAccuracy:true,timeout:15000});
}
function _rtParsearGps(txt){
  var m=String(txt||'').match(/(-?\d{1,3}\.\d+)\s*,\s*(-?\d{1,3}\.\d+)/);
  if(!m) return null;
  var la=parseFloat(m[1]), ln=parseFloat(m[2]);
  if(isNaN(la)||isNaN(ln)||Math.abs(la)>90||Math.abs(ln)>180) return null;
  return {lat:la,lng:ln};
}
async function rtAgregarSeleccion(i){
  var c=RT_BUSQUEDA[i]; if(!c) return;
  var body={contratoId:c.id};
  if(c.gps_lat==null||c.gps_lng==null){
    var inp=document.getElementById('rt_gps_manual_'+i);
    var g=_rtParsearGps(inp?inp.value:'');
    if(!g){ alert('Cargá la ubicación (botón de GPS o pegando coordenadas) antes de agregar.'); return; }
    body.gpsLat=g.lat; body.gpsLng=g.lng;
  }
  try{ await apiFetch('/api/ruta/seleccion',{method:'POST',body:body}); }
  catch(e){ showToast('No se pudo agregar','error'); return; }
  showToast('✅ '+c.cliente_nombre+' agregado a la ruta de hoy');
  rtBuscar(); rtCargarSeleccionHoy();
}
async function rtCargarSeleccionHoy(){
  var box=document.getElementById('rt_hoy_lista'); if(!box) return;
  var datos=[];
  try{ datos=await apiFetch('/api/ruta/seleccion'); }catch(e){ datos=[]; }
  var cnt=document.getElementById('rt_hoy_count'); if(cnt) cnt.textContent=datos.length;
  if(!datos.length){ box.innerHTML='<div class="empty"><i class="ti ti-map-pin-off"></i><p>Todavía no agregaste a nadie a la ruta de hoy</p></div>'; return; }
  box.innerHTML=datos.map(function(r){
    var etq = r.estado==='pendiente'?'pendiente':r.estado==='pagado'?'✅ pagó todo':r.estado==='abonado'?'💵 abonó '+fM(r.monto_resultado):r.estado==='no_pago'?'❌ no pagó':'⏭ saltado';
    return '<div class="stop">'
      + '<div style="flex:1;min-width:0"><div class="stop-nom">'+r.cliente_nombre+'</div>'
      + '<div class="stop-sub">'+r.numero_factura+' · debe '+fM(r.saldo)+' · '+etq+'</div></div>'
      + (r.estado==='pendiente' ? '<button type="button" class="bsm" style="color:var(--er)" onclick="rtQuitarSeleccion('+r.seleccion_id+')"><i class="ti ti-x"></i></button>' : '')
      + '</div>';
  }).join('');
}
async function rtQuitarSeleccion(id){
  if(!confirm('¿Quitar de la ruta de hoy?')) return;
  try{ await apiFetch('/api/ruta/seleccion/'+id,{method:'DELETE'}); }catch(e){ showToast('No se pudo quitar','error'); return; }
  rtCargarSeleccionHoy();
}

function rutaInit(){
  if(_rutaVista!=='mapa'){ rtCargarSeleccionHoy(); return; }
  RT.mapa=null; RT.marcaYo=null;
  rtCargar().then(function(){ rtPintar(); setTimeout(rtMapaInit,60); });
  rtSeguirGPS();
}

/* Sigue mi posición en vivo */
function rtSeguirGPS(){
  var est=document.getElementById('rt_estado');
  if(!navigator.geolocation){
    if(est) est.textContent='Este navegador no tiene GPS. Te muestro la ruta sin tu posición.';
    return;
  }
  if(RT.watch) navigator.geolocation.clearWatch(RT.watch);
  RT.watch = navigator.geolocation.watchPosition(function(pos){
    var nuevo = { lat:pos.coords.latitude, lng:pos.coords.longitude, acc:Math.round(pos.coords.accuracy||0) };
    var primeraVez = !RT.yo;
    // Recalcular solo si me moví más de 40 m (evita recalcular a cada segundo)
    var movido = RT.yo ? rtDist(RT.yo, nuevo) > 40 : true;
    RT.yo = nuevo;
    if(est) est.textContent = 'Estás aquí · precisión ±'+nuevo.acc+' m';
    rtMarcarYo();
    if(primeraVez || movido){ rtCargar().then(function(){ rtPintar(); rtMapaPintar(); rtCheckLlegada(); }); }
    else rtCheckLlegada();
  }, function(e){
    if(est) est.textContent = (e.code===1)
      ? '🔒 Permiso de ubicación denegado — toca el candado 🔒 de la barra del navegador → Ubicación → Permitir'
      : '📶 Sin señal GPS. Te muestro la ruta sin tu posición.';
  }, { enableHighAccuracy:true, timeout:20000, maximumAge:5000 });
}

/* ¿Llegué? (a menos de 60 m de la próxima parada) */
function rtCheckLlegada(){
  var box=document.getElementById('rt_llegaste');
  if(!box) return;
  var p=RT.paradas[0];
  if(!p || !RT.yo){ box.innerHTML=''; return; }
  var d=rtDist(RT.yo, p.co);
  box.innerHTML = (d<=60)
    ? '<div class="llegaste">✅ ¡Llegaste donde <b>'+p.c.cliente+'</b>! ('+rtKm(d)+')</div>'
    : '';
}

/* ══ Pintar los datos ══ */
function rtPintar(){
  var pend=RT.paradas.length;
  var deuda=RT.paradas.reduce(function(s,p){ return s+(p.c.saldo||0); },0);
  var total=0;
  try{ total = RT.paradas.reduce(function(s,p,i){
        var prev = i===0 ? RT.yo : RT.paradas[i-1].co;
        var d = prev ? rtDist(prev, p.co) : 0;
        return s + (isFinite(d)?d:0);
      },0); }catch(e){}

  var chips=document.getElementById('rt_chips');
  if(chips) chips.innerHTML =
      '<div class="ruta-chip"><b>'+pend+'</b><span>Por visitar</span></div>'
    + '<div class="ruta-chip"><b>'+RT.hechasInfo.length+'</b><span>Visitadas</span></div>'
    + '<div class="ruta-chip"><b style="font-size:14px">'+fM(deuda)+'</b><span>Por cobrar</span></div>'
    + '<div class="ruta-chip"><b style="font-size:14px;color:#B9F6CA">'+fM(RT.recaudado)+'</b><span>Recaudado hoy</span></div>'
    + '<div class="ruta-chip"><b style="font-size:14px">'+rtKm(total)+'</b><span>Recorrido</span></div>';

  rtNext();
  rtLista();
}

/* Lista con el orden completo */
