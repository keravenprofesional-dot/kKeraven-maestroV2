/* ── rClientes: cada contrato sin cédula era UNA sola fila. Arreglado. ── */
rClientes = function(){
  // Un cliente = una cédula. Si el contrato no tiene cédula, vale por sí mismo.
  var mapa = new Map();
  contratos.forEach(function(c){
    var k = (c.cedula && String(c.cedula).replace(/\D/g,'')) || ('FAC:'+facKey(c.fac));
    if(!mapa.has(k)) mapa.set(k, {key:k, ref:c, cts:[]});
    mapa.get(k).cts.push(c);
  });
  var lista=[...mapa.values()].sort(function(a,b){
    return (a.ref.cliente||'').localeCompare(b.ref.cliente||'');
  });

  var conSaldo = lista.filter(function(g){
    return g.cts.some(function(c){ return c.status==='aprobado' && (c.saldo||0)>0; });
  }).length;
  var cartera = contratos.filter(function(c){ return c.status==='aprobado'; })
    .reduce(function(s,c){ return s + (Number(c.saldo)||0); },0);

  return '<div class="card">'
   + '<div class="ct"><i class="ti ti-users" style="color:var(--mc);font-size:18px"></i>Base de Clientes'
   +   '<span class="pill" style="margin-left:auto">'+lista.length+' clientes</span></div>'
   + '<div class="sg" style="margin-bottom:14px">'
   +   '<div class="st"><div class="sv">'+lista.length+'</div><div class="sl2">Clientes</div></div>'
   +   '<div class="st"><div class="sv" style="color:var(--er)">'+conSaldo+'</div><div class="sl2">Con saldo</div></div>'
   +   '<div class="st"><div class="sv" style="font-size:14px">'+fM(cartera)+'</div><div class="sl2">Cartera total</div></div>'
   +   '<div class="st"><div class="sv">'+contratos.length+'</div><div class="sl2">Facturas</div></div>'
   + '</div>'
   + '<div style="position:relative;margin-bottom:12px">'
   +   '<i class="ti ti-search" style="position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--t3)"></i>'
   +   '<input id="cli_q" placeholder="Buscar cliente, cédula, teléfono o factura…" style="width:100%;padding:9px 10px 9px 34px;border:1.5px solid rgba(196,138,31,.2);border-radius:8px;font-family:inherit;font-size:13px" oninput="cliFilter()"></div>'
   + '<div class="tbl-wrap"><table class="tbl"><thead><tr>'
   +   '<th>Cliente</th><th>Cédula</th><th>Teléfono</th><th>Trabaja en</th><th>Canal</th>'
   +   '<th class="tr">Facturas</th><th class="tr">Facturado</th><th class="tr">Debe</th>'
   + '</tr></thead><tbody id="cli_tbody">'
   + lista.map(function(g){
       var c=g.ref;
       var apr=g.cts.filter(function(x){ return x.status==='aprobado'; });
       var fact=apr.reduce(function(s,x){ return s+(Number(x.monto)||0); },0);
       var debe=apr.reduce(function(s,x){ return s+(Number(x.saldo)||0); },0);
       return '<tr style="cursor:pointer" onclick="cliDetalle(this.dataset.k)" data-k="'+g.key+'">'
         + '<td style="font-weight:600">'+(c.cliente||'—')+'</td>'
         + '<td style="font-size:11px;color:var(--t2)">'+(c.cedula||'<span style="color:#E65100">sin cédula</span>')+'</td>'
         + '<td style="font-size:12px">'+(c.tel1||'—')+'</td>'
         + '<td style="font-size:11px;color:var(--t2)">'+(c.inst||'—')+'</td>'
         + '<td>'+canalPill(c.canal)+'</td>'
         + '<td class="tr" style="font-weight:600">'+g.cts.length+'</td>'
         + '<td class="tr">'+fM(fact)+'</td>'
         + '<td class="tr" style="font-weight:700;color:'+(debe>0?'var(--er)':'var(--green)')+'">'+fM(debe)+'</td>'
         + '</tr>';
     }).join('')
   + '</tbody></table></div></div>';
};
cliDetalle = function(key){
  var cts = contratos.filter(function(c){
    var k = (c.cedula && String(c.cedula).replace(/\D/g,'')) || ('FAC:'+facKey(c.fac));
    return k===key;
  });
  if(!cts.length) return;
  var c0=cts[0];
  openMdl('Cliente: '+c0.cliente,
    '<div class="dg" style="margin-bottom:14px">'
    + '<div><div class="dl">Nombre</div><div class="dv" style="font-weight:700">'+(c0.cliente||'—')+'</div></div>'
    + '<div><div class="dl">Cédula</div><div class="dv">'+(c0.cedula||'—')+'</div></div>'
    + '<div><div class="dl">Teléfono 1</div><div class="dv">'+(c0.tel1||'—')+'</div></div>'
    + '<div><div class="dl">Teléfono 2</div><div class="dv">'+(c0.tel2||'—')+'</div></div>'
    + '<div><div class="dl">Trabaja en</div><div class="dv">'+(c0.inst||'—')+'</div></div>'
    + '<div><div class="dl">Canal</div><div class="dv">'+canalNombre(c0.canal)+'</div></div>'
    + '</div>'
    + '<div class="sl">Facturas ('+cts.length+')</div>'
    + '<div class="tbl-wrap"><table class="tbl"><thead><tr><th>Factura</th><th>Fecha</th><th>Vendedor</th><th class="tr">Monto</th><th class="tr">Debe</th><th>Estado</th></tr></thead><tbody>'
    + cts.map(function(c){
        return '<tr><td style="font-weight:700;color:var(--gold)">'+c.fac+'</td>'
          + '<td style="font-size:11px">'+fD(c.fecha)+'</td>'
          + '<td style="font-size:11px">'+(c.promotor||'—')+'</td>'
          + '<td class="tr">'+fM(c.monto)+'</td>'
          + '<td class="tr" style="font-weight:700;color:'+((c.saldo||0)>0?'var(--er)':'var(--green)')+'">'+fM(c.saldo||0)+'</td>'
          + '<td><span class="'+(c.status==='aprobado'?'sta':c.status==='rechazado'?'str':'stp')+'">'+c.status+'</span></td></tr>';
      }).join('')
    + '</tbody></table></div>',
    '<button class="bs" onclick="closeMdl()">Cerrar</button>');
};

<script>
/* ══════════════════════════════════════════════════════════════════
   B · CANAL DE VENTA — Oficina · Ruta · Embajadoras
══════════════════════════════════════════════════════════════════ */
var CANALES = {
  oficina:    {n:'Oficina',     ico:'🏢', col:'#1565C0', desc:'Venta hecha en la oficina'},
  ruta:       {n:'Ruta',        ico:'🚐', col:'#2E7D32', desc:'Venta hecha por promotor en ruta'},
  embajadora: {n:'Embajadora',  ico:'👑', col:'#C2185B', desc:'Venta a emprendedora que revende'}
};
function canalNombre(k){ return CANALES[k] ? CANALES[k].ico+' '+CANALES[k].n : '—'; }
function canalPill(k){
  if(!CANALES[k]) return '<span class="cpill nd">sin canal</span>';
  return '<span class="cpill '+k+'">'+CANALES[k].ico+' '+CANALES[k].n+'</span>';
}

/* Selector de canal dentro del formulario de Facturación */
(function(){
  var _r = window.rContrato;
  if(!_r) return;
  window.rContrato = function(){
    var html = _r.apply(this, arguments);
    var marca = '<div class="fi"><label>Monto total (RD$)';
    if(html.indexOf(marca) < 0) return html;
    var sel =
      '<div class="fi sp2"><label>Canal de venta <span class="req">*</span></label>'
      + '<div style="display:flex;gap:7px;flex-wrap:wrap">'
      + Object.keys(CANALES).filter(function(k){return k!=='embajadora'||perms().includes('embajadoras');}).map(function(k){
          var C=CANALES[k];
          return '<button type="button" id="cnl_'+k+'" onclick="setCanal(\''+k+'\')" '
            + 'style="flex:1;min-width:112px;padding:11px 8px;border-radius:10px;cursor:pointer;'
            + 'font-family:inherit;font-size:12px;font-weight:700;border:2px solid '+C.col+'33;'
            + 'background:#fff;color:'+C.col+';transition:all .18s">'
            + '<div style="font-size:19px;line-height:1.2">'+C.ico+'</div>'+C.n+'</button>';
        }).join('')
      + '</div>'
      + '<input type="hidden" id="cf_canal" value="ruta">'
      + '<div style="font-size:11px;color:var(--t3);margin-top:5px" id="cnl_desc">'+CANALES.ruta.desc+'</div>'
      + '<div class="em" id="e_canal"></div></div>';
    return html.replace(marca, sel + marca);
  };
})();
function setCanal(k){
  var el=document.getElementById('cf_canal'); if(el) el.value=k;
  Object.keys(CANALES).forEach(function(x){
    var b=document.getElementById('cnl_'+x); if(!b) return;
    var C=CANALES[x], on=(x===k);
    b.style.background = on ? C.col : '#fff';
    b.style.color      = on ? '#fff' : C.col;
    b.style.borderColor= on ? C.col : C.col+'33';
  });
  var d=document.getElementById('cnl_desc'); if(d) d.textContent=CANALES[k].desc;
  var e=document.getElementById('e_canal'); if(e) e.textContent='';
}
/* Marcar el canal por defecto al abrir el formulario */
(function(){
  var _i = window.iContrato;
  window.iContrato = function(){
    if(_i) _i.apply(this, arguments);
    setTimeout(function(){ setCanal('ruta'); }, 20);
  };
})();
/* Guardar el canal en el contrato */
(function(){
  var _e = window.enviarC;
  if(!_e) return;
  window.enviarC = function(){
    var antes = contratos.length;
    _e.apply(this, arguments);
    if(contratos.length > antes){
      var c = contratos[contratos.length-1];
      var el = document.getElementById('cf_canal');
      c.canal = (el && el.value) || 'ruta';
      guardar();
    }
  };
})();

/* ── Pestañas de canal en Facturación ── */
var _facCanal = 'todos';
function facTab(k){
  _facCanal = k;
  document.querySelectorAll('.canal-tab').forEach(function(b){
    b.classList.toggle('act', b.dataset.c===k);
  });
  facResumen();
}
function facResumen(){
  var box=document.getElementById('fac_resumen'); if(!box) return;
  var lista = contratos.filter(function(c){
    return _facCanal==='todos' ? true : (c.canal||'ruta')===_facCanal;
  });
  var apr = lista.filter(function(c){ return c.status==='aprobado'; });
  var vend = apr.reduce(function(s,c){ return s+(Number(c.monto)||0); },0);
  var debe = apr.reduce(function(s,c){ return s+(Number(c.saldo)||0); },0);

  box.innerHTML =
    '<div class="sg" style="margin-bottom:12px">'
    + '<div class="st"><div class="sv">'+lista.length+'</div><div class="sl2">Facturas</div></div>'
    + '<div class="st"><div class="sv" style="color:#2E7D32">'+apr.length+'</div><div class="sl2">Aprobadas</div></div>'
    + '<div class="st"><div class="sv" style="font-size:14px">'+fM(vend)+'</div><div class="sl2">Facturado</div></div>'
    + '<div class="st"><div class="sv" style="font-size:14px;color:var(--er)">'+fM(debe)+'</div><div class="sl2">Por cobrar</div></div>'
    + '</div>'
    + (lista.length
      ? '<div class="tbl-wrap"><table class="tbl"><thead><tr>'
        + '<th>Factura</th><th>Fecha</th><th>Cliente</th><th>Vendedor</th><th>Canal</th>'
        + '<th class="tr">Monto</th><th class="tr">Debe</th><th>Estado</th></tr></thead><tbody>'
        + lista.slice().sort(function(a,b){ return parseInt(facKey(b.fac))-parseInt(facKey(a.fac)); })
          .map(function(c){
            return '<tr><td style="font-weight:700;color:var(--gold)">'+c.fac+'</td>'
             + '<td style="font-size:11px">'+fD(c.fecha)+'</td>'
             + '<td style="font-weight:600">'+(c.cliente||'—')+'</td>'
             + '<td style="font-size:11px">'+(c.promotor||'<span style="color:#E65100">sin asignar</span>')+'</td>'
             + '<td>'+canalPill(c.canal)+'</td>'
             + '<td class="tr">'+fM(c.monto)+'</td>'
             + '<td class="tr" style="font-weight:700;color:'+((c.saldo||0)>0?'var(--er)':'var(--green)')+'">'+fM(c.saldo||0)+'</td>'
             + '<td><span class="'+(c.status==='aprobado'?'sta':c.status==='rechazado'?'str':'stp')+'">'+c.status+'</span></td></tr>';
          }).join('')
        + '</tbody></table></div>'
      : '<div class="empty"><i class="ti ti-file-invoice"></i><p>Sin facturas en este canal</p></div>');
}
/* Añadir la sección de canales debajo del formulario de Facturación */
(function(){
  var _r2 = window.rContrato;
  window.rContrato = function(){
    var html = _r2.apply(this, arguments);
    return html
      + '<div class="card">'
      +   '<div class="ct"><i class="ti ti-chart-pie" style="color:var(--gold)"></i>Ventas por canal</div>'
      +   '<div class="canal-tabs">'
      +     '<button class="canal-tab act" data-c="todos"      onclick="facTab(\'todos\')">📋 Todas</button>'
      +     '<button class="canal-tab"     data-c="oficina"    onclick="facTab(\'oficina\')">🏢 Oficina</button>'
      +     '<button class="canal-tab"     data-c="ruta"       onclick="facTab(\'ruta\')">🚐 Ruta</button>'
      +     (perms().includes('embajadoras')?'<button class="canal-tab"     data-c="embajadora" onclick="facTab(\'embajadora\')">👑 Embajadoras</button>':'')
      +   '</div>'
      +   '<div id="fac_resumen"></div>'
      + '</div>';
  };
  var _ir = window.ir;
  window.ir = function(id){
    _ir.apply(this, arguments);
    if(id==='contrato') setTimeout(function(){ facTab(_facCanal); }, 40);
  };
})();


/* ══════════════════════════════════════════════════════════════════
   C · CONTABILIDAD — asientos automáticos de ventas y cobros
══════════════════════════════════════════════════════════════════ */
/* Se generan al vuelo desde los contratos: nunca se descuadran ni se duplican */
function asientosAuto(){
  var out=[];
  contratos.forEach(function(c){
    if(c.status!=='aprobado') return;
    var monto = Number(c.neto||c.monto)||0;
    if(monto>0){
      out.push({ auto:true, fecha:c.fecha||hoy(), ref:c.fac,
        desc:'Venta a crédito — '+(c.cliente||''),
        cuenta:'Cuentas por Cobrar', contra:'Ingresos por Ventas',
        tipo:'Venta', canal:c.canal||'ruta', vendedor:c.promotor||'',
        debe:monto, haber:0 });
    }
    (c.abonos||[]).forEach(function(a){
      out.push({ auto:true, fecha:a.f, ref:c.fac,
        desc:'Cobro — '+(c.cliente||'')+(a.via?' ('+a.via+')':''),
        cuenta:'Caja / Banco', contra:'Cuentas por Cobrar',
        tipo:'Cobro', canal:c.canal||'ruta', vendedor:c.promotor||'',
        debe:Number(a.m)||0, haber:0 });
    });
  });
  return out.sort(function(a,b){ return String(b.fecha).localeCompare(String(a.fecha)); });
}
/* Ingresos reales = lo cobrado (base efectivo), no solo las facturas saldadas */
contCalcs = function(){
  var facturado = contratos.filter(function(c){ return c.status==='aprobado'; })
    .reduce(function(s,c){ return s+(Number(c.neto||c.monto)||0); },0);
  var ingresos = ingresosCobranza();                    // todos los abonos cobrados
  var porCobrar = contratos.filter(function(c){ return c.status==='aprobado'; })
    .reduce(function(s,c){ return s+(Number(c.saldo)||0); },0);
  var gPagar  = (typeof pagar!=='undefined'?pagar:[]).reduce(function(s,p){
                  return s + (p.abonos||[]).reduce(function(x,a){ return x+(Number(a.monto)||0); },0); },0);
  var gNomina = (typeof nominas!=='undefined'?nominas:[]).reduce(function(s,n){ return s+(Number(n.totalNeto)||0); },0);
  var gTotal  = gPagar+gNomina;
  return { facturado:facturado, ingresos:ingresos, porCobrar:porCobrar,
           gPagar:gPagar, gNomina:gNomina, gTotal:gTotal, util:ingresos-gTotal };
};
</script>

<script>
/* ══════════════════════════════════════════════════════════════════
   D · CUENTAS POR COBRAR — la lógica estaba invertida
   c.saldo = LO QUE DEBE (no lo que pagó).  cobrado = monto − saldo.
══════════════════════════════════════════════════════════════════ */
rCXC = function(){
  var apr  = contratos.filter(function(c){ return c.status==='aprobado'; });
  var pend = apr.filter(function(c){ return (Number(c.saldo)||0) > 0; });
  var porCobrar = apr.reduce(function(s,c){ return s + (Number(c.saldo)||0); },0);
  var facturado = apr.reduce(function(s,c){ return s + (Number(c.neto||c.monto)||0); },0);
  var cobrado   = facturado - porCobrar;

  return '<div class="card">'
   + '<div class="ct"><i class="ti ti-receipt" style="color:var(--mc);font-size:18px"></i>Cuentas por Cobrar'
   +   '<span class="pill" style="margin-left:auto">'+pend.length+' pendientes</span></div>'
   + '<div class="sg" style="margin-bottom:14px">'
   +   '<div class="st"><div class="sv" style="font-size:14px;color:var(--er)">'+fM(porCobrar)+'</div><div class="sl2">Por cobrar</div></div>'
   +   '<div class="st"><div class="sv" style="font-size:14px;color:#2E7D32">'+fM(cobrado)+'</div><div class="sl2">Cobrado</div></div>'
   +   '<div class="st"><div class="sv" style="font-size:14px">'+fM(facturado)+'</div><div class="sl2">Facturado</div></div>'
   +   '<div class="st"><div class="sv">'+pend.length+'/'+apr.length+'</div><div class="sl2">Con deuda</div></div>'
   + '</div>'
   + (pend.length
     ? '<div class="tbl-wrap"><table class="tbl"><thead><tr>'
       + '<th>Factura</th><th>Cliente</th><th>Vendedor</th><th>Canal</th><th>Vence</th>'
       + '<th class="tr">Monto</th><th class="tr">Cobrado</th><th class="tr">Debe</th><th>Avance</th>'
       + '</tr></thead><tbody>'
       + pend.slice().sort(function(a,b){ return parseInt(facKey(b.fac))-parseInt(facKey(a.fac)); })
         .map(function(c){
           var monto = Number(c.neto||c.monto)||0;
           var debe  = Number(c.saldo)||0;
           var pago  = monto - debe;
           var pct   = monto>0 ? Math.round(pago/monto*100) : 0;
           var vencido = c.lim && c.lim < hoy();
           return '<tr>'
            + '<td style="font-weight:700;color:var(--gold)">'+c.fac+'</td>'
            + '<td style="font-weight:600">'+(c.cliente||'—')+'</td>'
            + '<td style="font-size:11px">'+(c.promotor||'<span style="color:#E65100">sin asignar</span>')+'</td>'
            + '<td>'+canalPill(c.canal)+'</td>'
            + '<td style="font-size:11px'+(vencido?';color:#C62828;font-weight:700':'')+'">'
            +   (c.lim? fD(c.lim)+(vencido?' ⚠':'') : '—')+'</td>'
            + '<td class="tr">'+fM(monto)+'</td>'
            + '<td class="tr" style="color:#2E7D32">'+fM(pago)+'</td>'
            + '<td class="tr" style="font-weight:800;color:var(--er)">'+fM(debe)+'</td>'
            + '<td><div style="display:flex;align-items:center;gap:6px">'
            +   '<div style="background:#eee;border-radius:3px;height:6px;width:56px;overflow:hidden">'
            +     '<div style="background:'+(pct>=100?'#2E7D32':'#0277BD')+';height:100%;width:'+pct+'%"></div></div>'
            +   '<span style="font-size:10px;font-weight:700;color:'+(pct>0?'#2E7D32':'#999')+'">'+pct+'%</span>'
            + '</div></td></tr>';
         }).join('')
       + '</tbody><tfoot><tr>'
       +   '<td colspan="5" style="font-weight:700;padding:9px 14px">TOTALES ('+pend.length+')</td>'
       +   '<td class="tr">'+fM(pend.reduce(function(s,c){ return s+(Number(c.neto||c.monto)||0); },0))+'</td>'
       +   '<td class="tr" style="color:#2E7D32">'+fM(pend.reduce(function(s,c){ return s+((Number(c.neto||c.monto)||0)-(Number(c.saldo)||0)); },0))+'</td>'
       +   '<td class="tr" style="font-weight:900;font-size:14px;color:var(--er)">'+fM(porCobrar)+'</td>'
       +   '<td></td></tr></tfoot></table></div>'
     : '<div class="empty"><i class="ti ti-circle-check"></i><p>No hay cuentas pendientes</p></div>')
   + '</div>';
};

/* ══════════════════════════════════════════════════════════════════
   E · Los abonos que ya estaban hechos deben dejar rastro contable
   Si una factura de 4,900 ya debía 2,000, es que cobraron 2,900.
   Se registra ese abono histórico para que la contabilidad cuadre.
══════════════════════════════════════════════════════════════════ */
async function abonosHistoricos(){
  var n=0;
  contratos.forEach(function(c){
    if(c.status!=='aprobado') return;
    if(c._histOk) return;
    var monto = Number(c.neto||c.monto)||0;
    var debe  = Number(c.saldo)||0;
    var yaReg = (c.abonos||[]).reduce(function(s,a){ return s+(Number(a.m)||0); },0);
    var falta = monto - debe - yaReg;
    if(falta > 0.5){
      if(!c.abonos) c.abonos=[];
      c.abonos.unshift({ f:(c.fecha||hoy()), m:Math.round(falta),
        q:'Migración', via:'histórico', nota:'Abono ya cobrado antes de conectar el sistema' });
      n++;
    }
    c._histOk = true;
  });
  if(n) await guardar();
  return n;
}
/* Corre junto con la migración, al entrar al programa */
(function(){
  var _m = window.migrarCobrador;
  window.migrarCobrador = async function(){
    var r = await _m.apply(this, arguments);
    completarDesdeFotos();
    var h = await abonosHistoricos();
    if(h) console.log('Abonos históricos registrados: '+h);
    r.historicos = h;
    return r;
  };
})();
</script>
