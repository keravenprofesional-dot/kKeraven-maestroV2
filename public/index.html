const ISR_T=[
  {hasta:416220,tasa:0,exceso:0,base:0},
  {hasta:624329,tasa:0.15,exceso:416220.01,base:0},
  {hasta:867123,tasa:0.20,exceso:624329.01,base:31212},
  {hasta:Infinity,tasa:0.25,exceso:867123.01,base:79776},
];
function calcISR(a){for(const t of ISR_T){if(a<=t.hasta)return t.base+Math.max(0,a-t.exceso)*t.tasa;}return 0;}
function calcDesc(bruto){
  const afp=bruto*0.0287,sfs=bruto*0.0304;
  const baseAnual=(bruto-afp-sfs)*12;
  const isr=Math.max(0,calcISR(baseAnual)/12);
  const tot=afp+sfs+isr;
  const escala=baseAnual<=416220?'Exento':baseAnual<=624329?'15%':baseAnual<=867123?'20%':'25%';
  return{afp,sfs,isr,tot,neto:bruto-tot,escala};
}

const diaPago=(ym,q)=>{if(q==='primera')return 15;const[y,m]=(ym||mesAct()).split('-').map(Number);return Math.min(30,new Date(y,m,0).getDate());};

function contCalcs(){
  const ingresos=contratos.filter(c=>c.status==='aprobado'&&c.saldo===0).reduce((s,c)=>s+Number(c.monto||0),0);
  const gPagar=pagar.reduce((s,p)=>(p.abonos||[]).reduce((x,a)=>x+a.monto,0)+s,0);
  const gNomina=nominas.reduce((s,n)=>s+Number(n.totalNeto||0),0);
  const gTotal=gPagar+gNomina;
  return{ingresos,gPagar,gNomina,gTotal,util:ingresos-gTotal};
}

async function contGuardarAsiento(){
  const dc=$('ca_dc')?.value?.trim();if(!dc)return;
  try{
    await apiFetch('/api/asientos',{method:'POST',body:{
      fecha:$('ca_fe')?.value||hoy(),descripcion:dc,cuenta:$('ca_ct')?.value||'',
      tipo:$('ca_tp')?.value||'',debe:parseFloat($('ca_db')?.value)||0,haber:parseFloat($('ca_hb')?.value)||0}});
  }catch(e){alert('No se pudo guardar el asiento: '+e.message);return;}

}

function rCRMBody(){
  const c=$('crm_body');if(!c)return;

  const usuariosSel=USUARIOS.filter(u=>u.on);

    const vencido=cl.seguimiento&&cl.seguimiento<hoy()&&cl.estado!=='cliente'&&cl.estado!=='inactivo';
    let body='';
    if(isE){
      const hist=(cl.historial||[]);
      const compras=(cl.compras||[]);
      body=`<div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--br)">

              ${Object.keys(CRM_ETAPAS).map(k=>`<option value="${k}"${cl.estado===k?' selected':''}>${CRM_ETAPAS[k].lab}</option>`).join('')}
            </select></div>
          <div class="fi"><label>Próximo seguimiento</label><input type="date" id="crm_seg_${cl.id}" value="${cl.seguimiento||''}" onchange="crmActualizar(${cl.id})"></div>
          <div class="fi"><label>Vendedor asignado</label>
            <select id="crm_vend_${cl.id}" onchange="crmActualizar(${cl.id})">
              <option value="">Sin asignar</option>
              ${usuariosSel.map(u=>`<option value="${u.id}"${cl.vendedorId===u.id?' selected':''}>${u.n}</option>`).join('')}
            </select></div>
        </div>
        <div class="sl">Historial de compras (${compras.length})</div>
        ${compras.length?compras.map(o=>`<div style="display:flex;justify-content:space-between;font-size:12px;padding:4px 0;border-bottom:1px solid var(--br)">
          <span>${o.fac} · ${fD(o.fecha)}</span><b style="color:${o.saldo>0?'var(--er)':'var(--green)'}">${fM(o.monto)}${o.saldo>0?' (debe '+fM(o.saldo)+')':''}</b>
        </div>`).join(''):`<div style="font-size:12px;color:var(--t3);padding:4px 0">Sin compras registradas todavía.</div>`}
        <div class="sl" style="margin-top:10px">Notas de contacto</div>
        ${hist.map(h=>`<div style="font-size:12px;padding:4px 0;border-bottom:1px solid var(--br)22">

        </div>`).join('')}
        ${!hist.length?`<div style="font-size:12px;color:var(--t3);padding:4px 0">Sin notas de contacto.</div>`:''}
        <div style="display:flex;gap:8px;margin-top:10px;flex-wrap:wrap">
          <input id="crm_nota_${cl.id}" style="flex:1;padding:7px 10px;border:1px solid var(--br2);border-radius:var(--r);font-family:inherit;font-size:12px;min-width:120px" placeholder="Agregar nota de contacto..."
            onkeydown="if(event.key==='Enter')crmAddNota(${cl.id})">
          <button class="bg" style="padding:7px 12px;font-size:12px" onclick="crmAddNota(${cl.id})">+ Nota</button>

        </div>
      </div>`;
    }
    return`<div class="cc${isE?' exp':''}">
      <div class="cc-hd" onclick="crmToggle(${cl.id})">
        <div style="flex:1;min-width:0">
          <div style="font-size:13px;font-weight:600">${cl.nombre}</div>
          <div style="font-size:10px;color:var(--t2)">${cl.tel||''} · ${cl.cedula||''}${cl.vendedor?' · '+cl.vendedor:''}${cl.seguimiento?` · <span style="color:${vencido?'var(--er)':'var(--t2)'}">Seguimiento: ${fD(cl.seguimiento)}</span>`:''}</div>

async function crmAddNota(id){
  const inp=$('crm_nota_'+id);const txt=inp?.value?.trim();if(!txt)return;
  try{await apiFetch(`/api/crm/clientes/${id}/notas`,{method:'POST',body:{texto:txt}});}

  await cargarCrm();rCRMBody();

async function crmActualizar(id){
  const et=$('crm_et_'+id)?.value,seg=$('crm_seg_'+id)?.value,vend=$('crm_vend_'+id)?.value;
  try{
    await apiFetch(`/api/crm/clientes/${id}`,{method:'PATCH',body:{
      estadoCrm:et,proximoSeguimiento:seg||null,vendedorId:vend?Number(vend):null}});
  }catch(e){alert('No se pudo actualizar: '+e.message);return;}
  await cargarCrm();rCRMBody();
}

let pagExpId=null;

function rPagar(){
  const venc=pagar.filter(p=>p.estado!=='pagado'&&p.vence&&new Date(p.vence)<new Date());
  const pendT=pagar.filter(p=>p.estado!=='pagado').reduce((s,p)=>s+Number(p.monto||0),0);
  let h=`<div class="card">
    <div class="ct"><i class="ti ti-cash-banknote" style="color:var(--red);font-size:18px"></i>Cuentas por Pagar
      <button class="bg" style="margin-left:auto" onclick="pagarAbrirNuevo()"><i class="ti ti-plus"></i> Nueva</button></div>
    <div class="sg" style="margin-bottom:10px">
      <div class="st"><div class="sv" style="color:var(--er)">${fM(pendT)}</div><div class="sl2">Pendiente</div></div>
      <div class="st"><div class="sv" style="color:${venc.length>0?'var(--er)':'var(--t3)'}">⚠️ ${venc.length}</div><div class="sl2">Vencidas</div></div>
      <div class="st"><div class="sv">${pagar.filter(p=>p.estado!=='pagado').length}</div><div class="sl2">Activas</div></div>
      <div class="st"><div class="sv">${pagar.filter(p=>p.estado==='pagado').length}</div><div class="sl2">Pagadas</div></div>
    </div>`;
  if(venc.length){
    h+=`<div style="padding:10px 12px;background:var(--rbg);border:1px solid var(--er);border-radius:var(--r);font-size:12px;color:var(--rdk);margin-bottom:10px">
      <b><i class="ti ti-alert-triangle"></i> ${venc.length} pago(s) vencido(s):</b>
      ${venc.map(v=>`<div style="margin-top:3px;font-weight:500">${v.proveedor} — ${fM(v.monto)} (venció ${fD(v.vence)})</div>`).join('')}
    </div>`;
  }
  pagar.forEach(p=>{
    const saldo=(p.abonos||[]).reduce((s,a)=>s+a.monto,0);
    const pct=Math.min(100,Math.round(saldo/Number(p.monto||1)*100));
    const isE=pagExpId===p.id;
    const vencida=p.estado!=='pagado'&&p.vence&&new Date(p.vence)<new Date();
    let body='';
    if(isE){
      const hist=(p.abonos||[]).map(a=>`<div style="display:flex;justify-content:space-between;font-size:12px;padding:4px 0;border-bottom:1px solid var(--br)">${fD(a.fecha)}<b style="color:var(--green)">${fM(a.monto)}</b></div>`).join('');
      body=`<div class="cc-bd">
        <div class="dg">
          <div><div class="dl">Proveedor</div><div class="dv">${p.proveedor}</div></div>
          <div><div class="dl">Concepto</div><div class="dv">${p.concepto||'—'}</div></div>
          <div><div class="dl">Monto</div><div class="dv">${fM(p.monto)}</div></div>
          <div><div class="dl">Vencimiento</div><div class="dv" style="${vencida?'color:var(--er);font-weight:600':''}">${fD(p.vence)}</div></div>
        </div>
        ${hist?`<div class="sl">Pagos realizados</div>${hist}`:''}
        ${p.estado!=='pagado'?`
        <div style="display:flex;gap:7px;margin-top:10px;flex-wrap:wrap">
          <input type="number" id="pag_abo_${p.id}" placeholder="Monto pago RD$" style="flex:1;padding:7px;border:1px solid var(--br2);border-radius:var(--r);font-family:inherit;font-size:12px">
          <button class="bv" onclick="pagarAbonar(${p.id})"><i class="ti ti-plus"></i> Pago</button>
          <button class="bg" onclick="pagarSaldar(${p.id})"><i class="ti ti-check"></i> Pagado</button>
        </div>`:'<div style="text-align:center;padding:7px;color:var(--green);font-size:12px;font-weight:600"><i class="ti ti-circle-check"></i> Pagado completamente</div>'}
      </div>`;
    }
    h+=`<div class="cobc${isE?' exp':''}">
      <div class="cob-hd" onclick="pagToggle(${p.id})" style="border-left:3px solid ${vencida?'var(--er)':p.estado==='pagado'?'var(--green)':'var(--gold)'}">
        <div style="flex:1;min-width:0">
          <div style="font-size:13px;font-weight:600">${p.proveedor}</div>
          <div style="font-size:10px;color:var(--t2)">${p.concepto||''}${p.vence?' · Vence: '+fD(p.vence):''}${vencida?' ⚠️':''}</div>
        </div>
        <div style="text-align:right;flex-shrink:0">
          <div style="font-size:14px;font-weight:700;color:${p.estado==='pagado'?'var(--green)':'var(--er)'}">${fM(Number(p.monto||0)-saldo)}</div>
          <div style="font-size:10px;color:var(--t2)">${p.estado==='pagado'?'Pagado':'Pendiente'}</div>
        </div>
        <i class="ti ti-chevron-${isE?'up':'down'}" style="font-size:14px;color:var(--t2)"></i>
      </div>${body}
    </div>`;
  });
  if(!pagar.length)h+=`<div class="empty"><i class="ti ti-cash-banknote"></i>Sin cuentas por pagar registradas</div>`;
  h+='</div>';
  return h;
}

function pagToggle(id){pagExpId=pagExpId===id?null:id;$('main').innerHTML=rPagar();}
async function pagarAbonar(id){
  const p=pagar.find(x=>x.id===id);if(!p)return;
  const m=parseFloat($('pag_abo_'+id)?.value)||0;
  if(m<=0){alert('Monto inválido.');return;}
  try{await apiFetch(`/api/cuentas-por-pagar/${id}/abonar`,{method:'POST',body:{monto:m}});}
  catch(e){alert('No se pudo registrar el pago: '+e.message);return;}
  await cargarCuentasPorPagar();$('main').innerHTML=rPagar();
}
async function pagarSaldar(id){
  const p=pagar.find(x=>x.id===id);if(!p||!confirm('¿Marcar como pagado completamente?'))return;
  const pagado=(p.abonos||[]).reduce((s,a)=>s+a.monto,0);
  const restante=Math.max(0,Number(p.monto)-pagado);
  try{await apiFetch(`/api/cuentas-por-pagar/${id}/abonar`,{method:'POST',body:{monto:restante,nota:'Saldado'}});}
  catch(e){alert('No se pudo saldar: '+e.message);return;}
  await cargarCuentasPorPagar();pagExpId=null;$('main').innerHTML=rPagar();
}

      </div>
      <div style="padding:18px 20px">
        <div class="fi"><label>Proveedor / Acreedor *</label><input id="pg_pr" placeholder="Nombre del proveedor" oninput="upper(this)"></div>
        <div class="fi"><label>Concepto</label><input id="pg_co" placeholder="Materia prima, servicio..." oninput="upper(this)"></div>
        <div class="fi"><label>Monto (RD$) *</label><input id="pg_mn" type="number" placeholder="0.00"></div>
        <div class="fi"><label>Fecha de Vencimiento</label><input id="pg_vc" type="date"></div>
        <div class="fi"><label>Notas</label><textarea id="pg_nt" style="resize:none;min-height:46px" placeholder="Observaciones..."></textarea></div>
        <button class="bg" style="width:100%" onclick="pagarGuardar()"><i class="ti ti-check"></i> Guardar</button>

async function pagarGuardar(){
  const pr=$('pg_pr')?.value?.trim(),mn=$('pg_mn')?.value;
  if(!pr||!mn){alert('Proveedor y monto son obligatorios.');return;}
  try{
    await apiFetch('/api/cuentas-por-pagar',{method:'POST',body:{
      proveedor:pr,concepto:$('pg_co')?.value||'',monto:parseFloat(mn),
      vencimiento:$('pg_vc')?.value||null,notas:$('pg_nt')?.value||''}});
  }catch(e){alert('No se pudo guardar: '+e.message);return;}
  await cargarCuentasPorPagar();
  document.getElementById('pag_modal')?.remove();$('main').innerHTML=rPagar();
}

<script>

// ── regenComisiones ──────────────────────────────────────────────
// Red de seguridad: crea en el servidor la comision de cualquier

  let added=0;
  try{
    const r=await apiFetch('/api/comisiones/regenerar',{method:'POST'});
    added=r.agregadas||0;
    if(added>0)await cargarComisionesSemanas();
  }catch(e){console.error('No se pudo regenerar comisiones:',e);}

var _mcTab='prom',_mcMes='',_mcExpId=null;
function rMisCom(){

    '</div>'+
    '<div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap">'+
      '<select id="mc_mes" style="padding:8px 12px;border:1.5px solid rgba(196,138,31,.25);border-radius:8px;font-family:inherit;font-size:13px" onchange="_mcMes=this.value;misCom_tab(_mcTab)">'+

  if(t==='cont'){
    var autos=lista.filter(function(s){return s.auto;});
    if(!autos.length){cont.innerHTML='<div class="empty"><i class="ti ti-bolt"></i><p>Sin comisiones de contratos</p></div>';return;}
    cont.innerHTML='<div class="tbl-wrap"><table class="tbl"><thead><tr><th>Factura</th><th>Promotor</th><th>Tipo</th><th>Fecha</th><th class="tr">Monto</th><th class="tr">%</th><th class="tr">Comisión</th><th>Estado</th></tr></thead><tbody>'+

        '<td style="font-weight:700;color:var(--gold)">'+s.fac+'</td>'+
        '<td>'+s.promotor+'</td>'+
        '<td><span style="padding:2px 8px;border-radius:100px;font-size:10px;font-weight:700;background:'+(s.tipo==='credito'?'#E8F5E9':'#FFF3E0')+';color:'+(s.tipo==='credito'?'#2E7D32':'#E65100')+'">'+s.tipo+'</span></td>'+
        '<td style="font-size:11px">'+fD(s.de)+'</td>'+
        '<td class="tr">'+fM(s.monto)+'</td>'+
        '<td class="tr" style="font-weight:700;color:'+(s.tipo==='credito'?'#2E7D32':'#E65100')+'">'+(s.tipo==='credito'?'8%':'16%')+'</td>'+
        '<td class="tr" style="font-weight:800;color:var(--gold)">'+fM(s.tot)+'</td>'+
        '<td><span style="padding:2px 8px;border-radius:100px;font-size:10px;font-weight:600;background:'+(s.pag?'#E8F5E9':'#FFFDE7')+';color:'+(s.pag?'#2E7D32':'#E65100')+'">'+(s.pag?'Pagado':'Pendiente')+'</span></td>'+

      '</tbody><tfoot><tr><td colspan="4" style="padding:8px 12px;font-weight:700">TOTALES</td><td class="tr" style="padding:8px 12px">'+fM(autos.reduce(function(s,x){return s+x.monto;},0))+'</td><td></td><td class="tr" style="font-weight:900;font-size:14px;color:var(--gold);padding:8px 12px">'+fM(autos.reduce(function(s,x){return s+x.tot;},0))+'</td><td></td></tr></tfoot></table></div>';
  } else {

    }

}

    lista.forEach(function(c){

      if(!por[p])por[p]={nombre:p,total:0,aprobado:0,pendiente:0,rechazado:0,montoApro:0,contado:0,credito:0,com:0};
      por[p].total++;
      if(c.status==='aprobado'){por[p].aprobado++;por[p].montoApro+=Number(c.monto||0);
        if(c.tipo==='contado'){por[p].contado++;por[p].com+=Math.round(Number(c.monto||0)*.16);}
        else{por[p].credito++;por[p].com+=Math.round(Number(c.monto||0)*.08);}
      }
      if(c.status==='pendiente')por[p].pendiente++;
      if(c.status==='rechazado')por[p].rechazado++;
    });
    var proms=Object.values(por).sort(function(a,b){return b.montoApro-a.montoApro;});
    if(!proms.length){cont.innerHTML='<div class="empty"><i class="ti ti-chart-dots"></i><p>Sin datos</p></div>';return;}
    cont.innerHTML='<div class="sg" style="margin-bottom:12px">'+
      '<div class="st"><div class="sv">'+proms.length+'</div><div class="sl2">Vendedores</div></div>'+
      '<div class="st"><div class="sv">'+lista.length+'</div><div class="sl2">Contratos</div></div>'+
      '<div class="st"><div class="sv" style="font-size:14px">'+fM(lista.filter(function(c){return c.status==='aprobado';}).reduce(function(s,c){return s+Number(c.monto||0);},0))+'</div><div class="sl2">Total aprobado</div></div>'+
    '</div>'+
    '<div class="tbl-wrap"><table class="tbl"><thead><tr><th>#</th><th>Vendedor</th><th class="tr">Total</th><th class="tr">Aprobados</th><th class="tr">Pend.</th><th class="tr">Rech.</th><th class="tr">Efectividad</th><th class="tr">Monto</th><th class="tr">Comisión</th></tr></thead><tbody>'+
    proms.map(function(p,i){
      var ef=p.total>0?Math.round(p.aprobado/p.total*100):0;
      var efC=ef>=70?'#2E7D32':ef>=50?'#E65100':'#C62828';
      return'<tr>'+
        '<td style="font-weight:700;color:var(--t2)">'+(i+1)+'</td>'+
        '<td style="font-weight:600">'+p.nombre+'</td>'+
        '<td class="tr">'+p.total+'</td>'+
        '<td class="tr" style="color:#2E7D32;font-weight:700">'+p.aprobado+'</td>'+
        '<td class="tr" style="color:#E65100">'+p.pendiente+'</td>'+
        '<td class="tr" style="color:#C62828">'+p.rechazado+'</td>'+
        '<td class="tr"><span style="font-weight:800;color:'+efC+'">'+ef+'%</span></td>'+
        '<td class="tr" style="font-weight:700">'+fM(p.montoApro)+'</td>'+
        '<td class="tr" style="font-weight:800;color:var(--gold)">'+fM(p.com)+'</td>'+
      '</tr>';
    }).join('')+'</tbody></table></div>';
  } else {
    var zonas={};
    lista.forEach(function(c){var z=c.zona||'Sin zona';
      if(!zonas[z])zonas[z]={zona:z,contratos:0,aprobado:0,monto:0,proms:new Set()};
      zonas[z].contratos++;zonas[z].monto+=Number(c.monto||0);
      if(c.status==='aprobado')zonas[z].aprobado++;
      if(c.promotor)zonas[z].proms.add(c.promotor);
    });
    var pct=lista.length>0?Math.round(lista.filter(function(c){return c.status==='aprobado';}).length/lista.length*100):0;
    cont.innerHTML='<div class="sg" style="margin-bottom:12px">'+
      '<div class="st"><div class="sv">'+lista.length+'</div><div class="sl2">Total contratos</div></div>'+
      '<div class="st"><div class="sv" style="color:#2E7D32">'+lista.filter(function(c){return c.status==='aprobado';}).length+'</div><div class="sl2">Aprobados</div></div>'+
      '<div class="st"><div class="sv">'+pct+'%</div><div class="sl2">Efectividad</div></div>'+
    '</div>'+
    '<div class="tbl-wrap"><table class="tbl"><thead><tr><th>Zona</th><th class="tr">Contratos</th><th class="tr">Aprobados</th><th class="tr">Efectividad</th><th class="tr">Monto</th><th>Vendedores</th></tr></thead><tbody>'+
    Object.values(zonas).sort(function(a,b){return b.monto-a.monto;}).map(function(z){
      var ef2=z.contratos>0?Math.round(z.aprobado/z.contratos*100):0;
      return'<tr>'+
        '<td style="font-weight:700">'+z.zona+'</td>'+
        '<td class="tr">'+z.contratos+'</td>'+
        '<td class="tr" style="color:#2E7D32;font-weight:700">'+z.aprobado+'</td>'+
        '<td class="tr"><span style="font-weight:800;color:'+(ef2>=70?'#2E7D32':ef2>=50?'#E65100':'#C62828')+'">'+ef2+'%</span></td>'+
        '<td class="tr" style="font-weight:700">'+fM(z.monto)+'</td>'+
        '<td style="font-size:11px">'+[...z.proms].join(', ')+'</td>'+
      '</tr>';
    }).join('')+'</tbody></table></div>';
  }
}
function xlsRendimiento(){
  var mes=_rendMes;
  var lista=contratos.filter(function(c){return!mes||c.fecha.startsWith(mes);});
  var rows=lista.map(function(c){return[c.fac,fD(c.fecha),c.promotor||'',c.zona||'',c.cliente,c.cedula,c.tipo||'',c.monto||0,c.status,c.status==='aprobado'?1:0];});
  reporteSelector(rows,['Factura','Fecha','Promotor','Zona','Cliente','Cédula','Tipo','Monto','Estado','Aprobado'],'Rendimiento'+mes,'Reporte de Rendimiento');
}

// ── canEdit / getEffectivePerms ──────────────────────────────────
// El servidor es quien decide de verdad (ver requirePermiso en
// server.js) — esto solo controla qué se muestra en pantalla.
const getEffectivePerms=function(u){
  u=u||ses;
  if(u&&Array.isArray(u.permisos))return u.permisos;
  return PERMS[u?u.rol:'']||[];
};
const canEdit=function(modId){
  if(!ses)return false;
  return getEffectivePerms(ses).includes(modId);
};

// ── Módulo de Permisos ────────────────────────────────────────────
// Nota: se simplificó de un modelo "none/ver/editar" por módulo (que
// en la versión original nunca llegaba a aplicarse de verdad en
// ninguna pantalla) a un modelo de "tiene acceso o no" por módulo,
// que es el mismo que ahora SÍ hace cumplir el servidor en cada
// llamada a la API.
var PERM_MODS=[
  {sec:'Principal',mods:[{id:'dash',lab:'Panel principal',ico:'🏠'},{id:'comunicados',lab:'Comunicados',ico:'📢'}]},

  {sec:'Comercial',mods:[{id:'clientes',lab:'Clientes',ico:'👥'},{id:'cxc',lab:'CxC',ico:'📄'},{id:'pedidos',lab:'Pedidos',ico:'🛍️'},{id:'embajadoras',lab:'Canal Embajadoras',ico:'👑'}]},
  {sec:'Almacén',mods:[{id:'arqueo',lab:'Arqueo',ico:'🧾'},{id:'almp',lab:'Alm. Principal',ico:'🏭'},{id:'almm',lab:'Alm. Móvil',ico:'🚐'},{id:'productos',lab:'Gestión de productos',ico:'🏷️'},{id:'laboratorio',lab:'Laboratorio (ver/armar recetas)',ico:'🧪'},{id:'laboratorio_produccion',lab:'Laboratorio: confirmar producción',ico:'⚗️'}]},
  {sec:'Finanzas',mods:[{id:'cxp',lab:'CxP',ico:'💳'},{id:'nomina',lab:'Nómina',ico:'👔'},{id:'contab',lab:'Contabilidad',ico:'📒'},{id:'ccrm',lab:'CRM',ico:'🤝'}]},
  {sec:'Admin',mods:[{id:'com',lab:'Comisiones',ico:'📊'},{id:'miscom',lab:'Cuadre Com.',ico:'💰'},{id:'users',lab:'Usuarios',ico:'👤'},{id:'rendimiento',lab:'Rendimiento',ico:'📈'},{id:'cfg',lab:'Config.',ico:'⚙️'},{id:'delfac',lab:'Anular Fac.',ico:'🚫'},{id:'auditoria',lab:'Auditoría',ico:'🛡️'},{id:'rrhh',lab:'Recursos Humanos',ico:'🧑‍💼'}]},
  {sec:'Herramientas',mods:[{id:'asistente',lab:'Asistente IA',ico:'🤖'},{id:'excel',lab:'Importar/Exportar Excel',ico:'📊'}]},
];

function abrirPermisos(uid){
  var u=USUARIOS.find(function(x){return x.id===uid;});if(!u)return;
  var rolBase=PERMS[u.rol]||[];
  var actual=Array.isArray(u.permisos)?u.permisos:null;
  var body='<div style="background:rgba(196,138,31,.08);border:1px solid rgba(196,138,31,.2);border-radius:8px;padding:10px;margin-bottom:14px;font-size:12px">'+
    '<i class="ti ti-info-circle" style="color:var(--gold)"></i> '+(actual?'Este usuario tiene permisos personalizados, distintos a los de su rol <b>'+u.rol+'</b>.':'Usando los permisos por defecto del rol <b>'+u.rol+'</b>.')+' '+
    '<button onclick=\"resetPermisos('+uid+')\" style="margin-left:8px;padding:2px 8px;background:#fff;border:1px solid var(--br);border-radius:5px;cursor:pointer;font-size:11px">↩ Restaurar rol</button>'+
  '</div>';
  if(u.rol!=='gerente'&&u.rol!=='subgerente'){
    body+='<label style="display:flex;align-items:center;gap:8px;padding:10px 12px;border-radius:8px;margin-bottom:14px;background:var(--rbg);border:1px solid var(--er)">'+
      '<input type="checkbox" id="pm_ver_todas_facturas" '+(u.verTodasFacturas?'checked':'')+'>'+
      '<span style="font-size:13px"><b>Ver la facturación de todo el equipo</b><br><span style="font-size:11px;color:var(--t3)">Si está desmarcado, este usuario solo ve los contratos que él mismo registró (Facturación, Buzón, Cobros). Activalo únicamente si de verdad necesita supervisar al equipo.</span></span>'+
    '</label>';
  }
  PERM_MODS.forEach(function(sec){
    body+='<div style="margin-bottom:14px"><div style="font-size:9px;font-weight:800;letter-spacing:.1em;color:var(--red);text-transform:uppercase;margin-bottom:6px;border-bottom:1px solid rgba(28,27,31,.1);padding-bottom:4px">'+sec.sec+'</div>';
    sec.mods.forEach(function(mod){
      var cur=(actual||rolBase).includes(mod.id);
      var locked=mod.id==='delfac'&&u.rol!=='gerente';
      body+='<label style="display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:8px;margin-bottom:2px;background:'+(cur?'rgba(196,138,31,.04)':'transparent')+';cursor:'+(locked?'not-allowed':'pointer')+'">'+
        '<input type="checkbox" name="pm_'+mod.id+'" '+(cur?'checked':'')+' '+(locked?'disabled':'')+'>'+
        '<span style="font-size:15px;width:22px">'+mod.ico+'</span>'+
        '<span style="font-size:13px;flex:1">'+mod.lab+'</span>'+
        (locked?'<span style="font-size:10px;color:#C62828;padding:2px 8px;background:#FFEBEE;border-radius:100px">Solo Gerente</span>':'')+
      '</label>';
    });
    body+='</div>';
  });
  var ov=document.createElement('div');ov.id='perm_modal_ov';
  ov.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);z-index:200;display:flex;align-items:flex-start;justify-content:center;padding:16px;overflow-y:auto';
  ov.onclick=function(e){if(e.target===ov)cerrarPermModal();};
  ov.innerHTML='<div style="background:#fff;border-radius:20px;width:100%;max-width:680px;margin:auto;box-shadow:0 20px 60px rgba(0,0,0,.2);overflow:hidden">'+
    '<div style="background:linear-gradient(135deg,rgba(28,27,31,.05),rgba(196,138,31,.05));padding:18px 22px;border-bottom:1px solid rgba(196,138,31,.12);display:flex;align-items:center;gap:12px">'+
      '<div style="font-size:15px;font-weight:800">🔑 Permisos — '+u.n+'</div>'+
      '<button onclick="cerrarPermModal()" style="margin-left:auto;width:30px;height:30px;border-radius:50%;border:1px solid var(--br);background:#fff;cursor:pointer">✕</button>'+
    '</div>'+
    '<div style="padding:18px 22px;max-height:65vh;overflow-y:auto">'+body+'</div>'+
    '<div style="padding:12px 22px;border-top:1px solid rgba(196,138,31,.1);display:flex;justify-content:flex-end;gap:8px">'+
      '<button class="bs" onclick="cerrarPermModal()">Cancelar</button>'+
      '<button class="bg" onclick=\"guardarPermisos('+uid+')\">Guardar permisos</button>'+
    '</div></div>';
  document.body.appendChild(ov);
}
function cerrarPermModal(){var o=document.getElementById('perm_modal_ov');if(o)o.remove();}
async function guardarPermisos(uid){
  var permisos=[];
  PERM_MODS.forEach(function(sec){sec.mods.forEach(function(mod){
    var cb=document.querySelector('[name="pm_'+mod.id+'"]');
    if(cb&&cb.checked)permisos.push(mod.id);
  });});
  try{
    await apiFetch('/api/usuarios/'+uid+'/permisos',{method:'PATCH',body:{permisos}});
    var verTodas=document.getElementById('pm_ver_todas_facturas');
    if(verTodas) await apiFetch('/api/usuarios/'+uid+'/ver-todas-facturas',{method:'PATCH',body:{valor:verTodas.checked}});
  }
  catch(e){alert('No se pudieron guardar los permisos: '+e.message);return;}
  cerrarPermModal();await cargarUsuariosAdmin();
  document.getElementById('main').innerHTML=rUsers();showToast('Permisos guardados ✅');
}
async function resetPermisos(uid){
  try{await apiFetch('/api/usuarios/'+uid+'/permisos',{method:'PATCH',body:{permisos:null}});}
  catch(e){alert('No se pudo restaurar: '+e.message);return;}
  cerrarPermModal();await cargarUsuariosAdmin();
  document.getElementById('main').innerHTML=rUsers();
}

</script>

<script>
// ═══════════════════════════════════════════════════════════════════

async function desaprobar(id){
  var c=contratos.find(function(x){return x.id===id;});if(!c)return;
  if(!confirm('¿Desaprobar "'+c.fac+'"? Volverá a PENDIENTE para poder editar y re-aprobar.'))return;
  c.status='pendiente';
  c.editado=true;
  c.decAnterior=c.dec;  // guardar la decisión anterior como referencia
  c.dec={q:'',h:'',c:''};
  // Revertir comisión automática si existe
  semanas=semanas.filter(function(s){return s.facRef!==id;});
  await guardar();
  buildBotNav();
  document.getElementById('main').innerHTML=rBuzon();
  showToast('Contrato devuelto a pendiente para revisión','info');
}

      '<div class="fi"><label>Teléfono 2</label><input id="ec_t2" value="'+(c.tel2||'')+'" type="tel" placeholder="829-000-0000" maxlength="12" oninput="fTel(this)"></div>'+
      '<div class="fi sp2"><label>Correo electrónico</label><input id="ec_em" value="'+(c.email||'')+'" type="email"></div>'+
      '<div class="fi"><label>Institución / Trabajo</label><input id="ec_in" value="'+(c.inst||'')+'" oninput="this.value=this.value.toUpperCase()"></div>'+
      '<div class="fi"><label>Barrio / Sector</label><input id="ec_br" value="'+(c.barrio||'')+'" oninput="this.value=this.value.toUpperCase()"></div>'+

    '</div>'+

      '<textarea id="ec_obs" placeholder="Explica qué se corrigió...">'+(c.obs||'')+'</textarea>'+

  // Use existing modal system

  ov.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(3px);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px;overflow-y:auto';
  ov.onclick=function(e){if(e.target===ov)ov.remove();};
  ov.innerHTML=
    '<div style="background:#fff;border:1px solid rgba(21,101,192,.2);border-radius:20px;width:100%;max-width:620px;margin:auto;box-shadow:0 20px 60px rgba(0,0,0,.2);overflow:hidden">'+
      '<div style="background:linear-gradient(135deg,rgba(21,101,192,.06),rgba(196,138,31,.04));padding:18px 22px;border-bottom:1px solid rgba(21,101,192,.12);display:flex;align-items:center;gap:12px">'+
        '<div style="width:42px;height:42px;border-radius:10px;background:linear-gradient(135deg,#1565C0,#0D47A1);display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px">✏️</div>'+

async function guardarEdicionCliente(id){
  var c=contratos.find(function(x){return x.id===id;});if(!c)return;
  var nm=document.getElementById('ec_nm')?.value?.trim();
  var ce=document.getElementById('ec_ce')?.value?.trim();

  try{
    await apiFetch(`/api/contratos/${id}/cliente`,{method:'PATCH',body:{
      nombre:nm,cedula:ce,
      telefono1:document.getElementById('ec_t1')?.value||c.tel1,
      telefono2:document.getElementById('ec_t2')?.value||c.tel2,
      email:document.getElementById('ec_em')?.value||c.email,
      institucion:document.getElementById('ec_in')?.value||c.inst,
      barrio:document.getElementById('ec_br')?.value||c.barrio,
      referencia:document.getElementById('ec_rf')?.value||c.ref,
      direccion:document.getElementById('ec_dir')?.value||c.dir,
      motivo:(document.getElementById('ec_obs')?.value||'').trim()}});
  }catch(e){showToast('No se pudo guardar: '+e.message,'err');return;}

// Override rBuzon to show tabs: Pendientes | Aprobados | Rechazados

    '</div>'+
    '<div class="cs">Sesión: <b>'+ses.n+'</b> — tu nombre queda registrado en cada decisión. Los contratos aprobados pueden desaprobarse para corrección.</div>'+

    '<div style="display:flex;gap:3px;background:var(--k-cream);border-radius:8px;padding:3px;margin-bottom:14px;flex-wrap:wrap">'+

    '</div>'+
    '<div id="bz_cont"></div>'+
  '</div>';
  return h;
};

let _bzTabActual='pend';
function bzTab(t){
  _bzTabActual=t;
  ['pend','apro','rech'].forEach(function(x){
    var b=document.getElementById('bz_tab_'+x);
    if(b)b.className='tab'+(x===t?' act':'');
  });
  var cont=document.getElementById('bz_cont');if(!cont)return;
  var pend=contratos.filter(function(c){return c.status==='pendiente';});
  var apro=contratos.filter(function(c){return c.status==='aprobado';});

  cont.innerHTML=lista.map(function(c){return ccCard(c);}).join('');
}

// ── Persistencia ─────────────────────────────────────────────────
function kvLoadCfg(){
  try{
    var saved=localStorage.getItem('sarah_cfg');
    kv.cfg=saved?Object.assign({},KV_CFG_DEFAULT,JSON.parse(saved)):Object.assign({},KV_CFG_DEFAULT);
    var h=localStorage.getItem('sarah_hist_'+(typeof ses!=='undefined'&&ses?ses.id:'x'));
    kv.hist=h?JSON.parse(h):[];
  }catch(e){kv.cfg=Object.assign({},KV_CFG_DEFAULT);kv.hist=[];}
}
function kvSaveCfg(){
  try{localStorage.setItem('sarah_cfg',JSON.stringify(kv.cfg));}catch(e){}
}
function kvSaveHist(){
  try{var uid=typeof ses!=='undefined'&&ses?ses.id:'x';
    localStorage.setItem('sarah_hist_'+uid,JSON.stringify(kv.hist.slice(-60)));}catch(e){}
}

// ── Init ──────────────────────────────────────────────────────────
function kvInit(){
  kvLoadCfg();
  var fab=document.getElementById('kv_fab');
  if(fab&&typeof ses!=='undefined'&&ses)fab.style.display='block';
  var nm=document.getElementById('kv_nm');if(nm)nm.textContent=kv.cfg.nombre;
  var wn=document.getElementById('kv_wname');if(wn)wn.textContent='Hola, soy '+kv.cfg.nombre;
  var av=document.getElementById('kv_avatar');if(av)av.innerHTML=kv.cfg.emoji+'<div style="position:absolute;bottom:1px;right:1px;width:10px;height:10px;background:#00C853;border-radius:50%;border:2px solid var(--red)"></div>';
  kvBuildProvStrip();
  kvBuildChips();
  kvDrag();
  if(window.speechSynthesis){
    speechSynthesis.getVoices();
    if(speechSynthesis.onvoiceschanged!==undefined)
      speechSynthesis.onvoiceschanged=function(){kv._voices=speechSynthesis.getVoices();};
    setTimeout(function(){kv._voices=speechSynthesis.getVoices();},800);
  }
}

function kvBuildChips(){
  var chips=document.getElementById('kv_chips');if(!chips)return;
  var sugs=['¿Cuántas ventas este mes?','¿Comisiones pendientes?','Dame un resumen ejecutivo','¿Cómo va el equipo?','Analiza la cartera','Ayúdame con el sistema'];
  chips.innerHTML=sugs.map(function(s){
    return'<button onclick="kvSend(\''+s+'\')" style="padding:6px 13px;background:rgba(212,175,55,.08);border:1px solid rgba(212,175,55,.18);border-radius:20px;font-size:11px;color:var(--gold-m);cursor:pointer;font-family:inherit;transition:all .15s" onmouseover="this.style.background=\'rgba(212,175,55,.15)\'" onmouseout="this.style.background=\'rgba(212,175,55,.08)\'">'+s+'</button>';
  }).join('');
}

function kvBuildProvStrip(){
  var strip=document.getElementById('kv_pstrip');if(!strip)return;
  var provs=[
    {id:'copilot',label:'Copilot',icon:'🪟',color:'var(--gold-m)',hasKey:!!kv.cfg.keys.copilot},
    {id:'gemini', label:'Gemini', icon:'✦',  color:'#0F9D58',hasKey:!!kv.cfg.keys.gemini},
    {id:'claude', label:'Claude', icon:'⚡',  color:'#D97706',hasKey:!!kv.cfg.keys.claude},
    {id:'chatgpt',label:'ChatGPT',icon:'🧠', color:'#10A37F',hasKey:!!kv.cfg.keys.chatgpt},
  ];
  var cur=kv.cfg.provider;
  strip.innerHTML='<span style="font-size:9px;font-weight:700;color:var(--t2);letter-spacing:.08em;text-transform:uppercase;white-space:nowrap;margin-right:4px">IA:</span>'+
    provs.map(function(p){
      var act=(cur===p.id)||(cur==='auto'&&p.hasKey);
      return'<button onclick="kv.cfg.provider=\''+p.id+'\';kvSaveCfg();kvBuildProvStrip()" style="padding:4px 10px;border-radius:100px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;border:1.5px solid;transition:all .2s;background:'+(p.hasKey?(act?p.color:'transparent'):'transparent')+';color:'+(p.hasKey?(act?'#fff':p.color):'#ccc')+';border-color:'+(p.hasKey?p.color+'44':'#eee')+';opacity:'+(p.hasKey?'1':'.5')+'">'+p.icon+' '+p.label+(p.hasKey&&act?'<span class="kv_primary_badge">✓</span>':'')+'</button>';
    }).join('');
}

// ── Panel toggle / drag ───────────────────────────────────────────
function kvToggle(){
  kv.open=!kv.open;
  var p=document.getElementById('kv_panel');if(!p)return;
  if(kv.open){p.style.visibility='visible';p.style.pointerEvents='all';p.style.transform='scale(1) translateY(0)';setTimeout(function(){var i=document.getElementById('kv_inp');if(i)i.focus();},200);}
  else{p.style.transform='scale(.94) translateY(14px)';setTimeout(function(){p.style.visibility='hidden';p.style.pointerEvents='none';},200);}
}
function kvClose(){kv.open=false;kvToggle();}

function kvDrag(){
  var hdr=document.getElementById('kv_hdr'),fab=document.getElementById('kv_fab');
  if(!hdr||!fab)return;
  var sx=0,sy=0;
  hdr.addEventListener('mousedown',function(e){
    if(e.target.tagName==='BUTTON')return;
    sx=e.clientX-fab.offsetLeft;sy=e.clientY-fab.offsetTop;
    function mv(e){fab.style.right='auto';fab.style.bottom='auto';fab.style.left=(e.clientX-sx)+'px';fab.style.top=(e.clientY-sy)+'px';}
    function up(){document.removeEventListener('mousemove',mv);document.removeEventListener('mouseup',up);}
    document.addEventListener('mousemove',mv);document.addEventListener('mouseup',up);
  });
}

// ── System prompt ─────────────────────────────────────────────────
function kvBuildPrompt(){
  var dat='';
  try{
    var mes=new Date().toISOString().slice(0,7);
    var fc=typeof contratos!=='undefined'?contratos.filter(function(c){return c.fecha&&c.fecha.startsWith(mes);}):[];

      'Usuario: '+(typeof ses!=='undefined'&&ses?ses.n+' ('+rolLabel(ses.rol)+')':'Sistema')+'. '+
      'Contratos este mes: '+fc.length+', aprobados: '+ap.length+
      ', monto: RD$'+ap.reduce(function(s,c){return s+Number(c.monto||0);},0).toLocaleString('es-DO')+
      ', clientes únicos: '+(new Set(fc.map(function(c){return c.cedula;}))).size+
      ', empleados activos: '+(typeof empleados!=='undefined'?empleados.filter(function(e){return e.activo;}).length:0)+'.';

    '\n\n## DATOS EN TIEMPO REAL DEL SISTEMA KERAVEN\n'+dat+

    'Nómina (AFP=2.87% SFS=3.04%), CRM, CxC, CxP, Rendimiento, Clientes, Portal de Pedidos.'+
    '\n\n## PRODUCTOS KERAVEN\nMascarilla/Shampoo 10oz Duo Kit: RD$450 | 32oz/8oz individuales: RD$900 | '+
    'Cirugía Capilar: RD$1,700 | Línea de Rizo: RD$2,700 | Línea Curativa: RD$4,900 | Línea Golden Black: RD$5,300.'+
    '\n\nResponde en español natural y fluido, como un colega de trabajo inteligente. Sé conciso pero completo. '+
    'Cuando tengas datos reales del sistema, úsalos. Usa un tono cálido y profesional.';
}

// ── API Calls ─────────────────────────────────────────────────────
// 1) Primero intenta la clave del NEGOCIO, guardada cifrada en el
//    servidor (Etapa 6) -- así cualquier usuario usa a Sarah sin
//    configurar nada. 2) Si el servidor no tiene ninguna clave activa
//    (o falla), cae a la clave PERSONAL que el usuario haya pegado en
//    Configuración (modo avanzado, sigue soportado para quien la use).
async function kvCallAI(msgs){
  var sys=kvBuildPrompt();
  var errors=[];

  try{ return await kvCallBackend(msgs,sys); }
  catch(e){ errors.push('backend:'+e.message); }

  var order=[];
  if(kv.cfg.provider==='auto'){
    if(kv.cfg.keys.copilot)order.push('copilot');
    if(kv.cfg.keys.chatgpt)order.push('chatgpt');
    if(kv.cfg.keys.gemini)order.push('gemini');
    if(kv.cfg.keys.claude)order.push('claude');
  } else {
    order=[kv.cfg.provider];
  }

  for(var i=0;i<order.length;i++){
    try{
      var p=order[i];
      if(p==='copilot'&&kv.cfg.keys.copilot)return await kvCallOpenAI(msgs,sys,kv.cfg.keys.copilot,'gpt-4o-mini');
      if(p==='chatgpt'&&kv.cfg.keys.chatgpt)return await kvCallOpenAI(msgs,sys,kv.cfg.keys.chatgpt,'gpt-4o');
      if(p==='gemini'&&kv.cfg.keys.gemini)return await kvCallGemini(msgs,sys,kv.cfg.keys.gemini);
      if(p==='claude'&&kv.cfg.keys.claude)return await kvCallClaude(msgs,sys,kv.cfg.keys.claude);
    }catch(e){errors.push(order[i]+':'+e.message);}
  }
  throw new Error('NO_PROVIDER|'+errors.join(' | '));
}
async function kvCallBackend(msgs,sys){
  var r=await apiFetch('/api/ia/chat',{method:'POST',body:{messages:msgs,sys:sys}});
  return r.texto;
}

async function kvFetch(url,opts,timeout){
  var ctrl=new AbortController(),t=setTimeout(function(){ctrl.abort();},timeout||14000);
  try{var r=await fetch(url,Object.assign({signal:ctrl.signal},opts));clearTimeout(t);return r;}
  catch(e){clearTimeout(t);throw e;}
}

async function kvCallOpenAI(msgs,sys,key,model){
  var r=await kvFetch('https://api.openai.com/v1/chat/completions',{
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},
    body:JSON.stringify({model:model||'gpt-4o-mini',messages:[{role:'system',content:sys}].concat(msgs),max_tokens:800,temperature:0.8})
  });
  if(!r.ok){var e=await r.json();throw new Error((e.error&&e.error.message)||r.status);}
  var d=await r.json();return d.choices[0].message.content;
}

async function kvCallGemini(msgs,sys,key){
  var parts=[{text:sys+'\n\n'}];
  msgs.forEach(function(m){parts.push({text:(m.role==='user'?'User: ':'Assistant: ')+m.content+'\n'});});
  var r=await kvFetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key='+key,{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({contents:[{role:'user',parts:parts}],generationConfig:{maxOutputTokens:800,temperature:0.8}})
  });
  if(!r.ok){var e2=await r.json();throw new Error((e2.error&&e2.error.message)||r.status);}
  var d2=await r.json();return d2.candidates[0].content.parts[0].text;
}

async function kvCallClaude(msgs,sys,key){
  var r=await kvFetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01'},
    body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:800,system:sys,messages:msgs})
  });
  if(!r.ok)throw new Error('Claude '+r.status);
  var d3=await r.json();return d3.content[0].text;
}

// ── Enviar mensaje ─────────────────────────────────────────────────
function kvTime(){return new Date().toLocaleTimeString('es-DO',{hour:'2-digit',minute:'2-digit'});}

function kvAddBubble(role,text,time){
  var msgs=document.getElementById('kv_msgs');if(!msgs)return;
  // Remove welcome on first message
  var wlc=document.getElementById('kv_welcome');if(wlc)wlc.remove();

  var isU=role==='u';
  var row=document.createElement('div');
  row.className='kv_row '+(isU?'u':'a');
  row.style.cssText='display:flex;align-items:flex-end;gap:8px;width:100%';

  // Format text: bold, code, newlines
  var fmt=text
    .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.*?)\*/g,'<em>$1</em>')
    .replace(/`(.*?)`/g,'<code>$1</code>')
    .replace(/\n\n/g,'<br><br>').replace(/\n/g,'<br>');

  var avHtml=isU?
    '<div class="kv_av" style="background:linear-gradient(135deg,var(--red),var(--red3));color:var(--gold-l)">'+
      (typeof ses!=='undefined'&&ses?ses.n.charAt(0):'U')+'</div>':
    '<div class="kv_av" style="background:linear-gradient(145deg,var(--gold-m),var(--gold))">'+kv.cfg.emoji+'</div>';

  var replayBtn=isU?'':'<button onclick="kvReplay(this)" data-text="'+text.replace(/"/g,'&quot;')+'" style="background:none;border:none;cursor:pointer;font-size:11px;color:var(--t3);padding:2px 6px;border-radius:4px;margin-top:5px;display:block" title="Escuchar">🔊</button>';

  row.innerHTML=(isU?'':avHtml)+
    '<div style="flex:1;display:flex;flex-direction:column;align-items:'+(isU?'flex-end':'flex-start')+'">'+
      '<div class="'+(isU?'kv_bubble_u':'kv_bubble_a')+'">'+fmt+'</div>'+
      replayBtn+
      '<div class="kv_time">'+(time||kvTime())+'</div>'+
    '</div>'+
    (isU?avHtml:'');

  msgs.appendChild(row);
  msgs.scrollTop=msgs.scrollHeight;
}

function kvShowTyping(){
  var msgs=document.getElementById('kv_msgs');if(!msgs)return;
  var d=document.createElement('div');d.id='kv_typing_div';d.className='kv_typing_row';
  d.style.cssText='display:flex;align-items:flex-end;gap:8px';
  d.innerHTML='<div class="kv_av" style="background:linear-gradient(145deg,var(--gold-m),var(--gold))">'+kv.cfg.emoji+'</div>'+
    '<div class="kv_typing_bub"><div class="kv_dot2"></div><div class="kv_dot2"></div><div class="kv_dot2"></div></div>';
  msgs.appendChild(d);msgs.scrollTop=msgs.scrollHeight;
}
function kvHideTyping(){var t=document.getElementById('kv_typing_div');if(t)t.remove();}

async function kvSend(txt){
  var inp=document.getElementById('kv_inp');
  var texto=(txt||(inp?inp.value:'')||'').trim();
  if(!texto)return;
  if(inp)inp.value='';

  var st=document.getElementById('kv_st');
  kvAddBubble('u',texto);
  kv.hist.push({role:'user',content:texto});
  if(kv.hist.length>50)kv.hist=kv.hist.slice(-50);
  kvShowTyping();
  if(st)st.innerHTML='<span style="width:6px;height:6px;background:#FFB300;border-radius:50%;display:inline-block"></span> Pensando...';

  try{
    var resp=await kvCallAI(kv.hist.slice(-14));
    kvHideTyping();
    kv.hist.push({role:'assistant',content:resp});
    kvSaveHist();
    kvAddBubble('a',resp);
    if(kv.voz)kvSpeak(resp);
    if(st)st.innerHTML='<span style="width:6px;height:6px;background:#00C853;border-radius:50%;display:inline-block"></span> En línea · '+kv.cfg.nombre;
  }catch(e){
    kvHideTyping();
    var emsg=e.message.startsWith('NO_PROVIDER')?
      '🔑 Todavía no tengo una clave de API activa. Pídele a Gerencia que la active en Configuración, o toca ⚙️ → APIs para agregar tu propia clave (Gemini gratis, Copilot, ChatGPT o Claude).':
      '⚠️ No pude responder ahora. Intenta de nuevo.';
    kvAddBubble('a',emsg);
    if(st)st.innerHTML='<span style="width:6px;height:6px;background:var(--er);border-radius:50%;display:inline-block"></span> Error';
  }
}

// ── Voz ───────────────────────────────────────────────────────────
function kvSpeak(text){
  if(!window.speechSynthesis)return;
  speechSynthesis.cancel();
  var clean=text.replace(/<[^>]+>/g,' ').replace(/\*\*(.*?)\*\*/g,'$1').replace(/\*(.*?)\*/g,'$1').replace(/`[^`]+`/g,' ').replace(/\s+/g,' ').trim();
  var sentences=clean.match(/[^.!?]+[.!?]*/g)||[clean];
  var voice=kvGetVoice();
  var idx=0;
  kv.speaking=true;
  var sw=document.getElementById('kv_stopbar');if(sw)sw.style.display='block';

  function next(){
    if(idx>=sentences.length){kv.speaking=false;if(sw)sw.style.display='none';kvSetVozBtn();return;}
    var utt=new SpeechSynthesisUtterance(sentences[idx].trim());
    utt.lang='es-DO';utt.rate=kv.cfg.rate||0.9;utt.pitch=1.0+(idx%3===0?.04:idx%3===1?0:-.03);utt.volume=1;
    if(voice)utt.voice=voice;
    utt.onend=utt.onerror=function(){idx++;next();};
    speechSynthesis.speak(utt);idx++;
  }
  // Chrome pause fix
  var ping=setInterval(function(){if(!kv.speaking){clearInterval(ping);return;}if(speechSynthesis.paused)speechSynthesis.resume();},10000);
  next();
}
function kvGetVoice(){
  if(!window.speechSynthesis)return null;
  var voices=speechSynthesis.getVoices();if(!voices.length)return null;
  if(kv.cfg.voz&&kv.cfg.voz!=='auto'){var sv=voices.find(function(v){return v.name===kv.cfg.voz;});if(sv)return sv;}
  return voices.find(function(v){return v.lang.startsWith('es')&&(v.name.toLowerCase().includes('neural')||v.name.toLowerCase().includes('google')||v.name.toLowerCase().includes('natural'));})||
    voices.find(function(v){return v.lang.startsWith('es');})||voices[0];
}
function kvStopVoz(){if(window.speechSynthesis)speechSynthesis.cancel();kv.speaking=false;var s=document.getElementById('kv_stopbar');if(s)s.style.display='none';kvSetVozBtn();}
function kvToggleVoz(){kv.voz=!kv.voz;try{localStorage.setItem('sarah_voz',kv.voz?'1':'0');}catch(e){}if(!kv.voz)kvStopVoz();kvSetVozBtn();}
function kvSetVozBtn(){var b=document.getElementById('kv_vbtn');if(!b)return;b.textContent=kv.voz?'🔊':'🔇';b.style.background=kv.voz?'rgba(255,255,255,.85)':'rgba(255,255,255,.1)';b.style.color=kv.voz?'var(--gold-m)':'#fff';}
function kvReplay(btn){var text=btn.getAttribute('data-text');if(text)kvSpeak(text);}

// ── Micrófono ─────────────────────────────────────────────────────
function kvMic(){
  if(kv.listening){kvStopMic();return;}
  var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){kvAddBubble('a','⚠️ Tu navegador no soporta micrófono. Usa Chrome o Edge.');return;}
  kv.recog=new SR();kv.recog.lang='es-DO';kv.recog.continuous=false;kv.recog.interimResults=true;
  kv.listening=true;
  var btn=document.getElementById('kv_mic');if(btn){btn.style.background='var(--er)';btn.style.color='#fff';btn.textContent='🔴';}
  var inp=document.getElementById('kv_inp');if(inp)inp.placeholder='Escuchando... habla ahora';
  kv.recog.onresult=function(e){var t=Array.from(e.results).map(function(r){return r[0].transcript;}).join('');if(inp)inp.value=t;if(e.results[0].isFinal){kvStopMic();setTimeout(kvSend,100);}};
  kv.recog.onerror=kv.recog.onend=function(){kvStopMic();};
  try{kv.recog.start();}catch(e){kvStopMic();}
}
function kvStopMic(){
  kv.listening=false;if(kv.recog){try{kv.recog.stop();}catch(e){}}
  var btn=document.getElementById('kv_mic');if(btn){btn.style.background='rgba(196,138,31,.08)';btn.style.color='';btn.textContent='🎤';}
  var inp=document.getElementById('kv_inp');if(inp)inp.placeholder='Escribe o usa el micrófono...';
}

function kvTab(t){

function kvTestVoz(){
  var vName=document.getElementById('kvc_voz')?.value;
  var rate=parseFloat(document.getElementById('kvc_rate')?.value||'0.9');
  var voices=speechSynthesis.getVoices();
  var voice=vName&&vName!=='auto'?voices.find(function(v){return v.name===vName;}):null;
  if(!voice)voice=voices.find(function(v){return v.lang.startsWith('es');})||voices[0];
  speechSynthesis&&speechSynthesis.cancel();
  var utt=new SpeechSynthesisUtterance('Hola, soy '+kv.cfg.nombre+'. Estoy lista para ayudarte con KERAVEN y todo lo que necesites.');
  utt.lang='es-DO';utt.rate=rate;utt.pitch=1.0;utt.volume=1.0;if(voice)utt.voice=voice;
  speechSynthesis&&speechSynthesis.speak(utt);
}

function rCXC(){

  var totalCxC=pend.reduce(function(s,c){return s+(Number(c.neto||c.monto||0)-Number(c.saldo||0));},0);
  var cobrado=apro.reduce(function(s,c){return s+Number(c.saldo||0);},0);
  return'<div class="card">'+
    '<div class="ct"><i class="ti ti-receipt" style="color:var(--mc);font-size:18px"></i>Cuentas por Cobrar</div>'+
    '<div class="sg" style="margin-bottom:14px">'+
      '<div class="st"><div class="sv" style="font-size:14px">'+fM(totalCxC)+'</div><div class="sl2">Por cobrar</div></div>'+
      '<div class="st"><div class="sv" style="font-size:14px">'+fM(cobrado)+'</div><div class="sl2">Cobrado</div></div>'+
      '<div class="st"><div class="sv">'+pend.length+'</div><div class="sl2">Pendientes</div></div>'+
      '<div class="st"><div class="sv">'+apro.length+'</div><div class="sl2">Aprobados</div></div>'+
    '</div>'+
    '<div class="tbl-wrap"><table class="tbl"><thead><tr>'+
      '<th>Factura</th><th>Cliente</th><th>Promotor</th><th>Fecha</th>'+
      '<th class="tr">Monto</th><th class="tr">Cobrado</th><th class="tr">Saldo</th><th>%</th>'+
    '</tr></thead><tbody>'+
    pend.sort(function(a,b){return(b.fecha||'').localeCompare(a.fecha||'');}).map(function(c){
      var neto=Number(c.neto||c.monto||0),saldo=Number(c.saldo||0),pendiente=neto-saldo;
      var pct=neto>0?Math.round(saldo/neto*100):0;
      return'<tr>'+
        '<td style="font-weight:700;color:var(--gold)">'+c.fac+'</td>'+
        '<td style="font-weight:600">'+c.cliente+'</td>'+
        '<td style="font-size:11px">'+(c.promotor||'—')+'</td>'+
        '<td style="font-size:11px">'+fD(c.fecha)+'</td>'+
        '<td class="tr">'+fM(neto)+'</td>'+
        '<td class="tr" style="color:var(--green)">'+fM(saldo)+'</td>'+
        '<td class="tr" style="font-weight:800;color:'+(pendiente>0?'var(--er)':'var(--green)')+'">'+fM(pendiente)+'</td>'+
        '<td><div style="background:#eee;border-radius:3px;height:6px;width:60px;overflow:hidden;display:inline-block;vertical-align:middle">'+
          '<div style="background:var(--green);height:100%;width:'+pct+'%"></div></div>'+
          '<span style="font-size:10px;margin-left:4px;font-weight:600;color:'+(pct>=100?'var(--green)':'var(--er)')+'">'+pct+'%</span></td>'+
      '</tr>';
    }).join('')+
    '</tbody><tfoot><tr>'+
      '<td colspan="4" style="padding:9px 14px;font-weight:700">TOTALES</td>'+
      '<td class="tr">'+fM(apro.reduce(function(s,c){return s+Number(c.neto||c.monto||0);},0))+'</td>'+
      '<td class="tr" style="color:var(--green)">'+fM(cobrado)+'</td>'+
      '<td class="tr" style="font-weight:900;font-size:14px;color:var(--er)">'+fM(totalCxC)+'</td>'+
      '<td></td>'+
    '</tr></tfoot></table></div>'+
  '</div>';
}

      '<div style="background:#fff;border:2px solid #C62828;border-radius:20px;padding:28px 24px;width:90%;max-width:400px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.3)">'+
        '<div style="font-size:44px;margin-bottom:10px">🔐</div>'+

function delFacRender(){
  var cont=document.getElementById('del_list');if(!cont)return;
  var q=(document.getElementById('del_q')?.value||'').toLowerCase();
  var lista=contratos.filter(function(c){return!q||(c.fac||'').toLowerCase().includes(q)||(c.cliente||'').toLowerCase().includes(q)||(c.cedula||'').includes(q);}).slice().reverse();
  if(!lista.length){cont.innerHTML='<div class="empty"><i class="ti ti-file-invoice"></i><p>Sin facturas encontradas</p></div>';return;}
  cont.innerHTML='<div class="tbl-wrap"><table class="tbl"><thead><tr><th>Factura</th><th>Fecha</th><th>Cliente</th><th>Cédula</th><th>Promotor</th><th class="tr">Monto</th><th>Estado</th><th>Acción</th></tr></thead><tbody>'+
  lista.map(function(c){
    var anulada=c.status==='anulado';
    return'<tr'+(anulada?' style="opacity:.6"':'')+'><td style="font-weight:700;color:var(--gold)">'+c.fac+'</td><td style="font-size:11px">'+fD(c.fecha)+'</td><td style="font-weight:600">'+c.cliente+'</td><td style="font-size:11px">'+c.cedula+'</td><td style="font-size:11px">'+(c.promotor||'—')+'</td><td class="tr" style="font-weight:700">'+fM(c.monto)+'</td>'+
    '<td><span style="padding:2px 9px;border-radius:100px;font-size:10px;font-weight:700;color:#fff;background:'+(c.status==='aprobado'?'#2E7D32':c.status==='rechazado'?'#C62828':c.status==='anulado'?'#7F0000':'#E65100')+'">'+c.status+'</span>'+
    (anulada?'<div style="font-size:10px;color:var(--t3);margin-top:3px" title="'+(c.motivoAnulacion||'')+'">🚫 '+(c.anuladoPorNombre||'—')+' · '+(c.anuladoEn?new Date(c.anuladoEn).toLocaleString('es-DO'):'')+'</div>':'')+
    '</td>'+
    '<td>'+(anulada?'<span style="font-size:11px;color:var(--t3)">Ya anulada</span>':'<button style="padding:5px 13px;background:linear-gradient(135deg,#C62828,#7F0000);color:#fff;border:none;border-radius:7px;cursor:pointer;font-size:11px;font-weight:700;font-family:inherit" onclick="delFacIniciar('+c.id+')">🚫 Anular</button>')+'</td></tr>';
  }).join('')+'</tbody></table></div><div style="text-align:center;padding:8px;font-size:11px;color:var(--t3)">'+lista.length+' factura(s)</div>';
}
function delFacIniciar(id){
  var c=contratos.find(function(x){return x.id===id;});if(!c)return;
  _delFacId=id;_delPinIntento=0;
  var info=document.getElementById('del_pin_info');if(info)info.innerHTML='<b style="color:#7F0000">'+c.fac+'</b><br>'+c.cliente+' · '+fD(c.fecha)+'<br><span style="color:#C62828">'+fM(c.monto)+'</span>';
  var mot=document.getElementById('del_motivo');if(mot)mot.value='';
  [0,1,2,3,4,5].forEach(function(i){var el=document.getElementById('dp'+i);if(el)el.value='';});
  var err=document.getElementById('del_pin_err');if(err)err.textContent='';
  var modal=document.getElementById('del_pin_modal');if(modal)modal.style.display='flex';
  setTimeout(function(){var d=document.getElementById('dp0');if(d)d.focus();},100);
}
function delPinNav(i){var el=document.getElementById('dp'+i);if(el&&el.value&&i<5)document.getElementById('dp'+(i+1)).focus();}
function delPinCerrar(){_delFacId=null;var m=document.getElementById('del_pin_modal');if(m)m.style.display='none';}
async function delPinConfirm(){
  var motivo=(document.getElementById('del_motivo')?.value||'').trim();
  var err=document.getElementById('del_pin_err');
  if(!motivo){if(err)err.textContent='❌ El motivo de la anulación es obligatorio';return;}
  var pin=[0,1,2,3,4,5].map(function(i){var el=document.getElementById('dp'+i);return el?el.value:'';}).join('');
  var ok=false;
  try{await apiFetch('/api/verificar-pin',{method:'POST',body:{pin}});ok=true;}catch(e){ok=false;}
  if(!ok){
    _delPinIntento++;
    if(err)err.textContent='❌ PIN incorrecto (intento '+_delPinIntento+')';
    [0,1,2,3,4,5].forEach(function(i){var el=document.getElementById('dp'+i);if(el)el.value='';});
    var d0=document.getElementById('dp0');if(d0)d0.focus();
    if(_delPinIntento>=3){delPinCerrar();showToast('Demasiados intentos','err');}
    return;
  }
  if(!_delFacId){delPinCerrar();return;}
  var idAnular=_delFacId;
  var resultado;
  try{resultado=await apiFetch(`/api/contratos/${idAnular}/anular`,{method:'POST',body:{motivo:motivo}});}
  catch(e){if(err)err.textContent='❌ '+e.message;return;}
  await cargarContratos();
  await cargarComisionesSemanas();
  delPinCerrar();_delFacId=null;
  document.getElementById('main').innerHTML=rDelFac();
  setTimeout(function(){delFacRender();},50);
  showToast('Factura '+resultado.numero_factura+' anulada ✅');
}

/* ══════════════════════════════════════════════════════════════════
   AUDITORÍA — historial real (quién/cuándo/por qué) + alertas
   calculadas contra los datos, no adivinadas. Solo Gerencia/Sub-Gerencia.
══════════════════════════════════════════════════════════════════ */
var AUDIT_EVENTOS=[], AUDIT_ALERTAS=[], TAREAS=[];
async function cargarAuditoria(){
  try{
    var r=await apiFetch('/api/auditoria');
    AUDIT_EVENTOS=r.eventos||[]; AUDIT_ALERTAS=r.alertas||[];
    TAREAS=await apiFetch('/api/tareas');
  }catch(e){ console.error('No se pudo cargar auditoría:',e); AUDIT_EVENTOS=[]; AUDIT_ALERTAS=[]; TAREAS=[]; }
}
var _AUDIT_NIVEL_COLOR={critico:{bg:'var(--rbg)',bd:'var(--er)',tx:'var(--rdk)'},alerta:{bg:'#FFF3E0',bd:'#E65100',tx:'#7F3D00'},info:{bg:'var(--bbg)',bd:'var(--blue)',tx:'var(--bdk)'}};
var _AUDIT_TIPO_LBL={anulacion:{ico:'🚫',lbl:'Factura anulada'},decision:{ico:'✅',lbl:'Decisión de contrato'},abono:{ico:'💵',lbl:'Abono registrado'}};
function rAuditoria(){
  var criticos=AUDIT_ALERTAS.filter(function(a){return a.nivel==='critico';}).length;
  var h='<div class="card">'
    +'<div class="ct"><i class="ti ti-shield-check" style="color:var(--gold)"></i>Auditoría'
    +'<span class="pill" style="margin-left:auto">'+AUDIT_ALERTAS.length+' alerta(s)</span></div>'
    +'<div class="cs">Lo que ya queda registrado en el sistema, y lo que necesita tu atención.</div>'
    +'<div style="display:flex;gap:8px;flex-wrap:wrap">'
    +'<button class="bg" onclick="auditPedirAnalisisSarah()"><i class="ti ti-robot"></i> Pedirle a Sarah un análisis</button>'
    +'<button class="bs" onclick="descargarManualUsuario()"><i class="ti ti-file-download"></i> Descargar mi manual (PDF)</button>'
    +'</div></div>';

  h+='<div class="card"><div class="ct"><i class="ti ti-alert-triangle" style="color:'+(criticos?'var(--er)':'var(--gold)')+'"></i>Alertas ('+AUDIT_ALERTAS.length+')</div>';
  if(!AUDIT_ALERTAS.length){
    h+='<div class="empty"><i class="ti ti-check"></i><p>Sin alertas pendientes -- todo en orden.</p></div>';
  } else {
    h+=AUDIT_ALERTAS.map(function(a,ai){
      var col=_AUDIT_NIVEL_COLOR[a.nivel]||_AUDIT_NIVEL_COLOR.info;
      return '<div style="background:'+col.bg+';border:1.5px solid '+col.bd+';border-radius:10px;padding:12px 15px;margin-bottom:10px">'
        +'<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px">'
        +'<b style="color:'+col.tx+'">'+a.mensaje+'</b>'
        +'<button class="bsm" style="flex-shrink:0" onclick="auditAsignarTareaDesdeAlerta('+ai+')">📋 Asignar tarea</button>'
        +'</div>'
        +(a.detalle&&a.detalle.length?'<div style="font-size:11px;color:'+col.tx+';margin-top:6px;opacity:.85">'+a.detalle.slice(0,8).join(', ')+(a.detalle.length>8?' y '+(a.detalle.length-8)+' más...':'')+'</div>':'')
        +'</div>';
    }).join('');
  }
  h+='</div>';

  h+='<div class="card"><div class="ct"><i class="ti ti-checklist" style="color:var(--gold)"></i>Tareas'
    +'<button class="bsm" style="margin-left:auto" onclick="auditAbrirNuevaTarea()">+ Nueva tarea</button></div>';
  var tareasAbiertas=TAREAS.filter(function(t){return t.estado==='pendiente'||t.estado==='en_proceso';});
  if(!tareasAbiertas.length){
    h+='<div class="empty"><i class="ti ti-checklist"></i><p>Sin tareas abiertas</p></div>';
  } else {
    h+='<div class="tbl-wrap"><table class="tbl"><thead><tr><th>Tarea</th><th>Asignado a</th><th>Fecha límite</th><th>Estado</th><th>Acción</th></tr></thead><tbody>'
      +tareasAbiertas.map(function(t){
        var venc=t.fecha_limite && new Date(t.fecha_limite)<new Date(hoy());
        return '<tr><td style="font-weight:600">'+t.titulo+(t.descripcion?'<div style="font-size:11px;color:var(--t3)">'+t.descripcion+'</div>':'')+'</td>'
          +'<td>'+(t.asignado_a_nombre||'—')+'</td>'
          +'<td style="color:'+(venc?'var(--er)':'inherit')+'">'+(t.fecha_limite?fD(t.fecha_limite):'—')+'</td>'

          +'<button class="bsm" style="color:var(--green)" onclick="auditCambiarEstadoTarea('+t.id+',\'completada\')">✅ Completar</button></td></tr>';
      }).join('')

  }
  h+='</div>';

  h+='<div class="card"><div class="ct"><i class="ti ti-history" style="color:var(--gold)"></i>Historial (últimos '+AUDIT_EVENTOS.length+')</div>';
  if(!AUDIT_EVENTOS.length){
    h+='<div class="empty"><i class="ti ti-history"></i><p>Sin eventos registrados todavía</p></div>';
  } else {
    h+='<div class="tbl-wrap"><table class="tbl"><thead><tr><th>Tipo</th><th>Factura</th><th>Usuario</th><th>Detalle</th><th>Fecha</th></tr></thead><tbody>'

          +'<td style="font-size:11px;white-space:nowrap">'+(e.fecha?new Date(e.fecha).toLocaleString('es-DO'):'—')+'</td></tr>';
      }).join('')
      +'</tbody></table></div>';
  }
  h+='</div>';
  return h;
}
function auditPedirAnalisisSarah(){
  var resumenAlertas=AUDIT_ALERTAS.length
    ? AUDIT_ALERTAS.map(function(a){return '- ('+a.nivel+') '+a.mensaje;}).join('\n')
    : 'Sin alertas pendientes.';
  var resumenEventos=AUDIT_EVENTOS.slice(0,20).map(function(e){
    var t=_AUDIT_TIPO_LBL[e.tipo]||{lbl:e.tipo};
    return '- '+t.lbl+' · '+(e.referencia||'')+' · '+(e.usuario||'—')+' · '+(e.detalle||'');
  }).join('\n');
  var prompt='Actuá como auditora interna de KERAVEN. Te paso las alertas activas del sistema y los últimos eventos registrados (anulaciones, aprobaciones/rechazos, abonos). '+
    'Decime qué es lo más urgente a atender, si ves algún patrón preocupante (por ejemplo muchas anulaciones seguidas, o siempre la misma persona), y qué recomendás para que el sistema funcione mejor.\n\n'+
    'ALERTAS:\n'+resumenAlertas+'\n\nÚLTIMOS EVENTOS:\n'+(resumenEventos||'Sin eventos.');
  if(!kv.open) kvToggle();
  setTimeout(function(){ kvSend(prompt); }, 300);

async function descargarManualUsuario(){
  if(typeof pedLoadLibs==='function') await pedLoadLibs(); else { await pedLoadScript('https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js'); }
  var jsPDFCtor=(window.jspdf&&window.jspdf.jsPDF)||window.jsPDF;
  var doc=new jsPDFCtor({unit:'pt',format:'a4'});
  var margen=48, y=64, ancho=doc.internal.pageSize.getWidth()-margen*2;
  var misPermisos=perms();
  var modulos=Object.keys(MANUAL_MODULOS).filter(function(id){return misPermisos.includes(id);});

  doc.setFont('helvetica','bold'); doc.setFontSize(20);
  doc.text('Manual de Usuario — KERAVEN Profesional', margen, y); y+=26;
  doc.setFont('helvetica','normal'); doc.setFontSize(11); doc.setTextColor(90);
  doc.text('Usuario: '+(ses&&ses.n?ses.n:'—')+'  ·  Rol: '+(ses&&ses.rl?ses.rl:'—'), margen, y); y+=16;
  doc.text('Generado: '+new Date().toLocaleString('es-DO'), margen, y); y+=30;
  doc.setTextColor(0);

  modulos.forEach(function(id){
    var m=MANUAL_MODULOS[id];
    if(y>720){ doc.addPage(); y=64; }
    doc.setFont('helvetica','bold'); doc.setFontSize(13);
    doc.text(m.tit, margen, y); y+=18;
    doc.setFont('helvetica','normal'); doc.setFontSize(10.5);
    m.pasos.forEach(function(p){
      if(y>780){ doc.addPage(); y=64; }
      var l=doc.splitTextToSize('• '+p, ancho-10);
      doc.text(l, margen+8, y); y+=l.length*13+3;
    });
    y+=12;
  });

  doc.save('manual_usuario_'+(ses&&ses.rl?ses.rl.replace(/\s+/g,'_'):'kerplus')+'.pdf');
}

  var ov=document.createElement('div');

  ov.onclick=function(e){if(e.target===ov)ov.remove();};

    '<div style="background:#fff;border-radius:16px;width:100%;max-width:420px;margin:auto;box-shadow:0 20px 60px rgba(0,0,0,.2);overflow:hidden">'
    + '<div style="padding:16px 20px;border-bottom:1px solid var(--br);font-weight:800">Nueva tarea</div>'
    + '<div style="padding:18px 20px">'

    +   '<div class="g2" style="margin-top:10px">'
    +     '<div class="fi"><label>Asignar a</label><select id="tar_asig"><option value="">Sin asignar</option>'+opcionesUsuarios+'</select></div>'
    +     '<div class="fi"><label>Fecha límite</label><input id="tar_fecha" type="date" value="'+(fechaLimite||'')+'"></div>'

    +   '<button class="bs" onclick="document.getElementById(\'tarea_modal_ov\').remove()">Cancelar</button>'
    +   '<button class="bg" onclick="auditGuardarTarea()">Guardar</button>'
    + '</div></div>';

function auditAbrirNuevaTarea(){ _auditModalTarea('','',''); }
function auditAsignarTareaDesdeAlerta(ai){
  var a=AUDIT_ALERTAS[ai]; if(!a) return;
  _auditModalTarea(a.mensaje, (a.detalle&&a.detalle.length?'Afecta: '+a.detalle.slice(0,10).join(', '):''), '');
  var sel=document.getElementById('tar_asig');
  if(sel) sel.dataset.origenTipo=a.tipo;
}
async function auditGuardarTarea(){
  var titulo=(document.getElementById('tar_tit')?.value||'').trim();
  var descripcion=(document.getElementById('tar_desc')?.value||'').trim();
  var asignadoA=document.getElementById('tar_asig')?.value||null;
  var fechaLimite=document.getElementById('tar_fecha')?.value||null;
  var origenTipo=document.getElementById('tar_asig')?.dataset.origenTipo||null;
  if(!titulo){ alert('Falta el título de la tarea.'); return; }
  try{
    await apiFetch('/api/tareas',{method:'POST',body:{titulo:titulo,descripcion:descripcion,asignadoA:asignadoA||null,fechaLimite:fechaLimite||null,origenTipo:origenTipo}});
  }catch(e){ alert('No se pudo guardar la tarea: '+e.message); return; }
  document.getElementById('tarea_modal_ov')?.remove();
  await cargarAuditoria();
  if(pag==='auditoria') document.getElementById('main').innerHTML=rAuditoria();
  showToast('Tarea creada ✅');
}
async function auditCambiarEstadoTarea(id,estado){
  try{ await apiFetch('/api/tareas/'+id,{method:'PATCH',body:{estado:estado}}); }
  catch(e){ showToast('No se pudo actualizar la tarea','error'); return; }
  await cargarAuditoria();
  if(pag==='auditoria') document.getElementById('main').innerHTML=rAuditoria();
  showToast(estado==='completada'?'✅ Tarea completada':'Tarea actualizada');
}

var RRHH_EMPLEADOS=[], RRHH_CANDIDATOS=[], RRHH_CODIGO={}, RRHH_DEBERES={};

async function cargarRRHH(){
  try{

function rRRHH(){

function rrhh_tab(t){

    var h='<div class="card" style="margin-bottom:14px"><div class="ct" style="margin:-16px -16px 13px"><i class="ti ti-id-badge-2" style="color:var(--gold)"></i>Datos personales</div>'

      +'<button class="bsm" style="margin-left:auto" onclick="rrhhModalVacaciones('+id+')">+ Registrar</button></div>'
      +'<div style="display:flex;gap:16px;flex-wrap:wrap;font-size:12px;margin-bottom:10px">'
      +'<div><b>'+(r.diasPorAnio||'—')+'</b> días/año ('+(r.aniosCompletos||0)+' año(s) de antigüedad)</div>'
      +'<div><b>'+(r.acumulados||0)+'</b> acumulados</div>'
      +'<div><b>'+(r.usados||0)+'</b> tomados</div>'
      +'<div style="color:var(--green);font-weight:700">'+(r.disponibles||0)+' disponibles</div>'
      +'</div>';
    h+=hist.length
      ? '<div class="tbl-wrap"><table class="tbl"><thead><tr><th>Desde</th><th>Hasta</th><th>Días</th><th>Notas</th></tr></thead><tbody>'
        +hist.map(function(v){return '<tr><td>'+fD(v.fecha_inicio)+'</td><td>'+fD(v.fecha_fin)+'</td><td>'+v.dias+'</td><td style="font-size:11px">'+(v.notas||'—')+'</td></tr>';}).join('')

    h+='<div class="card"><div class="ct" style="margin:-16px -16px 13px"><i class="ti ti-alert-circle" style="color:var(--gold)"></i>Historial (amonestaciones, observaciones y rendimiento)'
      +'<button class="bsm" style="margin-left:auto" onclick="rrhhModalIncidencia('+id+')">+ Nuevo registro</button></div>'
      +'<div class="cs">Cada tardanza, falta, amonestación, observación o evaluación de rendimiento queda aquí con fecha, motivo y quién la registró.</div>';
    h+=inc.length
      ? '<div class="tbl-wrap"><table class="tbl"><thead><tr><th>Fecha</th><th>Tipo</th><th>Descripción</th><th>Referencia</th><th>Registrado por</th></tr></thead><tbody>'
        +inc.map(function(i){return '<tr><td>'+fD(i.fecha)+'</td><td>'+(_RRHH_TIPO_LBL[i.tipo]||i.tipo)+'</td><td style="font-size:11px;max-width:200px">'+(i.descripcion||'—')+'</td><td style="font-size:11px">'+(i.articulo_referencia||'—')+'</td><td style="font-size:11px">'+(i.registrado_por_nombre||'—')+'</td></tr>';}).join('')

function _rrhhCalcDias(){
  var ini=document.getElementById('rrhh_vac_ini')?.value;
  var fin=document.getElementById('rrhh_vac_fin')?.value;
  if(!ini||!fin) return;
  var d=Math.round((new Date(fin)-new Date(ini))/86400000)+1;
  var campo=document.getElementById('rrhh_vac_dias');
  if(campo && d>0) campo.value=d;
}
async function rrhhGuardarVacaciones(empId){
  var fechaInicio=document.getElementById('rrhh_vac_ini')?.value;
  var fechaFin=document.getElementById('rrhh_vac_fin')?.value;
  var dias=Number(document.getElementById('rrhh_vac_dias')?.value||0);
  var notas=document.getElementById('rrhh_vac_notas')?.value||null;
  if(!fechaInicio||!fechaFin||!dias){ alert('Completá fechas y días.'); return; }
  try{
    await apiFetch('/api/rrhh/vacaciones',{method:'POST',body:{empleadoId:empId,fechaInicio:fechaInicio,fechaFin:fechaFin,dias:dias,notas:notas}});
  }catch(e){ alert('No se pudo registrar: '+e.message); return; }
  document.getElementById('rrhh_vac_ov')?.remove();
  rrhhAbrirEmpleado(empId);
  showToast('Vacaciones registradas ✅');

  showToast('Ficha guardada ✅');
}
async function rrhhGuardarDatosEmpleado(id){
  try{ await apiFetch('/api/rrhh/empleados/'+id+'/perfil',{method:'PATCH',body:_fichaLeer('rfe')}); }
  catch(e){ alert('No se pudo guardar la ficha: '+e.message); return; }
  await cargarRRHH();
  showToast('Datos personales guardados ✅');
}

/* ── Cuestionario de competencias (apoyo para RRHH, no un test clínico) ── */
async function rrhhModalCuestionario(candidatoId){
  var c=RRHH_CANDIDATOS.find(function(x){return x.id===candidatoId;}); if(!c) return;
  var puesto=c.puesto_perfil||'otro';
  var ov=document.createElement('div'); ov.id='rrhh_cuest_ov';
  ov.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(3px);z-index:200;display:flex;align-items:flex-start;justify-content:center;padding:16px;overflow-y:auto';
  ov.onclick=function(e){if(e.target===ov)ov.remove();};
  ov.innerHTML='<div style="background:#fff;border-radius:16px;width:100%;max-width:600px;margin:auto;box-shadow:0 20px 60px rgba(0,0,0,.2);overflow:hidden">'
    +'<div style="padding:16px 20px;border-bottom:1px solid var(--br);font-weight:800">Cuestionario de competencias — '+c.nombre+'</div>'
    +'<div style="padding:18px 20px;max-height:75vh;overflow-y:auto" id="rrhh_cuest_body"><div class="empty"><i class="ti ti-loader-2"></i>Cargando...</div></div>'
    +'</div>';
  document.body.appendChild(ov);
  var body=document.getElementById('rrhh_cuest_body');
  try{
    var plantilla=await apiFetch('/api/rrhh/cuestionario/'+puesto);
    var evaluaciones=await apiFetch('/api/rrhh/evaluaciones?candidatoId='+candidatoId);
    var h='<div style="padding:10px 12px;background:#FFF3E0;border:1.5px solid #E65100;border-radius:10px;font-size:11px;color:#7F3D00;margin-bottom:14px">'
      +'<i class="ti ti-alert-triangle"></i> Herramienta de apoyo para RRHH -- NO es un test psicológico clínico ni descalifica automáticamente a nadie. Vos seguís siendo quien decide.</div>';
    if(evaluaciones.length){
      h+='<div class="sl">Evaluaciones previas</div>'
        +evaluaciones.map(function(ev){
          return '<div style="padding:8px 0;border-bottom:1px solid var(--br);font-size:11.5px">'
            +'<b>Puntaje referencial: '+ev.puntaje_referencial+'</b> · '+(ev.evaluado_por_nombre||'—')+' · '+new Date(ev.creado_en).toLocaleDateString('es-DO')
            +(ev.notas_evaluador?'<div style="color:var(--t3);margin-top:2px">'+ev.notas_evaluador+'</div>':'')+'</div>';
        }).join('');
    }
    h+='<div class="sl" style="margin-top:12px">'+plantilla.titulo+' -- nueva evaluación</div>';
    h+=plantilla.preguntas.map(function(p,pi){
      return '<div style="margin-bottom:12px"><div style="font-size:12.5px;font-weight:600;margin-bottom:5px">'+(pi+1)+'. '+p.texto+'</div>'
        +p.opciones.map(function(o){
          return '<label style="display:flex;align-items:center;gap:6px;padding:4px 0;font-size:12px;cursor:pointer">'
            +'<input type="radio" name="rrhh_q_'+p.id+'" value="'+o.val+'"> '+o.texto+'</label>';
        }).join('')
        +'</div>';
    }).join('');
    h+='<div class="fi" style="margin-top:6px"><label>Notas del evaluador</label><textarea id="rrhh_cuest_notas" rows="2"></textarea></div>';
    h+='<div class="actions" style="margin-top:10px"><button class="bg" onclick="rrhhGuardarCuestionario('+candidatoId+',\''+puesto+'\')"><i class="ti ti-check"></i> Guardar evaluación</button></div>';
    body.innerHTML=h;
  }catch(e){ body.innerHTML='<div class="empty"><p>No se pudo cargar: '+e.message+'</p></div>'; }
}
async function rrhhGuardarCuestionario(candidatoId,puesto){
  var respuestas={};
  document.querySelectorAll('#rrhh_cuest_body input[type="radio"]:checked').forEach(function(el){
    var id=el.name.replace('rrhh_q_','');
    respuestas[id]=el.value;
  });
  var notasEvaluador=document.getElementById('rrhh_cuest_notas')?.value||null;
  if(!Object.keys(respuestas).length){ alert('Respondé al menos una pregunta.'); return; }
  var resultado;
  try{ resultado=await apiFetch('/api/rrhh/evaluaciones',{method:'POST',body:{candidatoId:candidatoId,puesto:puesto,respuestas:respuestas,notasEvaluador:notasEvaluador}}); }
  catch(e){ alert('No se pudo guardar la evaluación: '+e.message); return; }
  document.getElementById('rrhh_cuest_ov')?.remove();
  await cargarRRHH();
  if(pag==='rrhh') rrhh_tab('rec');
  showToast('Evaluación guardada · puntaje referencial: '+resultado.puntaje_referencial);
}

function rrhhModalEtapaCandidato(id){
  var c=RRHH_CANDIDATOS.find(function(x){return x.id===id;}); if(!c) return;
  var ov=document.createElement('div'); ov.id='rrhh_etapa_ov';
  ov.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(3px);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px;overflow-y:auto';
  ov.onclick=function(e){if(e.target===ov)ov.remove();};
  var opciones=Object.keys(_RRHH_ETAPA_LBL).map(function(e){return '<option value="'+e+'"'+(e===c.etapa?' selected':'')+'>'+_RRHH_ETAPA_LBL[e]+'</option>';}).join('');
  ov.innerHTML='<div style="background:#fff;border-radius:16px;width:100%;max-width:420px;margin:auto;box-shadow:0 20px 60px rgba(0,0,0,.2);overflow:hidden">'
    +'<div style="padding:16px 20px;border-bottom:1px solid var(--br);font-weight:800">'+c.nombre+' — actualizar etapa</div>'
    +'<div style="padding:18px 20px">'
    +'<div class="fi"><label>Etapa</label><select id="rrhh_etapa_sel" onchange="_rrhhToggleFijo()">'+opciones+'</select></div>'
    +'<div id="rrhh_etapa_fijo" style="display:none;margin-top:10px">'
    +'<div class="fi"><label>Cargo</label><input id="rrhh_etapa_cargo" value="'+(c.puesto_aplicado||'')+'"></div>'
    +'<div class="g2" style="margin-top:10px"><div class="fi"><label>Salario bruto</label><input id="rrhh_etapa_sal" type="number" min="0"></div>'
    +'<div class="fi"><label>Fecha de ingreso</label><input id="rrhh_etapa_ingreso" type="date" value="'+hoy()+'"></div></div>'
    +'<div style="font-size:11px;color:var(--t3);margin-top:6px">Al pasar a "Empleado fijo" se crea el registro en Nómina automáticamente.</div>'
    +'</div>'
    +'</div>'
    +'<div style="padding:14px 20px;border-top:1px solid var(--br);display:flex;justify-content:flex-end;gap:8px">'
    +'<button class="bs" onclick="document.getElementById(\'rrhh_etapa_ov\').remove()">Cancelar</button>'
    +'<button class="bg" onclick="rrhhGuardarEtapaCandidato('+id+')">Guardar</button>'
    +'</div></div>';
  document.body.appendChild(ov);
  _rrhhToggleFijo();
}
function _rrhhToggleFijo(){
  var sel=document.getElementById('rrhh_etapa_sel');
  var div=document.getElementById('rrhh_etapa_fijo');
  if(div) div.style.display=(sel&&sel.value==='fijo')?'block':'none';
}
async function rrhhGuardarEtapaCandidato(id){
  var etapa=document.getElementById('rrhh_etapa_sel')?.value;
  var body={etapa:etapa};
  if(etapa==='fijo'){
    body.cargo=document.getElementById('rrhh_etapa_cargo')?.value||null;
    body.salarioBruto=Number(document.getElementById('rrhh_etapa_sal')?.value||0);
    body.fechaIngreso=document.getElementById('rrhh_etapa_ingreso')?.value||null;
  }
  try{
    await apiFetch('/api/rrhh/candidatos/'+id,{method:'PATCH',body:body});
  }catch(e){ alert('No se pudo actualizar: '+e.message); return; }
  document.getElementById('rrhh_etapa_ov')?.remove();
  await cargarRRHH();
  if(pag==='rrhh') rrhh_tab('rec');
  showToast('Etapa actualizada ✅');
}

function CB_ordenar(){
  // Siempre de MAYOR a MENOR por No. de factura
  CB_clientes.sort((a,b)=>{
    const x = parseInt(a.no,10), y = parseInt(b.no,10);
    const xn = !isNaN(x), yn = !isNaN(y);
    if (xn && yn && x!==y) return y - x;              // descendente
    if (xn && !yn) return -1;                          // los numéricos primero
    if (!xn && yn) return 1;
    return String(b.no||"").localeCompare(String(a.no||""), 'es', {numeric:true});
  });
}

function CB_hoyISO(){ return new Date().toISOString().slice(0,10); }
function CB_diasAtraso(c){ if (!c.limite) return 0; const ms = new Date(CB_hoyISO()) - new Date(c.limite); return Math.max(0, Math.round(ms/86400000)); }
function CB_estadoDe(c){ if (c.saldo <= 0) return "pagado"; return CB_diasAtraso(c) > 0 ? "vencido" : "aldia"; }
function CB_categoriaPago(c){
  if (c.saldo <= 0) return "pagados";

}
function CB_fmt(n){ return Number(n||0).toLocaleString("en-US"); }
function CB_fechaBonita(iso){ if(!iso) return "—"; const [a,m,d]=String(iso).split("-"); return d?`${d}/${m}/${a}`:iso; }
