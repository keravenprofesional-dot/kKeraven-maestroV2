  var box=document.getElementById('rt_lista');
  if(!box) return;
  var html='';
  RT.hechasInfo.forEach(function(r){
    var etq = r.estado==='pagado'?'pagó todo':r.estado==='abonado'?'abonó '+fM(r.monto_resultado):r.estado==='no_pago'?'no pagó':'saltado';
    html += '<div class="stop done"><div class="stop-n">✓</div>'
         +  '<div style="flex:1"><div class="stop-nom">'+r.cliente_nombre+'</div>'
         +  '<div class="stop-sub">'+r.numero_factura+' · '+etq+'</div></div></div>';
  });
  if(!RT.paradas.length && !html){
    box.innerHTML='<div class="empty"><i class="ti ti-map-pin-off"></i><p>Sin paradas pendientes</p></div>';
    return;
  }
  RT.paradas.forEach(function(p,i){
    var c=p.c;
    html += '<div class="stop"'+(i===0?' style="border-color:#0277BD;border-width:2px"':'')+'>'
         +  '<div class="stop-n">'+(i+1)+'</div>'
         +  '<div style="flex:1;min-width:0">'
         +    '<div class="stop-nom">'+c.cliente+'</div>'
         +    '<div class="stop-sub">'+c.fac+' · debe '+fM(c.saldo)+(c.ref?' · '+c.ref:'')+'</div>'
         +  '</div>'
         +  '<div class="stop-km">'+rtKm(p.dist)+'</div>'
         +  '</div>';
  });
  box.innerHTML=html;
}

/* ══ Mapa ══ */
function rtMapaInit(){
  var el=document.getElementById('ruta_map');
  if(!el) return;
  if(typeof L==='undefined'){
    el.innerHTML='<div style="padding:26px;text-align:center;color:#5A5862;font-size:13px">'
      +'🗺️ El mapa necesita internet para cargar.<br>La ruta y las distancias funcionan igual, y '
      +'<b>Cómo llegar</b> te abre Google Maps.</div>';
    el.style.height='auto';
    return;
  }
  if(RT.mapa){ try{ RT.mapa.remove(); }catch(e){} RT.mapa=null; }
  var centro = RT.yo ? [RT.yo.lat,RT.yo.lng]
             : (RT.paradas[0] ? [RT.paradas[0].co.lat, RT.paradas[0].co.lng]
                              : [18.4861,-69.9312]);           // Santo Domingo
  RT.mapa = L.map(el,{zoomControl:true}).setView(centro, 14);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
    { maxZoom:19, attribution:'© OpenStreetMap' }).addTo(RT.mapa);
  RT.capaMarcas = L.layerGroup().addTo(RT.mapa);
  RT.capaLinea  = L.layerGroup().addTo(RT.mapa);
  rtMapaPintar();
  rtMarcarYo();
  setTimeout(function(){ try{ RT.mapa.invalidateSize(); }catch(e){} }, 250);
}

function rtMapaPintar(){
  if(!RT.mapa || typeof L==='undefined') return;
  RT.capaMarcas.clearLayers();
  RT.capaLinea.clearLayers();
  var pts=[];
  if(RT.yo) pts.push([RT.yo.lat, RT.yo.lng]);

  RT.paradas.forEach(function(p,i){
    var c=p.c;
    var cls = 'pin' + (i===0?' next':'');
    var ic = L.divIcon({ className:'', html:'<div class="'+cls+'">'+(i+1)+'</div>',
                         iconSize:[i===0?38:30, i===0?38:30], iconAnchor:[i===0?19:15, i===0?19:15] });
    L.marker([p.co.lat,p.co.lng], {icon:ic})
      .bindPopup('<b>'+(i+1)+'. '+c.cliente+'</b><br>'+c.fac+'<br>Debe: <b>'+fM(c.saldo)+'</b>'
        +(c.ref?'<br>'+c.ref:'')+'<br><a href="https://www.google.com/maps/dir/?api=1&destination='
        +p.co.lat+','+p.co.lng+'&travelmode=driving" target="_blank">🧭 Cómo llegar</a>')
      .addTo(RT.capaMarcas);
    pts.push([p.co.lat,p.co.lng]);
  });

  // Ya visitadas, en verde
  RT.hechasInfo.forEach(function(r){
    if(r.gps_lat==null || r.gps_lng==null) return;
    var ic=L.divIcon({className:'',html:'<div class="pin done">✓</div>',iconSize:[30,30],iconAnchor:[15,15]});
    L.marker([Number(r.gps_lat),Number(r.gps_lng)],{icon:ic}).bindPopup('<b>'+r.cliente_nombre+'</b><br>Visitada ✓').addTo(RT.capaMarcas);
  });

  if(pts.length>1){
    L.polyline(pts, {color:'#0277BD', weight:4, opacity:.75, dashArray:'8,7'}).addTo(RT.capaLinea);
    try{ RT.mapa.fitBounds(L.latLngBounds(pts).pad(0.18)); }catch(e){}
  }
}

function rtMarcarYo(){
  if(!RT.mapa || !RT.yo || typeof L==='undefined') return;
  if(RT.marcaYo){ try{ RT.mapa.removeLayer(RT.marcaYo); }catch(e){} }
  var ic=L.divIcon({className:'',html:'<div class="yo"></div>',iconSize:[18,18],iconAnchor:[9,9]});
  RT.marcaYo=L.marker([RT.yo.lat,RT.yo.lng],{icon:ic}).bindPopup('Estás aquí').addTo(RT.mapa);
}

/* ══ Acciones ══ */
function rtIr(){
  var p=RT.paradas[0];
  if(!p) return;
  window.open('https://www.google.com/maps/dir/?api=1&destination='+p.co.lat+','+p.co.lng+'&travelmode=driving','_blank');
}
function rtAbrirTodo(){
  if(!RT.paradas.length){ showToast('No hay paradas en la ruta','info'); return; }
  var org = RT.yo ? RT.yo.lat+','+RT.yo.lng : '';
  var pts = RT.paradas.map(function(p){ return p.co.lat+','+p.co.lng; });
  var dest = pts.pop();
  var url='https://www.google.com/maps/dir/?api=1&destination='+dest+'&travelmode=driving'
        + (org?'&origin='+org:'')
        + (pts.length? '&waypoints='+pts.slice(0,9).join('|') : '');   // Google admite 9 escalas
  window.open(url,'_blank');
}
/* Marca el resultado de la parada en el servidor (tabla ruta_seleccion)
   y refresca. El dinero (abono/saldo) se registra aparte, en el
   contrato real, ANTES de llamar a esto -- ver rtCobrado/rtAbono. */
async function rtRegistrarResultado(estado, montoResultado, nota){
  var p=RT.paradas[0]; if(!p) return;
  try{
    await apiFetch('/api/ruta/seleccion/'+p.seleccionId, {method:'PATCH', body:{estado:estado, montoResultado:montoResultado, nota:nota}});
  }catch(e){ showToast('No se pudo guardar el resultado de la visita','error'); throw e; }
  await rtCargar();
  rtPintar(); rtMapaPintar(); rtCheckLlegada();
}
async function rtCobrado(){
  var p=RT.paradas[0]; if(!p) return;
  var c=p.c;
  if(!confirm('¿'+c.cliente+' pagó los '+fM(c.saldo)+' completos?')) return;
  try{
    await apiFetch('/api/contratos/'+c.id+'/abonar', {method:'POST', body:{monto:c.saldo, via:'ruta', nota:'Cobrado en ruta'}});
  }catch(e){ showToast('No se pudo registrar el pago en el sistema','error'); return; }
  await rtRegistrarResultado('pagado', c.saldo, 'Cobrado en ruta');
  showToast('✅ '+c.cliente+' saldado');
}
async function rtAbono(){
  var p=RT.paradas[0]; if(!p) return;
  var c=p.c;

  if(!m || m<=0) return;
  if(m > (c.saldo||0)){ alert('El abono no puede ser mayor que la deuda ('+fM(c.saldo)+').'); return; }

  }catch(e){ showToast('No se pudo registrar el abono en el sistema','error'); return; }

async function rtNoPago(){

function rtSaltar(){
  var p=RT.paradas[0]; if(!p) return;
  // Se va al final de la cola, sin marcarla como visitada (solo mientras dure la sesión)
  RT.paradas.push(RT.paradas.shift());
  RT.paradas.forEach(function(x,i){
    var prev = i===0 ? RT.yo : RT.paradas[i-1].co;
    x.dist = prev ? rtDist(prev, x.co) : null;
  });
  rtPintar(); rtMapaPintar();
  showToast('Parada saltada — queda para el final','info');
}
function rtRecalcular(){

<script>
/* ══════════════════════════════════════════════════════════════════
   UNIFICACIÓN — EL CONTRATO ES LA ÚNICA FUENTE DE VERDAD
   ───────────────────────────────────────────────────────────────
   Antes: el Cobrador tenía su propia lista en localStorage y no se
   hablaba con el resto del sistema.
   Ahora: el Cobrador lee y escribe sobre contratos[] (IndexedDB).
   Se ve igual, pero todo queda conectado.
══════════════════════════════════════════════════════════════════ */

/* Normaliza un No. de factura para comparar: "0666", "666", "KRV-0666" → "666" */
function facKey(v){
  var s = String(v==null?'':v).trim().toUpperCase();
  var m = s.match(/(\d+)\s*$/);            // toma los dígitos finales
  return m ? String(parseInt(m[1],10)) : s;
}
function buscarContratoPorFac(fac){
  var k = facKey(fac);
  return contratos.find(function(c){ return facKey(c.fac) === k; }) || null;
}

/* ── Cliente del Cobrador  ⇄  Contrato ── */
function ctoAVista(c){
  return {
    _id:    c.id,
    no:     String(c.fac||''),
    nombre: c.cliente||'',
    tel:    (c.tel1||'').replace(/\D/g,''),
    tel2:   (c.tel2||'').replace(/\D/g,''),
    monto:  Number(c.monto)||0,
    saldo:  (c.saldo===undefined||c.saldo===null) ? (Number(c.monto)||0) : Number(c.saldo)||0,
    limite: c.lim||'',
    promesa:c.promesa||'',
    notas:  c.obs||'',
    provincia: c.provincia||''
  };
}
function vistaAContrato(v, c){
  c.fac     = v.no;
  c.cliente = v.nombre;
  c.tel1    = v.tel;
  c.tel2    = v.tel2;
  c.monto   = Number(v.monto)||0;
  c.saldo   = Math.max(0, Number(v.saldo)||0);
  c.lim     = v.limite||'';
  c.promesa = v.promesa||'';
  c.obs     = v.notas||'';
  return c;
}
function nuevoContratoDesdeCobrador(v){
  return {
    id: Date.now() + Math.floor(Math.random()*1000),
    fac: v.no, fecha: hoy(),
    promotor:'', zona:'',
    cliente: v.nombre, cedula:'', tel1: v.tel, tel2: v.tel2, email:'',
    inst:'', barrio:'', ref:'', dir:'', gps:'',
    tipo:'credito', plazo:0, lim: v.limite||'', promesa: v.promesa||'',
    prods:[], monto: Number(v.monto)||0, descuento:0, neto: Number(v.monto)||0,
    saldo: Math.max(0, Number(v.saldo)||0),
    obs: v.notas||'',
    fF:null, fR:null, fFac:null,
    status:'aprobado',                       // ya está en la calle, se está cobrando
    por: (typeof ses!=='undefined'&&ses)?ses.n:'Sistema',
    hora: now(),
    dec:{q:'Migración', h:now(), c:'Cargado desde el Cobrador'},
    abonos:[], origen:'cobrador'
  };
}

/* ══ MIGRACIÓN (una sola vez, por navegador) ══
   Pasa los clientes viejos del Cobrador (localStorage de este navegador,
   o si no hay nada ahí, los 10 de CB_DATOS_INICIALES) a la base de datos
   real, sin duplicar facturas que ya existan. A diferencia de la versión
   anterior, esto SÍ queda guardado de verdad (antes solo vivía en
   memoria y se perdía al recargar). */
/* Sube una lista de clientes del Cobrador (forma {no,nombre,tel,tel2,
   monto,saldo,limite,promesa,notas}) contra la base de datos real:
   si la factura ya existe, solo rellena datos de cobranza (nunca
   monto/saldo); si no existe, la crea como deuda migrada. La usan
   migrarCobrador() (una vez, al abrir) y el importador de Excel del
   Cobrador (cuando el usuario sube un archivo a mano). */
async function _cobradorSubirLote(lista){
  var nuevos=0, existentes=0, errores=0, detalle=[];
  for (var idx=0; idx<lista.length; idx++){
    var v = lista[idx];
    if(!v || !v.no || !v.nombre) continue;
    var c = buscarContratoPorFac(v.no);
    if(c){
      existentes++;
      try{
        await apiFetch(`/api/contratos/${c.id}/cobranza`,{method:'PATCH',body:{
          telefono2: c.tel2 || v.tel2 || '',
          fechaLimite: c.lim || v.limite || null,
          promesaPago: c.promesa || v.promesa || null,
          notas: (v.notas && String(c.obs||'').indexOf(v.notas)<0) ? ((c.obs?c.obs+' | ':'')+v.notas) : (c.obs||null),
          viaImportacion: true,
        }});
      }catch(e){}
      detalle.push('· '+v.no+' '+v.nombre+' → ya existía, no se duplicó');
    } else {
      try{
        await apiFetch('/api/contratos/migrar-cobrador',{method:'POST',body:{
          numeroFactura: v.no, nombre: v.nombre, telefono1: v.tel, telefono2: v.tel2,
          monto: v.monto, saldo: v.saldo, fechaLimite: v.limite||null, promesaPago: v.promesa||null, notas: v.notas||null
        }});
        nuevos++;
        detalle.push('· '+v.no+' '+v.nombre+' → creado');
      }catch(e){ errores++; detalle.push('· '+v.no+' '+v.nombre+' → ERROR: '+e.message); }
    }
  }
  await cargarContratos();
  return {nuevos:nuevos, existentes:existentes, errores:errores, detalle:detalle};
}

/* ══ MIGRACIÓN (una sola vez, por navegador) ══
   Pasa los clientes viejos del Cobrador (localStorage de este navegador,
   o si no hay nada ahí, los 10 de CB_DATOS_INICIALES) a la base de datos
   real, sin duplicar facturas que ya existan. A diferencia de la versión
   anterior, esto SÍ queda guardado de verdad (antes solo vivía en
   memoria y se perdía al recargar). */
async function migrarCobrador(){
  var yaHecha = false;
  try{ yaHecha = localStorage.getItem('kv_migracion_cobrador')==='1'; }catch(e){}
  if(yaHecha) return {nuevos:0, existentes:0, ya:true};

  var viejos=null;
  try{ viejos = JSON.parse(localStorage.getItem('cobrador_clientes')||'null'); }catch(e){ viejos=null; }
  if(!Array.isArray(viejos) || !viejos.length){
    viejos = (typeof CB_DATOS_INICIALES!=='undefined') ? CB_DATOS_INICIALES : [];
  }
  if(!viejos.length){
    try{ localStorage.setItem('kv_migracion_cobrador','1'); }catch(e){}
    return {nuevos:0, existentes:0, ya:false};
  }
  // La migracion masiva exige el permiso 'excel' en el servidor. Si
  // quien abrió el Cobrador no lo tiene, NO se marca como hecha -- se
  // reintenta sola la próxima vez que entre alguien con ese permiso
  // (Gerencia lo otorga en Usuarios). Los datos viejos siguen ahí, no
  // se pierden por esto.
  if(typeof perms!=='function' || !perms().includes('excel')){
    return {nuevos:0, existentes:0, ya:false, sinPermiso:true};
  }

  var res = await _cobradorSubirLote(viejos);
  try{
    localStorage.setItem('kv_migracion_cobrador','1');
    localStorage.setItem('cobrador_clientes_respaldo', JSON.stringify(viejos));   // respaldo por si acaso
  }catch(e){}
  console.log('MIGRACIÓN COBRADOR → CONTRATOS\n'+res.detalle.join('\n'));
  res.ya=false;
  return res;
}

/* ══ UN SOLO REGISTRO DE PAGO PARA TODO EL SISTEMA ══
   Cobrador, Ruta con Mapa y Cobros llaman siempre a esta función.
   Así el saldo, el historial y los reportes nunca se descuadran. */
async function registrarPago(idOFac, monto, opts){
  opts = opts || {};
  var c = (typeof idOFac==='number') ? contratos.find(function(x){ return x.id===idOFac; }) : null;
  if(!c) c = buscarContratoPorFac(idOFac);
  if(!c) return null;

  var deuda = Math.max(0, Number(c.saldo)||0);
  var m = Math.max(0, Math.min(Number(monto)||0, deuda));
  if(m<=0) return null;

  let actualizado;
  try{
    actualizado=await apiFetch(`/api/contratos/${c.id}/abonar`,{method:'POST',body:{monto:m,via:opts.via||'manual',nota:opts.nota||''}});
  }catch(e){alert('No se pudo registrar el pago: '+e.message);return null;}

  // Mutar el MISMO objeto que ya tenían los llamadores (abonar/saldar/
  // rtCobrado/etc. leen c.saldo despues del await sobre esta misma
  // referencia) en vez de reemplazarlo, para no romper esos flujos.
  if(!c.abonos) c.abonos=[];
  c.abonos.push({f:hoy(),m,q:ses?ses.n:'Sistema',via:opts.via||'manual',nota:opts.nota||''});
  c.saldo=Number(actualizado.saldo)||0;
  if(c.saldo===0)c.fechaSaldado=hoy();
  return c;
}
/* Total cobrado en un período (lo usa Contabilidad y Rendimiento) */
function ingresosCobranza(desde, hasta){
  var t=0;
  contratos.forEach(function(c){
    (c.abonos||[]).forEach(function(a){
      if(desde && a.f < desde) return;
      if(hasta && a.f > hasta) return;
      t += Number(a.m)||0;
    });
  });
  return t;
}


/* ══════════════════════════════════════════════════════════════════
   EL COBRADOR AHORA TRABAJA SOBRE contratos[]
   Se ve exactamente igual — cambia solo de dónde saca los datos.
══════════════════════════════════════════════════════════════════ */
CB_cargar = function(){

};

/* CB_guardarCliente() (más arriba en el archivo) ya llama directo a la API
   (PATCH /cobranza), y los 3 importadores de la pestaña Cargar (Excel,
   fotos con IA, lote JSON/CSV) ya suben todo de verdad via
   _cobradorSubirLote() -- ya no hace falta un CB_guardar() que sincronice
   contratos[] a mano. Solo CB_cobrar() (marca de "último cobro enviado por
   WhatsApp", dato no crítico) sigue usando el CB_guardar() original de
   arriba (solo localStorage). Un contrato nunca se elimina desde acá --
   la única baja posible es anularlo (POST /api/contratos/:id/anular,
   solo Gerencia/Sub-Gerencia, desde el Buzón), que lo marca 'anulado'
   sin borrar el registro ni su historial. */

/* Cobrar / abonar en el Cobrador → pasa por registrarPago() */
CB_registrarAbono = async function(i){
  var v = CB_clientes[i]; if(!v) return;
  var t = prompt('¿Cuánto abonó '+v.nombre+'?\n(debe '+CB_fmt(v.saldo)+')','');
  var m = parseFloat(String(t||'').replace(/[^0-9.]/g,''));
  if(!m || m<=0) return;
  if(m > v.saldo){ alert('El abono no puede ser mayor que la deuda ('+CB_fmt(v.saldo)+').'); return; }
  var c = await registrarPago(v._id!=null ? v._id : v.no, m, {via:'cobrador', nota:'Abono desde el Cobrador'});
  if(!c){ alert('No pude registrar el abono.'); return; }
  CB_cargar(); CB_pintar();
  if(typeof showToast==='function') showToast('💵 '+v.nombre+' abonó '+CB_fmt(m)+' · le queda '+CB_fmt(c.saldo));
};

/* La Ruta con Mapa también usa registrarPago() -- y avisa a ruta_seleccion
   (rtRegistrarResultado) para que la parada salga de "pendiente" hoy. */
rtCobrado = async function(){

  var c=p.c;

  await rtRegistrarResultado('pagado', m, 'Cobrado en ruta');

};
rtAbono = async function(){
  var p=RT.paradas[0]; if(!p) return;
  var c=p.c;
  var t=prompt('¿Cuánto abonó '+c.cliente+'?\n(debe '+fM(c.saldo)+')','');
  var m=parseFloat(String(t||'').replace(/[^0-9.]/g,''));
  if(!m || m<=0) return;
  if(m > (c.saldo||0)){ alert('El abono no puede ser mayor que la deuda ('+fM(c.saldo)+').'); return; }
  var actualizado = await registrarPago(c.id, m, {via:'ruta', nota:'Abono en ruta'});
  if(!actualizado){ showToast('No se pudo registrar el abono','error'); return; }
  await rtRegistrarResultado('abonado', m, 'Abono en ruta');

};

/* El módulo Cobros también */
abonar = async function(id){
  var c = contratos.find(function(x){ return x.id===id; }); if(!c) return;
  var el = document.getElementById('abo_'+id);
  var m = parseFloat(el && el.value)||0;

};
saldar = async function(id){

  if(!confirm('¿'+c.cliente+' pagó los '+fM(c.saldo)+' completos?')) return;
  await registrarPago(id, c.saldo, {via:'cobros', nota:'Saldado en ruta de cobro'});

};

/* Al abrir el Cobrador: migrar (una vez) y avisar del resultado */
(function(){
  var _init = window.cob_init;
  window.cob_init = async function(){
    var res = await migrarCobrador();
    _init.apply(this, arguments);
    if(res && !res.ya && (res.nuevos || res.existentes)){

      if(box){

        av.innerHTML='<b>🔗 Cobrador conectado con el resto del sistema</b><br>'
          + '· <b>'+res.nuevos+'</b> contrato(s) creados desde el Cobrador<br>'
          + '· <b>'+res.existentes+'</b> ya existían en Facturación — <b>no se duplicaron</b><br>'
          + (res.errores?'· <b style="color:#C62828">'+res.errores+'</b> no se pudieron migrar (revisa la consola) — quedan en el respaldo de este navegador<br>':'')
          + 'Ahora lo que cobres aquí se ve al instante en <b>Cuentas por Cobrar</b>, '
          + '<b>Ruta con Mapa</b> y <b>Rendimiento</b>.'
          + '<button onclick="this.parentNode.remove()" style="margin-left:10px;padding:3px 10px;'
          + 'background:#fff;border:1px solid #2E7D32;color:#2E7D32;border-radius:6px;cursor:pointer;font-size:11px">Entendido</button>';
        box.insertBefore(av, box.firstChild);
      }
    }
  };
})();

   +   '<div class="st"><div class="sv">'+contratos.length+'</div><div class="sl2">Facturas</div></div>'
   + '</div>'
   + '<div style="position:relative;margin-bottom:12px">'
   +   '<i class="ti ti-search" style="position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--t3)"></i>'
   +   '<input id="cli_q" placeholder="Buscar cliente, cédula, teléfono o factura…" style="width:100%;padding:9px 10px 9px 34px;border:1.5px solid rgba(196,138,31,.2);border-radius:8px;font-family:inherit;font-size:13px" oninput="cliFilter()"></div>'
   + '<div class="tbl-wrap"><table class="tbl"><thead><tr>'

   + '</tr></thead><tbody id="cli_tbody">'
   + lista.map(function(g){
       var c=g.ref;
       var apr=g.cts.filter(function(x){ return x.status==='aprobado'; });
       var fact=apr.reduce(function(s,x){ return s+(Number(x.monto)||0); },0);
       var debe=apr.reduce(function(s,x){ return s+(Number(x.saldo)||0); },0);
       return '<tr style="cursor:pointer" onclick="cliDetalle(this.dataset.k)" data-k="'+g.key+'">'
         + '<td style="font-weight:600">'+(c.cliente||'—')+'</td>'
         + '<td style="font-size:11px;color:var(--t2)">'+(c.cedula||'<span style="color:#E65100">sin cédula</span>')+'</td>'
         + '<td style="font-size:12px">'+(c.tel1||'—')+'</td>'
         + '<td style="font-size:11px;color:var(--t2)">'+(c.inst||'—')+'</td>'
         + '<td>'+canalPill(c.canal)+'</td>'
         + '<td class="tr" style="font-weight:600">'+g.cts.length+'</td>'
         + '<td class="tr">'+fM(fact)+'</td>'
         + '<td class="tr" style="font-weight:700;color:'+(debe>0?'var(--er)':'var(--green)')+'">'+fM(debe)+'</td>'
         + '</tr>';
     }).join('')
   + '</tbody></table></div></div>';
};
cliDetalle = function(key){
  var cts = contratos.filter(function(c){
    var k = (c.cedula && String(c.cedula).replace(/\D/g,'')) || ('FAC:'+facKey(c.fac));
    return k===key;
  });
  if(!cts.length) return;
  var c0=cts[0];
  openMdl('Cliente: '+c0.cliente,
    '<div class="dg" style="margin-bottom:14px">'
    + '<div><div class="dl">Nombre</div><div class="dv" style="font-weight:700">'+(c0.cliente||'—')+'</div></div>'
    + '<div><div class="dl">Cédula</div><div class="dv">'+(c0.cedula||'—')+'</div></div>'
    + '<div><div class="dl">Teléfono 1</div><div class="dv">'+(c0.tel1||'—')+'</div></div>'
    + '<div><div class="dl">Teléfono 2</div><div class="dv">'+(c0.tel2||'—')+'</div></div>'
    + '<div><div class="dl">Trabaja en</div><div class="dv">'+(c0.inst||'—')+'</div></div>'
    + '<div><div class="dl">Canal</div><div class="dv">'+canalNombre(c0.canal)+'</div></div>'
    + '</div>'
    + '<div class="sl">Facturas ('+cts.length+')</div>'
    + '<div class="tbl-wrap"><table class="tbl"><thead><tr><th>Factura</th><th>Fecha</th><th>Vendedor</th><th class="tr">Monto</th><th class="tr">Debe</th><th>Estado</th></tr></thead><tbody>'
    + cts.map(function(c){
        return '<tr><td style="font-weight:700;color:var(--gold)">'+c.fac+'</td>'
          + '<td style="font-size:11px">'+fD(c.fecha)+'</td>'
          + '<td style="font-size:11px">'+(c.promotor||'—')+'</td>'
          + '<td class="tr">'+fM(c.monto)+'</td>'
          + '<td class="tr" style="font-weight:700;color:'+((c.saldo||0)>0?'var(--er)':'var(--green)')+'">'+fM(c.saldo||0)+'</td>'
          + '<td><span class="'+(c.status==='aprobado'?'sta':c.status==='rechazado'?'str':'stp')+'">'+c.status+'</span></td></tr>';
      }).join('')
    + '</tbody></table></div>',
    '<button class="bs" onclick="closeMdl()">Cerrar</button>');
};

<style>

<script>
/* ══════════════════════════════════════════════════════════════════
   B · CANAL DE VENTA — Oficina · Ruta · Embajadoras
══════════════════════════════════════════════════════════════════ */
var CANALES = {
  oficina:    {n:'Oficina',     ico:'🏢', col:'#1565C0', desc:'Venta hecha en la oficina'},
  ruta:       {n:'Ruta',        ico:'🚐', col:'#2E7D32', desc:'Venta hecha por promotor en ruta'},
  embajadora: {n:'Embajadora',  ico:'👑', col:'#C2185B', desc:'Venta a emprendedora que revende'}
};
function canalNombre(k){ return CANALES[k] ? CANALES[k].ico+' '+CANALES[k].n : '—'; }
function canalPill(k){
  if(!CANALES[k]) return '<span class="cpill nd">sin canal</span>';
  return '<span class="cpill '+k+'">'+CANALES[k].ico+' '+CANALES[k].n+'</span>';
}

/* Selector de canal dentro del formulario de Facturación */
(function(){
  var _r = window.rContrato;
  if(!_r) return;
  window.rContrato = function(){
    var html = _r.apply(this, arguments);
    var marca = '<div class="fi"><label>Monto total (RD$)';
    if(html.indexOf(marca) < 0) return html;
    var sel =
      '<div class="fi sp2"><label>Canal de venta <span class="req">*</span></label>'
      + '<div style="display:flex;gap:7px;flex-wrap:wrap">'
      + Object.keys(CANALES).filter(function(k){return k!=='embajadora'||perms().includes('embajadoras');}).map(function(k){
          var C=CANALES[k];
          return '<button type="button" id="cnl_'+k+'" onclick="setCanal(\''+k+'\')" '
            + 'style="flex:1;min-width:112px;padding:11px 8px;border-radius:10px;cursor:pointer;'
            + 'font-family:inherit;font-size:12px;font-weight:700;border:2px solid '+C.col+'33;'
            + 'background:#fff;color:'+C.col+';transition:all .18s">'
            + '<div style="font-size:19px;line-height:1.2">'+C.ico+'</div>'+C.n+'</button>';
        }).join('')
      + '</div>'
      + '<input type="hidden" id="cf_canal" value="ruta">'
      + '<div style="font-size:11px;color:var(--t3);margin-top:5px" id="cnl_desc">'+CANALES.ruta.desc+'</div>'
      + '<div class="em" id="e_canal"></div></div>';
    return html.replace(marca, sel + marca);
  };
})();
function setCanal(k){
  var el=document.getElementById('cf_canal'); if(el) el.value=k;
  Object.keys(CANALES).forEach(function(x){
    var b=document.getElementById('cnl_'+x); if(!b) return;
    var C=CANALES[x], on=(x===k);
    b.style.background = on ? C.col : '#fff';
    b.style.color      = on ? '#fff' : C.col;
    b.style.borderColor= on ? C.col : C.col+'33';
  });
  var d=document.getElementById('cnl_desc'); if(d) d.textContent=CANALES[k].desc;
  var e=document.getElementById('e_canal'); if(e) e.textContent='';
}
/* Marcar el canal por defecto al abrir el formulario */
(function(){
  var _i = window.iContrato;
  window.iContrato = function(){
    if(_i) _i.apply(this, arguments);
    setTimeout(function(){ setCanal('ruta'); }, 20);
  };
})();
/* Guardar el canal en el contrato */
(function(){
  var _e = window.enviarC;
  if(!_e) return;
  window.enviarC = function(){
    var antes = contratos.length;
    _e.apply(this, arguments);
    if(contratos.length > antes){
      var c = contratos[contratos.length-1];
      var el = document.getElementById('cf_canal');
      c.canal = (el && el.value) || 'ruta';
      guardar();
    }
  };
})();

/* ── Pestañas de canal en Facturación ── */
var _facCanal = 'todos';
function facTab(k){
  _facCanal = k;
  document.querySelectorAll('.canal-tab').forEach(function(b){
    b.classList.toggle('act', b.dataset.c===k);
  });
  facResumen();
}
function facResumen(){
  var box=document.getElementById('fac_resumen'); if(!box) return;
  var lista = contratos.filter(function(c){
    return _facCanal==='todos' ? true : (c.canal||'ruta')===_facCanal;
  });
  var apr = lista.filter(function(c){ return c.status==='aprobado'; });
  var vend = apr.reduce(function(s,c){ return s+(Number(c.monto)||0); },0);
  var debe = apr.reduce(function(s,c){ return s+(Number(c.saldo)||0); },0);

  box.innerHTML =
    '<div class="sg" style="margin-bottom:12px">'
    + '<div class="st"><div class="sv">'+lista.length+'</div><div class="sl2">Facturas</div></div>'
    + '<div class="st"><div class="sv" style="color:#2E7D32">'+apr.length+'</div><div class="sl2">Aprobadas</div></div>'
    + '<div class="st"><div class="sv" style="font-size:14px">'+fM(vend)+'</div><div class="sl2">Facturado</div></div>'
    + '<div class="st"><div class="sv" style="font-size:14px;color:var(--er)">'+fM(debe)+'</div><div class="sl2">Por cobrar</div></div>'
    + '</div>'
    + (lista.length
      ? '<div class="tbl-wrap"><table class="tbl"><thead><tr>'
        + '<th>Factura</th><th>Fecha</th><th>Cliente</th><th>Vendedor</th><th>Canal</th>'
        + '<th class="tr">Monto</th><th class="tr">Debe</th><th>Estado</th></tr></thead><tbody>'
        + lista.slice().sort(function(a,b){ return parseInt(facKey(b.fac))-parseInt(facKey(a.fac)); })
          .map(function(c){
            return '<tr><td style="font-weight:700;color:var(--gold)">'+c.fac+'</td>'
             + '<td style="font-size:11px">'+fD(c.fecha)+'</td>'
             + '<td style="font-weight:600">'+(c.cliente||'—')+'</td>'
             + '<td style="font-size:11px">'+(c.promotor||'<span style="color:#E65100">sin asignar</span>')+'</td>'
             + '<td>'+canalPill(c.canal)+'</td>'
             + '<td class="tr">'+fM(c.monto)+'</td>'
             + '<td class="tr" style="font-weight:700;color:'+((c.saldo||0)>0?'var(--er)':'var(--green)')+'">'+fM(c.saldo||0)+'</td>'
             + '<td><span class="'+(c.status==='aprobado'?'sta':c.status==='rechazado'?'str':'stp')+'">'+c.status+'</span></td></tr>';
          }).join('')
        + '</tbody></table></div>'
      : '<div class="empty"><i class="ti ti-file-invoice"></i><p>Sin facturas en este canal</p></div>');
}
/* Añadir la sección de canales debajo del formulario de Facturación */
(function(){
  var _r2 = window.rContrato;
  window.rContrato = function(){
    var html = _r2.apply(this, arguments);
    return html
      + '<div class="card">'
      +   '<div class="ct"><i class="ti ti-chart-pie" style="color:var(--gold)"></i>Ventas por canal</div>'
      +   '<div class="canal-tabs">'
      +     '<button class="canal-tab act" data-c="todos"      onclick="facTab(\'todos\')">📋 Todas</button>'
      +     '<button class="canal-tab"     data-c="oficina"    onclick="facTab(\'oficina\')">🏢 Oficina</button>'
      +     '<button class="canal-tab"     data-c="ruta"       onclick="facTab(\'ruta\')">🚐 Ruta</button>'
      +     (perms().includes('embajadoras')?'<button class="canal-tab"     data-c="embajadora" onclick="facTab(\'embajadora\')">👑 Embajadoras</button>':'')
      +   '</div>'
      +   '<div id="fac_resumen"></div>'
      + '</div>';
  };
  var _ir = window.ir;
  window.ir = function(id){
    _ir.apply(this, arguments);
    if(id==='contrato') setTimeout(function(){ facTab(_facCanal); }, 40);
  };
})();


/* ══════════════════════════════════════════════════════════════════
   C · CONTABILIDAD — asientos automáticos de ventas y cobros
══════════════════════════════════════════════════════════════════ */
/* Se generan al vuelo desde los contratos: nunca se descuadran ni se duplican */
function asientosAuto(){
  var out=[];
  contratos.forEach(function(c){
    if(c.status!=='aprobado') return;
    var monto = Number(c.neto||c.monto)||0;
    if(monto>0){
      out.push({ auto:true, fecha:c.fecha||hoy(), ref:c.fac,
        desc:'Venta a crédito — '+(c.cliente||''),
        cuenta:'Cuentas por Cobrar', contra:'Ingresos por Ventas',
        tipo:'Venta', canal:c.canal||'ruta', vendedor:c.promotor||'',
        debe:monto, haber:0 });
    }
    (c.abonos||[]).forEach(function(a){
      out.push({ auto:true, fecha:a.f, ref:c.fac,
        desc:'Cobro — '+(c.cliente||'')+(a.via?' ('+a.via+')':''),
        cuenta:'Caja / Banco', contra:'Cuentas por Cobrar',
        tipo:'Cobro', canal:c.canal||'ruta', vendedor:c.promotor||'',
        debe:Number(a.m)||0, haber:0 });
    });
  });
  return out.sort(function(a,b){ return String(b.fecha).localeCompare(String(a.fecha)); });
}
/* Ingresos reales = lo cobrado (base efectivo), no solo las facturas saldadas */
contCalcs = function(){
  var facturado = contratos.filter(function(c){ return c.status==='aprobado'; })
    .reduce(function(s,c){ return s+(Number(c.neto||c.monto)||0); },0);
  var ingresos = ingresosCobranza();                    // todos los abonos cobrados
  var porCobrar = contratos.filter(function(c){ return c.status==='aprobado'; })
    .reduce(function(s,c){ return s+(Number(c.saldo)||0); },0);
  var gPagar  = (typeof pagar!=='undefined'?pagar:[]).reduce(function(s,p){
                  return s + (p.abonos||[]).reduce(function(x,a){ return x+(Number(a.monto)||0); },0); },0);
  var gNomina = (typeof nominas!=='undefined'?nominas:[]).reduce(function(s,n){ return s+(Number(n.totalNeto)||0); },0);
  var gTotal  = gPagar+gNomina;
  return { facturado:facturado, ingresos:ingresos, porCobrar:porCobrar,
           gPagar:gPagar, gNomina:gNomina, gTotal:gTotal, util:ingresos-gTotal };
};
</script>

<script>
/* ══════════════════════════════════════════════════════════════════
   D · CUENTAS POR COBRAR — la lógica estaba invertida
   c.saldo = LO QUE DEBE (no lo que pagó).  cobrado = monto − saldo.
══════════════════════════════════════════════════════════════════ */
rCXC = function(){
  var apr  = contratos.filter(function(c){ return c.status==='aprobado'; });
  var pend = apr.filter(function(c){ return (Number(c.saldo)||0) > 0; });
  var porCobrar = apr.reduce(function(s,c){ return s + (Number(c.saldo)||0); },0);
  var facturado = apr.reduce(function(s,c){ return s + (Number(c.neto||c.monto)||0); },0);
  var cobrado   = facturado - porCobrar;

  return '<div class="card">'
   + '<div class="ct"><i class="ti ti-receipt" style="color:var(--mc);font-size:18px"></i>Cuentas por Cobrar'
   +   '<span class="pill" style="margin-left:auto">'+pend.length+' pendientes</span></div>'
   + '<div class="sg" style="margin-bottom:14px">'
   +   '<div class="st"><div class="sv" style="font-size:14px;color:var(--er)">'+fM(porCobrar)+'</div><div class="sl2">Por cobrar</div></div>'
   +   '<div class="st"><div class="sv" style="font-size:14px;color:#2E7D32">'+fM(cobrado)+'</div><div class="sl2">Cobrado</div></div>'
   +   '<div class="st"><div class="sv" style="font-size:14px">'+fM(facturado)+'</div><div class="sl2">Facturado</div></div>'
   +   '<div class="st"><div class="sv">'+pend.length+'/'+apr.length+'</div><div class="sl2">Con deuda</div></div>'
   + '</div>'
   + (pend.length
     ? '<div class="tbl-wrap"><table class="tbl"><thead><tr>'
       + '<th>Factura</th><th>Cliente</th><th>Vendedor</th><th>Canal</th><th>Vence</th>'
       + '<th class="tr">Monto</th><th class="tr">Cobrado</th><th class="tr">Debe</th><th>Avance</th>'
       + '</tr></thead><tbody>'
       + pend.slice().sort(function(a,b){ return parseInt(facKey(b.fac))-parseInt(facKey(a.fac)); })
         .map(function(c){
           var monto = Number(c.neto||c.monto)||0;
           var debe  = Number(c.saldo)||0;
           var pago  = monto - debe;
           var pct   = monto>0 ? Math.round(pago/monto*100) : 0;
           var vencido = c.lim && c.lim < hoy();
           return '<tr>'
            + '<td style="font-weight:700;color:var(--gold)">'+c.fac+'</td>'
            + '<td style="font-weight:600">'+(c.cliente||'—')+'</td>'
            + '<td style="font-size:11px">'+(c.promotor||'<span style="color:#E65100">sin asignar</span>')+'</td>'
            + '<td>'+canalPill(c.canal)+'</td>'
            + '<td style="font-size:11px'+(vencido?';color:#C62828;font-weight:700':'')+'">'
            +   (c.lim? fD(c.lim)+(vencido?' ⚠':'') : '—')+'</td>'
            + '<td class="tr">'+fM(monto)+'</td>'
            + '<td class="tr" style="color:#2E7D32">'+fM(pago)+'</td>'
            + '<td class="tr" style="font-weight:800;color:var(--er)">'+fM(debe)+'</td>'
            + '<td><div style="display:flex;align-items:center;gap:6px">'
            +   '<div style="background:#eee;border-radius:3px;height:6px;width:56px;overflow:hidden">'
            +     '<div style="background:'+(pct>=100?'#2E7D32':'#0277BD')+';height:100%;width:'+pct+'%"></div></div>'
            +   '<span style="font-size:10px;font-weight:700;color:'+(pct>0?'#2E7D32':'#999')+'">'+pct+'%</span>'
            + '</div></td></tr>';
         }).join('')
       + '</tbody><tfoot><tr>'
       +   '<td colspan="5" style="font-weight:700;padding:9px 14px">TOTALES ('+pend.length+')</td>'
       +   '<td class="tr">'+fM(pend.reduce(function(s,c){ return s+(Number(c.neto||c.monto)||0); },0))+'</td>'
       +   '<td class="tr" style="color:#2E7D32">'+fM(pend.reduce(function(s,c){ return s+((Number(c.neto||c.monto)||0)-(Number(c.saldo)||0)); },0))+'</td>'
       +   '<td class="tr" style="font-weight:900;font-size:14px;color:var(--er)">'+fM(porCobrar)+'</td>'
       +   '<td></td></tr></tfoot></table></div>'
     : '<div class="empty"><i class="ti ti-circle-check"></i><p>No hay cuentas pendientes</p></div>')
   + '</div>';
};

/* ══════════════════════════════════════════════════════════════════
   E · Los abonos que ya estaban hechos deben dejar rastro contable
   Si una factura de 4,900 ya debía 2,000, es que cobraron 2,900.
   Se registra ese abono histórico para que la contabilidad cuadre.
══════════════════════════════════════════════════════════════════ */
async function abonosHistoricos(){
  var n=0;
  contratos.forEach(function(c){
    if(c.status!=='aprobado') return;
    if(c._histOk) return;
    var monto = Number(c.neto||c.monto)||0;
    var debe  = Number(c.saldo)||0;
    var yaReg = (c.abonos||[]).reduce(function(s,a){ return s+(Number(a.m)||0); },0);
    var falta = monto - debe - yaReg;
    if(falta > 0.5){
      if(!c.abonos) c.abonos=[];
      c.abonos.unshift({ f:(c.fecha||hoy()), m:Math.round(falta),
        q:'Migración', via:'histórico', nota:'Abono ya cobrado antes de conectar el sistema' });
      n++;
    }
    c._histOk = true;
  });
  if(n) await guardar();
  return n;
}
/* Corre junto con la migración, al entrar al programa */
(function(){
  var _m = window.migrarCobrador;
  window.migrarCobrador = async function(){
    var r = await _m.apply(this, arguments);
    completarDesdeFotos();
    var h = await abonosHistoricos();
    if(h) console.log('Abonos históricos registrados: '+h);
    r.historicos = h;
    return r;
  };
})();
</script>
