      '<div class="st"><div class="sv">'+lista.length+'</div><div class="sl2">Total contratos</div></div>'+
      '<div class="st"><div class="sv" style="color:#2E7D32">'+lista.filter(function(c){return c.status==='aprobado';}).length+'</div><div class="sl2">Aprobados</div></div>'+
      '<div class="st"><div class="sv">'+pct+'%</div><div class="sl2">Efectividad</div></div>'+
    '</div>'+
    '<div class="tbl-wrap"><table class="tbl"><thead><tr><th>Zona</th><th class="tr">Contratos</th><th class="tr">Aprobados</th><th class="tr">Efectividad</th><th class="tr">Monto</th><th>Vendedores</th></tr></thead><tbody>'+
    Object.values(zonas).sort(function(a,b){return b.monto-a.monto;}).map(function(z){

        '<td style="font-size:11px">'+[...z.proms].join(', ')+'</td>'+

    }).join('')+'</tbody></table></div>';
  }

// ── canEdit / getEffectivePerms ──────────────────────────────────
// El servidor es quien decide de verdad (ver requirePermiso en
// server.js) — esto solo controla qué se muestra en pantalla.
const getEffectivePerms=function(u){
  u=u||ses;
  if(u&&Array.isArray(u.permisos))return u.permisos;
  return PERMS[u?u.rol:'']||[];
};
const canEdit=function(modId){
  if(!ses)return false;
  return getEffectivePerms(ses).includes(modId);
};

async function guardarPermisos(uid){
  var permisos=[];
  PERM_MODS.forEach(function(sec){sec.mods.forEach(function(mod){

    if(cb&&cb.checked)permisos.push(mod.id);
  });});
  try{await apiFetch('/api/usuarios/'+uid+'/permisos',{method:'PATCH',body:{permisos}});}
  catch(e){alert('No se pudieron guardar los permisos: '+e.message);return;}
  cerrarPermModal();await cargarUsuariosAdmin();
  document.getElementById('main').innerHTML=rUsers();showToast('Permisos guardados ✅');
}

  cerrarPermModal();await cargarUsuariosAdmin();
  document.getElementById('main').innerHTML=rUsers();
}

</script>

async function guardarEdicionCliente(id){

let _bzTabActual='pend';
function bzTab(t){
  _bzTabActual=t;
  ['pend','apro','rech'].forEach(function(x){
    var b=document.getElementById('bz_tab_'+x);
    if(b)b.className='tab'+(x===t?' act':'');

  var pend=contratos.filter(function(c){return c.status==='pendiente';});
  var apro=contratos.filter(function(c){return c.status==='aprobado';});
  var rech=contratos.filter(function(c){return c.status==='rechazado';});

<script>
// ═══════════════════════════════════════════════════════════════════
// KEVA — ASISTENTE IA KERAVEN  v4

var kv={
  open:false, hist:[], voz:false, speaking:false,
  recog:null, listening:false, rate:0.9, selVoice:null,
  cfg:{},   // configuración completa
  _voices:[],
};

var KV_CFG_DEFAULT={
  nombre:'KEVA',
  emoji:'🤖',
  provider:'auto',  // auto = intenta en orden: copilot, gemini, claude, anthropic-nokey
  keys:{ copilot:'', claude:'', gemini:'', chatgpt:'' },
  caracteristicas:'Eres un asistente profesional de KERAVEN Profesional, empresa de productos capilares en República Dominicana. Hablas de manera natural, cálida y directa como un colega de trabajo. Usas datos reales del sistema cuando están disponibles. Eres experto en el sistema KERAVEN y en negocios, ventas, finanzas y recursos humanos.',
  voz:'auto', rate:0.9
};

// ── Persistencia ─────────────────────────────────────────────────
function kvLoadCfg(){
  try{
    var saved=localStorage.getItem('keva_cfg');
    kv.cfg=saved?Object.assign({},KV_CFG_DEFAULT,JSON.parse(saved)):Object.assign({},KV_CFG_DEFAULT);
    var h=localStorage.getItem('keva_hist_'+(typeof ses!=='undefined'&&ses?ses.id:'x'));
    kv.hist=h?JSON.parse(h):[];
  }catch(e){kv.cfg=Object.assign({},KV_CFG_DEFAULT);kv.hist=[];}
}
function kvSaveCfg(){
  try{localStorage.setItem('keva_cfg',JSON.stringify(kv.cfg));}catch(e){}
}
function kvSaveHist(){
  try{var uid=typeof ses!=='undefined'&&ses?ses.id:'x';
    localStorage.setItem('keva_hist_'+uid,JSON.stringify(kv.hist.slice(-60)));}catch(e){}
}

// ── Init ──────────────────────────────────────────────────────────
function kvInit(){
  kvLoadCfg();
  var fab=document.getElementById('kv_fab');
  if(fab&&typeof ses!=='undefined'&&ses)fab.style.display='block';
  var nm=document.getElementById('kv_nm');if(nm)nm.textContent=kv.cfg.nombre;
  var wn=document.getElementById('kv_wname');if(wn)wn.textContent='Hola, soy '+kv.cfg.nombre;
  var av=document.getElementById('kv_avatar');if(av)av.innerHTML=kv.cfg.emoji+'<div style="position:absolute;bottom:1px;right:1px;width:10px;height:10px;background:#00C853;border-radius:50%;border:2px solid #1B2A3B"></div>';
  kvBuildProvStrip();
  kvBuildChips();
  kvDrag();
  if(window.speechSynthesis){
    speechSynthesis.getVoices();
    if(speechSynthesis.onvoiceschanged!==undefined)
      speechSynthesis.onvoiceschanged=function(){kv._voices=speechSynthesis.getVoices();};
    setTimeout(function(){kv._voices=speechSynthesis.getVoices();},800);
  }
}

function kvBuildChips(){
  var chips=document.getElementById('kv_chips');if(!chips)return;
  var sugs=['¿Cuántas ventas este mes?','¿Comisiones pendientes?','Dame un resumen ejecutivo','¿Cómo va el equipo?','Analiza la cartera','Ayúdame con el sistema'];
  chips.innerHTML=sugs.map(function(s){
    return'<button onclick="kvSend(\''+s+'\')" style="padding:6px 13px;background:rgba(0,120,212,.08);border:1px solid rgba(0,120,212,.18);border-radius:20px;font-size:11px;color:#0078D4;cursor:pointer;font-family:inherit;transition:all .15s" onmouseover="this.style.background=\'rgba(0,120,212,.15)\'" onmouseout="this.style.background=\'rgba(0,120,212,.08)\'">'+s+'</button>';
  }).join('');
}

function kvBuildProvStrip(){
  var strip=document.getElementById('kv_pstrip');if(!strip)return;
  var provs=[
    {id:'copilot',label:'Copilot',icon:'🪟',color:'#0078D4',hasKey:!!kv.cfg.keys.copilot},
    {id:'gemini', label:'Gemini', icon:'✦',  color:'#0F9D58',hasKey:!!kv.cfg.keys.gemini},
    {id:'claude', label:'Claude', icon:'⚡',  color:'#D97706',hasKey:!!kv.cfg.keys.claude},
    {id:'chatgpt',label:'ChatGPT',icon:'🧠', color:'#10A37F',hasKey:!!kv.cfg.keys.chatgpt},
  ];
  var cur=kv.cfg.provider;
  strip.innerHTML='<span style="font-size:9px;font-weight:700;color:#6B7AAD;letter-spacing:.08em;text-transform:uppercase;white-space:nowrap;margin-right:4px">IA:</span>'+
    provs.map(function(p){
      var act=(cur===p.id)||(cur==='auto'&&p.hasKey);
      return'<button onclick="kv.cfg.provider=\''+p.id+'\';kvSaveCfg();kvBuildProvStrip()" style="padding:4px 10px;border-radius:100px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;border:1.5px solid;transition:all .2s;background:'+(p.hasKey?(act?p.color:'transparent'):'transparent')+';color:'+(p.hasKey?(act?'#fff':p.color):'#ccc')+';border-color:'+(p.hasKey?p.color+'44':'#eee')+';opacity:'+(p.hasKey?'1':'.5')+'">'+p.icon+' '+p.label+(p.hasKey&&act?'<span class="kv_primary_badge">✓</span>':'')+'</button>';
    }).join('');
}

// ── Panel toggle / drag ───────────────────────────────────────────
function kvToggle(){
  kv.open=!kv.open;
  var p=document.getElementById('kv_panel');if(!p)return;
  if(kv.open){p.style.visibility='visible';p.style.pointerEvents='all';p.style.transform='scale(1) translateY(0)';setTimeout(function(){var i=document.getElementById('kv_inp');if(i)i.focus();},200);}
  else{p.style.transform='scale(.94) translateY(14px)';setTimeout(function(){p.style.visibility='hidden';p.style.pointerEvents='none';},200);}
}
function kvClose(){kv.open=false;kvToggle();}

function kvDrag(){
  var hdr=document.getElementById('kv_hdr'),fab=document.getElementById('kv_fab');
  if(!hdr||!fab)return;
  var sx=0,sy=0;
  hdr.addEventListener('mousedown',function(e){
    if(e.target.tagName==='BUTTON')return;
    sx=e.clientX-fab.offsetLeft;sy=e.clientY-fab.offsetTop;
    function mv(e){fab.style.right='auto';fab.style.bottom='auto';fab.style.left=(e.clientX-sx)+'px';fab.style.top=(e.clientY-sy)+'px';}
    function up(){document.removeEventListener('mousemove',mv);document.removeEventListener('mouseup',up);}
    document.addEventListener('mousemove',mv);document.addEventListener('mouseup',up);
  });
}

// ── System prompt ─────────────────────────────────────────────────
function kvBuildPrompt(){
  var dat='';
  try{
    var mes=new Date().toISOString().slice(0,7);
    var fc=typeof contratos!=='undefined'?contratos.filter(function(c){return c.fecha&&c.fecha.startsWith(mes);}):[];
    var ap=fc.filter(function(c){return c.status==='aprobado';});
    dat='Fecha actual: '+new Date().toLocaleDateString('es-DO',{weekday:'long',year:'numeric',month:'long',day:'numeric'})+'. '+
      'Usuario: '+(typeof ses!=='undefined'&&ses?ses.n+' ('+rolLabel(ses.rol)+')':'Sistema')+'. '+
      'Contratos este mes: '+fc.length+', aprobados: '+ap.length+
      ', monto: RD$'+ap.reduce(function(s,c){return s+Number(c.monto||0);},0).toLocaleString('es-DO')+
      ', clientes únicos: '+(new Set(fc.map(function(c){return c.cedula;}))).size+
      ', empleados activos: '+(typeof empleados!=='undefined'?empleados.filter(function(e){return e.activo;}).length:0)+'.';
  }catch(e){}
  return kv.cfg.caracteristicas+
    '\n\n## DATOS EN TIEMPO REAL DEL SISTEMA KERAVEN\n'+dat+
    '\n\n## MÓDULOS KERAVEN MAESTRO\nContratos de venta (facturación con GPS y fotos), Buzón de aprobación, '+
    'Ruta de cobro, Almacén Principal y Móvil, Arqueo, Comisiones (contado=16% crédito=8% pago día 5), '+
    'Nómina (AFP=2.87% SFS=3.04%), CRM, CxC, CxP, Rendimiento, Clientes, Portal de Pedidos.'+
    '\n\n## PRODUCTOS KERAVEN\nMascarilla/Shampoo 10oz Duo Kit: RD$450 | 32oz/8oz individuales: RD$900 | '+
    'Cirugía Capilar: RD$1,700 | Línea de Rizo: RD$2,700 | Línea Curativa: RD$4,900 | Línea Golden Black: RD$5,300.'+
    '\n\nResponde en español natural y fluido, como un colega de trabajo inteligente. Sé conciso pero completo. '+
    'Cuando tengas datos reales del sistema, úsalos. Usa un tono cálido y profesional.';
}

// ── API Calls ─────────────────────────────────────────────────────
async function kvCallAI(msgs){
  var sys=kvBuildPrompt();
  var errors=[];

  // Determinar orden de proveedores según configuración
  var order=[];
  if(kv.cfg.provider==='auto'){
    if(kv.cfg.keys.copilot)order.push('copilot');
    if(kv.cfg.keys.chatgpt)order.push('chatgpt');
    if(kv.cfg.keys.gemini)order.push('gemini');
    if(kv.cfg.keys.claude)order.push('claude');
    order.push('_nokey'); // último recurso
  } else {
    order=[kv.cfg.provider,'_nokey'];
  }

  for(var i=0;i<order.length;i++){
    try{
      var p=order[i];
      if(p==='copilot'&&kv.cfg.keys.copilot)return await kvCallOpenAI(msgs,sys,kv.cfg.keys.copilot,'gpt-4o-mini');
      if(p==='chatgpt'&&kv.cfg.keys.chatgpt)return await kvCallOpenAI(msgs,sys,kv.cfg.keys.chatgpt,'gpt-4o');
      if(p==='gemini'&&kv.cfg.keys.gemini)return await kvCallGemini(msgs,sys,kv.cfg.keys.gemini);
      if(p==='claude'&&kv.cfg.keys.claude)return await kvCallClaude(msgs,sys,kv.cfg.keys.claude);
      if(p==='_nokey')return await kvCallNoKey(msgs,sys);
    }catch(e){errors.push(order[i]+':'+e.message);}
  }
  throw new Error('NO_PROVIDER|'+errors.join(' | '));
}

async function kvFetch(url,opts,timeout){
  var ctrl=new AbortController(),t=setTimeout(function(){ctrl.abort();},timeout||14000);
  try{var r=await fetch(url,Object.assign({signal:ctrl.signal},opts));clearTimeout(t);return r;}
  catch(e){clearTimeout(t);throw e;}
}

async function kvCallOpenAI(msgs,sys,key,model){
  var r=await kvFetch('https://api.openai.com/v1/chat/completions',{
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},
    body:JSON.stringify({model:model||'gpt-4o-mini',messages:[{role:'system',content:sys}].concat(msgs),max_tokens:800,temperature:0.8})
  });
  if(!r.ok){var e=await r.json();throw new Error((e.error&&e.error.message)||r.status);}
  var d=await r.json();return d.choices[0].message.content;
}

async function kvCallGemini(msgs,sys,key){
  var parts=[{text:sys+'\n\n'}];
  msgs.forEach(function(m){parts.push({text:(m.role==='user'?'User: ':'Assistant: ')+m.content+'\n'});});
  var r=await kvFetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key='+key,{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({contents:[{role:'user',parts:parts}],generationConfig:{maxOutputTokens:800,temperature:0.8}})
  });
  if(!r.ok){var e2=await r.json();throw new Error((e2.error&&e2.error.message)||r.status);}
  var d2=await r.json();return d2.candidates[0].content.parts[0].text;
}

async function kvCallClaude(msgs,sys,key){
  var r=await kvFetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01'},

async function kvSend(txt){
  var inp=document.getElementById('kv_inp');
  var texto=(txt||(inp?inp.value:'')||'').trim();
  if(!texto)return;
  if(inp)inp.value='';

  var st=document.getElementById('kv_st');

  if(kv.hist.length>50)kv.hist=kv.hist.slice(-50);
  kvShowTyping();
  if(st)st.innerHTML='<span style="width:6px;height:6px;background:#FFB300;border-radius:50%;display:inline-block"></span> Pensando...';

  try{

    if(st)st.innerHTML='<span style="width:6px;height:6px;background:#00C853;border-radius:50%;display:inline-block"></span> En línea · '+kv.cfg.nombre;
  }catch(e){

  }
}

// ── Voz ───────────────────────────────────────────────────────────
function kvSpeak(text){
  if(!window.speechSynthesis)return;
  speechSynthesis.cancel();
  var clean=text.replace(/<[^>]+>/g,' ').replace(/\*\*(.*?)\*\*/g,'$1').replace(/\*(.*?)\*/g,'$1').replace(/`[^`]+`/g,' ').replace(/\s+/g,' ').trim();
  var sentences=clean.match(/[^.!?]+[.!?]*/g)||[clean];
  var voice=kvGetVoice();
  var idx=0;
  kv.speaking=true;
  var sw=document.getElementById('kv_stopbar');if(sw)sw.style.display='block';

  function next(){
    if(idx>=sentences.length){kv.speaking=false;if(sw)sw.style.display='none';kvSetVozBtn();return;}
    var utt=new SpeechSynthesisUtterance(sentences[idx].trim());
    utt.lang='es-DO';utt.rate=kv.cfg.rate||0.9;utt.pitch=1.0+(idx%3===0?.04:idx%3===1?0:-.03);utt.volume=1;
    if(voice)utt.voice=voice;
    utt.onend=utt.onerror=function(){idx++;next();};
    speechSynthesis.speak(utt);idx++;
  }
  // Chrome pause fix
  var ping=setInterval(function(){if(!kv.speaking){clearInterval(ping);return;}if(speechSynthesis.paused)speechSynthesis.resume();},10000);
  next();
}
function kvGetVoice(){
  if(!window.speechSynthesis)return null;
  var voices=speechSynthesis.getVoices();if(!voices.length)return null;
  if(kv.cfg.voz&&kv.cfg.voz!=='auto'){var sv=voices.find(function(v){return v.name===kv.cfg.voz;});if(sv)return sv;}
  return voices.find(function(v){return v.lang.startsWith('es')&&(v.name.toLowerCase().includes('neural')||v.name.toLowerCase().includes('google')||v.name.toLowerCase().includes('natural'));})||
    voices.find(function(v){return v.lang.startsWith('es');})||voices[0];
}
function kvStopVoz(){if(window.speechSynthesis)speechSynthesis.cancel();kv.speaking=false;var s=document.getElementById('kv_stopbar');if(s)s.style.display='none';kvSetVozBtn();}
function kvToggleVoz(){kv.voz=!kv.voz;try{localStorage.setItem('keva_voz',kv.voz?'1':'0');}catch(e){}if(!kv.voz)kvStopVoz();kvSetVozBtn();}
function kvSetVozBtn(){var b=document.getElementById('kv_vbtn');if(!b)return;b.textContent=kv.voz?'🔊':'🔇';b.style.background=kv.voz?'rgba(255,255,255,.85)':'rgba(255,255,255,.1)';b.style.color=kv.voz?'#0078D4':'#fff';}
function kvReplay(btn){var text=btn.getAttribute('data-text');if(text)kvSpeak(text);}

// ── Micrófono ─────────────────────────────────────────────────────
function kvMic(){
  if(kv.listening){kvStopMic();return;}
  var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){kvAddBubble('a','⚠️ Tu navegador no soporta micrófono. Usa Chrome o Edge.');return;}
  kv.recog=new SR();kv.recog.lang='es-DO';kv.recog.continuous=false;kv.recog.interimResults=true;
  kv.listening=true;
  var btn=document.getElementById('kv_mic');if(btn){btn.style.background='#FF3B30';btn.style.color='#fff';btn.textContent='🔴';}
  var inp=document.getElementById('kv_inp');if(inp)inp.placeholder='Escuchando... habla ahora';
  kv.recog.onresult=function(e){var t=Array.from(e.results).map(function(r){return r[0].transcript;}).join('');if(inp)inp.value=t;if(e.results[0].isFinal){kvStopMic();setTimeout(kvSend,100);}};
  kv.recog.onerror=kv.recog.onend=function(){kvStopMic();};
  try{kv.recog.start();}catch(e){kvStopMic();}
}
function kvStopMic(){
  kv.listening=false;if(kv.recog){try{kv.recog.stop();}catch(e){}}
  var btn=document.getElementById('kv_mic');if(btn){btn.style.background='rgba(0,94,184,.08)';btn.style.color='';btn.textContent='🎤';}
  var inp=document.getElementById('kv_inp');if(inp)inp.placeholder='Escribe o usa el micrófono...';
}

function kvTestVoz(){
  var vName=document.getElementById('kvc_voz')?.value;
  var rate=parseFloat(document.getElementById('kvc_rate')?.value||'0.9');
  var voices=speechSynthesis.getVoices();
  var voice=vName&&vName!=='auto'?voices.find(function(v){return v.name===vName;}):null;
  if(!voice)voice=voices.find(function(v){return v.lang.startsWith('es');})||voices[0];
  speechSynthesis&&speechSynthesis.cancel();
  var utt=new SpeechSynthesisUtterance('Hola, soy '+kv.cfg.nombre+'. Estoy lista para ayudarte con KERAVEN y todo lo que necesites.');
  utt.lang='es-DO';utt.rate=rate;utt.pitch=1.0;utt.volume=1.0;if(voice)utt.voice=voice;
  speechSynthesis&&speechSynthesis.speak(utt);
}

        '<td><div style="background:#eee;border-radius:3px;height:6px;width:60px;overflow:hidden;display:inline-block;vertical-align:middle">'+
          '<div style="background:var(--green);height:100%;width:'+pct+'%"></div></div>'+
          '<span style="font-size:10px;margin-left:4px;font-weight:600;color:'+(pct>=100?'var(--green)':'var(--er)')+'">'+pct+'%</span></td>'+

      '<td class="tr">'+fM(apro.reduce(function(s,c){return s+Number(c.neto||c.monto||0);},0))+'</td>'+
      '<td class="tr" style="color:var(--green)">'+fM(cobrado)+'</td>'+
      '<td class="tr" style="font-weight:900;font-size:14px;color:var(--er)">'+fM(totalCxC)+'</td>'+
      '<td></td>'+
    '</tr></tfoot></table></div>'+
  '</div>';
}

// ── DELFAC ───────────────────────────────────────────────────────
var _delFacId=null,_delPinIntento=0;
function rDelFac(){
  if(!ses||ses.rol!=='gerente')return'<div class="card" style="text-align:center;padding:48px"><div style="font-size:48px">🔒</div><div style="font-size:18px;font-weight:700;color:var(--er);margin-top:12px">Solo el Gerente General puede eliminar facturas.</div></div>';
  setTimeout(function(){delFacRender();},50);
  return'<div class="card">'+
    '<div class="ct"><i class="ti ti-trash" style="color:#C62828;font-size:18px"></i>Eliminar Factura'+
      '<span class="pill" style="margin-left:auto;background:#FFEBEE;border-color:#C62828;color:#7F0000">🔒 Restringido</span>'+
    '</div>'+
    '<div style="background:#FFEBEE;border:1.5px solid #C62828;border-radius:10px;padding:12px 15px;margin-bottom:14px;display:flex;gap:10px">'+
      '<span style="font-size:22px">⚠️</span>'+
      '<div><b style="color:#7F0000">Zona de peligro — acción irreversible</b><br><span style="font-size:12px;color:#B71C1C">Se requiere PIN para cada eliminación.</span></div>'+
    '</div>'+
    '<div style="position:relative;margin-bottom:12px">'+
      '<i class="ti ti-search" style="position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--t3)"></i>'+
      '<input id="del_q" placeholder="Buscar factura, cliente, cédula..." style="width:100%;padding:9px 10px 9px 34px;border:1.5px solid rgba(198,40,40,.3);border-radius:8px;font-family:inherit;font-size:13px" oninput="delFacRender()">'+
    '</div>'+
    '<div id="del_list"></div>'+
    '<div id="del_pin_modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;align-items:center;justify-content:center">'+
      '<div style="background:#fff;border:2px solid #C62828;border-radius:20px;padding:28px 24px;width:90%;max-width:360px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.3)">'+
        '<div style="font-size:44px;margin-bottom:10px">🔐</div>'+
        '<div style="font-size:16px;font-weight:800;color:#7F0000;margin-bottom:5px">Confirmar eliminación</div>'+
        '<div id="del_pin_info" style="font-size:12px;color:#555;margin-bottom:16px;line-height:1.5"></div>'+
        '<div style="display:flex;gap:10px;justify-content:center;margin-bottom:16px">'+
          [0,1,2,3].map(function(i){return'<input class="pin-d" maxlength="1" type="password" inputmode="numeric" id="dp'+i+'" oninput="delPinNav('+i+')" style="width:50px;height:58px;font-size:24px;text-align:center;border:2px solid rgba(198,40,40,.3);border-radius:10px;background:#FFF8F8">';}).join('')+
        '</div>'+
        '<div id="del_pin_err" style="color:#C62828;font-size:12px;min-height:16px;margin-bottom:10px;font-weight:600"></div>'+
        '<div style="display:flex;gap:8px;justify-content:center">'+
          '<button class="bs" onclick="delPinCerrar()">Cancelar</button>'+
          '<button style="padding:9px 22px;background:linear-gradient(135deg,#C62828,#7F0000);color:#fff;border:none;border-radius:8px;font-weight:700;cursor:pointer;font-family:inherit;font-size:13px" onclick="delPinConfirm()">🗑️ Eliminar</button>'+
        '</div>'+
      '</div>'+
    '</div>'+
  '</div>';
}
function delFacRender(){
  var cont=document.getElementById('del_list');if(!cont)return;
  var q=(document.getElementById('del_q')?.value||'').toLowerCase();
  var lista=contratos.filter(function(c){return!q||(c.fac||'').toLowerCase().includes(q)||(c.cliente||'').toLowerCase().includes(q)||(c.cedula||'').includes(q);}).slice().reverse();
  if(!lista.length){cont.innerHTML='<div class="empty"><i class="ti ti-file-invoice"></i><p>Sin facturas encontradas</p></div>';return;}
  cont.innerHTML='<div class="tbl-wrap"><table class="tbl"><thead><tr><th>Factura</th><th>Fecha</th><th>Cliente</th><th>Cédula</th><th>Promotor</th><th class="tr">Monto</th><th>Estado</th><th>Acción</th></tr></thead><tbody>'+
  lista.map(function(c){
    return'<tr><td style="font-weight:700;color:var(--gold)">'+c.fac+'</td><td style="font-size:11px">'+fD(c.fecha)+'</td><td style="font-weight:600">'+c.cliente+'</td><td style="font-size:11px">'+c.cedula+'</td><td style="font-size:11px">'+(c.promotor||'—')+'</td><td class="tr" style="font-weight:700">'+fM(c.monto)+'</td>'+
    '<td><span style="padding:2px 9px;border-radius:100px;font-size:10px;font-weight:700;color:#fff;background:'+(c.status==='aprobado'?'#2E7D32':c.status==='rechazado'?'#C62828':'#E65100')+'">'+c.status+'</span></td>'+
    '<td><button style="padding:5px 13px;background:linear-gradient(135deg,#C62828,#7F0000);color:#fff;border:none;border-radius:7px;cursor:pointer;font-size:11px;font-weight:700;font-family:inherit" onclick="delFacIniciar('+c.id+')">🗑️</button></td></tr>';
  }).join('')+'</tbody></table></div><div style="text-align:center;padding:8px;font-size:11px;color:var(--t3)">'+lista.length+' factura(s)</div>';
}
function delFacIniciar(id){
  var c=contratos.find(function(x){return x.id===id;});if(!c)return;
  _delFacId=id;_delPinIntento=0;
  var info=document.getElementById('del_pin_info');if(info)info.innerHTML='<b style="color:#7F0000">'+c.fac+'</b><br>'+c.cliente+' · '+fD(c.fecha)+'<br><span style="color:#C62828">'+fM(c.monto)+'</span>';
  [0,1,2,3].forEach(function(i){var el=document.getElementById('dp'+i);if(el)el.value='';});
  var err=document.getElementById('del_pin_err');if(err)err.textContent='';
  var modal=document.getElementById('del_pin_modal');if(modal)modal.style.display='flex';
  setTimeout(function(){var d=document.getElementById('dp0');if(d)d.focus();},100);
}
function delPinNav(i){var el=document.getElementById('dp'+i);if(el&&el.value&&i<3)document.getElementById('dp'+(i+1)).focus();}
function delPinCerrar(){_delFacId=null;var m=document.getElementById('del_pin_modal');if(m)m.style.display='none';}
async function delPinConfirm(){
  var pin=[0,1,2,3].map(function(i){var el=document.getElementById('dp'+i);return el?el.value:'';}).join('');
  var err=document.getElementById('del_pin_err');
  var ok=false;
  try{await apiFetch('/api/verificar-pin',{method:'POST',body:{pin}});ok=true;}catch(e){ok=false;}
  if(!ok){
    _delPinIntento++;
    if(err)err.textContent='❌ PIN incorrecto (intento '+_delPinIntento+')';
    [0,1,2,3].forEach(function(i){var el=document.getElementById('dp'+i);if(el)el.value='';});
    var d0=document.getElementById('dp0');if(d0)d0.focus();
    if(_delPinIntento>=3){delPinCerrar();showToast('Demasiados intentos','err');}
    return;
  }
  if(!_delFacId){delPinCerrar();return;}
  var c=contratos.find(function(x){return x.id===_delFacId;}),facN=c?c.fac:'';
  contratos=contratos.filter(function(x){return x.id!==_delFacId;});

function CB_decode(s){
  var bin=atob(s), b=new Uint8Array(bin.length);
  for(var i=0;i<bin.length;i++) b[i]=bin.charCodeAt(i);
  return new TextDecoder('utf-8').decode(b);
}

function CB_cargar(){
  try { CB_clientes = JSON.parse(localStorage.getItem("cobrador_clientes")) || null; } catch(e){ CB_clientes = null; }
  if (!CB_clientes) { CB_clientes = CB_DATOS_INICIALES; CB_guardar(); }
  CB_ordenar();
  document.getElementById("cb-plantilla").value = localStorage.getItem("cobrador_plantilla") || PLANTILLA_DEFECTO;
  document.getElementById("cb-clave-api").value = localStorage.getItem("cobrador_api") || "";
}
function CB_ordenar(){
  // Siempre de MAYOR a MENOR por No. de factura
  CB_clientes.sort((a,b)=>{
    const x = parseInt(a.no,10), y = parseInt(b.no,10);
    const xn = !isNaN(x), yn = !isNaN(y);
    if (xn && yn && x!==y) return y - x;              // descendente
    if (xn && !yn) return -1;                          // los numéricos primero
    if (!xn && yn) return 1;
    return String(b.no||"").localeCompare(String(a.no||""), 'es', {numeric:true});
  });
}
function CB_guardar(){ CB_ordenar(); localStorage.setItem("cobrador_clientes", JSON.stringify(CB_clientes)); }
function CB_guardarPlantilla(){ localStorage.setItem("cobrador_plantilla", document.getElementById("cb-plantilla").value); }

// ------------------- Utilidades -------------------
function CB_hoyISO(){ return new Date().toISOString().slice(0,10); }
function CB_diasAtraso(c){ if (!c.limite) return 0; const ms = new Date(CB_hoyISO()) - new Date(c.limite); return Math.max(0, Math.round(ms/86400000)); }
function CB_estadoDe(c){ if (c.saldo <= 0) return "pagado"; return CB_diasAtraso(c) > 0 ? "vencido" : "aldia"; }
function CB_categoriaPago(c){
  if (c.saldo <= 0) return "pagados";
  if (c.saldo < c.monto) return "abonados";
  return "morosos";
}
function CB_fmt(n){ return Number(n||0).toLocaleString("en-US"); }
function CB_fechaBonita(iso){ if(!iso) return "—"; const [a,m,d]=String(iso).split("-"); return d?`${d}/${m}/${a}`:iso; }

// ------------------- Pestañas -------------------
function CB_mostrarTab(cual){
  if(!document.getElementById('cb-sec-clientes')) return;

  ["clientes","cargar","programar","reportes"].forEach(t=>{
    document.getElementById("cb-sec-"+t).classList.toggle("oculto", t!==cual);
    document.getElementById("cb-tab-"+t).classList.toggle("activa", t===cual);
  });
  if (cual==="reportes") CB_verReporte(CB_reporteActual);
  if (cual==="programar") CB_pintarProgramar();
}

// ------------------- Cobro por WhatsApp -------------------
function CB_mensajePara(c){
  const dias = CB_diasAtraso(c);
  let msj = document.getElementById("cb-plantilla").value
    .replaceAll("{nombre}", c.nombre.split(" ")[0])
    .replaceAll("{contrato}", c.no)
    .replaceAll("{saldo}", CB_fmt(c.saldo))
    .replaceAll("{dias}", dias)
    .replaceAll("{limite}", CB_fechaBonita(c.limite));
  if (dias > 30) msj += " ⚠️ IMPORTANTE: según el contrato firmado, la deuda vencida genera un recargo del 2% mensual y el precio puede ajustarse a RD$6,500. Evite cargos adicionales pagando hoy.";
  return msj;
}
function CB_telWa(t){
  const limpio = String(t||"").replace(/\D/g,"");
  if (limpio.length === 10) return "1" + limpio;
  if (limpio.length === 11 && limpio.startsWith("1")) return limpio;
  return limpio;
}
function CB_cobrar(i){
  const c = CB_clientes[i];
  if (!c.tel) { alert("Este cliente no tiene teléfono."); return; }
  window.open("https://wa.me/" + CB_telWa(c.tel) + "?text=" + encodeURIComponent(CB_mensajePara(c)), "_blank");
  c.ultimoCobro = CB_hoyISO();
  CB_guardar(); CB_pintar();
}
function CB_cobrarTodos(){
  CB_colaEnvio = CB_clientes.map((c,i)=>({c,i})).filter(x => CB_estadoDe(x.c)==="vencido" && x.c.tel);
  if (!CB_colaEnvio.length) { alert("No hay CB_clientes vencidos con teléfono."); return; }
  if (confirm(`Se enviará el cobro a ${CB_colaEnvio.length} CB_clientes vencidos, uno por uno.\n\nSe abrirá WhatsApp con cada mensaje listo: presiona ENVIAR y vuelve aquí para el siguiente.\n\n¿Comenzamos?`)) CB_siguienteEnvio();
}
function CB_siguienteEnvio(){
  const prog = document.getElementById("cb-progreso-envio");
  if (!CB_colaEnvio.length){ prog.innerHTML = "✅ ¡Cobros enviados!"; setTimeout(()=>prog.innerHTML="",4000); return; }
  const {i} = CB_colaEnvio.shift();
  CB_cobrar(i);
  prog.innerHTML = `Enviando... faltan ${CB_colaEnvio.length}. <button class="principal btn-mini" onclick="CB_siguienteEnvio()">Siguiente ➡️</button>`;
}
function CB_registrarAbono(i){
  const c = CB_clientes[i];
  const monto = parseFloat(prompt(`Abono de ${c.nombre}\nSaldo actual: RD$${CB_fmt(c.saldo)}\n\n¿Cuánto abonó?`));
  if (!monto || monto<=0) return;
  c.saldo = Math.max(0, c.saldo - monto);
  c.notas = (c.notas?c.notas+" | ":"") + `Abonó ${CB_fmt(monto)} el ${CB_fechaBonita(CB_hoyISO())}`;
  CB_guardar(); CB_pintar();
  if (c.saldo===0) alert(`🎉 ${c.nombre} quedó SALDADA.`);
}

function CB_log(t){

 const el = document.getElementById("cb-log-carga"); el.textContent += "\n" + t; el.scrollTop = el.scrollHeight; }
function CB_mergeClientes(nuevos){
  let agregados=0, duplicados=0;
  nuevos.forEach(n=>{
    if (!n || !n.nombre) return;
    n.no = String(n.no||"").trim();
    n.monto = parseFloat(n.monto)||0;
    n.saldo = (n.saldo===undefined || n.saldo===null || n.saldo==="") ? n.monto : (parseFloat(n.saldo)||0);
    if (n.no && CB_clientes.some(c=>String(c.no)===n.no)) { duplicados++; return; }
    CB_clientes.push({no:n.no, nombre:n.nombre, tel:String(n.tel||"").replace(/\D/g,""), tel2:String(n.tel2||"").replace(/\D/g,""),
      monto:n.monto, saldo:n.saldo, limite:n.limite||"", promesa:n.promesa||"", notas:n.notas||""});
    agregados++;
  });
  CB_guardar(); CB_pintar();
  return {agregados, duplicados};
}

// Opción 1: leer fotos con la API de Claude
async function CB_leerFotos(){
  const clave = localStorage.getItem("cobrador_api");
  const archivos = document.getElementById("cb-fotos").files;
  if (!clave){ alert("Pega primero tu clave de API (sk-ant-...)."); return; }
  if (!archivos.length){ alert("Selecciona al menos una foto."); return; }
  document.getElementById("cb-log-carga").textContent = `Procesando ${archivos.length} foto(s)...`;
  let total = {agregados:0, duplicados:0, errores:0};
  for (let k=0; k<archivos.length; k++){
    try {
      CB_log(`📷 Foto ${k+1}/${archivos.length}: ${archivos[k].name} — leyendo...`);
      const b64 = await CB_redimensionar(archivos[k]);
      const datos = await CB_extraerConIA(clave, b64);
      const r = CB_mergeClientes(Array.isArray(datos)?datos:[datos]);
      total.agregados += r.agregados; total.duplicados += r.duplicados;
      CB_log(`   ✅ ${r.agregados} agregado(s), ${r.duplicados} duplicado(s) omitido(s).`);
    } catch(e){
      total.errores++;
      CB_log(`   ❌ Error: ${e.message}`);
    }
  }
  CB_log(`\n===== RESULTADO: ${total.agregados} clientes nuevos, ${total.duplicados} duplicados, ${total.errores} errores =====`);
  CB_log(`Revisa en la pestaña Clientes los que digan REVISAR.`);
}
function CB_redimensionar(archivo){
  return new Promise((ok, mal)=>{
    const img = new Image();
    img.onload = ()=>{
      const MAX = 1400;
      let w = img.width, h = img.height;
      if (Math.max(w,h) > MAX){ const f = MAX/Math.max(w,h); w=Math.round(w*f); h=Math.round(h*f); }
      const cv = document.createElement("canvas"); cv.width=w; cv.height=h;
      cv.getContext("2d").drawImage(img,0,0,w,h);
      ok(cv.toDataURL("image/jpeg",0.85).split(",")[1]);
    };
    img.onerror = ()=>mal(new Error("No se pudo leer la imagen"));
    img.src = URL.createObjectURL(archivo);
  });
}
async function CB_extraerConIA(clave, b64){
  const respuesta = await fetch("https://api.anthropic.com/v1/messages", {
    method:"POST",
    headers:{
      "content-type":"application/json",
      "x-api-key": clave,
      "anthropic-version":"2023-06-01",
      "anthropic-dangerous-direct-browser-access":"true"
    },
    body: JSON.stringify({
      model:"claude-sonnet-5",
      max_tokens:1200,
      messages:[{role:"user", content:[
        {type:"image", source:{type:"base64", media_type:"image/jpeg", data:b64}},
        {type:"text", text:
`Esta es la foto de un CONTRATO DE VENTA A CRÉDITO de Keraven Profesional (República Dominicana), llenado a mano.
Extrae los datos y responde SOLO con un JSON (sin explicaciones, sin markdown) con esta forma exacta:
{"no":"número de contrato (rojo, arriba)","nombre":"nombre del cliente","tel":"teléfono1 solo dígitos","tel2":"teléfono2 solo dígitos o vacío","monto":4900,"saldo":4900,"limite":"AAAA-MM-DD","promesa":"AAAA-MM-DD o vacío","notas":"cédula, dirección, lugar de trabajo, anotaciones a mano (abonos, acuerdos), y la palabra REVISAR en los datos dudosos"}
Reglas: monto = valor total de la venta. saldo = monto menos abonos anotados a mano (si no hay abonos, saldo = monto). limite = fecha límite de pago. promesa = fecha de promesa/acuerdo anotada a mano si existe. Si algo no se lee, déjalo vacío y menciónalo en notas con REVISAR.`}
      ]}]
    })
  });
  if (!respuesta.ok){
    const err = await respuesta.json().catch(()=>({}));
    throw new Error(err.error?.message || ("HTTP " + respuesta.status));
  }
  const dato = await respuesta.json();
  let texto = (dato.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("");
  const ini = texto.indexOf("{"), fin = texto.lastIndexOf("}");
  if (ini<0) throw new Error("La IA no devolvió datos");
  return JSON.parse(texto.slice(ini, fin+1));
}

// Opción 2: importar lote JSON/CSV
function CB_importarLote(ev){
  const f = ev.target.files[0]; if(!f) return;
  const r = new FileReader();
  r.onload = () => {
    try{
      let nuevos;
      if (f.name.toLowerCase().endsWith(".json")) nuevos = JSON.parse(r.result);
      else nuevos = CB_csvAClientes(r.result);
      const res = CB_mergeClientes(nuevos);
      alert(`Lote importado: ${res.agregados} clientes nuevos, ${res.duplicados} duplicados omitidos.`);
    }catch(e){ alert("No se pudo leer el lote: " + e.message); }
    ev.target.value = "";
  };
  r.readAsText(f, "utf-8");
}
function CB_csvAClientes(texto){
  const lineas = texto.replace(/^﻿/,"").split(/\r?\n/).filter(l=>l.trim());
  const parse = l => (l.match(/("([^"]*)"|[^,]+)(?=,|$)/g)||[]).map(x=>x.replace(/^"|"$/g,"").trim());
  const cab = parse(lineas[0]).map(x=>x.toLowerCase());
  const idx = n => cab.findIndex(c=>c.includes(n));
  const iNo=idx("no"), iNom=idx("cliente")>=0?idx("cliente"):idx("nombre"), iTel=idx("tel"), iMonto=idx("monto"), iSaldo=idx("saldo"), iLim=idx("límite")>=0?idx("límite"):idx("limite"), iNot=idx("nota");
  return lineas.slice(1).map(l=>{
    const c = parse(l);
    const fecha = (c[iLim]||"").includes("/") ? c[iLim].split("/").reverse().join("-") : (c[iLim]||"");
    return {no:c[iNo], nombre:c[iNom], tel:c[iTel], monto:c[iMonto], saldo:iSaldo>=0?c[iSaldo]:undefined, limite:fecha, notas:iNot>=0?c[iNot]:""};
  });
}

function CB_sonar(){
  try{
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    [0,.7,1.4].forEach(t=>{
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination); o.frequency.value = 880;
      g.gain.setValueAtTime(.25, ctx.currentTime + t);
      o.start(ctx.currentTime + t); o.stop(ctx.currentTime + t + .45);
    });
  }catch(e){}
}

function CB_pintar(){
  if(!document.getElementById('cb-cuerpo')) return;

  const filtro = document.getElementById("cb-filtro").value;
  const q = document.getElementById("cb-buscar").value.toLowerCase();
  const cuerpo = document.getElementById("cb-cuerpo");
  cuerpo.innerHTML = "";
  let pendiente=0, vencidos=0, promesasHoy=0, pagados=0, facturado=0;
  CB_clientes.forEach((c,i)=>{
    const est = CB_estadoDe(c);
    facturado += c.monto;
    if (est!=="pagado") pendiente += c.saldo;
    if (est==="vencido") vencidos++;
    if (est==="pagado") pagados++;
    if (c.promesa === CB_hoyISO() && est!=="pagado") promesasHoy++;
    const pasa =
      (filtro==="todos") ||
      (filtro==="vencidos" && est==="vencido") ||
      (filtro==="promesas" && c.promesa===CB_hoyISO() && est!=="pagado") ||
      (filtro==="pagados" && est==="pagado");
    const coincide = !q || c.nombre.toLowerCase().includes(q) || String(c.no).includes(q);
    if (!pasa || !coincide) return;
    const dias = CB_diasAtraso(c);
    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td>${c.no}</td>
      <td><b>${c.nombre}</b></td>
      <td>${c.tel||"—"}${c.tel2?"<br>"+c.tel2:""}</td>
      <td>${CB_fmt(c.monto)}</td>
      <td class="rojo"><b>${c.saldo>0? CB_fmt(c.saldo) : "0 ✅"}</b></td>
      <td>${CB_fechaBonita(c.limite)}</td>
      <td>${dias>0? dias+" días":"—"}</td>
      <td class="estado-${est}">${est==="aldia"?"AL DÍA":est.toUpperCase()}</td>
      <td>${c.promesa? (c.promesa===CB_hoyISO()? "<span class='chip'>📅 HOY</span>" : CB_fechaBonita(c.promesa)) : "—"}</td>
      <td style="max-width:220px">${c.notas||""}${c.ultimoCobro?`<br><span class='chip'>último cobro: ${CB_fechaBonita(c.ultimoCobro)}</span>`:""}</td>
      <td style="white-space:nowrap">
        <button class="principal btn-mini" onclick="CB_cobrar(${i})">📲 Cobrar</button>
        <button class="btn-mini" onclick="CB_registrarAbono(${i})">💵 Abono</button>
        <button class="btn-mini" onclick="CB_abrirEdicion(${i})">✏️</button>
      </td>`;
    cuerpo.appendChild(tr);
  });
  document.getElementById("cb-t-facturado").textContent = "RD$" + CB_fmt(facturado);
  document.getElementById("cb-t-cantidad").textContent = CB_clientes.length + " facturas";
  document.getElementById("cb-t-cobrado").textContent = "RD$" + CB_fmt(facturado - pendiente);

  document.getElementById("cb-t-vencidos").textContent = vencidos;
  document.getElementById("cb-t-promesas").textContent = promesasHoy;
  document.getElementById("cb-t-pagados").textContent = pagados;
}

function _checkBlur(dataUrl){
  return new Promise(function(res){
    var img=new Image();
    img.onerror=function(){ res({score:999,blurry:false,borderline:false}); };
    img.onload=function(){
      try{
        var cv=document.createElement('canvas');
        var esc=Math.min(1,320/img.width);
        cv.width=Math.max(2,Math.round(img.width*esc));
        cv.height=Math.max(2,Math.round(img.height*esc));
        var cx=cv.getContext('2d');
        cx.drawImage(img,0,0,cv.width,cv.height);
        var d=cx.getImageData(0,0,cv.width,cv.height).data;
        var w=cv.width,hh=cv.height,g=new Float32Array(w*hh);
        for(var i=0;i<d.length;i+=4) g[i/4]=0.299*d[i]+0.587*d[i+1]+0.114*d[i+2];
        var s=0,s2=0,n=0;
        for(var y=1;y<hh-1;y++) for(var x=1;x<w-1;x++){
          var lap = 4*g[y*w+x] - g[(y-1)*w+x] - g[(y+1)*w+x] - g[y*w+x-1] - g[y*w+x+1];
          s+=lap; s2+=lap*lap; n++;
        }
        var v = n? (s2 - (s*s)/n)/n : 999;
        res({score:Math.round(v), blurry:v<80, borderline:v<200});
      }catch(e){ res({score:999,blurry:false,borderline:false}); }
    };
    img.src=dataUrl;
  });
}

/* ── Validar cédula con IA: compara la foto contra lo digitado ── */
async function validarDocumentosAI(){
  var box=document.getElementById('val_result');
  var nm=(document.getElementById('cf_nm')||{}).value||'';
  var ce=(document.getElementById('cf_ce')||{}).value||'';
  nm=nm.trim().toUpperCase(); ce=ce.replace(/\D/g,'');

  function show(bg,br,col,html){
    if(!box) return;
    box.style.display='block';
    box.style.background=bg; box.style.border='1.5px solid '+br; box.style.color=col;
    box.innerHTML=html;
  }
  if(!fotos.f && !fotos.r){
    show('#FFEBEE','#C62828','#7F0000','⚠️ Toma primero la foto de la cédula.');
    return;
  }
  if(!nm || !ce){
    show('#FFF3E0','#FF8F00','#E65100','⚠️ Escribe el nombre y la cédula antes de validar.');
    return;
  }
  show('#E3F2FD','#0288D1','#01579B','🔍 Analizando la cédula con IA…');

  try{
    var img=(fotos.f||fotos.r).split(',')[1];
    var r=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-6', max_tokens:400,
        messages:[{role:'user',content:[
          {type:'image',source:{type:'base64',media_type:'image/jpeg',data:img}},
          {type:'text',text:'Esta es una cédula de identidad dominicana. Extrae el NOMBRE COMPLETO impreso y el NÚMERO DE CÉDULA (solo dígitos). Responde SOLO con JSON válido, sin backticks ni texto extra:\n{"nombre":"","cedula":"","legible":true}\nSi no se puede leer, pon legible:false.'}
        ]}]
      })
    });
    var d=await r.json();
    var txt=(d.content && d.content[0] && d.content[0].text) || '';
    var ia; try{ ia=JSON.parse(txt.replace(/```json|```/g,'').trim()); }
    catch(e){ ia={nombre:'',cedula:'',legible:false}; }

    if(!ia.legible){
      show('#FFEBEE','#C62828','#7F0000',
        '<b>❌ La foto de la cédula no se lee bien.</b><br>Tómala de nuevo con buena luz y sin movimiento.');
      return;
    }
    function norm(s){ return (s||'').toUpperCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim(); }
    var alertas=[];
    var A=norm(ia.nombre).split(/\s+/).filter(Boolean);
    var B=norm(nm).split(/\s+/).filter(Boolean);
    if(A.length && B.length){
      var hit=A.filter(function(w){ return B.some(function(x){ return x===w||x.indexOf(w)>=0||w.indexOf(x)>=0; }); });
      var sim=hit.length/Math.max(A.length,B.length);
      if(sim<0.5) alertas.push('⚠️ <b>EL NOMBRE NO COINCIDE</b><br>Cédula: "'+ia.nombre+'"<br>Digitado: "'+nm+'"');
      else if(sim<0.8) alertas.push('⚠️ El nombre podría estar mal escrito.<br>Cédula: "'+ia.nombre+'" · Digitado: "'+nm+'"');
    }
    var cIA=(ia.cedula||'').replace(/\D/g,'');
    if(cIA && cIA!==ce) alertas.push('❌ <b>LA CÉDULA NO COINCIDE</b><br>Foto: '+ia.cedula+'<br>Digitada: '+ce);

    var pieFac = fotos.fac
      ? '<div style="margin-top:9px;font-size:12px">📄 Foto de la factura: capturada ✓</div>'
      : '<div style="margin-top:9px;font-size:12px;color:#E65100">⚠️ Falta la foto de la factura física.</div>';

    if(!alertas.length){
      show('#E8F5E9','#2E7D32','#1B5E20',
        '<b>✅ Documentos validados</b><div style="font-size:12px;margin-top:5px">Nombre: <b>'+ia.nombre
        +'</b> · Cédula: <b>'+ia.cedula+'</b></div>'+pieFac);
    } else {
      show('#FFEBEE','#C62828','#7F0000',
        '<b>⚠️ Alertas de validación</b>'
        + alertas.map(function(a){
            return '<div style="margin-top:6px;padding:7px 10px;background:rgba(255,255,255,.55);border-radius:6px;font-size:12px">'+a+'</div>';
          }).join('') + pieFac);
    }
  }catch(e){
    show('#FFF3E0','#FF8F00','#E65100','📶 No se pudo conectar con el validador IA. Revisa tu conexión.');
  }
}

/* ══════════════════════════════════════════════════════════════
   3) COBRADOR — subir clientes desde EXCEL (.xlsx / .xls)
════════════════════════════════════════════════════════════════ */
function _cbLog(msg){
  var el=document.getElementById('cb-excel-log');
  if(el) el.textContent += (el.textContent?'\n':'') + msg;
}
/* Normaliza un encabezado: minúsculas, sin tildes ni signos */
function _cbNorm(s){
  return String(s||'').toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .replace(/[^a-z0-9]/g,'');
}
/* Convierte una fecha de Excel (serie, texto ISO o dd/mm/aaaa) a AAAA-MM-DD */
function _cbFecha(v){
  if(v===undefined || v===null || v==='') return '';
  if(v instanceof Date && !isNaN(v)) return v.toISOString().slice(0,10);
  if(typeof v==='number'){                    // serie de Excel
    var d=new Date(Math.round((v-25569)*86400*1000));
    return isNaN(d) ? '' : d.toISOString().slice(0,10);
  }
  var s=String(v).trim();
  if(/^\d{4}-\d{2}-\d{2}/.test(s)) return s.slice(0,10);
  var m=s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})$/);   // dd/mm/aaaa
  if(m){
    var a=m[3].length===2 ? '20'+m[3] : m[3];
    return a+'-'+('0'+m[2]).slice(-2)+'-'+('0'+m[1]).slice(-2);
  }
  return s;
}
function _cbNum(v){
  if(v===undefined||v===null||v==='') return null;
  var n=parseFloat(String(v).replace(/[^0-9.\-]/g,''));
  return isNaN(n)?null:n;
}
/* Mapea una fila del Excel al formato del cobrador */
function _cbFila(obj){
  var g={};
  Object.keys(obj).forEach(function(k){ g[_cbNorm(k)] = obj[k]; });
  function buscar(lista){
    for(var i=0;i<lista.length;i++){
      var t=lista[i];
      var k=Object.keys(g).find(function(x){ return x===t; });
      if(k!==undefined && g[k]!=='' && g[k]!==null && g[k]!==undefined) return g[k];
    }
    for(var j=0;j<lista.length;j++){
      var t2=lista[j];
      var k2=Object.keys(g).find(function(x){ return x.indexOf(t2)>=0; });
      if(k2!==undefined && g[k2]!=='' && g[k2]!==null && g[k2]!==undefined) return g[k2];
    }
    return '';
  }
  var monto  = _cbNum(buscar(['montofactura','monto','montords','total','valor']));
  var abon   = _cbNum(buscar(['abonado','abonadords','pagado','abono']));
  var saldo  = _cbNum(buscar(['saldodeberds','saldodebe','saldo','resta','debe','pendiente']));
  if(saldo===null && monto!==null) saldo = monto - (abon||0);
  return {
    no:     String(buscar(['no','nocontrato','contrato','numero','factura'])||'').trim(),
    nombre: String(buscar(['cliente','nombre','nombrecliente'])||'').trim(),
    tel:    String(buscar(['telefono1','telefono','tel','celular'])||'').replace(/\D/g,''),
    tel2:   String(buscar(['telefono2','tel2','telefonoalterno'])||'').replace(/\D/g,''),
    monto:  monto||0,
    saldo:  (saldo===null? (monto||0) : saldo),
    limite: _cbFecha(buscar(['fechalimite','limite','vence','vencimiento'])),
    promesa:_cbFecha(buscar(['promesa','promesadepago'])),
    notas:  String(buscar(['notas','nota','observaciones','comentarios'])||'').trim(),
  };
}
/* Lee el archivo Excel y lo importa */
function cbImportarExcel(ev){
  var f = ev.target.files && ev.target.files[0];
  if(!f) return;
  var log=document.getElementById('cb-excel-log'); if(log) log.textContent='';
  if(typeof XLSX==='undefined'){
    _cbLog('❌ No se pudo cargar el lector de Excel. Revisa tu conexión a internet y recarga la página.');
    ev.target.value=''; return;
  }
  _cbLog('📖 Leyendo "'+f.name+'"…');
  var r=new FileReader();
  r.onload=function(e){
    try{
      var wb = XLSX.read(new Uint8Array(e.target.result), {type:'array', cellDates:true});
      var hoja = wb.SheetNames[0];
      _cbLog('   Hoja: "'+hoja+'"');
      var filas = XLSX.utils.sheet_to_json(wb.Sheets[hoja], {defval:''});

      // Si la 1ª fila no trae encabezados válidos, busca la fila de encabezado real
      var tieneCliente = filas.length && Object.keys(filas[0]).some(function(k){
        return /cliente|nombre/.test(_cbNorm(k));
      });
      if(!tieneCliente){
        var m = XLSX.utils.sheet_to_json(wb.Sheets[hoja], {header:1, defval:''});
        var iCab = m.findIndex(function(row){
          return row.some(function(c){ return /cliente|nombre/.test(_cbNorm(c)); });
        });
        if(iCab>=0){
          _cbLog('   Encabezados detectados en la fila '+(iCab+1));
          filas = XLSX.utils.sheet_to_json(wb.Sheets[hoja], {range:iCab, defval:''});
        }
      }
      _cbLog('   '+filas.length+' fila(s) leída(s)');

      var listos = filas.map(_cbFila).filter(function(c){
        return c.nombre && !/^totales?$/i.test(c.nombre);
      });
      _cbLog('   '+listos.length+' cliente(s) válido(s)');
      if(!listos.length){
        _cbLog('❌ No encontré clientes. El Excel debe tener al menos las columnas: No. · Cliente · Teléfono · Monto');
        ev.target.value=''; return;
      }
      var res = CB_mergeClientes(listos);
      _cbLog('');
      _cbLog('✅ '+res.agregados+' cliente(s) agregado(s)');
      _cbLog('⏭️  '+res.duplicados+' duplicado(s) omitido(s) (mismo No. de contrato)');
      _cbLog('');
      _cbLog('Ve a la pestaña 👥 Clientes para verlos.');
      if(typeof showToast==='function') showToast('Excel importado: '+res.agregados+' clientes nuevos');
    }catch(err){
      _cbLog('❌ Error al leer el Excel: '+err.message);
    }
    ev.target.value='';
  };
  r.onerror=function(){ _cbLog('❌ No se pudo abrir el archivo.'); ev.target.value=''; };
  r.readAsArrayBuffer(f);
}
/* Descarga una plantilla de Excel lista para llenar */

function cbMontarPanelExcel(){

    + '<b>Abonado RD$</b> · <b>Saldo (debe) RD$</b> · <b>Fecha límite</b> · <b>Promesa</b> · <b>Notas</b><br>'
    + '<span style="color:#5A7A66">Si no pones el saldo, se calcula solo: Monto − Abonado. '

  sec.insertBefore(div, sec.firstChild);

<script>
/* ══════════════════════════════════════════════════════════════
   RUTA CON MAPA — cobro guiado por GPS
   Ordena las visitas por cercanía y recalcula al llegar a cada una
════════════════════════════════════════════════════════════════ */
var RT = {
  yo:null,          // {lat,lng,acc}
  paradas:[],       // contratos con coordenadas
  hechas:[],        // ids ya visitados
  mapa:null, capaMarcas:null, capaLinea:null, marcaYo:null,
  watch:null, recaudado:0, iniciada:false
};

/* Saca lat/lng del texto guardado: "7F3F+H59  (18.48123, -69.93456)" */
function rtCoords(c){
  if(!c) return null;
  var g=c.gps;
  if(g && typeof g==='object' && g.lat) return {lat:+g.lat, lng:+g.lng};
  if(typeof g!=='string' || !g) return null;
  var m=g.match(/\(?\s*(-?\d{1,3}\.\d+)\s*,\s*(-?\d{1,3}\.\d+)\s*\)?/);
  if(!m) return null;
  var la=parseFloat(m[1]), ln=parseFloat(m[2]);
  if(isNaN(la)||isNaN(ln)||Math.abs(la)>90||Math.abs(ln)>180) return null;
  return {lat:la, lng:ln};
}

/* Distancia real entre dos puntos de la Tierra (Haversine), en metros */
function rtDist(a,b){
  if(!a||!b) return Infinity;
  var R=6371000, r=Math.PI/180;
  var dLa=(b.lat-a.lat)*r, dLn=(b.lng-a.lng)*r;
  var x=Math.sin(dLa/2)*Math.sin(dLa/2)
      + Math.cos(a.lat*r)*Math.cos(b.lat*r)*Math.sin(dLn/2)*Math.sin(dLn/2);
  return 2*R*Math.atan2(Math.sqrt(x), Math.sqrt(1-x));
}
function rtKm(m){
  if(m===Infinity||m===null) return '—';
  return m<1000 ? Math.round(m)+' m' : (m/1000).toFixed(m<10000?1:0)+' km';
}

/* Ruta por VECINO MÁS CERCANO: desde donde estoy, siempre la más próxima */
function rtOrdenar(desde, pend){
  var ruta=[], libres=pend.slice(), aqui=desde;
  while(libres.length){
    var mejor=0, min=Infinity;
    for(var i=0;i<libres.length;i++){
      var d = aqui ? rtDist(aqui, libres[i].co) : 0;
      if(d<min){ min=d; mejor=i; }
    }
    var p=libres.splice(mejor,1)[0];
    p.dist = aqui ? min : null;
    ruta.push(p);
    aqui = p.co;
  }
  return ruta;
}

/* Reconstruye la lista de paradas pendientes desde los contratos */
function rtCargar(){
  var lista=[];
  contratos.forEach(function(c){
    if(c.status!=='aprobado') return;
    if((c.saldo||0)<=0) return;                 // ya está saldado
    if(RT.hechas.indexOf(c.id)>=0) return;      // ya la visité hoy
    var co=rtCoords(c);
    if(!co) return;                             // sin GPS → no entra al mapa
    lista.push({ id:c.id, c:c, co:co });
  });
  RT.paradas = rtOrdenar(RT.yo, lista);
}

/* ══ Pantalla ══ */
function rRuta(){
  return '<div id="ruta_root">'
    + '<div class="ruta-hero">'
    +   '<div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">'
    +     '<div style="flex:1;min-width:180px">'
    +       '<div style="font-size:19px;font-weight:900">🗺️ Ruta con Mapa</div>'
    +       '<div style="font-size:11px;color:rgba(255,255,255,.75);margin-top:2px" id="rt_estado">Buscando tu ubicación…</div>'
    +     '</div>'
    +     '<button class="bsm" style="background:rgba(255,255,255,.16);border-color:rgba(255,255,255,.3);color:#fff" onclick="rtRecalcular()">🔄 Recalcular</button>'
    +   '</div>'
    +   '<div class="ruta-chips" id="rt_chips"></div>'
    + '</div>'
    + '<div id="rt_llegaste"></div>'
    + '<div id="rt_next"></div>'
    + '<div id="ruta_map"></div>'
    + '<div class="card" style="margin-top:14px">'
    +   '<div class="ct"><i class="ti ti-list-numbers" style="color:var(--gold)"></i>Orden de visitas'
    +     '<button class="bsm" style="margin-left:auto" onclick="rtAbrirTodo()">📍 Abrir ruta completa en Google Maps</button>'
    +   '</div>'
    +   '<div id="rt_lista"></div>'
    + '</div>'
    + '<div id="rt_singps"></div>'
    + '</div>';
}

function rutaInit(){
  RT.mapa=null; RT.marcaYo=null;
  if(!RT.iniciada){ RT.hechas=[]; RT.recaudado=0; RT.iniciada=true; }
  rtCargar();
  rtPintar();
  setTimeout(rtMapaInit, 60);
  rtSeguirGPS();
}

/* Sigue mi posición en vivo */
function rtSeguirGPS(){
  var est=document.getElementById('rt_estado');
  if(!navigator.geolocation){
    if(est) est.textContent='Este navegador no tiene GPS. Te muestro la ruta sin tu posición.';
    return;
  }
  if(RT.watch) navigator.geolocation.clearWatch(RT.watch);
  RT.watch = navigator.geolocation.watchPosition(function(pos){
    var nuevo = { lat:pos.coords.latitude, lng:pos.coords.longitude, acc:Math.round(pos.coords.accuracy||0) };
    var primeraVez = !RT.yo;
    // Recalcular solo si me moví más de 40 m (evita recalcular a cada segundo)
    var movido = RT.yo ? rtDist(RT.yo, nuevo) > 40 : true;
    RT.yo = nuevo;
    if(est) est.textContent = 'Estás aquí · precisión ±'+nuevo.acc+' m';
    rtMarcarYo();
    if(primeraVez || movido){ rtCargar(); rtPintar(); rtMapaPintar(); }
    rtCheckLlegada();
  }, function(e){
    if(est) est.textContent = (e.code===1)
      ? '🔒 Permiso de ubicación denegado — toca el candado 🔒 de la barra del navegador → Ubicación → Permitir'
      : '📶 Sin señal GPS. Te muestro la ruta sin tu posición.';
  }, { enableHighAccuracy:true, timeout:20000, maximumAge:5000 });
}

/* ¿Llegué? (a menos de 60 m de la próxima parada) */
function rtCheckLlegada(){
  var box=document.getElementById('rt_llegaste');
  if(!box) return;
  var p=RT.paradas[0];
  if(!p || !RT.yo){ box.innerHTML=''; return; }
  var d=rtDist(RT.yo, p.co);
  box.innerHTML = (d<=60)
    ? '<div class="llegaste">✅ ¡Llegaste donde <b>'+p.c.cliente+'</b>! ('+rtKm(d)+')</div>'
    : '';
}

/* ══ Pintar los datos ══ */
function rtPintar(){
  var pend=RT.paradas.length;
  var deuda=RT.paradas.reduce(function(s,p){ return s+(p.c.saldo||0); },0);
  var total=0;
  try{ total = RT.paradas.reduce(function(s,p,i){
        var prev = i===0 ? RT.yo : RT.paradas[i-1].co;
        var d = prev ? rtDist(prev, p.co) : 0;
        return s + (isFinite(d)?d:0);
      },0); }catch(e){}

  var chips=document.getElementById('rt_chips');
  if(chips) chips.innerHTML =
      '<div class="ruta-chip"><b>'+pend+'</b><span>Por visitar</span></div>'
    + '<div class="ruta-chip"><b>'+RT.hechas.length+'</b><span>Visitadas</span></div>'
    + '<div class="ruta-chip"><b style="font-size:14px">'+fM(deuda)+'</b><span>Por cobrar</span></div>'
    + '<div class="ruta-chip"><b style="font-size:14px;color:#B9F6CA">'+fM(RT.recaudado)+'</b><span>Recaudado hoy</span></div>'
    + '<div class="ruta-chip"><b style="font-size:14px">'+rtKm(total)+'</b><span>Recorrido</span></div>';

  rtNext();
  rtLista();
  rtSinGPS();
}

/* Tarjeta grande de la PRÓXIMA parada */
function rtNext(){
  var box=document.getElementById('rt_next');
  if(!box) return;
  var p=RT.paradas[0];
  if(!p){
    box.innerHTML = RT.hechas.length
      ? '<div class="card" style="text-align:center;padding:32px;border:2px solid #2E7D32">'
        + '<div style="font-size:46px">🎉</div>'
        + '<div style="font-size:19px;font-weight:900;color:#2E7D32;margin-top:8px">¡Ruta terminada!</div>'
        + '<div style="font-size:13px;color:var(--t2);margin-top:5px">Visitaste '+RT.hechas.length
        + ' cliente(s) y recaudaste <b>'+fM(RT.recaudado)+'</b>.</div>'
        + '<button class="bg" style="margin-top:14px" onclick="rtNuevaRuta()">🔄 Empezar una ruta nueva</button></div>'
      : '<div class="empty"><i class="ti ti-map-off"></i><p>No hay clientes por cobrar con ubicación GPS guardada.</p></div>';
    return;
  }
  var c=p.c;
  var d = RT.yo ? rtDist(RT.yo, p.co) : null;
  var tel=(c.tel1||'').replace(/\D/g,'');
  var msg=encodeURIComponent('Hola '+c.cliente+', le saluda KERAVEN Profesional. Estoy cerca para pasar por su pago de '
    + fM(c.saldo)+' (factura '+c.fac+'). ¿Está disponible ahora?');

  box.innerHTML =
    '<div class="next-card">'
    + '<div class="next-top"><div class="next-num">1</div>'
    +   '<div><div style="font-size:10px;letter-spacing:.1em;text-transform:uppercase;opacity:.8">Próxima parada</div>'
    +   '<div style="font-size:13px;font-weight:700">'+c.fac+'</div></div>'
    +   (d!==null ? '<div style="margin-left:auto;font-size:15px;font-weight:900">'+rtKm(d)+'</div>' : '')
    + '</div>'
    + '<div class="next-body">'
    +   '<div class="next-nom">'+c.cliente+'</div>'
    +   '<div class="next-dat">'
    +     (c.dir? '📍 '+c.dir+'<br>':'')
    +     (c.ref? '🏠 '+c.ref+'<br>':'')
    +     (c.inst?'🏢 '+c.inst+'<br>':'')
    +     (c.tel1?'📞 '+c.tel1:'')
    +   '</div>'
    +   '<div class="next-deuda">'+fM(c.saldo)+'</div>'
    +   '<div style="font-size:11px;color:var(--t3);margin-bottom:4px">debe · vence '+fD(c.lim||c.fecha)+'</div>'
    +   (d!==null? '<div class="next-dist">🧭 A '+rtKm(d)+' de ti</div>' : '')
    +   '<div class="next-btns">'
    +     '<button class="rb rb-ir" onclick="rtIr()">🧭 Cómo llegar</button>'
    +     (tel
            ? '<button class="rb rb-wa" onclick="window.open(\'https://wa.me/1'+tel+'?text='+msg+'\',\'_blank\')">📱 WhatsApp</button>'
            : '<button class="rb rb-sk" disabled>Sin teléfono</button>')
    +     '<button class="rb rb-ok" onclick="rtCobrado()">✅ Pagó todo</button>'
    +     '<button class="rb rb-ab" onclick="rtAbono()">💵 Abonó</button>'
    +     '<button class="rb rb-no" onclick="rtNoPago()">❌ No pagó</button>'
    +     '<button class="rb rb-sk" onclick="rtSaltar()">⏭ Saltar</button>'
    +   '</div>'
    + '</div></div>';
}

/* Lista con el orden completo */
function rtLista(){
  var box=document.getElementById('rt_lista');
  if(!box) return;
  var html='';
  RT.hechas.forEach(function(id,i){
    var c=contratos.find(function(x){ return x.id===id; });
    if(!c) return;
    html += '<div class="stop done"><div class="stop-n">✓</div>'
         +  '<div style="flex:1"><div class="stop-nom">'+c.cliente+'</div>'
         +  '<div class="stop-sub">'+c.fac+' · visitada</div></div></div>';
  });
  if(!RT.paradas.length && !html){
    box.innerHTML='<div class="empty"><i class="ti ti-map-pin-off"></i><p>Sin paradas pendientes</p></div>';
    return;
  }
  RT.paradas.forEach(function(p,i){
    var c=p.c;
    html += '<div class="stop"'+(i===0?' style="border-color:#0277BD;border-width:2px"':'')+'>'
         +  '<div class="stop-n">'+(i+1)+'</div>'
         +  '<div style="flex:1;min-width:0">'
         +    '<div class="stop-nom">'+c.cliente+'</div>'
         +    '<div class="stop-sub">'+c.fac+' · debe '+fM(c.saldo)+(c.ref?' · '+c.ref:'')+'</div>'
         +  '</div>'
         +  '<div class="stop-km">'+rtKm(p.dist)+'</div>'
         +  '</div>';
  });
  box.innerHTML=html;
}

/* Clientes por cobrar que NO tienen GPS */
function rtSinGPS(){
  var box=document.getElementById('rt_singps');
  if(!box) return;
  var sin=contratos.filter(function(c){
    return c.status==='aprobado' && (c.saldo||0)>0 && !rtCoords(c);
  });
  box.innerHTML = sin.length
    ? '<div class="card" style="border-left:4px solid #E65100">'
      + '<div class="ct" style="color:#E65100"><i class="ti ti-map-pin-off"></i>'
      + sin.length+' cliente(s) sin ubicación — no salen en el mapa</div>'
      + '<div class="cs">Cuando le tomes el GPS al contrato, entrarán solos en la ruta.</div>'
      + sin.map(function(c){
          return '<div class="stop" style="opacity:.8">'
               + '<div class="stop-n" style="background:#E65100">?</div>'
               + '<div style="flex:1"><div class="stop-nom">'+c.cliente+'</div>'
               + '<div class="stop-sub">'+c.fac+' · debe '+fM(c.saldo)+'</div></div></div>';
        }).join('')
      + '</div>'
    : '';
}

/* ══ Mapa ══ */
function rtMapaInit(){
  var el=document.getElementById('ruta_map');
  if(!el) return;
  if(typeof L==='undefined'){
    el.innerHTML='<div style="padding:26px;text-align:center;color:#5C5470;font-size:13px">'
      +'🗺️ El mapa necesita internet para cargar.<br>La ruta y las distancias funcionan igual, y '
      +'<b>Cómo llegar</b> te abre Google Maps.</div>';
    el.style.height='auto';
    return;
  }
  if(RT.mapa){ try{ RT.mapa.remove(); }catch(e){} RT.mapa=null; }
  var centro = RT.yo ? [RT.yo.lat,RT.yo.lng]
             : (RT.paradas[0] ? [RT.paradas[0].co.lat, RT.paradas[0].co.lng]
                              : [18.4861,-69.9312]);           // Santo Domingo
  RT.mapa = L.map(el,{zoomControl:true}).setView(centro, 14);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
    { maxZoom:19, attribution:'© OpenStreetMap' }).addTo(RT.mapa);
  RT.capaMarcas = L.layerGroup().addTo(RT.mapa);
  RT.capaLinea  = L.layerGroup().addTo(RT.mapa);
  rtMapaPintar();
  rtMarcarYo();
  setTimeout(function(){ try{ RT.mapa.invalidateSize(); }catch(e){} }, 250);
}

function rtMapaPintar(){
  if(!RT.mapa || typeof L==='undefined') return;
  RT.capaMarcas.clearLayers();
  RT.capaLinea.clearLayers();
  var pts=[];
  if(RT.yo) pts.push([RT.yo.lat, RT.yo.lng]);

  RT.paradas.forEach(function(p,i){
    var c=p.c;
    var cls = 'pin' + (i===0?' next':'');
    var ic = L.divIcon({ className:'', html:'<div class="'+cls+'">'+(i+1)+'</div>',
                         iconSize:[i===0?38:30, i===0?38:30], iconAnchor:[i===0?19:15, i===0?19:15] });
    L.marker([p.co.lat,p.co.lng], {icon:ic})
      .bindPopup('<b>'+(i+1)+'. '+c.cliente+'</b><br>'+c.fac+'<br>Debe: <b>'+fM(c.saldo)+'</b>'
        +(c.ref?'<br>'+c.ref:'')+'<br><a href="https://www.google.com/maps/dir/?api=1&destination='
        +p.co.lat+','+p.co.lng+'&travelmode=driving" target="_blank">🧭 Cómo llegar</a>')
      .addTo(RT.capaMarcas);
    pts.push([p.co.lat,p.co.lng]);
  });

  // Ya visitadas, en verde
  RT.hechas.forEach(function(id){
    var c=contratos.find(function(x){ return x.id===id; });
    var co=rtCoords(c);
    if(!co) return;
    var ic=L.divIcon({className:'',html:'<div class="pin done">✓</div>',iconSize:[30,30],iconAnchor:[15,15]});
    L.marker([co.lat,co.lng],{icon:ic}).bindPopup('<b>'+c.cliente+'</b><br>Visitada ✓').addTo(RT.capaMarcas);
  });

  if(pts.length>1){
    L.polyline(pts, {color:'#0277BD', weight:4, opacity:.75, dashArray:'8,7'}).addTo(RT.capaLinea);
    try{ RT.mapa.fitBounds(L.latLngBounds(pts).pad(0.18)); }catch(e){}
  }
}

function rtMarcarYo(){
  if(!RT.mapa || !RT.yo || typeof L==='undefined') return;
  if(RT.marcaYo){ try{ RT.mapa.removeLayer(RT.marcaYo); }catch(e){} }
  var ic=L.divIcon({className:'',html:'<div class="yo"></div>',iconSize:[18,18],iconAnchor:[9,9]});
  RT.marcaYo=L.marker([RT.yo.lat,RT.yo.lng],{icon:ic}).bindPopup('Estás aquí').addTo(RT.mapa);
}

/* ══ Acciones ══ */
function rtIr(){
  var p=RT.paradas[0];
  if(!p) return;
  window.open('https://www.google.com/maps/dir/?api=1&destination='+p.co.lat+','+p.co.lng+'&travelmode=driving','_blank');
}
function rtAbrirTodo(){
  if(!RT.paradas.length){ showToast('No hay paradas en la ruta','info'); return; }
  var org = RT.yo ? RT.yo.lat+','+RT.yo.lng : '';
  var pts = RT.paradas.map(function(p){ return p.co.lat+','+p.co.lng; });
  var dest = pts.pop();
  var url='https://www.google.com/maps/dir/?api=1&destination='+dest+'&travelmode=driving'
        + (org?'&origin='+org:'')
        + (pts.length? '&waypoints='+pts.slice(0,9).join('|') : '');   // Google admite 9 escalas

}
function rtCerrarParada(id){
  RT.hechas.push(id);
  rtCargar(); rtPintar(); rtMapaPintar();
}
async function rtCobrado(){
  var p=RT.paradas[0]; if(!p) return;
  var c=p.c;
  if(!confirm('¿'+c.cliente+' pagó los '+fM(c.saldo)+' completos?')) return;
  RT.recaudado += (c.saldo||0);
  if(!c.abonos) c.abonos=[];
  c.abonos.push({ f:hoy(), m:c.saldo, q:ses.n, nota:'Cobrado en ruta' });
  c.saldo=0;
  await guardar();
  showToast('✅ '+c.cliente+' saldado');
  rtCerrarParada(c.id);
}
async function rtAbono(){
  var p=RT.paradas[0]; if(!p) return;
  var c=p.c;
  var t=prompt('¿Cuánto abonó '+c.cliente+'?\n(debe '+fM(c.saldo)+')','');
  var m=parseFloat(String(t||'').replace(/[^0-9.]/g,''));
  if(!m || m<=0) return;
  if(m > (c.saldo||0)){ alert('El abono no puede ser mayor que la deuda ('+fM(c.saldo)+').'); return; }
  RT.recaudado += m;
  if(!c.abonos) c.abonos=[];
  c.abonos.push({ f:hoy(), m:m, q:ses.n, nota:'Abono en ruta' });
  c.saldo = Math.max(0,(c.saldo||0)-m);
  await guardar();
  showToast('💵 Abonó '+fM(m)+' · le queda '+fM(c.saldo));
  rtCerrarParada(c.id);       // se visita hoy; si queda saldo, entra en la ruta de mañana
}
async function rtNoPago(){
  var p=RT.paradas[0]; if(!p) return;
  var c=p.c;
  var motivo=prompt('¿Por qué no pagó '+c.cliente+'?','No estaba / pidió más plazo');
  if(motivo===null) return;
  if(!c.visitas) c.visitas=[];
  c.visitas.push({ f:hoy(), q:ses.n, r:'No pagó', nota:motivo });
  await guardar();
  showToast('Anotado: '+c.cliente+' no pagó','info');
  rtCerrarParada(c.id);
}
function rtSaltar(){
  var p=RT.paradas[0]; if(!p) return;
  // Se va al final de la cola, sin marcarla como visitada
  RT.paradas.push(RT.paradas.shift());
  RT.paradas.forEach(function(x,i){
    var prev = i===0 ? RT.yo : RT.paradas[i-1].co;
    x.dist = prev ? rtDist(prev, x.co) : null;
  });
  rtPintar(); rtMapaPintar();
  showToast('Parada saltada — queda para el final','info');
}
function rtRecalcular(){
  rtCargar(); rtPintar(); rtMapaPintar(); rtCheckLlegada();
  showToast('🔄 Ruta recalculada desde donde estás');
}
function rtNuevaRuta(){
  RT.hechas=[]; RT.recaudado=0;
  rtCargar(); rtPintar(); rtMapaInit();
}
</script>

<script>
/* ══════════════════════════════════════════════════════════════════
   UNIFICACIÓN — EL CONTRATO ES LA ÚNICA FUENTE DE VERDAD
   ───────────────────────────────────────────────────────────────
   Antes: el Cobrador tenía su propia lista en localStorage y no se
   hablaba con el resto del sistema.
   Ahora: el Cobrador lee y escribe sobre contratos[] (IndexedDB).
   Se ve igual, pero todo queda conectado.
══════════════════════════════════════════════════════════════════ */

/* Normaliza un No. de factura para comparar: "0666", "666", "KRV-0666" → "666" */
function facKey(v){
  var s = String(v==null?'':v).trim().toUpperCase();
  var m = s.match(/(\d+)\s*$/);            // toma los dígitos finales
  return m ? String(parseInt(m[1],10)) : s;
}
function buscarContratoPorFac(fac){
  var k = facKey(fac);
  return contratos.find(function(c){ return facKey(c.fac) === k; }) || null;
}

/* ── Cliente del Cobrador  ⇄  Contrato ── */
function ctoAVista(c){
  return {
    _id:    c.id,
    no:     String(c.fac||''),
    nombre: c.cliente||'',
    tel:    (c.tel1||'').replace(/\D/g,''),
    tel2:   (c.tel2||'').replace(/\D/g,''),
    monto:  Number(c.monto)||0,
    saldo:  (c.saldo===undefined||c.saldo===null) ? (Number(c.monto)||0) : Number(c.saldo)||0,
    limite: c.lim||'',
    promesa:c.promesa||'',
    notas:  c.obs||''
  };
}
function vistaAContrato(v, c){
  c.fac     = v.no;
  c.cliente = v.nombre;
  c.tel1    = v.tel;
  c.tel2    = v.tel2;
  c.monto   = Number(v.monto)||0;
  c.saldo   = Math.max(0, Number(v.saldo)||0);
  c.lim     = v.limite||'';
  c.promesa = v.promesa||'';
  c.obs     = v.notas||'';
  return c;
}
function nuevoContratoDesdeCobrador(v){
  return {
    id: Date.now() + Math.floor(Math.random()*1000),
    fac: v.no, fecha: hoy(),
    promotor:'', zona:'',
    cliente: v.nombre, cedula:'', tel1: v.tel, tel2: v.tel2, email:'',
    inst:'', barrio:'', ref:'', dir:'', gps:'',
    tipo:'credito', plazo:0, lim: v.limite||'', promesa: v.promesa||'',
    prods:[], monto: Number(v.monto)||0, descuento:0, neto: Number(v.monto)||0,
    saldo: Math.max(0, Number(v.saldo)||0),
    obs: v.notas||'',
    fF:null, fR:null, fFac:null,
    status:'aprobado',                       // ya está en la calle, se está cobrando
    por: (typeof ses!=='undefined'&&ses)?ses.n:'Sistema',
    hora: now(),
    dec:{q:'Migración', h:now(), c:'Cargado desde el Cobrador'},
    abonos:[], origen:'cobrador'
  };
}

/* ══ MIGRACIÓN (una sola vez) ══
   Pasa los clientes del Cobrador a contratos[], sin duplicar facturas. */
async function migrarCobrador(){
  var yaHecha = false;
  try{ yaHecha = localStorage.getItem('kv_migracion_cobrador')==='1'; }catch(e){}
  if(yaHecha) return {nuevos:0, existentes:0, ya:true};

  var viejos=[];
  try{ viejos = JSON.parse(localStorage.getItem('cobrador_clientes')||'[]'); }catch(e){}
  if(!Array.isArray(viejos)) viejos=[];
  if(!viejos.length){
    try{ localStorage.setItem('kv_migracion_cobrador','1'); }catch(e){}
    return {nuevos:0, existentes:0, ya:false};
  }

  var nuevos=0, existentes=0, detalle=[];
  viejos.forEach(function(v){
    if(!v || !v.no) return;
    var c = buscarContratoPorFac(v.no);
    if(c){
      // ── YA EXISTE: no se duplica. Solo se rellenan campos vacíos. ──
      existentes++;
      if(!c.tel2 && v.tel2)       c.tel2 = v.tel2;
      if(!c.promesa && v.promesa) c.promesa = v.promesa;
      if(!c.lim && v.limite)      c.lim = v.limite;
      if(v.notas && String(c.obs||'').indexOf(v.notas)<0)
        c.obs = (c.obs? c.obs+' | ' : '') + v.notas;
      detalle.push('· '+v.no+' '+v.nombre+' → ya existía, no se duplicó');
    } else {
      // ── NUEVO: se crea como contrato aprobado ──
      contratos.push(nuevoContratoDesdeCobrador(v));
      nuevos++;
      detalle.push('· '+v.no+' '+v.nombre+' → creado');
    }
  });
  contratos.sort(function(a,b){ return parseInt(facKey(b.fac))-parseInt(facKey(a.fac)); });
  await guardar();
  try{
    localStorage.setItem('kv_migracion_cobrador','1');
    localStorage.setItem('cobrador_clientes_respaldo', JSON.stringify(viejos));   // respaldo por si acaso
  }catch(e){}
  console.log('MIGRACIÓN COBRADOR → CONTRATOS\n'+detalle.join('\n'));
  return {nuevos:nuevos, existentes:existentes, ya:false, detalle:detalle};
}

/* ══ UN SOLO REGISTRO DE PAGO PARA TODO EL SISTEMA ══
   Cobrador, Ruta con Mapa y Cobros llaman siempre a esta función.
   Así el saldo, el historial y los reportes nunca se descuadran. */
async function registrarPago(idOFac, monto, opts){
  opts = opts || {};
  var c = (typeof idOFac==='number') ? contratos.find(function(x){ return x.id===idOFac; }) : null;
  if(!c) c = buscarContratoPorFac(idOFac);
  if(!c) return null;

  var deuda = Math.max(0, Number(c.saldo)||0);
  var m = Math.max(0, Math.min(Number(monto)||0, deuda));
  if(m<=0) return null;

  let actualizado;
  try{
    actualizado=await apiFetch(`/api/contratos/${c.id}/abonar`,{method:'POST',body:{monto:m,via:opts.via||'manual',nota:opts.nota||''}});
  }catch(e){alert('No se pudo registrar el pago: '+e.message);return null;}

  // Mutar el MISMO objeto que ya tenían los llamadores (abonar/saldar/
  // rtCobrado/etc. leen c.saldo despues del await sobre esta misma
  // referencia) en vez de reemplazarlo, para no romper esos flujos.
  if(!c.abonos) c.abonos=[];
  c.abonos.push({f:hoy(),m,q:ses?ses.n:'Sistema',via:opts.via||'manual',nota:opts.nota||''});
  c.saldo=Number(actualizado.saldo)||0;
  if(c.saldo===0)c.fechaSaldado=hoy();
  return c;
}
/* Total cobrado en un período (lo usa Contabilidad y Rendimiento) */
function ingresosCobranza(desde, hasta){
  var t=0;
  contratos.forEach(function(c){
    (c.abonos||[]).forEach(function(a){
      if(desde && a.f < desde) return;
      if(hasta && a.f > hasta) return;
      t += Number(a.m)||0;
    });
  });
  return t;
}


/* ══════════════════════════════════════════════════════════════════
   EL COBRADOR AHORA TRABAJA SOBRE contratos[]
   Se ve exactamente igual — cambia solo de dónde saca los datos.
══════════════════════════════════════════════════════════════════ */
CB_cargar = function(){
  // Plantilla del mensaje (sigue en localStorage, es solo texto)
  try{
    var pl = localStorage.getItem('cobrador_plantilla');
    var el = document.getElementById('cb-plantilla');
    if(el) el.value = pl || (typeof CB_PLANTILLA_DEF!=='undefined' ? CB_PLANTILLA_DEF : el.value);
  }catch(e){}

  CB_clientes = contratos
    .filter(function(c){ return c.status==='aprobado'; })
    .map(ctoAVista);
  CB_ordenar();                        // siempre de mayor a menor por factura
};

CB_guardar = function(){
  CB_clientes.forEach(function(v){
    var c = (v._id!=null) ? contratos.find(function(x){ return x.id===v._id; }) : null;
    if(!c) c = buscarContratoPorFac(v.no);
    if(c){ vistaAContrato(v, c); }
    else {                              // cliente nuevo creado dentro del Cobrador
      var nc = nuevoContratoDesdeCobrador(v);
      contratos.push(nc);
      v._id = nc.id;
    }
  });
  guardar();                            // IndexedDB — fuente única
};

/* Cobrar / abonar en el Cobrador → pasa por registrarPago() */
CB_registrarAbono = async function(i){
  var v = CB_clientes[i]; if(!v) return;
  var t = prompt('¿Cuánto abonó '+v.nombre+'?\n(debe '+CB_fmt(v.saldo)+')','');
  var m = parseFloat(String(t||'').replace(/[^0-9.]/g,''));
  if(!m || m<=0) return;
  if(m > v.saldo){ alert('El abono no puede ser mayor que la deuda ('+CB_fmt(v.saldo)+').'); return; }
  var c = await registrarPago(v._id!=null ? v._id : v.no, m, {via:'cobrador', nota:'Abono desde el Cobrador'});
  if(!c){ alert('No pude registrar el abono.'); return; }
  CB_cargar(); CB_pintar();
  if(typeof showToast==='function') showToast('💵 '+v.nombre+' abonó '+CB_fmt(m)+' · le queda '+CB_fmt(c.saldo));
};

/* Borrar en el Cobrador = borrar el contrato (es la misma cosa) */
CB_borrarCliente = async function(){
  if(CB_editando===null || CB_editando===undefined) return;
  var v = CB_clientes[CB_editando]; if(!v) return;
  if(!confirm('¿Borrar el contrato '+v.no+' de '+v.nombre+'?\nEsto lo elimina de TODO el sistema.')) return;
  contratos = contratos.filter(function(c){ return c.id !== v._id; });
  await guardar();
  CB_dlg.close();
  CB_cargar(); CB_pintar();
  if(typeof showToast==='function') showToast('Contrato '+v.no+' eliminado');
};

/* La Ruta con Mapa también usa registrarPago() */
rtCobrado = async function(){
  var p=RT.paradas[0]; if(!p) return;

};
rtAbono = async function(){

  var c=p.c;

  var m=parseFloat(String(t||'').replace(/[^0-9.]/g,''));
  if(!m || m<=0) return;
  if(m > (c.saldo||0)){ alert('El abono no puede ser mayor que la deuda ('+fM(c.saldo)+').'); return; }
  await registrarPago(c.id, m, {via:'ruta', nota:'Abono en ruta'});
  RT.recaudado += m;
  showToast('💵 Abonó '+fM(m)+' · le queda '+fM(c.saldo));

/* El módulo Cobros también */
abonar = async function(id){
  var c = contratos.find(function(x){ return x.id===id; }); if(!c) return;
  var el = document.getElementById('abo_'+id);

saldar = async function(id){
  var c = contratos.find(function(x){ return x.id===id; }); if(!c) return;

/* Al abrir el Cobrador: migrar (una vez) y avisar del resultado */
(function(){
