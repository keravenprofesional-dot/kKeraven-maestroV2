<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>KERAVEN Maestro v2</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
/* ═══ RESET + BASE ══════════════════════════════════════════════ */
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#F8F4EE;color:#1A1628;letter-spacing:.01em}

/* ═══ CSS VARS BASE ═════════════════════════════════════════════ */
:root{
  --gold:#D4AF37;--gold-l:#E8C84B;--gold-m:#B8962E;--gold-p:rgba(212,175,55,.1);
  --red:#8B1520;--red2:#521018;--red3:#9E1C30;
  --tx:#1A1628;--t2:#5C5470;--t3:#9088A0;--wh:#fff;
  --bg:#F8F4EE;--bg2:#F0E8D8;
  --br:rgba(196,138,31,.15);--br2:rgba(196,138,31,.25);
  --r:10px;--rl:15px;--rll:20px;
  --k-cream:#F0E8D8;--k-gold:#C48A1F;--k-ink:#1A1628;--k-mist:#9088A0;--k-stone:#5C5470;
  --green:#1a7a42;--gbg:rgba(26,122,66,.08);--gdk:#155a30;
  --blue:#185FA5;--bbg:rgba(24,95,165,.08);--bdk:#0d47a1;
  --er:#c62828;--rbg:rgba(198,40,40,.07);--rdk:#7f0000;
}

/* ═══ LOGIN ═════════════════════════════════════════════════════ */
#login{
  display:flex;align-items:center;justify-content:center;height:100vh;
  background:radial-gradient(ellipse at 15% 40%,rgba(122,20,34,.07),transparent 55%),
    radial-gradient(ellipse at 85% 25%,rgba(196,138,31,.07),transparent 50%),
    radial-gradient(ellipse at 50% 80%,rgba(122,20,34,.05),transparent 60%),
    #F8F4EE;
  position:relative;overflow:hidden
}
#login::before{content:'';position:absolute;width:600px;height:600px;border-radius:50%;
  border:1px solid rgba(196,138,31,.07);top:50%;left:50%;transform:translate(-50%,-60%);pointer-events:none}
.lk-card{
  background:#fff;position:relative;overflow:hidden;
  border:1px solid rgba(196,138,31,.15);border-radius:var(--rll);
  box-shadow:0 2px 4px rgba(26,22,40,.04),0 20px 60px rgba(26,22,40,.12),0 0 0 1px rgba(196,138,31,.08);
  width:100%;max-width:380px
}
.lk-card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;
  background:linear-gradient(90deg,var(--red),var(--gold),var(--red))}
.lk-head{text-align:center;padding:32px 32px 8px;background:linear-gradient(160deg,rgba(122,20,34,.03),transparent 60%)}
.lk-logo3d{
  width:72px;height:72px;border-radius:18px;margin:0 auto 14px;
  background:linear-gradient(145deg,var(--red2),var(--red3),var(--red));
  box-shadow:0 8px 30px rgba(122,20,34,.35),0 2px 6px rgba(0,0,0,.2),inset 0 1px 0 rgba(255,255,255,.1);
  display:flex;align-items:center;justify-content:center;font-size:30px;position:relative
}
.lk-logo3d::after{content:'';position:absolute;inset:0;border-radius:18px;
  background:linear-gradient(145deg,rgba(255,255,255,.12),transparent 50%)}
.lk-brand{font-size:26px;font-weight:900;letter-spacing:.12em;
  background:linear-gradient(135deg,var(--red),var(--gold),var(--red));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.lk-sub{font-size:10px;letter-spacing:.2em;color:var(--t2);margin-top:3px;text-transform:uppercase}
.lk-body{padding:20px 32px 32px}
.lbl{display:block;font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--t2);margin-bottom:5px;margin-top:13px}
.linp{
  width:100%;padding:10px 12px;background:#f8f4ee;
  border:1.5px solid rgba(196,138,31,.2);border-radius:var(--r);
  font-size:14px;font-family:inherit;outline:none;
  box-shadow:inset 0 2px 5px rgba(26,22,40,.04);transition:all .2s;color:var(--tx)
}
.linp:focus{border-color:var(--gold);background:#fff;box-shadow:0 0 0 3px rgba(196,138,31,.12),inset 0 1px 3px rgba(26,22,40,.02)}
.pin-row{display:flex;gap:10px;justify-content:center;margin:14px 0}
.pin-d{
  width:50px;height:58px;background:#f8f4ee;border:2px solid rgba(196,138,31,.2);
  border-radius:10px;font-size:24px;text-align:center;color:var(--red);font-weight:700;
  outline:none;box-shadow:inset 0 2px 6px rgba(26,22,40,.06);transition:all .2s
}
.pin-d:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(196,138,31,.15),inset 0 2px 4px rgba(26,22,40,.04)}
.lerr{color:var(--er);font-size:12px;text-align:center;margin:8px 0;min-height:16px}
.lbtn{
  width:100%;margin-top:6px;padding:12px;
  background:linear-gradient(135deg,var(--red),var(--red3));
  color:var(--gold-l);border:none;border-radius:var(--r);
  font-size:13px;font-weight:700;letter-spacing:.06em;cursor:pointer;font-family:inherit;
  box-shadow:0 6px 20px rgba(122,20,34,.3),0 2px 6px rgba(0,0,0,.1),inset 0 1px 0 rgba(255,255,255,.1);
  transition:all .2s
}
.lbtn:hover{transform:translateY(-1px);box-shadow:0 8px 28px rgba(122,20,34,.38)}
.lbtn:active{transform:none;box-shadow:0 3px 10px rgba(122,20,34,.25)}

/* ═══ APP ═══════════════════════════════════════════════════════ */
#app{display:none;height:100vh;flex-direction:column}
#app.on{display:flex}

/* ═══ TOPBAR ════════════════════════════════════════════════════ */
.topbar{
  background:#fff;display:flex;align-items:center;gap:10px;padding:0 20px;height:54px;flex-shrink:0;
  position:relative;box-shadow:0 1px 0 rgba(26,22,40,.06),0 4px 20px rgba(26,22,40,.05)
}
.topbar::before{content:'';position:absolute;left:0;top:0;right:0;height:3px;
  background:linear-gradient(90deg,var(--red),var(--gold),var(--red))}
.ham{background:none;border:none;font-size:22px;cursor:pointer;color:var(--t2);padding:4px}
.tb-title{font-size:16px;font-weight:700;flex:1;color:var(--tx)}
.tb-av{
  width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:800;color:var(--gold-l);
  background:linear-gradient(135deg,var(--red),var(--red3));
  border:2px solid var(--gold);box-shadow:0 3px 10px rgba(122,20,34,.3)
}

/* ═══ OVERLAY ═══════════════════════════════════════════════════ */
#ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:40;backdrop-filter:blur(2px)}
#ov.on{display:block}

/* ═══ SIDEBAR ═══════════════════════════════════════════════════ */
.sidebar{
  position:fixed;top:0;bottom:0;left:0;width:252px;
  background:linear-gradient(170deg,#0B0E1B 0%,#131530 40%,#0D1122 70%,#0B0E1B 100%);
  display:flex;flex-direction:column;z-index:50;
  transform:translateX(-110%);transition:transform .25s ease;
  border-right:1px solid rgba(196,138,31,.18);
  box-shadow:6px 0 40px rgba(0,0,0,.25)
}
.sidebar.on{transform:none}
.sb-top{
  background:linear-gradient(135deg,rgba(196,138,31,.12),rgba(122,20,34,.12));
  border-bottom:1px solid rgba(196,138,31,.2);
  padding:20px 18px 16px;
  position:relative;overflow:hidden;flex-shrink:0
}
.sb-top::before{content:'';position:absolute;top:-30px;right:-30px;width:100px;height:100px;
  background:radial-gradient(circle,rgba(196,138,31,.15),transparent 70%);border-radius:50%}
.sb-brand{
  font-size:20px;font-weight:900;letter-spacing:.14em;display:block;line-height:1.1;
  background:linear-gradient(135deg,#DBA830,#E8C84B,#C48A1F,#DBA830);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text
}
.sb-sub2{font-size:8.5px;letter-spacing:.2em;color:rgba(196,138,31,.55);text-transform:uppercase;margin-top:2px}
.sb-x{background:none;border:none;color:rgba(212,175,55,.5);font-size:18px;cursor:pointer;
  position:absolute;top:14px;right:14px}
.sb-x:hover{color:var(--gold)}
.sb-us{
  background:rgba(255,255,255,.04);border-bottom:1px solid rgba(196,138,31,.12);
  padding:11px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0
}
.sb-av2{
  width:36px;height:36px;border-radius:50%;
  background:linear-gradient(135deg,var(--red),var(--red3));
  border:2px solid rgba(196,138,31,.4);
  display:flex;align-items:center;justify-content:center;
  font-weight:800;font-size:14px;color:var(--gold-l);
  flex-shrink:0;box-shadow:0 2px 8px rgba(122,20,34,.4)
}
.sb-nm{font-size:13px;font-weight:600;color:#E8E8F4}
.sb-rl{font-size:9.5px;color:rgba(255,255,255,.3);text-transform:uppercase;letter-spacing:.07em;margin-top:1px}
.sb-nav{flex:1;overflow-y:auto;padding:8px 0}
.sb-nav::-webkit-scrollbar{width:3px}
.sb-nav::-webkit-scrollbar-thumb{background:rgba(196,138,31,.2);border-radius:3px}
.nav-sec{
  font-size:8px;letter-spacing:.18em;color:rgba(196,138,31,.35);text-transform:uppercase;
  padding:14px 18px 5px;font-weight:700
}
.nav-it{
  display:flex;align-items:center;gap:9px;padding:10px 18px;width:100%;background:none;
  border:none;border-left:2px solid transparent;
  color:rgba(255,255,255,.92);font-size:14px;font-weight:600;
  cursor:pointer;font-family:inherit;transition:all .18s;text-align:left;
  text-shadow:0 0 12px rgba(255,255,255,.15)
}
.nav-it i{font-size:15px;width:18px;text-align:center;flex-shrink:0}
.nav-it:hover{
  background:rgba(255,255,255,.07);color:#fff;
  border-left-color:rgba(255,255,255,.4);
  text-shadow:0 0 14px rgba(255,255,255,.3)
}
.nav-it.act{
  background:linear-gradient(90deg,rgba(196,138,31,.18),rgba(196,138,31,.05));
  color:#FFE066;border-left-color:var(--gold);font-weight:700;
  text-shadow:0 0 16px rgba(255,224,102,.35)
}
.nav-it.off{opacity:.35;pointer-events:none}
.nav-bd{background:#e24b4a;color:#fff;border-radius:100px;padding:1px 6px;font-size:9px;font-weight:800;margin-left:auto}
.sb-bot{padding:10px 14px;border-top:1px solid rgba(196,138,31,.12);flex-shrink:0}
.sb-out{
  display:flex;align-items:center;gap:7px;padding:9px 13px;width:100%;background:none;
  border:1px solid rgba(196,138,31,.2);border-radius:var(--r);
  color:rgba(196,138,31,.6);font-size:12px;cursor:pointer;font-family:inherit;transition:all .2s
}
.sb-out:hover{background:rgba(196,138,31,.1);color:var(--gold-l);border-color:var(--gold)}

/* ═══ CONTENT AREA ══════════════════════════════════════════════ */
.content{flex:1;overflow-y:auto;padding:14px;scroll-behavior:smooth;width:100%}

/* ═══ BOTTOM NAV ════════════════════════════════════════════════ */
.botnav{
  background:#fff;display:flex;flex-shrink:0;
  box-shadow:0 -2px 20px rgba(26,22,40,.08),0 -1px 0 rgba(196,138,31,.1)
}
.bn{
  display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;
  padding:5px 4px 7px;background:none;border:none;color:var(--t3);font-size:9px;
  font-weight:600;cursor:pointer;font-family:inherit;position:relative;min-height:54px;
  gap:2px;transition:all .15s
}
.bn i{font-size:20px}
.bn.act{color:var(--gold)}
.bn-bd{position:absolute;top:2px;right:calc(50% - 18px);background:#e24b4a;color:#fff;
  border-radius:100px;padding:1px 5px;font-size:8px;font-weight:800}
.bn-cfg{background:none;border:none;color:var(--t3);font-size:22px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;padding:4px;min-height:54px}

/* ═══ MODAL ══════════════════════════════════════════════════════ */
#modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;
  align-items:center;justify-content:center;padding:14px;
  backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px)}
#modal.on{display:flex}
.mbox{
  background:#fff;border:1px solid rgba(196,138,31,.15);border-radius:var(--rll);
  width:100%;max-width:680px;max-height:90vh;
  display:flex;flex-direction:column;overflow:hidden;
  box-shadow:0 8px 60px rgba(26,22,40,.18),0 2px 10px rgba(26,22,40,.08)
}
.mhd{
  background:linear-gradient(135deg,rgba(122,20,34,.04),rgba(196,138,31,.04));
  border-bottom:1px solid rgba(196,138,31,.12);padding:18px 22px;
  border-radius:var(--rll) var(--rll) 0 0;
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0
}
.mhd h3{font-size:14px;font-weight:700;color:var(--tx)}
.mclz{width:28px;height:28px;border-radius:50%;border:1px solid rgba(196,138,31,.2);
  background:#fff;cursor:pointer;font-size:14px;color:var(--t2)}
.mbody{padding:18px 22px;overflow-y:auto;flex:1}
.mft{padding:12px 22px;border-top:1px solid rgba(196,138,31,.1);display:flex;justify-content:flex-end;gap:7px;flex-shrink:0}

/* ═══ TOAST ══════════════════════════════════════════════════════ */
#toast-wrap{position:fixed;bottom:70px;right:14px;z-index:999;display:flex;flex-direction:column;gap:6px;align-items:flex-end}

/* ═══ CARDS ══════════════════════════════════════════════════════ */
.card{
  background:#fff;border:1px solid rgba(196,138,31,.1);border-radius:var(--rl);
  padding:16px;margin-bottom:13px;
  box-shadow:0 2px 4px rgba(26,22,40,.05),0 8px 28px rgba(26,22,40,.09);
  transition:transform .2s,box-shadow .2s
}
.ct{
  font-size:14px;font-weight:700;color:var(--tx);
  padding-bottom:12px;margin-bottom:13px;display:flex;align-items:center;gap:8px;
  border-bottom:2px solid;
  border-image:linear-gradient(90deg,var(--red),var(--gold),transparent) 1
}
.cs{font-size:12px;color:var(--t2);margin-bottom:12px;line-height:1.6}
.sep,.sl{
  font-size:9.5px;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:.1em;
  padding:8px 0 5px;border-bottom:1px solid rgba(196,138,31,.15);
  margin:6px 0 12px;display:flex;align-items:center;gap:6px
}
.sl2{font-size:9.5px;font-weight:600;color:var(--t2);text-transform:uppercase;letter-spacing:.06em;margin-top:2px}

/* ═══ STAT GRID ══════════════════════════════════════════════════ */
.sg{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:13px}
.st{
  background:#fff;border:none;border-radius:var(--rl);padding:18px;
  box-shadow:0 2px 4px rgba(26,22,40,.05),0 8px 28px rgba(26,22,40,.09);
  position:relative;overflow:hidden;transition:transform .2s,box-shadow .2s;cursor:pointer
}
.st::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,var(--red),var(--gold))}
.st::after{content:'';position:absolute;bottom:-20px;right:-20px;width:70px;height:70px;
  border-radius:50%;background:radial-gradient(circle,rgba(196,138,31,.08),transparent 70%)}
.st:hover{transform:translateY(-3px) scale(1.01);box-shadow:0 4px 8px rgba(26,22,40,.08),0 20px 50px rgba(26,22,40,.13)}
.sv{font-size:24px;font-weight:800;color:var(--red);line-height:1.1;margin-bottom:3px}

/* ═══ BUTTONS ════════════════════════════════════════════════════ */
.bg{
  background:linear-gradient(135deg,var(--gold),var(--gold-l));color:#1a0a0f;
  border:none;border-radius:var(--r);padding:9px 16px;font-size:12px;font-weight:700;
  cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:5px;
  box-shadow:0 4px 16px rgba(196,138,31,.22),0 1px 4px rgba(196,138,31,.12);transition:all .2s
}
.bg:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(196,138,31,.35)}
.bs{
  background:#fff;border:1.5px solid rgba(196,138,31,.3);color:var(--gold-m);
  border-radius:var(--r);padding:9px 14px;font-size:12px;font-weight:600;
  cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:5px;transition:all .18s
}
.bs:hover{background:rgba(196,138,31,.06);border-color:var(--gold)}
.bv{
  background:linear-gradient(135deg,#1a7a42,#228b4a);color:#fff;border:none;
  border-radius:var(--r);padding:9px 14px;font-size:12px;font-weight:600;
  cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:5px;
  box-shadow:0 3px 10px rgba(26,122,66,.25);transition:all .18s
}
.bv:hover{transform:translateY(-1px);box-shadow:0 5px 16px rgba(26,122,66,.35)}
.bre{
  background:linear-gradient(135deg,var(--red),var(--red3));color:var(--gold-l);
  border:none;border-radius:var(--r);padding:9px 14px;font-size:12px;font-weight:600;
  cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:5px;
  box-shadow:0 4px 14px rgba(122,20,34,.3);transition:all .2s
}
.bre:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(122,20,34,.4)}
.bsm{
  background:#fff;border:1px solid rgba(196,138,31,.25);color:var(--gold-m);
  border-radius:7px;padding:5px 10px;font-size:11px;cursor:pointer;
  font-family:inherit;display:inline-flex;align-items:center;gap:4px;transition:all .15s
}
.bsm:hover{background:rgba(196,138,31,.06);border-color:var(--gold)}
.bap{
  background:linear-gradient(135deg,#1a7a42,#228b4a);color:#fff;border:none;
  border-radius:var(--r);padding:11px;font-size:13px;font-weight:700;
  cursor:pointer;font-family:inherit;width:100%;display:flex;align-items:center;justify-content:center;gap:7px
}
.btn-sm{padding:5px 10px!important;font-size:11px!important}
.gbtn{
  background:linear-gradient(135deg,var(--tx),#2a2040);color:var(--gold-l);
  border:1px solid rgba(196,138,31,.3);border-radius:var(--r);
  padding:8px 14px;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;
  box-shadow:0 3px 10px rgba(0,0,0,.15);transition:all .18s
}
.gbtn:hover{box-shadow:0 4px 14px rgba(0,0,0,.22)}

/* ═══ FORMS ══════════════════════════════════════════════════════ */
.fi{margin-bottom:11px}
.fi label{display:block;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--t2);margin-bottom:5px}
.fi input,.fi select,.fi textarea{
  width:100%;padding:10px 12px;background:#f8f4ee;
  border:1.5px solid rgba(196,138,31,.18);border-radius:var(--r);
  font-size:13px;font-family:inherit;outline:none;color:var(--tx);
  box-shadow:inset 0 1px 4px rgba(26,22,40,.04);transition:all .18s
}
.fi input:focus,.fi select:focus,.fi textarea:focus{
  border-color:var(--gold);background:#fff;
  box-shadow:0 0 0 3px rgba(196,138,31,.12),inset 0 1px 2px rgba(26,22,40,.02)
}
.fi textarea{min-height:70px;resize:vertical}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.sp2{grid-column:span 2}
.req{color:var(--er)}
.em{color:var(--er);font-size:11px;margin-top:2px;min-height:14px}

/* ═══ TABLES ══════════════════════════════════════════════════════ */
.tbl-wrap{overflow-x:auto;border-radius:var(--rl);border:1px solid rgba(196,138,31,.1);
  box-shadow:0 2px 4px rgba(26,22,40,.05),0 8px 28px rgba(26,22,40,.09)}
.tbl{width:100%;border-collapse:separate;border-spacing:0;min-width:max-content;white-space:nowrap}
.tbl thead th{
  background:linear-gradient(135deg,var(--red2),var(--red));color:var(--gold-l);
  font-size:9.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  padding:11px 14px;border:none;position:sticky;top:0;z-index:2;white-space:nowrap
}
.tbl thead th:first-child{border-radius:var(--r) 0 0 0}.tbl thead th:last-child{border-radius:0 var(--r) 0 0}
.tbl tbody td{
  padding:10px 14px;border-bottom:1px solid rgba(196,138,31,.06);
  font-size:13px;vertical-align:middle;white-space:nowrap;color:var(--tx);transition:background .12s
}
.tbl tbody tr:nth-child(even) td{background:rgba(248,244,238,.6)}
.tbl tbody tr:hover td{background:rgba(196,138,31,.06)!important}
.tbl tfoot td{
  background:linear-gradient(90deg,rgba(122,20,34,.06),rgba(196,138,31,.06));
  font-weight:700;padding:10px 14px;border-top:2px solid rgba(196,138,31,.2)
}
.tr{text-align:right!important}

/* ═══ STATUS PILLS ════════════════════════════════════════════════ */
.stp,.sta,.str,.cc-st{border-radius:100px;padding:3px 10px;font-size:10px;font-weight:700;letter-spacing:.04em}
.stp{background:linear-gradient(135deg,rgba(196,138,31,.12),rgba(196,138,31,.07));color:var(--red);border:1px solid rgba(196,138,31,.25)}
.sta{background:linear-gradient(135deg,rgba(26,122,66,.1),rgba(26,122,66,.06));color:#1a7a42;border:1px solid rgba(26,122,66,.25)}
.str{background:linear-gradient(135deg,rgba(122,20,34,.1),rgba(122,20,34,.06));color:var(--red);border:1px solid rgba(122,20,34,.25)}
.pill{background:linear-gradient(135deg,rgba(196,138,31,.1),rgba(196,138,31,.06));border:1px solid rgba(196,138,31,.25);
  color:var(--red);border-radius:100px;padding:3px 10px;font-size:10.5px;font-weight:700;letter-spacing:.03em}

/* ═══ TABS ════════════════════════════════════════════════════════ */
.tab{background:transparent;border:none;border-radius:7px;padding:7px 13px;font-size:12px;font-weight:600;cursor:pointer;color:var(--t2);transition:all .15s;font-family:inherit}
.tab.act{background:#fff;color:var(--red);box-shadow:0 2px 8px rgba(26,22,40,.1)}
.tab-bar{display:flex;gap:3px;background:rgba(240,232,216,.7);border-radius:var(--r);padding:4px}
.tab-btn{border:none;background:transparent;border-radius:7px;padding:7px 16px;font-size:12px;font-weight:600;color:var(--t2);cursor:pointer;transition:all .18s;font-family:inherit}
.tab-btn.act{background:#fff;color:var(--red);box-shadow:0 2px 8px rgba(26,22,40,.1)}

/* ═══ EMPTY ═══════════════════════════════════════════════════════ */
.empty{
  background:linear-gradient(145deg,rgba(196,138,31,.04),rgba(122,20,34,.03));
  border:2px dashed rgba(196,138,31,.15);border-radius:var(--rll);
  padding:50px 24px;text-align:center;color:var(--t3)
}
.empty i{color:rgba(196,138,31,.25);font-size:44px;display:block;margin-bottom:14px}

/* ═══ CONTRACT CARDS ══════════════════════════════════════════════ */
.cc{border:1px solid rgba(196,138,31,.1);border-radius:var(--rl);background:#fff;overflow:hidden;
  box-shadow:0 2px 8px rgba(26,22,40,.06);transition:all .18s;margin-bottom:9px}
.cc:hover{border-color:rgba(196,138,31,.25);box-shadow:0 4px 16px rgba(26,22,40,.1)}
.cc.exp{border-color:var(--gold);box-shadow:0 0 0 2px rgba(196,138,31,.12)}
.cc-hd,.cob-hd{padding:13px 15px;display:flex;align-items:center;gap:10px;cursor:pointer;flex-wrap:wrap}
.cc-fac{font-size:10px;font-weight:700;letter-spacing:.07em;background:linear-gradient(135deg,var(--red),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.cc-nom{font-size:13px;font-weight:600}
.cc-met{font-size:11px;color:var(--t2)}
.cc-bd{display:flex;align-items:center;gap:5px;margin-left:auto;flex-shrink:0}
.apg{display:grid;grid-template-columns:1fr 1fr;gap:9px;padding:12px 14px;border-top:1px solid rgba(196,138,31,.08)}
.pna{background:linear-gradient(145deg,rgba(26,122,66,.07),rgba(26,122,66,.04));border:1.5px solid rgba(26,122,66,.2);border-radius:var(--r);padding:12px}
.pna-t{font-size:12px;font-weight:700;color:#1a7a42;margin-bottom:5px;display:flex;align-items:center;gap:5px}
.pnr{background:linear-gradient(145deg,rgba(122,20,34,.06),rgba(196,138,31,.04));border:1.5px solid rgba(196,138,31,.2);border-radius:var(--rl);padding:12px}
.pnr-t{font-size:12px;font-weight:700;color:var(--red);margin-bottom:5px;display:flex;align-items:center;gap:5px}
.ra{background:linear-gradient(135deg,rgba(26,122,66,.08),rgba(26,122,66,.04));border:1px solid rgba(26,122,66,.2);border-radius:var(--r);padding:10px 13px;font-size:12px;color:#1a7a42;display:flex;align-items:center;gap:7px;margin:10px 14px}
.rr{background:linear-gradient(135deg,rgba(122,20,34,.06),rgba(122,20,34,.03));border:1px solid rgba(122,20,34,.2);border-radius:var(--r);padding:10px 13px;font-size:12px;color:var(--red);display:flex;align-items:center;gap:7px;margin:10px 14px}
.dg{display:grid;grid-template-columns:1fr 1fr;gap:10px 14px;margin-bottom:12px}
.dl{font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--t3)}
.dv{font-size:13px;color:var(--tx);font-weight:500;margin-top:1px}
.trow{display:flex;gap:8px;margin-top:8px}
.th{flex:1;background:#f8f4ee;border-radius:var(--r);overflow:hidden;height:80px;display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--t3);cursor:pointer}
.th img{width:100%;height:100%;object-fit:cover}

/* ═══ PRODUCTS ════════════════════════════════════════════════════ */
.plist{display:flex;flex-direction:column;gap:2px;max-height:230px;overflow-y:auto}
.pi{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:var(--r);cursor:pointer;transition:all .15s;font-size:13px;border:1px solid transparent}
.pi:hover{background:rgba(196,138,31,.06);border-color:rgba(196,138,31,.2)}
.pi.pk{background:linear-gradient(135deg,rgba(196,138,31,.1),rgba(196,138,31,.05));border-color:rgba(196,138,31,.3);font-weight:600}
.ptags{display:flex;flex-wrap:wrap;gap:3px;margin-top:5px}
.ptag{display:inline-flex;align-items:center;gap:2px;padding:3px 9px;background:linear-gradient(135deg,rgba(196,138,31,.12),rgba(196,138,31,.06));border:1px solid rgba(196,138,31,.25);border-radius:100px;font-size:11px;color:var(--red);font-weight:600}
.ptag button{background:none;border:none;cursor:pointer;color:var(--gold);padding:0;font-size:13px}
.ppill{background:linear-gradient(135deg,rgba(196,138,31,.1),rgba(196,138,31,.06));border:1px solid rgba(196,138,31,.22);border-radius:100px;font-size:10px;color:var(--red);font-weight:600;padding:3px 8px}

/* ═══ PHOTOS ══════════════════════════════════════════════════════ */
.fb{border:2px dashed rgba(196,138,31,.25);border-radius:var(--rl);background:linear-gradient(145deg,#f8f4ee,#f0e8d8);min-height:88px;transition:all .2s;position:relative;overflow:hidden;cursor:pointer}
.fb:hover{border-color:var(--gold);background:rgba(196,138,31,.06);box-shadow:0 4px 16px rgba(196,138,31,.15)}
.ftop{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--red);padding:4px 8px;background:linear-gradient(90deg,rgba(122,20,34,.07),transparent);border-radius:6px 6px 0 0}
.fb-badge{position:absolute;top:7px;right:7px;background:var(--green);color:#fff;border-radius:100px;padding:2px 7px;font-size:9px;font-weight:700}
.fb-ov{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.55);padding:5px;display:flex;gap:4px;justify-content:center}
.fb-ov button{padding:4px 10px;border-radius:5px;border:none;cursor:pointer;font-size:11px;font-family:inherit}

/* ═══ GPS ═════════════════════════════════════════════════════════ */
.mapa{display:none;gap:7px;margin-top:7px;flex-wrap:wrap}
.mapa a{display:inline-flex;align-items:center;gap:5px;padding:6px 11px;background:#fff;border:1px solid rgba(196,138,31,.2);border-radius:var(--r);font-size:12px;color:var(--blue);text-decoration:none}

/* ═══ USERS ═══════════════════════════════════════════════════════ */
.ug{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:12px}
.uc{background:#fff;border:1px solid rgba(196,138,31,.1);border-radius:var(--rl);padding:11px 13px;display:flex;align-items:center;gap:9px;box-shadow:0 2px 6px rgba(26,22,40,.05)}
.uc.me{border-color:var(--gold);background:rgba(196,138,31,.04)}
.uav{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;color:#fff;flex-shrink:0}
.unm{font-size:12px;font-weight:600;display:flex;align-items:center;gap:4px;flex-wrap:wrap}
.url{font-size:10px;color:var(--t2);margin-top:1px}
.upin{font-size:9px;color:var(--t3);margin-top:1px;display:flex;align-items:center;gap:2px}
.uacts{display:flex;gap:4px;flex-shrink:0}
.ub{width:27px;height:27px;border:1px solid rgba(196,138,31,.2);border-radius:6px;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--t2);transition:all .15s}
.ub:hover{border-color:var(--gold);color:var(--gold)}
.ub.del:hover{border-color:var(--er);color:var(--er)}
.af{background:linear-gradient(145deg,#f8f4ee,#f5f0e8);border:1px solid rgba(196,138,31,.18);border-radius:var(--rl);padding:14px;box-shadow:inset 0 2px 8px rgba(26,22,40,.04)}
.selfbox{border:2px solid var(--gold);background:rgba(196,138,31,.05);border-radius:var(--rl);padding:12px;margin-bottom:12px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}

/* ═══ COMMISSION CARDS ════════════════════════════════════════════ */
.pg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.pc{border-radius:var(--rl);padding:11px;text-align:center}
.pc.tot{background:linear-gradient(135deg,#0d0d0d,#1a1a1a);border:1px solid var(--gold)}
.pc.cred{background:var(--bbg);border:1px solid rgba(24,95,165,.25)}
.pc.cont{background:var(--gbg);border:1px solid rgba(26,122,66,.25)}
.pc.cnt{background:#f7f7f5;border:1px solid rgba(196,138,31,.15)}
.pv{font-size:17px;font-weight:700}
.pc.tot .pv{color:var(--gold-l)}.pc.cred .pv{color:var(--bdk)}.pc.cont .pv{color:var(--gdk)}.pc.cnt .pv{color:var(--tx)}
.pl{font-size:9px;text-transform:uppercase;letter-spacing:.05em;margin-top:3px}
.pc.tot .pl{color:var(--gold)}.pc.cred .pl{color:var(--blue)}.pc.cont .pl{color:var(--green)}
.pr{background:#fff;border:1px solid rgba(196,138,31,.1);border-radius:var(--rl);padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:11px;flex-wrap:wrap}
.pr-nm{font-size:13px;font-weight:600;min-width:100px}
.pr-det{flex:1;display:flex;gap:10px;flex-wrap:wrap}
.pdi{display:flex;flex-direction:column;gap:2px}
.pdl{font-size:9px;color:var(--t2);text-transform:uppercase;letter-spacing:.05em;font-weight:600}
.pdv{font-size:12px;font-weight:500}
.pr-com{font-size:16px;font-weight:700;color:var(--gold);white-space:nowrap}
.sc{background:#fff;border:1px solid rgba(196,138,31,.1);border-radius:var(--rl);margin-bottom:8px;overflow:hidden}
.sc-hd{display:flex;align-items:center;gap:8px;padding:12px 14px;cursor:pointer;flex-wrap:wrap}

/* ═══ MISC ════════════════════════════════════════════════════════ */
.flujo{background:linear-gradient(135deg,rgba(248,244,238,.8),rgba(240,232,216,.5));border:1px solid rgba(196,138,31,.12);border-radius:var(--rl);padding:11px 13px;font-size:12px;color:var(--t2);display:flex;gap:8px;align-items:flex-start;margin:8px 0;box-shadow:inset 0 1px 0 rgba(255,255,255,.8)}
.ig{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:9px}
.ic{background:#fff;border:1px solid rgba(196,138,31,.1);border-radius:var(--rl);padding:11px}
.ic.ok{border-color:rgba(26,122,66,.35)}.ic.warn{border-color:#D97706}.ic.crit{border-color:rgba(198,40,40,.35)}
.in{font-size:11px;font-weight:600;margin-bottom:3px}
.ibg{background:#f0f0ec;border-radius:2px;height:4px;margin-top:4px;overflow:hidden}
.ib{height:100%;border-radius:2px}
.okbox{background:var(--gbg);border:1px solid rgba(26,122,66,.22);border-radius:var(--r);padding:10px 13px;font-size:12px;color:var(--gdk);display:flex;align-items:center;gap:7px}
.mg{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:12px}
.mc{background:#fff;border:1px solid rgba(196,138,31,.1);border-radius:var(--rl);padding:11px;box-shadow:0 2px 6px rgba(26,22,40,.05);transition:all .18s}
.mc:hover{border-color:rgba(196,138,31,.25);transform:translateY(-2px);box-shadow:0 6px 18px rgba(26,22,40,.1)}
.ro{background:#f8f4ee;border:1.5px solid rgba(196,138,31,.2);border-radius:var(--r);color:var(--t2);font-size:13px;transition:all .18s;padding:11px 18px}
.ro.on{background:linear-gradient(135deg,rgba(122,20,34,.1),rgba(196,138,31,.07));border-color:var(--gold);color:var(--red);font-weight:700}

/* ═══ RESPONSIVE ══════════════════════════════════════════════════ */
@media(min-width:700px){
  .sg,.pg{grid-template-columns:repeat(4,1fr)}
  .mg,.ig,.ug{grid-template-columns:repeat(3,1fr)}
  .botnav{display:none!important}
  .content{padding-bottom:14px}
}
@media(max-width:699px){
  .g2,.g3,.g4,.dg,.apg,.fg{grid-template-columns:1fr}
  .sp2{grid-column:span 1}
}

/* ═══ ANIMATIONS ══════════════════════════════════════════════════ */
@keyframes k-fadeup{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes k-popIn{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}
#main>.card{animation:k-fadeup .3s ease both}
#main>.card:nth-child(1){animation-delay:.03s}
#main>.card:nth-child(2){animation-delay:.07s}
#main>.card:nth-child(3){animation-delay:.11s}

/* ═══ SCROLLBAR ═══════════════════════════════════════════════════ */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:rgba(240,232,216,.5)}
::-webkit-scrollbar-thumb{background:rgba(196,138,31,.3);border-radius:99px}
::-webkit-scrollbar-thumb:hover{background:rgba(196,138,31,.5)}

@media print{
  .sidebar,.topbar,.botnav{display:none!important}
  .content{margin-left:0!important}
  body{background:#fff}
  .card{box-shadow:none;border:1px solid #ddd}
  .tbl thead th{-webkit-print-color-adjust:exact;print-color-adjust:exact}
}

// ── API ────────────────────────────────────────────────────────────
// Helper unico para hablar con el backend. Siempre manda la cookie de
// sesion (credentials:'include') y lanza un error legible si la
// respuesta no es 2xx, para que cada llamador solo tenga que
// try/catch y mostrar el mensaje.
async function apiFetch(url,opts={}){
  const r=await fetch(url,{
    ...opts,
    headers:{'Content-Type':'application/json',...(opts.headers||{})},
    credentials:'include',
    body:opts.body?JSON.stringify(opts.body):undefined,
  });
  let data=null;
  try{data=await r.json();}catch(e){}
  if(!r.ok){
    const err=new Error(data?.error||('Error '+r.status));
    err.status=r.status;err.data=data;throw err;
  }
  return data;
}

// ── INDEXEDDB ──────────────────────────────────────────────────────
const DB='keraven2';
function openDB(){
  return new Promise((res,rej)=>{
    const r=indexedDB.open(DB,1);
    r.onupgradeneeded=e=>{if(!e.target.result.objectStoreNames.contains('kv'))e.target.result.createObjectStore('kv',{keyPath:'k'});};
    r.onsuccess=e=>res(e.target.result);
    r.onerror=()=>rej();
  });
}
async function dbSave(k,v){try{const db=await openDB();const t=db.transaction('kv','readwrite');t.objectStore('kv').put({k,v});}catch(e){}}
async function dbLoad(k){try{const db=await openDB();return new Promise(r=>{const t=db.transaction('kv','readonly');const q=t.objectStore('kv').get(k);q.onsuccess=e=>r(e.target.result?.v??null);q.onerror=()=>r(null);});}catch(e){return null;}}
// `contratos` ya NO pasa por acá — vive en la base de datos real y se
// maneja con cargarContratos()/apiFetch. El resto de los módulos
// (almacén, comisiones, nómina, etc.) todavía no está migrado, así

async function login(){
  const uid=$('lu').value,pin=$('lpin').value,err=$('lerr');
  err.textContent='';
  if(!uid){err.textContent='Selecciona tu usuario.';return;}
  if(!pin||pin.length!==4){err.textContent='Ingresa tu PIN de 4 dígitos.';return;}
  let resp;
  try{
    resp=await apiFetch('/api/login',{method:'POST',body:{usuarioId:Number(uid),pin}});
  }catch(e){
    if(e.status===429){err.textContent='Demasiados intentos. Cuenta bloqueada temporalmente, intenta en unos minutos.';}
    else{err.textContent='Usuario o PIN incorrecto.';}
    $('lpin').value='';
    return;
  }
  const u=mapUsuarioApi(resp.usuario);
  sesPermisos=resp.permisos||[];
  ses=u;
  $('login').style.display='none';
  $('app').classList.add('on');

  $('sbav').textContent=u.n[0];$('sbav').style.background=u.c;
  $('sbnm').textContent=u.n;$('sbrl').textContent=u.rl;
  await cargarProductos();
  await cargarContratos();
  await cargar();
  buildNav();buildBotNav();ir('dash');
}

function kvToggleOrg(){
  _kvOrgMode=!_kvOrgMode;

  if(!grid||!btn)return;

  if(_kvOrgMode){
    // Activar modo organizar

      card.setAttribute('draggable','true');
      card.addEventListener('dragstart',kvDragStart);
      card.addEventListener('dragend',kvDragEnd);
      card.addEventListener('dragover',kvDragOver);
      card.addEventListener('dragleave',kvDragLeave);
      card.addEventListener('drop',kvDrop);
      // Touch support
      card.addEventListener('touchstart',kvTouchStart,{passive:true});
      card.addEventListener('touchmove',kvTouchMove,{passive:false});
      card.addEventListener('touchend',kvTouchEnd);
    });
    showToast('Arrastra los módulos para reorganizarlos','info');
  } else {
    // Desactivar y guardar
    grid.classList.remove('edit-mode');
    btn.classList.remove('active');
    ico.textContent='✥';
    txt.textContent='Organizar';
    grid.querySelectorAll('.lc').forEach(function(card){
      card.setAttribute('draggable','false');
      card.classList.remove('dragging','drag-over');
    });
    kvSaveOrder();
    showToast('✅ Orden guardado');
  }
}

function kvLcClick(e,id){

// ── MOUSE DRAG ──────────────────────────────────────────────────
function kvDragStart(e){
  _kvDragSrc=this;
  this.classList.add('dragging');
  e.dataTransfer.effectAllowed='move';
  e.dataTransfer.setData('text/plain',this.getAttribute('data-id'));
}
function kvDragEnd(){
  this.classList.remove('dragging');
  document.querySelectorAll('.lc').forEach(function(c){c.classList.remove('drag-over');});
}
function kvDragOver(e){
  e.preventDefault();e.dataTransfer.dropEffect='move';
  if(this!==_kvDragSrc){
    document.querySelectorAll('.lc').forEach(function(c){c.classList.remove('drag-over');});
    this.classList.add('drag-over');
  }
}
function kvDragLeave(){this.classList.remove('drag-over');}
function kvDrop(e){
  e.preventDefault();
  if(_kvDragSrc&&this!==_kvDragSrc){
    var grid=document.getElementById('kv_grid');
    var cards=[].slice.call(grid.querySelectorAll('.lc'));
    var srcIdx=cards.indexOf(_kvDragSrc);
    var tgtIdx=cards.indexOf(this);
    if(srcIdx<tgtIdx){grid.insertBefore(_kvDragSrc,this.nextSibling);}
    else{grid.insertBefore(_kvDragSrc,this);}
    this.classList.remove('drag-over');
  }
}

// ── TOUCH DRAG (móvil) ──────────────────────────────────────────
var _tvSrc=null,_tvClone=null,_tvStartX=0,_tvStartY=0;
function kvTouchStart(e){
  _tvSrc=this;
  _tvStartX=e.touches[0].clientX;_tvStartY=e.touches[0].clientY;
  var rect=this.getBoundingClientRect();
  _tvClone=this.cloneNode(true);
  _tvClone.style.cssText='position:fixed;left:'+rect.left+'px;top:'+rect.top+'px;width:'+rect.width+'px;opacity:.75;z-index:9999;pointer-events:none;transition:none;margin:0';
  document.body.appendChild(_tvClone);
  this.classList.add('dragging');
}
function kvTouchMove(e){
  if(!_tvClone||!_tvSrc)return;
  e.preventDefault();
  var dx=e.touches[0].clientX-_tvStartX,dy=e.touches[0].clientY-_tvStartY;
  var rect=_tvSrc.getBoundingClientRect();
  _tvClone.style.left=(rect.left+dx)+'px';_tvClone.style.top=(rect.top+dy)+'px';
  // Find card under touch
  _tvClone.style.display='none';
  var under=document.elementFromPoint(e.touches[0].clientX,e.touches[0].clientY);
  _tvClone.style.display='';
  var tgt=under?under.closest('.lc'):null;
  document.querySelectorAll('.lc').forEach(function(c){c.classList.remove('drag-over');});
  if(tgt&&tgt!==_tvSrc)tgt.classList.add('drag-over');
}
function kvTouchEnd(e){
  if(!_tvSrc){return;}
  if(_tvClone){_tvClone.remove();_tvClone=null;}
  var tgt=document.querySelector('.lc.drag-over');
  document.querySelectorAll('.lc').forEach(function(c){c.classList.remove('drag-over','dragging');});
  if(tgt&&tgt!==_tvSrc){
    var grid=document.getElementById('kv_grid');
    var cards=[].slice.call(grid.querySelectorAll('.lc'));
    var si=cards.indexOf(_tvSrc),ti=cards.indexOf(tgt);
    if(si<ti)grid.insertBefore(_tvSrc,tgt.nextSibling);
    else grid.insertBefore(_tvSrc,tgt);
  }
  _tvSrc=null;
}

// ── GPS + PLUS CODE ────────────────────────────────────────────
function _toPlusCode(lat,lng){
  const C='23456789CFGHJMPQRVWX';
  const S=[20,1,0.05,0.0025,0.000125];
  let la=lat+90,lo=lng+180,code='';
  for(let i=0;i<5;i++){
    const sz=S[i];
    const ld=Math.floor(la/sz)%20;
    const od=Math.floor(lo/sz)%20;
    la=la%sz;lo=lo%sz;
    code+=C[ld]+C[od];
    if(i===3)code+='+';
  }
  return code;
}

function capGPS(){
  const btn=$('gbtn'),st=$('gst'),ma=$('mapa'),inp=$('cf_gp');
  if(!navigator.geolocation){
    st.innerHTML='<span style="color:var(--er)">❌ GPS no soportado</span>';
    return;
  }
  gps=null;inp.value='';
  if(ma)ma.style.display='none';
  btn.disabled=true;
  btn.innerHTML='<i class="ti ti-loader"></i> Obteniendo...';
  st.innerHTML='<span style="color:var(--t2)">📡 Buscando señal GPS...</span>';

  function aplicar(pos){
    const lat=pos.coords.latitude;
    const lng=pos.coords.longitude;
    const acc=Math.round(pos.coords.accuracy);
    const pc=_toPlusCode(lat,lng);
    const pcs=pc.slice(-7);
    gps={lat:lat.toFixed(6),lng:lng.toFixed(6),plusCode:pc,acc:acc};
    inp.value=pc+'  ('+lat.toFixed(5)+', '+lng.toFixed(5)+')';
    const col=acc<=30?'var(--green)':acc<=100?'#e8a020':'var(--er)';
    st.innerHTML=
      '<span style="color:var(--green)">✅ Capturado</span> · '+
      '<span style="color:'+col+'">±'+acc+'m</span> · '+
      '<b style="background:#faeeda;border:1px solid #ba7517;color:#633806;padding:2px 8px;border-radius:4px;font-size:12px">'+pcs+'</b>';
    if(ma)ma.style.display='flex';
    btn.disabled=false;
    btn.innerHTML='<i class="ti ti-current-location" style="font-size:12px"></i> Actualizar';
  }

  function err1(e){
    // 2do intento: sin alta precisión (más rápido, usa WiFi/celular)
    st.innerHTML='<span style="color:var(--t2)">📶 Usando señal de red...</span>';
    navigator.geolocation.getCurrentPosition(aplicar,function(e2){
      btn.disabled=false;
      btn.innerHTML='<i class="ti ti-current-location" style="font-size:12px"></i> Reintentar';
      if(e.code===1||e2.code===1){
        st.innerHTML='<span style="color:var(--er)">🔒 Permiso denegado — toca el candado 🔒 en la barra del navegador → Ubicación → Permitir</span>';
      }else{
        st.innerHTML='<span style="color:var(--er)">❌ Sin señal. Asegúrate de tener GPS activo y estar al aire libre.</span>';
      }
    },{enableHighAccuracy:false,timeout:8000,maximumAge:30000});
  }

  // 1er intento: GPS chip de alta precisión
  navigator.geolocation.getCurrentPosition(aplicar,err1,{
    enableHighAccuracy:true,
    timeout:10000,
    maximumAge:0
  });
}

      <div class="st"><div class="sv" style="font-size:14px">${fM(cart)}</div><div class="sl2">Cartera</div></div>
      <div class="st"><div class="sv">${apro.length}</div><div class="sl2">Total</div></div>
    </div>`;
  if(!apro.length)h+=`<div class="empty"><i class="ti ti-cash"></i>No hay contratos aprobados aún</div>`;

  if(sald.length){h+=`<div class="sl" style="margin-top:10px">Saldados (${sald.length})</div>`;sald.forEach(c=>{h+=cobCard(c);});}
  return h+'</div>';
}
function cobCard(c){
  const saldo=c.saldo||0,isE=expId===('c'+c.id);let body='';
  if(isE){
    const hist=(c.abonos||[]).map(a=>`<div style="display:flex;justify-content:space-between;font-size:12px;padding:4px 0;border-bottom:1px solid var(--br)"><span>${a.f} — ${a.q}</span><b style="color:var(--green)">${fM(a.m)}</b></div>`).join('');
    body=`<div class="cc-bd">
      <div class="dg">
        <div><div class="dl">Cédula</div><div class="dv">${c.cedula}</div></div>
        <div><div class="dl">Teléfono</div><div class="dv">${c.tel1}</div></div>
        <div><div class="dl">Monto original</div><div class="dv">${fM(c.monto)}</div></div>
        ${c.descuento>0?`<div><div class="dl">Descuento</div><div class="dv" style="color:var(--red)">- ${fM(c.descuento)}</div></div>
        <div><div class="dl">Neto</div><div class="dv" style="color:var(--green);font-weight:700">${fM(c.neto||c.monto)}</div></div>`:''}
        <div><div class="dl">Saldo</div><div class="dv" style="font-weight:600;color:${saldo>0?'var(--red)':'var(--green)'}">${fM(saldo)}</div></div>
        ${c.tipo==='credito'?`<div><div class="dl">Vence</div><div class="dv">${fD(c.lim)}</div></div>`:''}
        <div><div class="dl">Tipo</div><div class="dv">${c.tipo}</div></div>
      </div>
      ${hist?`<div class="sl">Historial abonos</div>${hist}`:''}
      ${(c.fF||c.fR||c.fFac)?`<div style="margin:10px 0 6px;padding-top:10px;border-top:1px solid var(--br)">
        <div style="font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--k-mist);margin-bottom:8px"><i class="ti ti-camera"></i> Fotos del contrato</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          ${c.fF?`<div style="cursor:pointer;text-align:center" onclick="verFoto('`+c.fF+`','Cédula Frente')">
            <img src="`+c.fF+`" style="width:80px;height:54px;object-fit:cover;border-radius:7px;border:2px solid rgba(196,138,31,.3)">
            <div style="font-size:9px;color:var(--t2);margin-top:2px">Cédula Frente</div>
          </div>`:''}
          ${c.fR?`<div style="cursor:pointer;text-align:center" onclick="verFoto('`+c.fR+`','Cédula Reverso')">
            <img src="`+c.fR+`" style="width:80px;height:54px;object-fit:cover;border-radius:7px;border:2px solid rgba(196,138,31,.3)">
            <div style="font-size:9px;color:var(--t2);margin-top:2px">Cédula Reverso</div>
          </div>`:''}
          ${c.fFac?`<div style="cursor:pointer;text-align:center" onclick="verFoto('`+c.fFac+`','Factura Física')">
            <img src="`+c.fFac+`" style="width:80px;height:54px;object-fit:cover;border-radius:7px;border:2px solid rgba(21,101,192,.3)">
            <div style="font-size:9px;color:#1565C0;margin-top:2px;font-weight:600">Factura</div>
          </div>`:''}
        </div>
      </div>`:''}
    ${saldo>0?`<div style="display:flex;gap:7px;margin-top:9px;flex-wrap:wrap">
        <input type="number" id="abo_${c.id}" placeholder="Monto abono RD$" style="flex:1;padding:7px;border:1px solid var(--br2);border-radius:var(--r);font-family:inherit;font-size:12px">
        <button class="bv" onclick="abonar(${c.id})"><i class="ti ti-plus"></i> Abono</button>
        <button class="bg" onclick="saldar(${c.id})"><i class="ti ti-check"></i> Saldado</button>
        <button class="bs" onclick="noPago(${c.id})"><i class="ti ti-x"></i> No pagó</button>
      </div>`:'<div style="text-align:center;padding:7px;color:var(--green);font-size:12px;font-weight:600"><i class="ti ti-circle-check"></i> Saldado</div>'}
    </div>`;
  }
  return `<div class="cobc${isE?' exp':''}">
    <div class="cob-hd" onclick="togCob(${c.id})">
      <div style="flex:1;min-width:0">
        <div style="font-size:13px;font-weight:600">${c.cliente}</div>
        <div style="font-size:10px;color:var(--t2);margin-top:1px">${c.fac} · ${c.promotor} · ${fD(c.fecha)}</div>
      </div>
      <div style="text-align:right;flex-shrink:0">
        <div style="font-size:14px;font-weight:700;color:${saldo>0?'var(--red)':'var(--green)'}">${fM(saldo)}</div>
        <div style="font-size:10px;color:var(--t2)">${saldo>0?'Pendiente':'Saldado'}</div>
      </div>
      <i class="ti ti-chevron-${isE?'up':'down'}" style="font-size:14px;color:var(--t2)"></i>
    </div>${body}</div>`;
}
function togCob(id){expId=expId===('c'+id)?null:'c'+id;$('main').innerHTML=rCobros();}
function abonar(id){const c=contratos.find(x=>x.id===id);if(!c)return;const m=parseFloat($('abo_'+id)?.value)||0;if(m<=0){alert('Monto inválido.');return;}if(!c.abonos)c.abonos=[];c.abonos.push({f:hoy(),m,q:ses.n});c.saldo=Math.max(0,(c.saldo||0)-m);guardar();$('main').innerHTML=rCobros();}
function saldar(id){const c=contratos.find(x=>x.id===id);if(!c||!confirm('¿Marcar como saldado?'))return;if(!c.abonos)c.abonos=[];c.abonos.push({f:hoy(),m:c.saldo||0,q:ses.n,nota:'Saldado'});c.saldo=0;guardar();$('main').innerHTML=rCobros();}
async function noPago(id){
  const c=contratos.find(x=>x.id===id);if(!c)return;
  // monto 0 a propósito: deja una visita registrada sin afectar el saldo
  // (no pasa por registrarPago() porque esa función descarta los montos <= 0).
  try{await apiFetch(`/api/contratos/${id}/abonar`,{method:'POST',body:{monto:0,via:'cobros',nota:'No pagó'}});}
  catch(e){alert('No se pudo registrar la visita: '+e.message);return;}
  if(!c.abonos)c.abonos=[];c.abonos.push({f:hoy(),m:0,q:ses.n,nota:'No pagó'});
  $('main').innerHTML=rCobros();
}

function rArqueo(){
  return `<div class="card">

    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px">
      <button class="bg" id="at_sal" onclick="aTab('sal')"><i class="ti ti-truck"></i> Despacho</button>
      <button class="bs" id="at_arq" onclick="aTab('arq')"><i class="ti ti-clipboard-check"></i> Arqueo</button>
      <button class="bs" id="at_his" onclick="aTab('his')"><i class="ti ti-history"></i> Historial</button>
    </div>
    <div id="aq_cont"></div>

}
function aTab(t){
  ['sal','arq','his'].forEach(x=>{const b=$('at_'+x);if(b)b.className=x===t?'bg':'bs';});
  const c=$('aq_cont');if(!c)return;
  if(t==='sal'){
    c.innerHTML=`<div class="sl">Despacho de salida</div>
    <div class="g2" style="margin-bottom:10px">
      <div class="fi"><label>Fecha</label><input type="date" id="aq_fe" value="${hoy()}"></div>
      <div class="fi"><label>Responsable</label><input id="aq_re" value="${ses.n}" oninput="upper(this)"></div>
    </div>
    <div class="tbl-wrap"><table class="tbl"><thead><tr><th>Producto</th><th>Cantidad</th></tr></thead>
    <tbody>${PRODS.slice(0,15).map((p,i)=>`<tr><td style="font-size:11px">${p}</td><td><input type="number" id="qs_${i}" min="0" value="0"></td></tr>`).join('')}</tbody></table></div>
    <div class="actions"><button class="bg" onclick="gDesp()"><i class="ti ti-check"></i> Registrar despacho</button></div>`;
  } else if(t==='arq'){
    const ult=despachos[despachos.length-1];
    if(!ult){c.innerHTML=`<div class="empty"><i class="ti ti-clipboard-list"></i>Registra primero un despacho</div>`;return;}
    c.innerHTML=`<div class="sl">Arqueo — Despacho del ${fD(ult.fecha)}</div>
    <div class="tbl-wrap"><table class="tbl">
    <thead><tr><th>Producto</th><th class="tr">Salió</th><th class="tr">Regresó</th><th class="tr">Vendido</th><th class="tr">Diferencia</th></tr></thead>
    <tbody>${(ult.items||[]).map((it,i)=>`<tr><td style="font-size:11px">${it.p}</td><td class="tr">${it.q}</td>
    <td><input type="number" id="qr_${i}" min="0" value="0" oninput="calcDif(${i},${it.q})" style="width:72px;padding:4px;border:1px solid var(--br2);border-radius:5px;text-align:right;font-family:inherit;font-size:12px"></td>
    <td class="tr" id="vd_${i}">—</td><td class="tr" id="df_${i}">—</td></tr>`).join('')}</tbody></table></div>
    <div class="actions"><button class="bg" onclick="gArqueo()"><i class="ti ti-check"></i> Guardar arqueo</button></div>`;
  } else {
    if(!arqueos.length){c.innerHTML=`<div class="empty"><i class="ti ti-history"></i>Sin arqueos registrados</div>`;return;}
    c.innerHTML=arqueos.slice().reverse().map(a=>`<div class="card" style="margin-bottom:8px"><div style="display:flex;justify-content:space-between;align-items:center"><div><b>${fD(a.fecha)}</b><div style="font-size:11px;color:var(--t2)">${a.resp}</div></div><span class="pill">Cerrado</span></div></div>`).join('');
  }
}
function calcDif(i,sal){const r=parseInt($('qr_'+i)?.value)||0,v=sal-r;if($('df_'+i))$('df_'+i).innerHTML=`<span class="${v>=0?'dok':'dng'}">${v>=0?'+':''}${v}</span>`;if($('vd_'+i))$('vd_'+i).textContent=Math.max(0,v);}
function gDesp(){const items=PRODS.slice(0,15).map((p,i)=>({p,q:parseInt($('qs_'+i)?.value)||0})).filter(x=>x.q>0);if(!items.length){alert('Ingresa cantidades.');return;}despachos.push({id:Date.now(),fecha:$('aq_fe')?.value||hoy(),resp:$('aq_re')?.value||ses.n,items});guardar();alert('Despacho registrado.');aTab('arq');}
function gArqueo(){const ult=despachos[despachos.length-1];if(!ult)return;const res=(ult.items||[]).map((it,i)=>({p:it.p,sal:it.q,reg:parseInt($('qr_'+i)?.value)||0,vend:it.q-(parseInt($('qr_'+i)?.value)||0)}));arqueos.push({id:Date.now(),fecha:hoy(),resp:ses.n,res});guardar();alert('Arqueo guardado.');aTab('his');}

      <button class="bs" id="ap_ent" onclick="apTab('ent')"><i class="ti ti-plus"></i> Entrada</button>

function apTab(t){

    <div class="tbl-wrap"><table class="tbl"><thead><tr><th>Producto</th><th class="tr">Stock</th><th class="tr">Estado</th></tr></thead>

  } else if(t==='ent'){
    c.innerHTML=`<div class="sl">Registrar entrada</div>
    <div class="fi"><label>Proveedor</label><input id="ap_prov" placeholder="Nombre del proveedor" oninput="upper(this)"></div>
    <div class="tbl-wrap"><table class="tbl"><thead><tr><th>Producto</th><th>Cantidad entrada</th></tr></thead>
    <tbody>${PRODS.map((p,i)=>`<tr><td style="font-size:11px">${p}</td><td><input type="number" id="ae_${i}" min="0" value="0" style="width:80px;padding:4px;border:1px solid var(--br2);border-radius:5px;text-align:right;font-family:inherit;font-size:12px"></td></tr>`).join('')}</tbody></table></div>
    <div class="actions"><button class="bg" onclick="gEntrada()"><i class="ti ti-check"></i> Registrar entrada</button></div>`;

function gEntrada(){const prov=$('ap_prov')?.value||'Sin especificar';const items=PRODS.map((p,i)=>({p,q:parseInt($('ae_'+i)?.value)||0})).filter(x=>x.q>0);if(!items.length){alert('Ingresa cantidades.');return;}items.forEach(({p,q})=>{almP[p]=(almP[p]||0)+q;});entAlm.push({id:Date.now(),fecha:hoy(),prov,q:ses.n,items});guardar();alert('Entrada registrada.');apTab('stk');}

function rAlmM(){
  return `<div class="card">
    <div class="ct"><i class="ti ti-truck" style="color:var(--gold);font-size:18px"></i>Almacén Móvil</div>

    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px">
      <button class="bg" id="am_inv" onclick="amTab('inv')"><i class="ti ti-package"></i> Inventario</button>
      <button class="bs" id="am_vta" onclick="amTab('vta')"><i class="ti ti-shopping-cart"></i> Venta</button>
      <button class="bs" id="am_car" onclick="amTab('car')"><i class="ti ti-truck-loading"></i> Cargar ruta</button>
    </div>
    <div id="almm_c"></div>
  </div>`;
}
function amTab(t){
  ['inv','vta','car'].forEach(x=>{const b=$('am_'+x);if(b)b.className=x===t?'bg':'bs';});
  const c=$('almm_c');if(!c)return;
  if(t==='inv'){
    const tot=PRODS.reduce((s,p)=>s+(almM[p]||0),0);
    c.innerHTML=`<div style="font-size:12px;color:var(--t2);margin-bottom:9px">Total en ruta: <b style="color:var(--tx)">${tot} unidades</b></div>
    <div class="ig">${PRODS.map(p=>{const q=almM[p]||0,mx=almP[p]>0?almP[p]:q||1,pct=Math.min(100,Math.round(q/mx*100)),cls=q===0?'crit':q<3?'warn':'ok';return`<div class="ic ${cls}"><div class="in">${p.substring(0,20)}</div><div style="display:flex;justify-content:space-between;font-size:11px"><span style="color:var(--t2)">Disponible</span><b style="color:${q===0?'var(--red)':q<3?'#D97706':'var(--green)'}">${q}</b></div><div class="ibg"><div class="ib" style="width:${pct}%;background:${q===0?'var(--red)':q<3?'#D97706':'var(--green)'}"></div></div></div>`;}).join('')}</div>`;
  } else if(t==='vta'){
    c.innerHTML=`<div class="sl">Registrar venta en ruta</div>
    <div class="fi"><label>Cliente</label><input id="am_cli" placeholder="Nombre del cliente" oninput="upper(this)"></div>
    <div class="tbl-wrap"><table class="tbl"><thead><tr><th>Producto</th><th class="tr">En guagua</th><th>Vendido</th></tr></thead>
    <tbody>${PRODS.map((p,i)=>`<tr><td style="font-size:11px">${p}</td><td class="tr">${almM[p]||0}</td>
    <td><input type="number" id="av_${i}" min="0" max="${almM[p]||0}" value="0" style="width:70px;padding:4px;border:1px solid var(--br2);border-radius:5px;text-align:right;font-family:inherit;font-size:12px"></td></tr>`).join('')}</tbody></table></div>
    <div class="actions"><button class="bg" onclick="gVenta()"><i class="ti ti-check"></i> Registrar venta</button></div>`;
  } else {
    c.innerHTML=`<div class="sl">Cargar ruta desde bodega</div>
    <div class="tbl-wrap"><table class="tbl"><thead><tr><th>Producto</th><th class="tr">En bodega</th><th>Cargar</th></tr></thead>
    <tbody>${PRODS.map((p,i)=>`<tr><td style="font-size:11px">${p}</td><td class="tr">${almP[p]||0}</td>
    <td><input type="number" id="ac_${i}" min="0" max="${almP[p]||0}" value="0" style="width:70px;padding:4px;border:1px solid var(--br2);border-radius:5px;text-align:right;font-family:inherit;font-size:12px"></td></tr>`).join('')}</tbody></table></div>
    <div class="actions"><button class="bg" onclick="gCarga()"><i class="ti ti-truck-loading"></i> Cargar ruta</button></div>`;
  }
}
function gVenta(){const cli=$('am_cli')?.value||'Cliente';const items=PRODS.map((p,i)=>({p,q:parseInt($('av_'+i)?.value)||0})).filter(x=>x.q>0);if(!items.length){alert('Selecciona productos.');return;}let err=false;items.forEach(({p,q})=>{if(q>(almM[p]||0)){alert('Stock insuficiente: '+p);err=true;}});if(err)return;items.forEach(({p,q})=>{almM[p]=(almM[p]||0)-q;});movAlm.push({id:Date.now(),fecha:hoy(),tipo:'venta',cli,q:ses.n,items});guardar();alert('Venta registrada.');amTab('inv');}
function gCarga(){const items=PRODS.map((p,i)=>({p,q:parseInt($('ac_'+i)?.value)||0})).filter(x=>x.q>0);if(!items.length){alert('Selecciona productos.');return;}let err=false;items.forEach(({p,q})=>{if(q>(almP[p]||0)){alert('Stock insuficiente en bodega: '+p);err=true;}});if(err)return;items.forEach(({p,q})=>{almP[p]=(almP[p]||0)-q;almM[p]=(almM[p]||0)+q;});movAlm.push({id:Date.now(),fecha:hoy(),tipo:'carga',q:ses.n,items});guardar();alert('Ruta cargada.');amTab('inv');}

function calcC(i){
  const cr=Number($('cc_'+i)?.value||0),co=Number($('co_'+i)?.value||0);
  const c8=Math.round(cr*0.08),c16=Math.round(co*0.16),tot=c8+c16;
  if($('c8_'+i))$('c8_'+i).textContent=cr>0?fM(c8):'—';
  if($('c16_'+i))$('c16_'+i).textContent=co>0?fM(c16):'—';
  if($('ct_'+i))$('ct_'+i).textContent=tot>0?fM(tot):'—';
  let tcc=0,tc8=0,tco=0,tc16=0,tg=0;
  PROMS.forEach((_,j)=>{const c=Number($('cc_'+j)?.value||0),o=Number($('co_'+j)?.value||0);tcc+=c;tco+=o;tc8+=Math.round(c*0.08);tc16+=Math.round(o*0.16);tg+=Math.round(c*0.08)+Math.round(o*0.16);});
  if($('tot_cc'))$('tot_cc').textContent=fM(tcc);if($('tot_c8'))$('tot_c8').textContent=fM(tc8);if($('tot_co'))$('tot_co').textContent=fM(tco);if($('tot_c16'))$('tot_c16').textContent=fM(tc16);if($('tot_gt'))$('tot_gt').textContent=fM(tg);
}
function gSemCom(){
  const de=$('cs_de')?.value,ha=$('cs_ha')?.value,mes=$('cs_ms')?.value||'Sin mes';
  if(!de){alert('Selecciona la fecha de inicio.');return;}
  const proms=PROMS.map((n,i)=>{const vc=Number($('cc_'+i)?.value||0),vo=Number($('co_'+i)?.value||0),c8=Math.round(vc*0.08),c16=Math.round(vo*0.16),tot=c8+c16;return{n,vc,vo,c8,c16,tot};});
  const tot=proms.reduce((s,p)=>s+p.tot,0);
  if(!tot){alert('Ingresa al menos una venta.');return;}
  semanas.unshift({id:Date.now(),de,ha:ha||de,mes,proms,tot,q:ses.n,hora:now(),pag:false});
  guardar();alert('Semana guardada.');cTab('d5');
}
function marcarPag(){
  const pend=semanas.filter(s=>!s.pag),tot=pend.reduce((s,w)=>s+w.tot,0),mes=[...new Set(pend.map(w=>w.mes))].join(', ');
  if(!confirm(`¿Confirmar pago de ${fM(tot)} — ${pend.length} semana${pend.length!==1?'s':''} — ${mes}?`))return;
  pend.forEach(s=>s.pag=true);
  pagos.unshift({id:Date.now(),fecha:hoy(),mes,ns:pend.length,tot,q:ses.n,hora:now()});
  guardar();cTab('d5');
}

function conFB(){
  const raw=$('fb_in')?.value?.trim(),err=$('fb_err');
  if(!raw){err.textContent='Pega la configuración de Firebase';return;}
  try{
    const m=raw.match(/\{[\s\S]*\}/);const cfg=JSON.parse(m?m[0]:raw);
    if(!cfg.apiKey||!cfg.projectId){err.textContent='Falta apiKey o projectId';return;}
    localStorage.setItem('k_fb',JSON.stringify(cfg));err.textContent='';
    iFB(cfg);$('main').innerHTML=rCfg();
  }catch(e){err.textContent='JSON inválido — copia solo el objeto { }';}
}
function descFB(){if(!confirm('¿Desconectar Firebase?'))return;localStorage.removeItem('k_fb');window._fbSync=null;$('main').innerHTML=rCfg();}
function iFB(cfg){
  const ss=['https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js','https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js'];
  let n=0;ss.forEach(src=>{const s=document.createElement('script');s.src=src;s.onload=()=>{if(++n===ss.length)sFB(cfg);};document.head.appendChild(s);});
}
function sFB(cfg){
  try{
    if(!firebase.apps.length)firebase.initializeApp(cfg);
    const db=firebase.firestore();db.enablePersistence({synchronizeTabs:true}).catch(()=>{});
    const ref=db.collection('keraven').doc('data');
    ref.onSnapshot(snap=>{
      if(!snap.exists)return;const d=snap.data();if(!d||!d.ts)return;
      const loc=parseInt(localStorage.getItem('k_ts')||'0');
      if(d.ts>loc){contratos=d.c||contratos;semanas=d.s||semanas;pagos=d.p||pagos;facN=d.f||facN;almM=d.am||almM;almP=d.ap||almP;movAlm=d.mv||movAlm;entAlm=d.ea||entAlm;despachos=d.de||despachos;arqueos=d.ar||arqueos;guardar();localStorage.setItem('k_ts',d.ts);if(ses)render(pag);}
    });
    window._fbSync=()=>{const ts=Date.now();localStorage.setItem('k_ts',ts);ref.set({c:contratos,s:semanas,p:pagos,f:facN,am:almM,ap:almP,mv:movAlm,ea:entAlm,de:despachos,ar:arqueos,emp:empleados,nom:nominas,pag:pagar,cli:crm,ast:asientos,ts}).catch(()=>{});}
  }catch(e){}
}

function xls(data,cols,nom,modTit){
  var modLabel=(modTit||nom.replace('KERAVEN_','').replace(/_/g,' ')).toUpperCase();
  var usr=ses&&ses.n?ses.n:'Sistema';

  var hora=ahora.toLocaleTimeString('es-DO',{hour:'2-digit',minute:'2-digit'});
  var nc=cols.length;

  // Colores CELESTE/AZUL CLARO
  var C={
    hdr1:'#0277BD',   // azul marino suave (encabezado empresa)
    hdr2:'#0288D1',   // azul medio (subtítulo)
    hdr3:'#29B6F6',   // celeste claro (módulo)
    hdr4:'#E1F5FE',   // celeste muy claro (metadata)
    colHdr:'#01579B', // azul oscuro (columnas)
    colTxt:'#FFFFFF', // blanco (texto en columnas)

    row2:'#FFFFFF',   // blanco (filas impares)
    rowTxt:'#0D1B2A', // casi negro azulado (texto datos)
    foot:'#0277BD',   // azul (pie)
    footTxt:'#FFFFFF', // blanco (texto pie)
    accent:'#29B6F6', // acento celeste
    border:'#BBDEFB'  // borde celeste claro
  };

  function isNum(v){return v!==''&&v!==null&&v!==undefined&&!isNaN(Number(v))&&typeof v!=='boolean';}

  var colHdrs=cols.map(function(c){
    return'<td style="background:'+C.colHdr+';color:'+C.colTxt+
      ';font-weight:bold;font-size:12pt;text-align:center;padding:12px 14px'+
      ';border:1px solid '+C.colHdr+';font-family:Calibri,Arial;letter-spacing:0.5px'+
      ';vertical-align:middle">'+c+'</td>';
  }).join('');

  var dataRows=data.map(function(row,ri){
    var bg=ri%2===0?C.row1:C.row2;
    return'<tr>'+row.map(function(cell,ci){
      var align=isNum(cell)?'right':'left';
      var fw=ci===0?'600':'normal';
      var val=cell!==null&&cell!==undefined?cell:'';
      var fmt=isNum(val)&&String(val).includes('.')?
        parseFloat(val).toLocaleString('es-DO',{minimumFractionDigits:2,maximumFractionDigits:2}):val;
      return'<td style="background:'+bg+';color:'+C.rowTxt+';font-size:11pt;font-weight:'+fw+
        ';text-align:'+align+';padding:8px 12px;border:1px solid '+C.border+
        ';font-family:Calibri,Arial;vertical-align:middle">'+fmt+'</td>';
    }).join('')+'</tr>';
  }).join('');

  // Fila de totales
  var totRow='<tr>'+cols.map(function(c,ci){
    var sum=data.reduce(function(s,r){return s+(isNum(r[ci])?Number(r[ci]):0);},0);
    return'<td style="background:'+C.colHdr+';color:'+C.colTxt+';font-weight:bold;font-size:11pt'+
      ';text-align:right;padding:9px 14px;border:1px solid '+C.hdr1+';font-family:Calibri,Arial">'+
      (sum>0?sum.toLocaleString('es-DO',{minimumFractionDigits:0}):' ')+'</td>';
  }).join('')+'</tr>';

  var htm=[
    '<html xmlns:o="urn:schemas-microsoft-com:office:office"',
    '      xmlns:x="urn:schemas-microsoft-com:office:excel">',
    '<head><meta charset="UTF-8">',
    '<style>body{margin:0}td{mso-number-format:"@"}table{border-collapse:collapse}</style>',
    '</head><body>',
    '<table style="border-collapse:collapse;width:100%;min-width:700px">',

    // ── Fila 1: Empresa ──────────────────────────────────────────
    '<tr><td colspan="'+nc+'" style="background:'+C.hdr1+';color:#FFFFFF'+
      ';font-size:22pt;font-weight:bold;text-align:center;padding:20px 24px'+
      ';font-family:Calibri,Arial;letter-spacing:4px">✦ KERAVEN PROFESIONAL</td></tr>',

    // ── Fila 2: Subtítulo ─────────────────────────────────────────
    '<tr><td colspan="'+nc+'" style="background:'+C.hdr2+';color:#E1F5FE'+
      ';font-size:12pt;text-align:center;padding:8px;font-family:Calibri,Arial;letter-spacing:1px">'+
      'Sistema de Gestión Empresarial — República Dominicana</td></tr>',

    // ── Fila 3: Módulo ─────────────────────────────────────────
    '<tr><td colspan="'+nc+'" style="background:'+C.hdr3+';color:#01579B'+
      ';font-size:15pt;font-weight:bold;text-align:center;padding:12px;font-family:Calibri,Arial;letter-spacing:1px">'+
      '▶  MÓDULO: '+modLabel+'</td></tr>',

    // ── Fila 4: Metadata ──────────────────────────────────────────
    '<tr><td colspan="'+nc+'" style="background:'+C.hdr4+';color:#01579B'+
      ';font-size:11pt;text-align:center;padding:9px;font-style:italic;font-family:Calibri,Arial'+
      ';border-bottom:3px solid '+C.hdr2+'">'+
      '📅 Fecha: '+dia+' — '+hora+'   |   👤 Usuario: '+usr+'</td></tr>',

    // ── Fila 5: Separador ─────────────────────────────────────────
    '<tr><td colspan="'+nc+'" style="background:'+C.row1+';padding:4px;font-size:1pt"> </td></tr>',

    // ── Columnas ─────────────────────────────────────────────────
    '<tr>'+colHdrs+'</tr>',

    // ── Datos ─────────────────────────────────────────────────────
    dataRows,

    // ── Totales ───────────────────────────────────────────────────
    totRow,

    // ── Pie ───────────────────────────────────────────────────────
    '<tr><td colspan="'+nc+'" style="background:'+C.foot+';color:'+C.footTxt+
      ';font-size:10pt;text-align:center;padding:10px;font-family:Calibri,Arial'+
      ';border-top:3px solid '+C.accent+'">'+
      '✦ KERAVEN PROFESIONAL © '+new Date().getFullYear()+
      ' &nbsp;|&nbsp; '+modLabel+' &nbsp;|&nbsp; '+dia+' &nbsp;|&nbsp; Documento Confidencial</td></tr>',

    '</table>'].join('\n');

  var blob=new Blob(['\ufeff'+htm],{type:'application/vnd.ms-excel;charset=UTF-8'});
  var a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='KERAVEN_'+nom+'_'+ahora.toISOString().split('T')[0]+'.xls';
  document.body.appendChild(a);a.click();
  document.body.removeChild(a);
  setTimeout(function(){URL.revokeObjectURL(a.href);},5000);
}

function pedRender(){

  const pasos=[{n:1,l:'Datos'},{n:2,l:'Pedido'},{n:3,l:'Pago'},{n:4,l:'Envío'}];
  h+='<div class="ped-steps">';
  pasos.forEach(({n,l},i)=>{
    const done=pedPaso>n, act=pedPaso===n;
    h+=`<div class="ped-step">
      <div class="ped-step-n${done?' done':act?' act':''}">${done?'✓':n}</div>
      <div class="ped-step-l${act?' act':''}">${l}</div>
    </div>`;
    if(i<3)h+=`<div class="ped-step-line${done?' done':''}"></div>`;
  });
  h+='</div>';

  if(pedPaso===1) h+=pedRenderDatos();
  else if(pedPaso===2) h+=pedRenderProductos();
  else if(pedPaso===3) h+=pedRenderPago();
  else if(pedPaso===4) h+=pedRenderResumen();

  m.innerHTML=h;
  // Botones de categoría
  if(pedPaso===2){
    document.querySelectorAll('.ped-cat').forEach(b=>{
      b.classList.toggle('act',b.dataset.cat===pedCatActiva);
    });
  }
}

      </div>

        <button class="ped-qty-btn" onclick="pedQty('${p.replace(/'/g,"\\'")}',−1)">−</button>

function pedSetCat(c){pedCatActiva=c;pedRender();}
function pedQty(p,d,maxStk){
  if(typeof maxStk==='undefined')maxStk=almP[p]||0;
  const cur=pedCarrito[p]||0;
  const nuevo=Math.max(0,cur+d);
  if(nuevo>maxStk&&d>0){return;}
  if(nuevo===0)delete pedCarrito[p]; else pedCarrito[p]=nuevo;
  pedRender();
}

function pedLoadScript(src){
  return new Promise((res,rej)=>{
    if(document.querySelector(`script[src="${src}"]`)){res();return;}
    const s=document.createElement('script');s.src=src;s.onload=res;s.onerror=rej;document.head.appendChild(s);
  });
}

async function pedGenPDFBlob(){
  await pedLoadLibs();
  const wrap=document.createElement('div');
  wrap.style.cssText='position:fixed;left:-9999px;top:0;z-index:-1;background:#fff';
  wrap.innerHTML=pedMakeReceiptHTML();
  document.body.appendChild(wrap);
  await new Promise(r=>setTimeout(r,300));
  const canvas=await window.html2canvas(wrap.firstElementChild,{scale:2,useCORS:true,backgroundColor:'#ffffff',logging:false});
  document.body.removeChild(wrap);
  const {jsPDF}=window.jspdf;
  const pdf=new jsPDF({orientation:'portrait',unit:'px',format:'a4'});
  const pw=pdf.internal.pageSize.getWidth(),ph=pdf.internal.pageSize.getHeight();
  const imgH=pw/(canvas.width/canvas.height);
  if(imgH<=ph){pdf.addImage(canvas.toDataURL('image/jpeg',.95),'JPEG',0,0,pw,imgH);}
  else{let yo=0;const sh=Math.floor(canvas.width*(ph/pw));while(yo<canvas.height){const sc=document.createElement('canvas');sc.width=canvas.width;sc.height=Math.min(sh,canvas.height-yo);sc.getContext('2d').drawImage(canvas,0,-yo);if(yo>0)pdf.addPage();pdf.addImage(sc.toDataURL('image/jpeg',.95),'JPEG',0,0,pw,(sc.height*pw)/sc.width);yo+=sh;}}
  return pdf.output('blob');
}

async function pedEnviarWA(){
  pedEnviando=true; pedErrEnvio=''; pedRender();
  try{
    const blob=await pedGenPDFBlob();
    const file=new File([blob],`KERAVEN-${pedConduce}.pdf`,{type:'application/pdf'});
    // Guardar orden recibida
    const total=PRODS.reduce((s,p)=>s+(pedCarrito[p]||0)*(PED_PRICES[p]||0),0);
    await pedLoadData();
    pedOrdArr.push({id:Date.now(),conduce:pedConduce,fecha:new Date().toISOString().split('T')[0],
      cliente:pedInfo.nombre,cedula:pedInfo.cedula,tel1:pedInfo.tel1,email:pedInfo.email||'',
      ciudad:pedInfo.ciudad,parada:pedInfo.parada,metodo:pedMetodo,
      plazo:pedPlazo||null,codCli:pedCredito?.codigo||null,
      items:PRODS.filter(p=>pedCarrito[p]).map(p=>({p,q:pedCarrito[p],pr:PED_PRICES[p]||0})),
      total,status:'recibido'});
    await pedSaveData();
    // Enviar
    if(navigator.canShare&&navigator.canShare({files:[file]})){
      await navigator.share({files:[file],title:`Pedido KERAVEN — ${pedConduce}`});
    } else {
      const url=URL.createObjectURL(blob);
      const a=document.createElement('a');a.href=url;a.download=`KERAVEN-${pedConduce}.pdf`;a.click();
      setTimeout(()=>URL.revokeObjectURL(url),5000);

  }catch(e){pedErrEnvio='No se pudo generar el PDF. Intenta de nuevo.';}

// ── ISR RD 2024 ───────────────────────────────────────────────────
const ISR_T=[
  {hasta:416220,tasa:0,exceso:0,base:0},
  {hasta:624329,tasa:0.15,exceso:416220.01,base:0},
  {hasta:867123,tasa:0.20,exceso:624329.01,base:31212},
  {hasta:Infinity,tasa:0.25,exceso:867123.01,base:79776},
];
function calcISR(a){for(const t of ISR_T){if(a<=t.hasta)return t.base+Math.max(0,a-t.exceso)*t.tasa;}return 0;}
function calcDesc(bruto){
  const afp=bruto*0.0287,sfs=bruto*0.0304;
  const baseAnual=(bruto-afp-sfs)*12;
  const isr=Math.max(0,calcISR(baseAnual)/12);
  const tot=afp+sfs+isr;
  const escala=baseAnual<=416220?'Exento':baseAnual<=624329?'15%':baseAnual<=867123?'20%':'25%';
  return{afp,sfs,isr,tot,neto:bruto-tot,escala};
}

const diaPago=(ym,q)=>{if(q==='primera')return 15;const[y,m]=(ym||mesAct()).split('-').map(Number);return Math.min(30,new Date(y,m,0).getDate());};

  if(nominas.find(n=>n.mes===ms&&n.quincena===qn)){alert('Ya existe esa nómina.');return;}
  const activos=empleados.filter(e=>e.activo);
  if(!activos.length){alert('No hay empleados activos.');return;}
  const det=activos.map(e=>{
    const bruto=Number(e.salario||0)/2;
    const d=calcDesc(Number(e.salario||0));
    return{nombre:e.nombre,cedula:e.cedula||'',codigo:e.codigo||'',banco:e.banco||'',cuenta:e.cuenta||'',
      cargo:e.cargo||'',bruto,afp:d.afp/2,sfs:d.sfs/2,isr:d.isr/2,totalDesc:d.tot/2,neto:bruto-d.tot/2,escala:d.escala};
  });
  const totalNeto=det.reduce((s,d)=>s+d.neto,0);
  nominas.push({id:nuid(),mes:ms,quincena:qn,fechaPago:fechaPagoStr(ms,qn),det,
    totalNeto,totalBruto:det.reduce((s,d)=>s+d.bruto,0),empleados:activos.length,en:new Date().toISOString()});
  guardar();document.getElementById('nom_proc_modal')?.remove();
  alert(`✅ Nómina procesada. Neto total: ${fM(totalNeto)}`);
  $('main').innerHTML=rNomina();setTimeout(()=>nomRenderTab(),0);
}

function contCalcs(){
  const ingresos=contratos.filter(c=>c.status==='aprobado'&&c.saldo===0).reduce((s,c)=>s+Number(c.monto||0),0);
  const gPagar=pagar.reduce((s,p)=>(p.abonos||[]).reduce((x,a)=>x+a.monto,0)+s,0);
  const gNomina=nominas.reduce((s,n)=>s+Number(n.totalNeto||0),0);
  const gTotal=gPagar+gNomina;
  return{ingresos,gPagar,gNomina,gTotal,util:ingresos-gTotal};
}

let pagExpId=null;

function rPagar(){
  const venc=pagar.filter(p=>p.estado!=='pagado'&&p.vence&&new Date(p.vence)<new Date());
  const pendT=pagar.filter(p=>p.estado!=='pagado').reduce((s,p)=>s+Number(p.monto||0),0);
  let h=`<div class="card">
    <div class="ct"><i class="ti ti-cash-banknote" style="color:var(--red);font-size:18px"></i>Cuentas por Pagar
      <button class="bg" style="margin-left:auto" onclick="pagarAbrirNuevo()"><i class="ti ti-plus"></i> Nueva</button></div>
    <div class="sg" style="margin-bottom:10px">
      <div class="st"><div class="sv" style="color:var(--red)">${fM(pendT)}</div><div class="sl2">Pendiente</div></div>
      <div class="st"><div class="sv" style="color:${venc.length>0?'var(--red)':'var(--t3)'}">⚠️ ${venc.length}</div><div class="sl2">Vencidas</div></div>
      <div class="st"><div class="sv">${pagar.filter(p=>p.estado!=='pagado').length}</div><div class="sl2">Activas</div></div>
      <div class="st"><div class="sv">${pagar.filter(p=>p.estado==='pagado').length}</div><div class="sl2">Pagadas</div></div>
    </div>`;
  if(venc.length){
    h+=`<div style="padding:10px 12px;background:var(--rbg);border:1px solid var(--red);border-radius:var(--r);font-size:12px;color:var(--rdk);margin-bottom:10px">
      <b><i class="ti ti-alert-triangle"></i> ${venc.length} pago(s) vencido(s):</b>
      ${venc.map(v=>`<div style="margin-top:3px;font-weight:500">${v.proveedor} — ${fM(v.monto)} (venció ${fD(v.vence)})</div>`).join('')}
    </div>`;
  }
  pagar.forEach(p=>{
    const saldo=(p.abonos||[]).reduce((s,a)=>s+a.monto,0);
    const pct=Math.min(100,Math.round(saldo/Number(p.monto||1)*100));
    const isE=pagExpId===p.id;
    const vencida=p.estado!=='pagado'&&p.vence&&new Date(p.vence)<new Date();
    let body='';
    if(isE){
      const hist=(p.abonos||[]).map(a=>`<div style="display:flex;justify-content:space-between;font-size:12px;padding:4px 0;border-bottom:1px solid var(--br)">${fD(a.fecha)}<b style="color:var(--green)">${fM(a.monto)}</b></div>`).join('');
      body=`<div class="cc-bd">
        <div class="dg">
          <div><div class="dl">Proveedor</div><div class="dv">${p.proveedor}</div></div>
          <div><div class="dl">Concepto</div><div class="dv">${p.concepto||'—'}</div></div>
          <div><div class="dl">Monto</div><div class="dv">${fM(p.monto)}</div></div>
          <div><div class="dl">Vencimiento</div><div class="dv" style="${vencida?'color:var(--red);font-weight:600':''}">${fD(p.vence)}</div></div>
        </div>
        ${hist?`<div class="sl">Pagos realizados</div>${hist}`:''}
        ${p.estado!=='pagado'?`
        <div style="display:flex;gap:7px;margin-top:10px;flex-wrap:wrap">
          <input type="number" id="pag_abo_${p.id}" placeholder="Monto pago RD$" style="flex:1;padding:7px;border:1px solid var(--br2);border-radius:var(--r);font-family:inherit;font-size:12px">
          <button class="bv" onclick="pagarAbonar('${p.id}')"><i class="ti ti-plus"></i> Pago</button>
          <button class="bg" onclick="pagarSaldar('${p.id}')"><i class="ti ti-check"></i> Pagado</button>
        </div>`:'<div style="text-align:center;padding:7px;color:var(--green);font-size:12px;font-weight:600"><i class="ti ti-circle-check"></i> Pagado completamente</div>'}
      </div>`;
    }
    h+=`<div class="cobc${isE?' exp':''}">
      <div class="cob-hd" onclick="pagToggle('${p.id}')" style="border-left:3px solid ${vencida?'var(--red)':p.estado==='pagado'?'var(--green)':'var(--gold)'}">
        <div style="flex:1;min-width:0">
          <div style="font-size:13px;font-weight:600">${p.proveedor}</div>
          <div style="font-size:10px;color:var(--t2)">${p.concepto||''}${p.vence?' · Vence: '+fD(p.vence):''}${vencida?' ⚠️':''}</div>
        </div>
        <div style="text-align:right;flex-shrink:0">
          <div style="font-size:14px;font-weight:700;color:${p.estado==='pagado'?'var(--green)':'var(--red)'}">${fM(Number(p.monto||0)-saldo)}</div>
          <div style="font-size:10px;color:var(--t2)">${p.estado==='pagado'?'Pagado':'Pendiente'}</div>
        </div>
        <i class="ti ti-chevron-${isE?'up':'down'}" style="font-size:14px;color:var(--t2)"></i>
      </div>${body}
    </div>`;
  });
  if(!pagar.length)h+=`<div class="empty"><i class="ti ti-cash-banknote"></i>Sin cuentas por pagar registradas</div>`;
  h+='</div>';
  return h;
}

function pagToggle(id){pagExpId=pagExpId===id?null:id;$('main').innerHTML=rPagar();}
function pagarAbonar(id){const p=pagar.find(x=>x.id===id);if(!p)return;const m=parseFloat($('pag_abo_'+id)?.value)||0;if(m<=0){alert('Monto inválido.');return;}if(!p.abonos)p.abonos=[];p.abonos.push({monto:m,fecha:hoy()});const pg=p.abonos.reduce((s,a)=>s+a.monto,0);p.estado=pg>=Number(p.monto)?'pagado':'parcial';guardar();$('main').innerHTML=rPagar();}
function pagarSaldar(id){const p=pagar.find(x=>x.id===id);if(!p||!confirm('¿Marcar como pagado completamente?'))return;if(!p.abonos)p.abonos=[];p.abonos.push({monto:Number(p.monto)||0,fecha:hoy(),nota:'Saldado'});p.estado='pagado';guardar();pagExpId=null;$('main').innerHTML=rPagar();}

    if(!ya){
      var fecha=c.fecha||hoy();
      var meses=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
      var mesNom=meses[new Date(fecha+'T00:00:00').getMonth()]+' '+new Date(fecha+'T00:00:00').getFullYear();
      var monto=Number(c.monto)||0;
      var esCred=c.tipo==='credito';
      var vc=esCred?monto:0,vo=esCred?0:monto;
      var c8=Math.round(vc*0.08),c16=Math.round(vo*0.16),totCom=c8+c16;
      var promsArr=[{n:c.promotor,vc:vc,vo:vo,c8:c8,c16:c16,tot:totCom}];
      semanas.push({id:'AUTO-'+c.id,facRef:c.id,fac:c.fac,de:fecha,ha:fecha,mes:mesNom,
        proms:promsArr,tot:totCom,q:'Sistema',hora:hoy(),pag:false,auto:true,
        promotor:c.promotor,tipo:c.tipo,monto:monto});
      added++;
    }
  });
  if(added>0){guardar();}
  return added;
}

      var p=c.promotor||'Sin promotor';

      '<div class="st"><div class="sv">'+proms.length+'</div><div class="sl2">Vendedores</div></div>'+

    '</div>'+
    '<div class="tbl-wrap"><table class="tbl"><thead><tr><th>#</th><th>Vendedor</th><th class="tr">Total</th><th class="tr">Aprobados</th><th class="tr">Pend.</th><th class="tr">Rech.</th><th class="tr">Efectividad</th><th class="tr">Monto</th><th class="tr">Comisión</th></tr></thead><tbody>'+
    proms.map(function(p,i){
      var ef=p.total>0?Math.round(p.aprobado/p.total*100):0;
      var efC=ef>=70?'#2E7D32':ef>=50?'#E65100':'#C62828';
      return'<tr>'+
        '<td style="font-weight:700;color:var(--t2)">'+(i+1)+'</td>'+
        '<td style="font-weight:600">'+p.nombre+'</td>'+
        '<td class="tr">'+p.total+'</td>'+
        '<td class="tr" style="color:#2E7D32;font-weight:700">'+p.aprobado+'</td>'+
        '<td class="tr" style="color:#E65100">'+p.pendiente+'</td>'+
        '<td class="tr" style="color:#C62828">'+p.rechazado+'</td>'+
        '<td class="tr"><span style="font-weight:800;color:'+efC+'">'+ef+'%</span></td>'+
        '<td class="tr" style="font-weight:700">'+fM(p.montoApro)+'</td>'+
        '<td class="tr" style="font-weight:800;color:var(--gold)">'+fM(p.com)+'</td>'+
      '</tr>';
    }).join('')+'</tbody></table></div>';
  } else {
    var zonas={};
    lista.forEach(function(c){var z=c.zona||'Sin zona';
      if(!zonas[z])zonas[z]={zona:z,contratos:0,aprobado:0,monto:0,proms:new Set()};
      zonas[z].contratos++;zonas[z].monto+=Number(c.monto||0);
      if(c.status==='aprobado')zonas[z].aprobado++;
      if(c.promotor)zonas[z].proms.add(c.promotor);
    });
    var pct=lista.length>0?Math.round(lista.filter(function(c){return c.status==='aprobado';}).length/lista.length*100):0;
